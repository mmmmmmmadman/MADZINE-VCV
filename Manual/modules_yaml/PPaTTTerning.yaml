slug: PPaTTTerning
name: PPaTTTerning
hp: 4
wide: false
alt: PPaTTTerning
description:
  en: Minimalist CV sequencer with 5 voltage knobs, 3 pattern styles including custom pattern support, density control, and integrated shift register delay
  zh: 極簡 CV Sequencer，具備 5 個電壓旋鈕、3 種 Pattern 風格（含自訂 Pattern）、Density 控制與整合 Shift Register Delay
  ja: 5つの電圧ノブ、カスタムパターン対応3つのパターンスタイル、密度制御、統合シフトレジスターディレイを備えたミニマリストCVシーケンサー
features:
  en:
  - 5 voltage knobs with pattern mapping
  - Variable length 8-48 steps
  - 3 pattern styles (Sequential/Custom/Jump)
  - Custom pattern via context menu
  - Dual delay system (shift register + CVD)
  zh:
  - 5 個電壓旋鈕含 Pattern 對應
  - 可變長度 8-48 步
  - 3 種 Pattern 風格（Sequential/Custom/Jump）
  - 右鍵選單自訂 Pattern
  - 雙重 Delay 系統（Shift Register + CVD）
  ja:
  - パターンマッピング付き5電圧ノブ
  - 可変長8-48ステップ
  - 3パターンスタイル（Sequential/Custom/Jump）
  - 右クリックメニューでカスタムパターン
  - デュアルディレイシステム（シフトレジスター + CVD）
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Minimalist CV sequencer with five voltage knobs mapped to sequence steps via three pattern algorithms. Density controls the number of active knobs, chaos adds randomization, and a dual-delay system combines shift register (step-based) and CVD (time-based) for creating polyrhythmic textures.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow</h3>
    <p style="margin-bottom: 1rem;">Clock → Step Counter → [Knob Mapping via Style] → CV OUT. CV2 receives the same sequence through shift register delay then optional CVD time delay.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Density Parameter</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Range 0.0-0.2</b>: 2 primary knobs (K1-K2)</li>
    <li><b>Range 0.2-0.4</b>: 3 primary knobs (K1-K3)</li>
    <li><b>Range 0.4-0.6</b>: 4 primary knobs (K1-K4)</li>
    <li><b>Range 0.6-1.0</b>: 5 primary knobs (K1-K5)</li>
    <li><b>High Density Bonus</b>: Above 0.8, additional pattern variations every clamp(length/8, 3, 8) steps</li>
    <li><b>Unused Knobs</b>: Inserted at regular intervals even when not primary</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Style Modes</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Sequential (Red LED)</b>: Simple cycle through primary knobs, wrapping at pattern length</li>
    <li><b>Custom (Green LED)</b>: User-defined pattern editable via right-click menu. Default is a 32-step Steve Reich-inspired motif. Enter knob numbers 1-5 to define your own pattern.</li>
    <li><b>Jump (Blue LED)</b>: Alternates between distant knobs using pattern [0,2,4,1,3]. Creates wider melodic intervals.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Custom Pattern</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Access</b>: Right-click menu → Custom Pattern section</li>
    <li><b>Format</b>: Enter numbers 1-5 representing knobs (e.g., "12312345")</li>
    <li><b>Default</b>: 32-step phasing pattern [1,2,3,1,2,3,4,5,4,5,1,2,3,1,2,3,4,5,4,5,2,4,3,5,1,3,2,4,1,5,3,2]</li>
    <li><b>Density Interaction</b>: Pattern values are clamped to available knobs based on Density setting</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaos Parameter</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Step Randomization</b>: Randomizes up to 50% of steps based on chaos amount</li>
    <li><b>High Chaos (&gt;50%)</b>: Randomly selects knobs outside the density range, creating unexpected variations</li>
    <li><b>Result</b>: Higher chaos creates less predictable, more generative sequences</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Voltage Knobs (K1-K5)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Range</b>: -10V to +10V each</li>
    <li><b>Defaults</b>: K1=0V, K2=2V, K3=4V, K4=6V, K5=8V (ascending pattern)</li>
    <li><b>Use Case</b>: Set to scale notes for melodic sequences, or arbitrary values for modulation</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Trigger Generation</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>TRIG Output</b>: Generates 10ms pulse when CV value changes from previous step</li>
    <li><b>TRIG2 Output</b>: Generates 10ms pulse when CV2 value changes</li>
    <li><b>No Trigger</b>: If consecutive steps output the same voltage, no trigger fires</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Delay System (Track 2)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>T2.DLY (Shift Register)</b>: 0-5 step delay. Stores last 8 CV values in circular buffer. LED brightness indicates delay amount.</li>
    <li><b>CVD (Time Delay)</b>: 0-1000ms continuous delay. Buffer size: 192,000 samples (~4.3s at 44.1kHz).</li>
    <li><b>CV Modulation</b>: When CVD CV input is connected, knob acts as attenuator for CV. Formula: (CV/10V) × knob × 1000 = delay time in ms.</li>
    <li><b>Combined Delay</b>: CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CV OUT</b>: Main sequence output (current knob voltage)</li>
    <li><b>TRIG</b>: Trigger on CV change (10ms pulse)</li>
    <li><b>CV2</b>: Delayed sequence (shift register + CVD)</li>
    <li><b>TRIG2</b>: Trigger on CV2 change (10ms pulse)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Knob voltage range: ±10V</li>
    <li>Sequence length: 8-48 steps</li>
    <li>Shift register delay: 0-5 steps</li>
    <li>CVD delay: 0-1000ms</li>
    <li>CVD buffer: 192,000 samples</li>
    <li>Trigger pulse width: 10ms</li>
    <li>Processing: 32-bit floating point</li>
    <li>Module width: 4HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CPU Optimization</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Pattern mapping regenerated only when DENSITY, CHAOS, or STYLE parameters change, on Reset, or on preset load - not on every clock</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>K1</b>: Voltage knob 1. Range -10V to +10V, default 0V.</li>
    <li><b>K2</b>: Voltage knob 2. Range -10V to +10V, default 2V.</li>
    <li><b>K3</b>: Voltage knob 3. Range -10V to +10V, default 4V.</li>
    <li><b>K4</b>: Voltage knob 4. Range -10V to +10V, default 6V.</li>
    <li><b>K5</b>: Voltage knob 5. Range -10V to +10V, default 8V.</li>
    <li><b>Mode</b>: Pattern style selector. Sequential (Red), Custom (Green), Jump (Blue).</li>
    <li><b>Density</b>: Controls active knob count and sequence length (8-48 steps).</li>
    <li><b>Chaos</b>: Randomization amount 0-100%. Higher values create less predictable sequences.</li>
    <li><b>CVD Time/Attenuation</b>: CVD delay time 0-1000ms. Acts as attenuator when CV input is connected.</li>
    <li><b>Delay</b>: Shift register delay 0-5 steps for Track 2.</li>
    <li><b>Clock</b>: Clock input. Rising edge advances the step counter.</li>
    <li><b>Reset</b>: Reset input. Rising edge resets step counter to 0.</li>
    <li><b>CVD Time CV</b>: CV input for CVD delay time modulation (0-10V).</li>
    <li><b>CV</b>: Main CV sequence output (current knob voltage).</li>
    <li><b>Trigger</b>: Trigger output. 10ms pulse when CV value changes from previous step.</li>
    <li><b>CV2</b>: Delayed CV sequence output. Applies shift register delay then CVD time delay to the main sequence.</li>
    <li><b>Trigger 2</b>: Trigger output for CV2. 10ms pulse when delayed CV value changes.</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">極簡 CV Sequencer，透過三種 Pattern 演算法將五個電壓旋鈕對應至序列步進。Density 控制使用的旋鈕數量，Chaos 加入隨機化，雙重 Delay 系統結合 Shift Register（步進基礎）與 CVD（時間基礎）創造 Polyrhythmic 織體。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">訊號流</h3>
    <p style="margin-bottom: 1rem;">Clock → Step Counter → [透過 Style 對應旋鈕] → CV OUT。CV2 接收相同序列，經過 Shift Register Delay 後再經過可選的 CVD Time Delay。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Density 參數</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>範圍 0.0-0.2</b>: 2 個主要旋鈕（K1-K2）</li>
    <li><b>範圍 0.2-0.4</b>: 3 個主要旋鈕（K1-K3）</li>
    <li><b>範圍 0.4-0.6</b>: 4 個主要旋鈕（K1-K4）</li>
    <li><b>範圍 0.6-1.0</b>: 5 個主要旋鈕（K1-K5）</li>
    <li><b>高 Density 加成</b>: 0.8 以上，每 clamp(Length/8, 3, 8) 步增加額外 Pattern 變化</li>
    <li><b>未使用旋鈕</b>: 即使非主要旋鈕也會定期插入</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Style 模式</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Sequential（紅 LED）</b>: 簡單循環主要旋鈕，於 Pattern 長度處環繞</li>
    <li><b>Custom（綠 LED）</b>: 使用者自訂 Pattern，可透過右鍵選單編輯。預設為 32 步 Steve Reich 風格動機。輸入數字 1-5 定義自訂 Pattern。</li>
    <li><b>Jump（藍 LED）</b>: 使用 Pattern [0,2,4,1,3] 在遠距旋鈕間交替。創造更寬的旋律音程。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Custom Pattern</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>存取</b>: 右鍵選單 → Custom Pattern 區段</li>
    <li><b>格式</b>: 輸入數字 1-5 代表旋鈕（例如 "12312345"）</li>
    <li><b>預設</b>: 32 步移相 Pattern [1,2,3,1,2,3,4,5,4,5,1,2,3,1,2,3,4,5,4,5,2,4,3,5,1,3,2,4,1,5,3,2]</li>
    <li><b>Density 互動</b>: Pattern 值會根據 Density 設定限制在可用旋鈕範圍內</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaos 參數</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>步進隨機化</b>: 根據 Chaos 的設定量，對最多 50% 的步進進行隨機化處理</li>
    <li><b>高 Chaos（&gt;50%）</b>: 隨機選取超出 Density 範圍之外的旋鈕數值，藉此創造出意料之外的變化</li>
    <li><b>結果</b>: Chaos 值越高，產生的序列越難以預測，具有更強的生成性特質</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">電壓旋鈕（K1-K5）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>範圍</b>: 各 -10V 至 +10V</li>
    <li><b>預設值</b>: K1=0V，K2=2V，K3=4V，K4=6V，K5=8V（遞增 Pattern）</li>
    <li><b>用途</b>: 設定為音階音符用於旋律序列，或任意值用於 Modulation</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Trigger 生成</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>TRIG 輸出</b>: 當 CV 值與前一步不同時產生 10ms Pulse</li>
    <li><b>TRIG2 輸出</b>: 當 CV2 值變化時產生 10ms Pulse</li>
    <li><b>無 Trigger</b>: 連續步進輸出相同電壓時，不觸發 Trigger</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Delay 系統（Track 2）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>T2.DLY（Shift Register）</b>: 0-5 步 Delay。在循環緩衝區儲存最後 8 個 CV 值。LED 亮度指示 Delay 量。</li>
    <li><b>CVD（Time Delay）</b>: 0-1000ms 連續 Delay。緩衝區大小: 192,000 Samples（44.1kHz 時約 4.3s）。</li>
    <li><b>CV Modulation</b>: 連接 CVD CV 輸入時，旋鈕作為 CV 衰減器。公式: (CV/10V) × knob × 1000 = Delay 時間 (ms)。</li>
    <li><b>組合 Delay</b>: CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CV OUT</b>: 主序列輸出（目前旋鈕電壓）</li>
    <li><b>TRIG</b>: CV 變化時 Trigger（10ms Pulse）</li>
    <li><b>CV2</b>: 延遲序列（Shift Register + CVD）</li>
    <li><b>TRIG2</b>: CV2 變化時 Trigger（10ms Pulse）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>旋鈕電壓範圍: ±10V</li>
    <li>序列長度: 8-48 步</li>
    <li>Shift Register Delay: 0-5 步</li>
    <li>CVD Delay: 0-1000ms</li>
    <li>CVD 緩衝區: 192,000 Samples</li>
    <li>Trigger Pulse 寬度: 10ms</li>
    <li>處理: 32-bit 浮點</li>
    <li>模組寬度: 4HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CPU 最佳化</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Pattern 對應僅在 DENSITY、CHAOS 或 STYLE 參數變化、Reset、或載入 Preset 時重新生成，而非每個 Clock</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>K1</b>: 電壓旋鈕 1。範圍 -10V 至 +10V，預設 0V。</li>
    <li><b>K2</b>: 電壓旋鈕 2。範圍 -10V 至 +10V，預設 2V。</li>
    <li><b>K3</b>: 電壓旋鈕 3。範圍 -10V 至 +10V，預設 4V。</li>
    <li><b>K4</b>: 電壓旋鈕 4。範圍 -10V 至 +10V，預設 6V。</li>
    <li><b>K5</b>: 電壓旋鈕 5。範圍 -10V 至 +10V，預設 8V。</li>
    <li><b>Mode</b>: Pattern 風格選擇器。Sequential（紅）、Custom（綠）、Jump（藍）。</li>
    <li><b>Density</b>: 控制使用旋鈕數量與序列長度（8-48 步）。</li>
    <li><b>Chaos</b>: 隨機化量 0-100%。較高值產生較不可預測的序列。</li>
    <li><b>CVD Time/Attenuation</b>: CVD Delay 時間 0-1000ms。連接 CV 輸入時作為衰減器。</li>
    <li><b>Delay</b>: Track 2 的 Shift Register Delay 0-5 步。</li>
    <li><b>Clock</b>: Clock 輸入。上升邊緣推進 Step Counter。</li>
    <li><b>Reset</b>: Reset 輸入。上升邊緣將 Step Counter 重置為 0。</li>
    <li><b>CVD Time CV</b>: CVD Delay 時間調變 CV 輸入（0-10V）。</li>
    <li><b>CV</b>: 主 CV 序列輸出（目前旋鈕電壓）。</li>
    <li><b>Trigger</b>: Trigger 輸出。當 CV 值與前一步不同時產生 10ms Pulse。</li>
    <li><b>CV2</b>: 延遲 CV 序列輸出。對主序列先施加 Shift Register Delay 再施加 CVD Time Delay。</li>
    <li><b>Trigger 2</b>: CV2 的 Trigger 輸出。延遲 CV 值變化時產生 10ms Pulse。</li>
    </ul>
    <div style="display:none"><ul>
    <li><b>Range 0.0-0.2</b>: 2 個主要旋鈕（K1-K2）</li>
    <li><b>Range 0.2-0.4</b>: 3 個主要旋鈕（K1-K3）</li>
    <li><b>Range 0.4-0.6</b>: 4 個主要旋鈕（K1-K4）</li>
    <li><b>Range 0.6-1.0</b>: 5 個主要旋鈕（K1-K5）</li>
    <li><b>High Density Bonus</b>: 0.8 以上，每 clamp(Length/8, 3, 8) 步增加額外 Pattern 變化</li>
    <li><b>Unused Knobs</b>: 即使非主要旋鈕也會定期插入</li>
    <li><b>Sequential (Red LED)</b>: 簡單循環主要旋鈕，於 Pattern 長度處環繞</li>
    <li><b>Custom (Green LED)</b>: 使用者自訂 Pattern，可透過右鍵選單編輯。預設為 32 步 Steve Reich 風格動機。輸入旋鈕編號 1-5 定義自訂 Pattern。</li>
    <li><b>Jump (Blue LED)</b>: 使用音型 [0,2,4,1,3] 在遠距旋鈕間交替。創造更廣的旋律跳躍</li>
    <li><b>Access</b>: 右鍵選單 → Custom Pattern 區段</li>
    <li><b>Format</b>: 輸入 1-5 代表旋鈕的數字（例如："12312345"）</li>
    <li><b>Default</b>: 32 步移相音型 [1,2,3,1,2,3,4,5,4,5,1,2,3,1,2,3,4,5,4,5,2,4,3,5,1,3,2,4,1,5,3,2]</li>
    <li><b>Density Interaction</b>: Pattern 值根據 Density 設定限制至可用旋鈕</li>
    <li><b>Step Randomization</b>: 根據 Chaos 量對最多 50% 的步驟進行隨機化</li>
    <li><b>High Chaos (>50%)</b>: 隨機選取超出 Density 範圍之外的旋鈕數值，藉此創造出意料之外的變化</li>
    <li><b>Result</b>: Chaos 越高，序列越難以預測，更具生成性</li>
    <li><b>Range</b>: -10V 至 +10V 各旋鈕</li>
    <li><b>Defaults</b>: K1=0V, K2=2V, K3=4V, K4=6V, K5=8V（遞增音型）</li>
    <li><b>Use Case</b>: 可設定為音階音符以產生旋律序列，或設定為任意數值作為調變用途</li>
    <li><b>TRIG Output</b>: CV 值相較上一步驟變化時產生 10ms 脈衝</li>
    <li><b>TRIG2 Output</b>: CV2 值變化時產生 10ms 脈衝</li>
    <li><b>No Trigger</b>: 若連續步驟輸出相同電壓，不產生 Trigger</li>
    <li><b>T2.DLY (Shift Register)</b>: 0-5 步延遲。在循環 Buffer 中儲存最後 8 個 CV 值。LED 亮度指示延遲量</li>
    <li><b>CVD (Time Delay)</b>: 0-1000ms 連續延遲。Buffer 大小：192,000 Samples（44.1kHz 約 4.3s）</li>
    <li><b>Combined Delay</b>: CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    <li><b>CV Modulation</b>: 連接 CVD CV 輸入時，旋鈕作為 CV 衰減器。公式：(CV/10V) x 旋鈕值 x 1000 = Delay 時間（ms）。</li>
    </ul></div>
    <div style="display:none"><ul>
    <li><b>High Chaos (&gt;50%)</b>：Density 範圍外的旋鈕被隨機選取，創造意外變化</li>
    <li><b>Combined Delay</b>：CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    </ul></div>
    <div style="display:none"><ul>
    <li><b>Combined Delay</b>：CV2 = CVD延遲(移位暫存器[步驟 - T2.DLY])</li>
    </ul></div>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">3つのパターンアルゴリズムで5つの電圧ノブをシーケンスステップにマッピングするミニマリストCVシーケンサー。Densityで使用ノブ数を制御、Chaosでランダム化を追加。シフトレジスター（ステップベース）とCVD（タイムベース）を組み合わせたデュアルディレイシステムでポリリズミックなテクスチャを作成。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">信号フロー</h3>
    <p style="margin-bottom: 1rem;">クロック → ステップカウンター → [スタイルによるノブマッピング] → CV OUT。CV2は同じシーケンスをシフトレジスターディレイ経由で受け取り、その後オプションのCVDタイムディレイを経由。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Densityパラメータ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>範囲0.0-0.2</b>: 2つの主要ノブ（K1-K2）</li>
    <li><b>範囲0.2-0.4</b>: 3つの主要ノブ（K1-K3）</li>
    <li><b>範囲0.4-0.6</b>: 4つの主要ノブ（K1-K4）</li>
    <li><b>範囲0.6-1.0</b>: 5つの主要ノブ（K1-K5）</li>
    <li><b>高密度ボーナス</b>: 0.8以上で、clamp(Length/8, 3, 8)ステップごとに追加のパターン変化</li>
    <li><b>未使用ノブ</b>: 主要でなくても定期的に挿入</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">スタイルモード</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Sequential（赤LED）</b>: 主要ノブを単純に循環、パターン長で折り返し</li>
    <li><b>Custom（緑LED）</b>: ユーザー定義パターン、右クリックメニューで編集可能。デフォルトは32ステップSteve Reich風モチーフ。数字1-5を入力してカスタムパターンを定義。</li>
    <li><b>Jump（青LED）</b>: パターン[0,2,4,1,3]を使用して遠いノブ間を交互。より広い旋律音程を作成。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">カスタムパターン</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>アクセス</b>: 右クリックメニュー → Custom Patternセクション</li>
    <li><b>形式</b>: ノブを表す数字1-5を入力（例："12312345"）</li>
    <li><b>デフォルト</b>: 32ステップフェージングパターン [1,2,3,1,2,3,4,5,4,5,1,2,3,1,2,3,4,5,4,5,2,4,3,5,1,3,2,4,1,5,3,2]</li>
    <li><b>Density連携</b>: パターン値はDensity設定に基づき使用可能なノブにクランプ</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaosパラメータ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ステップランダム化</b>: Chaos量に応じて最大50%のステップをランダム化</li>
    <li><b>高Chaos（&gt;50%）</b>: Density範囲外のノブをランダム選択、予想外の変化を生成</li>
    <li><b>結果</b>: より高いChaosはより予測不可能でジェネレーティブなシーケンスを作成</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">電圧ノブ（K1-K5）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>範囲</b>: 各-10V〜+10V</li>
    <li><b>デフォルト</b>: K1=0V、K2=2V、K3=4V、K4=6V、K5=8V（昇順パターン）</li>
    <li><b>用途</b>: メロディックシーケンス用にスケール音に設定、または変調用に任意の値</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">トリガー生成</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>TRIG出力</b>: CV値が前のステップから変化すると10msパルスを生成</li>
    <li><b>TRIG2出力</b>: CV2値が変化すると10msパルスを生成</li>
    <li><b>トリガーなし</b>: 連続するステップが同じ電圧を出力する場合、トリガーは発火しない</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ディレイシステム（トラック2）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>T2.DLY（シフトレジスター）</b>: 0-5ステップディレイ。循環バッファに最後の8つのCV値を保存。LED輝度がディレイ量を表示。</li>
    <li><b>CVD（タイムディレイ）</b>: 0-1000ms連続ディレイ。バッファサイズ: 192,000サンプル（44.1kHzで約4.3s）。</li>
    <li><b>CV変調</b>: CVD CV入力接続時、ノブはCVのアッテネーターとして機能。計算式: (CV/10V) × knob × 1000 = ディレイ時間 (ms)。</li>
    <li><b>組み合わせディレイ</b>: CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CV OUT</b>: メインシーケンス出力（現在のノブ電圧）</li>
    <li><b>TRIG</b>: CV変化時トリガー（10msパルス）</li>
    <li><b>CV2</b>: 遅延シーケンス（シフトレジスター + CVD）</li>
    <li><b>TRIG2</b>: CV2変化時トリガー（10msパルス）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>ノブ電圧範囲: ±10V</li>
    <li>シーケンス長: 8-48ステップ</li>
    <li>シフトレジスターディレイ: 0-5ステップ</li>
    <li>CVDディレイ: 0-1000ms</li>
    <li>CVDバッファ: 192,000サンプル</li>
    <li>トリガーパルス幅: 10ms</li>
    <li>処理: 32ビット浮動小数点</li>
    <li>モジュール幅: 4HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CPU最適化</h3>
    <ul style="padding-left: 1.5rem;">
    <li>パターンマッピングはDENSITY、CHAOS、またはSTYLEパラメータ変更時、リセット時、またはプリセット読み込み時のみ再生成され、クロックごとではない</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>K1</b>: 電圧ノブ1。範囲-10V〜+10V、デフォルト0V。</li>
    <li><b>K2</b>: 電圧ノブ2。範囲-10V〜+10V、デフォルト2V。</li>
    <li><b>K3</b>: 電圧ノブ3。範囲-10V〜+10V、デフォルト4V。</li>
    <li><b>K4</b>: 電圧ノブ4。範囲-10V〜+10V、デフォルト6V。</li>
    <li><b>K5</b>: 電圧ノブ5。範囲-10V〜+10V、デフォルト8V。</li>
    <li><b>Mode</b>: パターンスタイルセレクター。Sequential（赤）、Custom（緑）、Jump（青）。</li>
    <li><b>Density</b>: 使用ノブ数とシーケンス長（8-48ステップ）を制御。</li>
    <li><b>Chaos</b>: ランダム化量0-100%。高値はより予測不可能なシーケンスを生成。</li>
    <li><b>CVD Time/Attenuation</b>: CVDディレイ時間0-1000ms。CV入力接続時はアッテネーターとして機能。</li>
    <li><b>Delay</b>: トラック2のシフトレジスターディレイ0-5ステップ。</li>
    <li><b>Clock</b>: クロック入力。立ち上がりエッジでステップカウンターを進行。</li>
    <li><b>Reset</b>: リセット入力。立ち上がりエッジでステップカウンターを0にリセット。</li>
    <li><b>CVD Time CV</b>: CVDディレイ時間変調用CV入力（0-10V）。</li>
    <li><b>CV</b>: メインCVシーケンス出力（現在のノブ電圧）。</li>
    <li><b>Trigger</b>: トリガー出力。CV値が前ステップから変化すると10msパルスを生成。</li>
    <li><b>CV2</b>: 遅延CVシーケンス出力。メインシーケンスにシフトレジスターディレイ後、CVDタイムディレイを適用。</li>
    <li><b>Trigger 2</b>: CV2のトリガー出力。遅延CV値が変化すると10msパルスを生成。</li>
    </ul>
    <div style="display:none"><ul>
    <li><b>Range 0.0-0.2</b>: 2つのプライマリーノブ（K1-K2）</li>
    <li><b>Range 0.2-0.4</b>: 3つのプライマリーノブ（K1-K3）</li>
    <li><b>Range 0.4-0.6</b>: 4つのプライマリーノブ（K1-K4）</li>
    <li><b>Range 0.6-1.0</b>: 5つのプライマリーノブ（K1-K5）</li>
    <li><b>High Density Bonus</b>: 0.8以上、clamp(Length/8, 3, 8)ステップごとに追加のパターンバリエーション</li>
    <li><b>Unused Knobs</b>: プライマリーでないノブも定期的に挿入される</li>
    <li><b>Sequential (Red LED)</b>: プライマリーノブをシンプルにサイクル、パターン長でラップ</li>
    <li><b>Custom (Green LED)</b>: ユーザー定義パターン、右クリックメニューで編集可能。デフォルトは32ステップSteve Reich風モチーフ。ノブ番号1〜5を入力してカスタムパターンを定義。</li>
    <li><b>Jump (Blue LED)</b>: パターン[0,2,4,1,3]で離れたノブを交互に使用。より広いメロディックジャンプを作成</li>
    <li><b>Access</b>: 右クリックメニュー → カスタムパターンセクション</li>
    <li><b>Format</b>: ノブを表す1〜5の数字を入力（例：「12312345」）</li>
    <li><b>Default</b>: 32ステップフェージングパターン [1,2,3,1,2,3,4,5,4,5,1,2,3,1,2,3,4,5,4,5,2,4,3,5,1,3,2,4,1,5,3,2]</li>
    <li><b>Density Interaction</b>: パターン値はDensity設定に基づいて利用可能なノブにクランプ</li>
    <li><b>Step Randomization</b>: カオス量に基づいて最大50%のステップをランダム化</li>
    <li><b>High Chaos (>50%)</b>: Densityレンジ外のノブをランダム選択、予期しないバリエーションを作成</li>
    <li><b>Result</b>: カオスが高いほど予測しにくくジェネレーティブなシーケンス</li>
    <li><b>Range</b>: 各ノブ -10V〜+10V</li>
    <li><b>Defaults</b>: K1=0V, K2=2V, K3=4V, K4=6V, K5=8V（昇順パターン）</li>
    <li><b>Use Case</b>: スケール音符に設定してメロディックシーケンス、または変調用の任意の値</li>
    <li><b>TRIG Output</b>: CV値が前のステップから変化した時に10msパルスを生成</li>
    <li><b>TRIG2 Output</b>: CV2値が変化した時に10msパルスを生成</li>
    <li><b>No Trigger</b>: 連続するステップが同じ電圧を出力する場合、トリガーは発火しない</li>
    <li><b>T2.DLY (Shift Register)</b>: 0〜5ステップ遅延。循環バッファに最後の8つのCV値を格納。LED輝度が遅延量を示す</li>
    <li><b>CVD (Time Delay)</b>: 0〜1000ms連続ディレイ。バッファサイズ：192,000サンプル（44.1kHzで約4.3s）</li>
    <li><b>Combined Delay</b>: CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    <li><b>CV Modulation</b>: CVD CV入力が接続されている場合、ノブはCVのアッテネーターとして機能。計算式：(CV/10V) x ノブ値 x 1000 = ディレイ時間（ms）。</li>
    </ul></div>
    <div style="display:none"><ul>
    <li><b>High Chaos (&gt;50%)</b>：Densityレンジ外のノブをランダム選択し予期しないバリエーションを生成</li>
    <li><b>Combined Delay</b>：CV2 = CVD_delay(shift_register[step - T2.DLY])</li>
    </ul></div>
    <div style="display:none"><ul>
    <li><b>Combined Delay</b>：CV2 = CVDディレイ(シフトレジスタ[ステップ - T2.DLY])</li>
    </ul></div>
controls:
- name: K1
  type: param
  desc:
    en: Voltage knob 1. Range -10V to +10V, default 0V.
    zh: 電壓旋鈕 1。範圍 -10V 至 +10V，預設 0V。
    ja: 電圧ノブ1。範囲-10V〜+10V、デフォルト0V。
- name: K2
  type: param
  desc:
    en: Voltage knob 2. Range -10V to +10V, default 2V.
    zh: 電壓旋鈕 2。範圍 -10V 至 +10V，預設 2V。
    ja: 電圧ノブ2。範囲-10V〜+10V、デフォルト2V。
- name: K3
  type: param
  desc:
    en: Voltage knob 3. Range -10V to +10V, default 4V.
    zh: 電壓旋鈕 3。範圍 -10V 至 +10V，預設 4V。
    ja: 電圧ノブ3。範囲-10V〜+10V、デフォルト4V。
- name: K4
  type: param
  desc:
    en: Voltage knob 4. Range -10V to +10V, default 6V.
    zh: 電壓旋鈕 4。範圍 -10V 至 +10V，預設 6V。
    ja: 電圧ノブ4。範囲-10V〜+10V、デフォルト6V。
- name: K5
  type: param
  desc:
    en: Voltage knob 5. Range -10V to +10V, default 8V.
    zh: 電壓旋鈕 5。範圍 -10V 至 +10V，預設 8V。
    ja: 電圧ノブ5。範囲-10V〜+10V、デフォルト8V。
- name: Style
  type: param
  desc:
    en: Pattern style selector button. Cycles through Sequential (Red), Custom (Green), Jump (Blue). Default Custom.
    zh: Pattern 風格選擇按鈕。循環切換 Sequential（紅）、Custom（綠）、Jump（藍）。預設 Custom。
    ja: パターンスタイル選択ボタン。Sequential（赤）、Custom（緑）、Jump（青）を循環。デフォルトはCustom。
- name: Density
  type: param
  desc:
    en: Controls active knob count and sequence length (8-48 steps).
    zh: 控制使用旋鈕數量與序列長度（8-48 步）。
    ja: 使用ノブ数とシーケンス長（8-48ステップ）を制御。
- name: Chaos
  type: param
  desc:
    en: Randomization amount 0-100%. Higher values create less predictable sequences.
    zh: 隨機化量 0-100%。較高值產生較不可預測的序列。
    ja: ランダム化量0-100%。高値はより予測不可能なシーケンスを生成。
- name: CVD Time/Attenuation
  type: param
  desc:
    en: CVD delay time 0-1000ms. Acts as attenuator when CV input is connected.
    zh: CVD Delay 時間 0-1000ms。連接 CV 輸入時作為衰減器。
    ja: CVDディレイ時間0-1000ms。CV入力接続時はアッテネーターとして機能。
- name: Delay
  type: param
  desc:
    en: Shift register delay 0-5 steps for Track 2.
    zh: Track 2 的 Shift Register Delay 0-5 步。
    ja: トラック2のシフトレジスターディレイ0-5ステップ。
- name: Clock
  type: input
  desc:
    en: Clock input. Rising edge advances the step counter.
    zh: Clock 輸入。上升邊緣推進 Step Counter。
    ja: クロック入力。立ち上がりエッジでステップカウンターを進行。
- name: Reset
  type: input
  desc:
    en: Reset input. Rising edge resets step counter to 0.
    zh: Reset 輸入。上升邊緣將 Step Counter 重置為 0。
    ja: リセット入力。立ち上がりエッジでステップカウンターを0にリセット。
- name: CVD Time CV
  type: input
  desc:
    en: CV input for CVD delay time modulation (0-10V).
    zh: CVD Delay 時間調變 CV 輸入（0-10V）。
    ja: CVDディレイ時間変調用CV入力（0-10V）。
- name: CV
  type: output
  desc:
    en: Main CV sequence output (current knob voltage).
    zh: 主 CV 序列輸出（目前旋鈕電壓）。
    ja: メインCVシーケンス出力（現在のノブ電圧）。
- name: Trigger
  type: output
  desc:
    en: Trigger output. 10ms pulse when CV value changes from previous step.
    zh: Trigger 輸出。當 CV 值與前一步不同時產生 10ms Pulse。
    ja: トリガー出力。CV値が前ステップから変化すると10msパルスを生成。
- name: CV2
  type: output
  desc:
    en: Delayed CV output combining Shift Register delay (0-5 steps) and CVD time delay (0-1000ms).
