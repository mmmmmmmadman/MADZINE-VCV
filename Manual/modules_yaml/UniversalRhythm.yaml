    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>モジュール幅: 40HP</li>
    <li>ボイス数: 8（ロールあたり2）</li>
    <li>シンセモード: SINE（ピッチあり）、NOISE（ピッチなし）</li>
    <li>パターン保存: MultiVoicePatterns、デフォルト16ステップ</li>
    <li>ディケイ範囲: 12-800ms、プリセット依存</li>
    <li>処理: 32ビット浮動小数点</li>
    </ul>
controls:
- name: Timeline Style
  type: param
  desc:
    en: Timeline role rhythm style (0-9, integer snap, default 0).
    zh: Timeline Role 節奏 Style（0-9，整數對齊，預設 0）。
