    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">10種のワールドミュージックスタイルと8ボイス統合ドラム合成を備えたクロスカルチャーリズム生成器。複数の専用エンジンを使用：PatternGenerator、HumanizeEngine、RestEngine、FillGenerator、ArticulationEngine、KotekanEngine（バリ島インターロッキング）、LlamadaEngine（アフロキューバンコールレスポンス）、CrossRhythmEngine、AsymmetricGroupingEngine、AmenBreakEngine。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">スタイルと周波数範囲</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>West African</b>: Gankogui 4.5kHz、Dununba 80Hz、Djembe 400-700Hz</li>
    <li><b>Afro-Cuban</b>: Clave 4kHz、Tumba 100Hz、Congas 350-550Hz、Timbales 3kHz</li>
    <li><b>Brazilian</b>: Agogô 3-4.5kHz、Surdo 55-80Hz、Tamborim 400Hz、Caixa 500Hz</li>
    <li><b>Balkan</b>: Rim 4kHz、Tapan 90-130Hz、Tarabuka 300-450Hz</li>
    <li><b>Indian</b>: Manjira 6-8kHz、Baya 65-90Hz、Daya 350-500Hz</li>
    <li><b>Gamelan</b>: Kenong 600-700Hz、Gong 90Hz、Bonang 800-1kHz、Gender 1.2kHz</li>
    <li><b>Jazz</b>: Ride 2.5-4.5kHz、Kick 50-80Hz、Snare 400-500Hz、HiHat 6-8kHz</li>
    <li><b>Electronic</b>: HiHat 9-12kHz、808 Kick 45-60Hz、Clap 1.5-2.5kHz</li>
    <li><b>Breakbeat</b>: HiHat 8-10kHz、Kick 55-70Hz、Snare 2-2.5kHz</li>
    <li><b>Techno</b>: HiHat 10-12kHz、909 Kick 42-55Hz、Clap 1.8kHz、Rim 3kHz</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">4ロールシステム（各2ボイス）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline</b>（ボイス0-1）: タイムキーピングレイヤー、通常3-6kHzのベル/ハイハット</li>
    <li><b>Foundation</b>（ボイス2-3）: ベースレイヤー、40-150Hz（キック、低音ドラム）</li>
    <li><b>Groove</b>（ボイス4-5）: 中域250-700Hz（スネア、クラップパターン）</li>
    <li><b>Lead</b>（ボイス6-7）: 高域装飾音とアクセント</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ロール別コントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>STYLE</b>: リズムスタイル（0-9、整数スナップ）</li>
    <li><b>DENSITY</b>: パターン密度。Foundationデフォルト20%、Timeline 40%、その他50%</li>
    <li><b>LENGTH</b>: パターン長（4-32ステップ、整数スナップ）</li>
    <li><b>FREQ</b>: 周波数修正（-1～+1オクターブ）。CV: ±1V = ±0.2オクターブ</li>
    <li><b>DECAY</b>: ディケイ倍率（0.2x～2.0x）</li>
    <li><b>MIX</b>: 内部シンセ（0%）から外部オーディオ（100%）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">外部オーディオVCA</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Velocity Response</b>: 外部オーディオの音量がヒットベロシティに応じて変化し、自然なダイナミクスを生成</li>
    <li><b>Decay Behavior</b>: エンベロープは強いヒットほど速く減衰、アコースティックドラムの特性に一致</li>
    <li><b>Application</b>: 外部オーディオ入力を使用してサンプルや外部シンセ音をリズムパターンに重ねる</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グローバルパラメータ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Variation</b>: パターンバリエーション（デフォルト30%）</li>
    <li><b>Humanize</b>: タイミング/ベロシティヒューマナイズ（デフォルト50%）</li>
    <li><b>Swing</b>: スウィング量（デフォルト50%）</li>
    <li><b>Rest</b>: 休符確率、CV入力対応</li>
    <li><b>Fill</b>: 結合確率+強度（デフォルト30%）</li>
    <li><b>Articulation</b>: アーティキュレーション量。Ghost、Accent、Flam、Drag、Buzz、Ruff技法を有効化。</li>
    <li><b>Ghost Notes</b>: ゴーストノート確率。</li>
    <li><b>Accent</b>: アクセント確率。</li>
    <li><b>Spread</b>: ステレオスプレッド（デフォルト50%）</li>
    <li><b>Regenerate</b>: 現在の設定に基づいて新パターンを生成。</li>
    <li><b>Reset</b>: 全ステップカウンターをゼロにリセット。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">アーティキュレーションシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Types</b>: Normal、Ghost、Accent、Flam、Drag、Buzz、Ruff</li>
    <li><b>Flam/Drag</b>: DelayedTrigger構造体で実装、サンプル精度タイミング</li>
    <li><b>Groove Templates</b>: Auto、Straight、Swing、African、Latin、LaidBack、Pushed</li>
    <li><b>Fill Types</b>: 小節開始時に事前決定、fillStartStepでトリガー</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クロックとタイミング</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>PPQN Settings</b>: 1（四分音符）、2（八分音符）、または4（十六分音符）四分音符あたりのパルス数</li>
    <li><b>Per-Role Steps</b>: 各ロールは独立したステップカウンターを維持</li>
    <li><b>Global Step</b>: 小節トラッキングとFill同期用の共有カウンター</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
