    <li><b>Lead 1 Gate</b>: Leadボイス1ゲート/トリガー出力。</li>
    <li><b>Lead 1 Pitch CV (1V/Oct, C4=0V)</b>: Leadボイス1ピッチCV出力。</li>
    <li><b>Lead 1 Velocity CV</b>: Leadボイス1ベロシティCV出力（0-8V）。</li>
