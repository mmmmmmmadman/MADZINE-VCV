    <li><b>Groove Mix (Int/Ext)</b>: Grooveロール内部シンセ（0%）から外部オーディオ（100%）。</li>
    <li><b>Lead Style</b>: Leadロールリズムスタイル（0-9、整数スナップ）。</li>
    <li><b>Lead Density</b>: Leadロールパターン密度（0-100%、デフォルト50%）。</li>
    <li><b>Lead Length</b>: Leadロールパターン長（4-32ステップ、整数スナップ）。</li>
    <li><b>Lead Freq</b>: Leadロール周波数修正（-1～+1オクターブ）。</li>
    <li><b>Lead Decay</b>: Leadロールディケイ倍率（0.2x～2.0x）。</li>
    <li><b>Lead Mix (Int/Ext)</b>: Leadロール内部シンセ（0%）から外部オーディオ（100%）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>: パターン再生用クロック入力。</li>
    <li><b>Reset</b>: リセット入力。全ステップカウンターをゼロに戻す。</li>
