  type: param
  desc:
    en: Pattern variation amount (0-100%, default 30%).
    zh: Pattern Variation 量（0-100%，預設 30%）。
    ja: パターンバリエーション量（0-100%、デフォルト30%）。
- name: Humanize
  type: param
