    zh: Groove Role 內部合成至外部 Audio 混合（0% = 內部，100% = 外部，預設 0%）。
    ja: Grooveロール内部シンセから外部オーディオへのミックス（0% = 内部、100% = 外部、デフォルト0%）。
- name: Lead Mix
  type: param
  desc:
    en: Lead role internal synth to external audio mix (0% = internal, 100% = external, default 0%).
    zh: Lead Role 內部合成至外部 Audio 混合（0% = 內部，100% = 外部，預設 0%）。
    ja: Leadロール内部シンセから外部オーディオへのミックス（0% = 内部、100% = 外部、デフォルト0%）。
