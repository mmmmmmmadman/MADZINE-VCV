slug: UniversalRhythm
name: Universal Rhythm
hp: 40
wide: true
alt: Universal Rhythm panel
description:
  en: Cross-cultural rhythm generator featuring 10 world music styles, 4 rhythmic roles per style, and 8-voice polyphonic drum synthesis with per-role density and humanize controls
  zh: 跨文化節奏生成器，具備 10 種世界音樂風格、每種風格 4 種節奏角色、8 聲 Polyphonic Drum Synthesis，以及各角色 Density 與 Humanize 控制
  ja: 10種のワールドミュージックスタイル、スタイル別4つのリズムロール、8ボイスポリフォニックドラム合成、ロール別のデンシティとヒューマナイズコントロールを備えたクロスカルチャーリズムジェネレーター
features:
  en:
  - 10 world music rhythm styles
  - 4 rhythmic roles per style
  - 8-voice polyphonic drum synthesis
  - Per-role density and humanize
  - Real-time pattern variation
  zh:
  - 10 種世界音樂節奏風格
  - 每種風格 4 種節奏角色
  - 8 聲 Polyphonic Drum Synthesis
  - 各角色獨立 Density 與 Humanize
  - 即時 Pattern Variation
  ja:
  - 10種のワールドミュージックリズムスタイル
  - スタイル別4つのリズムロール
  - 8ボイスポリフォニックドラム合成
  - ロール別Density・Humanize
  - リアルタイムパターンバリエーション
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Cross-cultural rhythm generator with 10 world music styles and 8-voice integrated drum synthesis. Uses multiple specialized engines: PatternGenerator, HumanizeEngine, RestEngine, FillGenerator, ArticulationEngine, KotekanEngine (Balinese interlocking), LlamadaEngine (Afro-Cuban call-response), CrossRhythmEngine, AsymmetricGroupingEngine, and AmenBreakEngine.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Styles and Frequency Ranges</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>West African</b>: Gankogui 4.5kHz, Dununba 80Hz, Djembe 400-700Hz</li>
    <li><b>Afro-Cuban</b>: Clave 4kHz, Tumba 100Hz, Congas 350-550Hz, Timbales 3kHz</li>
    <li><b>Brazilian</b>: Agogô 3-4.5kHz, Surdo 55-80Hz, Tamborim 400Hz, Caixa 500Hz</li>
    <li><b>Balkan</b>: Rim 4kHz, Tapan 90-130Hz, Tarabuka 300-450Hz</li>
    <li><b>Indian</b>: Manjira 6-8kHz, Baya 65-90Hz, Daya 350-500Hz</li>
    <li><b>Gamelan</b>: Kenong 600-700Hz, Gong 90Hz, Bonang 800-1kHz, Gender 1.2kHz</li>
    <li><b>Jazz</b>: Ride 2.5-4.5kHz, Kick 50-80Hz, Snare 400-500Hz, HiHat 6-8kHz</li>
    <li><b>Electronic</b>: HiHat 9-12kHz, 808 Kick 45-60Hz, Clap 1.5-2.5kHz</li>
    <li><b>Breakbeat</b>: HiHat 8-10kHz, Kick 55-70Hz, Snare 2-2.5kHz</li>
    <li><b>Techno</b>: HiHat 10-12kHz, 909 Kick 42-55Hz, Clap 1.8kHz, Rim 3kHz</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">4-Role System (2 voices each)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline</b> (Voices 0-1): Time-keeping layer, typically 3-6kHz bells/hi-hats</li>
    <li><b>Foundation</b> (Voices 2-3): Bass layer at 40-150Hz (kick, low drums)</li>
    <li><b>Groove</b> (Voices 4-5): Mid-range 250-700Hz (snare, clap patterns)</li>
    <li><b>Lead</b> (Voices 6-7): High-frequency embellishments and accents</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Role Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>STYLE</b>: Rhythm style (0-9, snapped to integers)</li>
    <li><b>DENSITY</b>: Pattern density. Foundation default 20%, Timeline 40%, others 50%</li>
    <li><b>LENGTH</b>: Pattern length (4-32 steps, integer snap)</li>
    <li><b>FREQ</b>: Frequency modifier (-1 to +1 octave). CV: ±1V = ±0.2 octave</li>
    <li><b>DECAY</b>: Decay multiplier (0.2x to 2.0x)</li>
    <li><b>MIX</b>: Internal synth (0%) to external audio (100%)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">External Audio VCA</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Velocity Response</b>: External audio volume responds to hit velocity with natural-feeling dynamics</li>
    <li><b>Decay Behavior</b>: Envelope decays faster for louder hits, matching acoustic drum behavior</li>
    <li><b>Application</b>: Use external audio inputs to layer samples or external synth sounds with the rhythm patterns</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Global Parameters</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Variation</b>: Pattern variation (default 30%)</li>
    <li><b>Humanize</b>: Humanize timing/velocity (default 50%)</li>
    <li><b>Swing</b>: Swing amount (default 50%)</li>
    <li><b>Rest</b>: Rest probability with CV input</li>
    <li><b>Fill</b>: Combined probability + intensity (default 30%)</li>
    <li><b>Articulation</b>: Articulation amount. Enables Ghost, Accent, Flam, Drag, Buzz, Ruff articulations.</li>
    <li><b>Ghost Notes</b>: Ghost note probability.</li>
    <li><b>Accent</b>: Accent probability.</li>
    <li><b>Spread</b>: Stereo spread (default 50%)</li>
    <li><b>Regenerate</b>: Generate new patterns based on current settings.</li>
    <li><b>Reset</b>: Reset all step counters to zero.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Articulation System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Types</b>: Normal, Ghost, Accent, Flam, Drag, Buzz, Ruff</li>
    <li><b>Flam/Drag</b>: Implemented via DelayedTrigger struct with sample-accurate timing</li>
    <li><b>Groove Templates</b>: Auto, Straight, Swing, African, Latin, LaidBack, Pushed</li>
    <li><b>Fill Types</b>: Pre-determined at bar start, triggered at fillStartStep</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock and Timing</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>PPQN Settings</b>: 1 (quarter), 2 (8th), or 4 (16th note) pulses per quarter</li>
    <li><b>Per-Role Steps</b>: Each role maintains independent step counter</li>
    <li><b>Global Step</b>: Shared counter for bar tracking and fill synchronization</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>MIX L/R</b>: Stereo sum of all voices with spread</li>
    <li><b>Per-Voice Audio</b>: Individual voice audio outputs</li>
    <li><b>Per-Voice Gate</b>: Trigger outputs via PulseGenerator</li>
    <li><b>Per-Voice Pitch CV</b>: 1V/Oct, C4=0V, derived from currentFreqs array</li>
    <li><b>Per-Voice Velocity</b>: Velocity CV (0-8V)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Role Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline Style</b>: Timeline role rhythm style (0-9, integer snap).</li>
    <li><b>Timeline Density</b>: Timeline role pattern density (0-100%, default 40%).</li>
    <li><b>Timeline Length</b>: Timeline role pattern length (4-32 steps, integer snap).</li>
    <li><b>Timeline Freq</b>: Timeline role frequency modifier (-1 to +1 octave).</li>
    <li><b>Timeline Decay</b>: Timeline role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Timeline Mix (Int/Ext)</b>: Timeline role internal synth (0%) to external audio (100%).</li>
    <li><b>Foundation Style</b>: Foundation role rhythm style (0-9, integer snap).</li>
    <li><b>Foundation Density</b>: Foundation role pattern density (0-100%, default 20%).</li>
    <li><b>Foundation Length</b>: Foundation role pattern length (4-32 steps, integer snap).</li>
    <li><b>Foundation Freq</b>: Foundation role frequency modifier (-1 to +1 octave).</li>
    <li><b>Foundation Decay</b>: Foundation role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Foundation Mix (Int/Ext)</b>: Foundation role internal synth (0%) to external audio (100%).</li>
    <li><b>Groove Style</b>: Groove role rhythm style (0-9, integer snap).</li>
    <li><b>Groove Density</b>: Groove role pattern density (0-100%, default 50%).</li>
    <li><b>Groove Length</b>: Groove role pattern length (4-32 steps, integer snap).</li>
    <li><b>Groove Freq</b>: Groove role frequency modifier (-1 to +1 octave).</li>
    <li><b>Groove Decay</b>: Groove role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Groove Mix (Int/Ext)</b>: Groove role internal synth (0%) to external audio (100%).</li>
    <li><b>Lead Style</b>: Lead role rhythm style (0-9, integer snap).</li>
    <li><b>Lead Density</b>: Lead role pattern density (0-100%, default 50%).</li>
    <li><b>Lead Length</b>: Lead role pattern length (4-32 steps, integer snap).</li>
    <li><b>Lead Freq</b>: Lead role frequency modifier (-1 to +1 octave).</li>
    <li><b>Lead Decay</b>: Lead role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Lead Mix (Int/Ext)</b>: Lead role internal synth (0%) to external audio (100%).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>: Clock input for pattern playback.</li>
    <li><b>Reset</b>: Reset input. Returns all step counters to zero.</li>
    <li><b>Regenerate</b>: Trigger input to generate new patterns.</li>
    <li><b>Rest CV</b>: CV input for rest probability modulation.</li>
    <li><b>Fill Trigger</b>: Trigger input for fill activation.</li>
    <li><b>Timeline Style CV</b>: CV input for Timeline style modulation.</li>
    <li><b>Timeline Density CV</b>: CV input for Timeline density modulation.</li>
    <li><b>Timeline Freq CV</b>: CV input for Timeline frequency modulation.</li>
    <li><b>Timeline Decay CV</b>: CV input for Timeline decay modulation.</li>
    <li><b>Foundation Style CV</b>: CV input for Foundation style modulation.</li>
    <li><b>Foundation Density CV</b>: CV input for Foundation density modulation.</li>
    <li><b>Foundation Freq CV</b>: CV input for Foundation frequency modulation.</li>
    <li><b>Foundation Decay CV</b>: CV input for Foundation decay modulation.</li>
    <li><b>Groove Style CV</b>: CV input for Groove style modulation.</li>
    <li><b>Groove Density CV</b>: CV input for Groove density modulation.</li>
    <li><b>Groove Freq CV</b>: CV input for Groove frequency modulation.</li>
    <li><b>Groove Decay CV</b>: CV input for Groove decay modulation.</li>
    <li><b>Lead Style CV</b>: CV input for Lead style modulation.</li>
    <li><b>Lead Density CV</b>: CV input for Lead density modulation.</li>
    <li><b>Lead Freq CV</b>: CV input for Lead frequency modulation.</li>
    <li><b>Lead Decay CV</b>: CV input for Lead decay modulation.</li>
    <li><b>Timeline Audio Input 1</b>: External audio input 1 for Timeline role.</li>
    <li><b>Timeline Audio Input 2</b>: External audio input 2 for Timeline role.</li>
    <li><b>Foundation Audio Input 1</b>: External audio input 1 for Foundation role.</li>
    <li><b>Foundation Audio Input 2</b>: External audio input 2 for Foundation role.</li>
    <li><b>Groove Audio Input 1</b>: External audio input 1 for Groove role.</li>
    <li><b>Groove Audio Input 2</b>: External audio input 2 for Groove role.</li>
    <li><b>Lead Audio Input 1</b>: External audio input 1 for Lead role.</li>
    <li><b>Lead Audio Input 2</b>: External audio input 2 for Lead role.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Output Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Mix L</b>: Left stereo mix output (all voices with spread).</li>
    <li><b>Mix R</b>: Right stereo mix output (all voices with spread).</li>
    <li><b>Timeline 1 Audio</b>: Timeline voice 1 audio output.</li>
    <li><b>Timeline 1 Gate</b>: Timeline voice 1 gate/trigger output.</li>
    <li><b>Timeline 1 Pitch CV (1V/Oct, C4=0V)</b>: Timeline voice 1 pitch CV output.</li>
    <li><b>Timeline 1 Velocity CV</b>: Timeline voice 1 velocity CV output (0-8V).</li>
    <li><b>Timeline 2 Audio</b>: Timeline voice 2 audio output.</li>
    <li><b>Timeline 2 Gate</b>: Timeline voice 2 gate/trigger output.</li>
    <li><b>Timeline 2 Pitch CV (1V/Oct, C4=0V)</b>: Timeline voice 2 pitch CV output.</li>
    <li><b>Timeline 2 Velocity CV</b>: Timeline voice 2 velocity CV output (0-8V).</li>
    <li><b>Foundation 1 Audio</b>: Foundation voice 1 audio output.</li>
    <li><b>Foundation 1 Gate</b>: Foundation voice 1 gate/trigger output.</li>
    <li><b>Foundation 1 Pitch CV (1V/Oct, C4=0V)</b>: Foundation voice 1 pitch CV output.</li>
    <li><b>Foundation 1 Velocity CV</b>: Foundation voice 1 velocity CV output (0-8V).</li>
    <li><b>Foundation 2 Audio</b>: Foundation voice 2 audio output.</li>
    <li><b>Foundation 2 Gate</b>: Foundation voice 2 gate/trigger output.</li>
    <li><b>Foundation 2 Pitch CV (1V/Oct, C4=0V)</b>: Foundation voice 2 pitch CV output.</li>
    <li><b>Foundation 2 Velocity CV</b>: Foundation voice 2 velocity CV output (0-8V).</li>
    <li><b>Groove 1 Audio</b>: Groove voice 1 audio output.</li>
    <li><b>Groove 1 Gate</b>: Groove voice 1 gate/trigger output.</li>
    <li><b>Groove 1 Pitch CV (1V/Oct, C4=0V)</b>: Groove voice 1 pitch CV output.</li>
    <li><b>Groove 1 Velocity CV</b>: Groove voice 1 velocity CV output (0-8V).</li>
    <li><b>Groove 2 Audio</b>: Groove voice 2 audio output.</li>
    <li><b>Groove 2 Gate</b>: Groove voice 2 gate/trigger output.</li>
    <li><b>Groove 2 Pitch CV (1V/Oct, C4=0V)</b>: Groove voice 2 pitch CV output.</li>
    <li><b>Groove 2 Velocity CV</b>: Groove voice 2 velocity CV output (0-8V).</li>
    <li><b>Lead 1 Audio</b>: Lead voice 1 audio output.</li>
    <li><b>Lead 1 Gate</b>: Lead voice 1 gate/trigger output.</li>
    <li><b>Lead 1 Pitch CV (1V/Oct, C4=0V)</b>: Lead voice 1 pitch CV output.</li>
    <li><b>Lead 1 Velocity CV</b>: Lead voice 1 velocity CV output (0-8V).</li>
    <li><b>Lead 2 Audio</b>: Lead voice 2 audio output.</li>
    <li><b>Lead 2 Gate</b>: Lead voice 2 gate/trigger output.</li>
    <li><b>Lead 2 Pitch CV (1V/Oct, C4=0V)</b>: Lead voice 2 pitch CV output.</li>
    <li><b>Lead 2 Velocity CV</b>: Lead voice 2 velocity CV output (0-8V).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Module width: 40HP</li>
    <li>Voice count: 8 (2 per role)</li>
    <li>Synth modes: SINE (pitched), NOISE (unpitched)</li>
    <li>Pattern storage: MultiVoicePatterns with 16-step default</li>
    <li>Decay range: 12-800ms depending on preset</li>
    <li>Processing: 32-bit floating point</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">具備 10 種世界音樂風格與 8 聲整合 Drum Synthesis 的跨文化節奏生成器。使用多個專用引擎：PatternGenerator、HumanizeEngine、RestEngine、FillGenerator、ArticulationEngine、KotekanEngine（峇里島交錯）、LlamadaEngine（非裔古巴呼應）、CrossRhythmEngine、AsymmetricGroupingEngine 與 AmenBreakEngine。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">風格與頻率範圍</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>West African</b>: Gankogui 4.5kHz、Dununba 80Hz、Djembe 400-700Hz</li>
    <li><b>Afro-Cuban</b>: Clave 4kHz、Tumba 100Hz、Congas 350-550Hz、Timbales 3kHz</li>
    <li><b>Brazilian</b>: Agogô 3-4.5kHz、Surdo 55-80Hz、Tamborim 400Hz、Caixa 500Hz</li>
    <li><b>Balkan</b>: Rim 4kHz、Tapan 90-130Hz、Tarabuka 300-450Hz</li>
    <li><b>Indian</b>: Manjira 6-8kHz、Baya 65-90Hz、Daya 350-500Hz</li>
    <li><b>Gamelan</b>: Kenong 600-700Hz、Gong 90Hz、Bonang 800-1kHz、Gender 1.2kHz</li>
    <li><b>Jazz</b>: Ride 2.5-4.5kHz、Kick 50-80Hz、Snare 400-500Hz、HiHat 6-8kHz</li>
    <li><b>Electronic</b>: HiHat 9-12kHz、808 Kick 45-60Hz、Clap 1.5-2.5kHz</li>
    <li><b>Breakbeat</b>: HiHat 8-10kHz、Kick 55-70Hz、Snare 2-2.5kHz</li>
    <li><b>Techno</b>: HiHat 10-12kHz、909 Kick 42-55Hz、Clap 1.8kHz、Rim 3kHz</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">4 角色系統（各 2 聲）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline</b>（Voice 0-1）: 計時層，通常 3-6kHz 鈴鐺/Hi-hat</li>
    <li><b>Foundation</b>（Voice 2-3）: Bass 層，40-150Hz（Kick、低音鼓）</li>
    <li><b>Groove</b>（Voice 4-5）: 中頻 250-700Hz（Snare、Clap Pattern）</li>
    <li><b>Lead</b>（Voice 6-7）: 高頻裝飾與重音</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">各角色控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>STYLE</b>: 節奏風格（0-9，對齊至整數）</li>
    <li><b>DENSITY</b>: Pattern 密度。Foundation 預設 20%、Timeline 40%、其他 50%</li>
    <li><b>LENGTH</b>: Pattern 長度（4-32 步，整數對齊）</li>
    <li><b>FREQ</b>: 頻率修正（-1 至 +1 八度）。CV: ±1V = ±0.2 八度</li>
    <li><b>DECAY</b>: Decay 倍數（0.2x 至 2.0x）</li>
    <li><b>MIX</b>: 內部合成（0%）至外部 Audio（100%）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">外部 Audio VCA</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Velocity Response</b>: 外部 Audio 音量隨 Hit Velocity 變化，產生自然的動態感</li>
    <li><b>Decay Behavior</b>: Envelope 在較大力度時衰減較快，符合原聲鼓的特性</li>
    <li><b>Application</b>: 使用外部 Audio 輸入來疊加 Sample 或外部合成器音色與節奏 Pattern</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">全域參數</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Variation</b>: Pattern 變化（預設 30%）</li>
    <li><b>Humanize</b>: 時序/Velocity Humanize（預設 50%）</li>
    <li><b>Swing</b>: Swing 量（預設 50%）</li>
    <li><b>Rest</b>: 休止機率，帶 CV 輸入</li>
    <li><b>Fill</b>: 結合機率 + 強度（預設 30%）</li>
    <li><b>Articulation</b>: Articulation 量。啟用 Ghost、Accent、Flam、Drag、Buzz、Ruff 演奏技法。</li>
    <li><b>Ghost Notes</b>: Ghost Note 機率。</li>
    <li><b>Accent</b>: Accent 機率。</li>
    <li><b>Spread</b>: Stereo Spread（預設 50%）</li>
    <li><b>Regenerate</b>: 依據目前設定生成新 Pattern。</li>
    <li><b>Reset</b>: 將所有步數計數器歸零。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Articulation 系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Types</b>: Normal、Ghost、Accent、Flam、Drag、Buzz、Ruff</li>
    <li><b>Flam/Drag</b>: 透過 DelayedTrigger 結構實作，樣本精確時序</li>
    <li><b>Groove Templates</b>: Auto、Straight、Swing、African、Latin、LaidBack、Pushed</li>
    <li><b>Fill Types</b>: 在小節開始時預先決定，於 fillStartStep 觸發</li>
    </ul>

