    <li><b>Timeline Style CV</b>: Timelineスタイル変調CV入力。</li>
    <li><b>Timeline Density CV</b>: Timeline密度変調CV入力。</li>
    <li><b>Timeline Freq CV</b>: Timeline周波数変調CV入力。</li>
    <li><b>Timeline Decay CV</b>: Timelineディケイ変調CV入力。</li>
    <li><b>Foundation Style CV</b>: Foundationスタイル変調CV入力。</li>
    <li><b>Foundation Density CV</b>: Foundation密度変調CV入力。</li>
    <li><b>Foundation Freq CV</b>: Foundation周波数変調CV入力。</li>
    <li><b>Foundation Decay CV</b>: Foundationディケイ変調CV入力。</li>
    <li><b>Groove Style CV</b>: Grooveスタイル変調CV入力。</li>
    <li><b>Groove Density CV</b>: Groove密度変調CV入力。</li>
    <li><b>Groove Freq CV</b>: Groove周波数変調CV入力。</li>
    <li><b>Groove Decay CV</b>: Grooveディケイ変調CV入力。</li>
    <li><b>Lead Style CV</b>: Leadスタイル変調CV入力。</li>
    <li><b>Lead Density CV</b>: Lead密度変調CV入力。</li>
    <li><b>Lead Freq CV</b>: Lead周波数変調CV入力。</li>
    <li><b>Lead Decay CV</b>: Leadディケイ変調CV入力。</li>
    <li><b>Timeline Audio Input 1</b>: Timelineロール外部オーディオ入力1。</li>
    <li><b>Timeline Audio Input 2</b>: Timelineロール外部オーディオ入力2。</li>
    <li><b>Foundation Audio Input 1</b>: Foundationロール外部オーディオ入力1。</li>
    <li><b>Foundation Audio Input 2</b>: Foundationロール外部オーディオ入力2。</li>
    <li><b>Groove Audio Input 1</b>: Grooveロール外部オーディオ入力1。</li>
