    <li><b>Foundation 1 Pitch CV (1V/Oct, C4=0V)</b>: Foundationボイス1ピッチCV出力。</li>
    <li><b>Foundation 1 Velocity CV</b>: Foundationボイス1ベロシティCV出力（0-8V）。</li>
    <li><b>Foundation 2 Audio</b>: Foundationボイス2オーディオ出力。</li>
    <li><b>Foundation 2 Gate</b>: Foundationボイス2ゲート/トリガー出力。</li>
    <li><b>Foundation 2 Pitch CV (1V/Oct, C4=0V)</b>: Foundationボイス2ピッチCV出力。</li>
