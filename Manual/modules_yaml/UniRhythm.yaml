    zh: Lead 角色 Decay 倍數（0.2x 至 2.0x）。
    ja: Leadロールディケイ倍率（0.2x～2.0x）。
- name: Variation
  type: param
  desc:
    en: Pattern variation amount (default 30%). Controls how much patterns evolve over time.
    zh: Pattern 變化量（預設 30%）。控制 Pattern 隨時間演化的程度。
    ja: パターンバリエーション量（デフォルト30%）。パターンの時間経過に伴う変化を制御。
- name: Humanize
  type: param
  desc:
    en: Humanize timing and velocity (default 50%). Adds organic feel to rhythms.
    zh: 時序與 Velocity Humanize（預設 50%）。為節奏添加有機感。
    ja: タイミング・ベロシティヒューマナイズ（デフォルト50%）。リズムにオーガニック感を付加。
- name: Swing
  type: param
  desc:
    en: Swing amount (default 50%). Adjusts timing of off-beat notes.
    zh: Swing 量（預設 50%）。調整 Off-beat 音符的時序。
    ja: スウィング量（デフォルト50%）。オフビートノートのタイミングを調整。
- name: Rest
  type: param
  desc:
    en: Rest probability with CV input. Removes hits from patterns probabilistically.
    zh: 休止機率，帶 CV 輸入。以機率方式移除 Pattern 中的 Hit。
    ja: 休符確率、CV入力対応。確率的にパターンからヒットを除去。
- name: Fill
  type: param
  desc:
    en: Combined fill probability and intensity (default 30%). Pre-determined at bar start.
    zh: 結合 Fill 機率與強度（預設 30%）。在小節開始時預先決定。
    ja: フィル確率+強度の統合パラメータ（デフォルト30%）。小節開始時に事前決定。
- name: Articulation
  type: param
  desc:
    en: Articulation amount. Enables Ghost, Accent, Rim, Flam, Drag, Buzz, Ruff articulations.
    zh: Articulation 量。啟用 Ghost、Accent、Rim、Flam、Drag、Buzz、Ruff 演奏技法。
    ja: アーティキュレーション量。Ghost、Accent、Rim、Flam、Drag、Buzz、Ruff技法を有効化。
- name: Ghost Notes
  type: param
  desc:
    en: Ghost note probability.
    zh: Ghost Note 機率。
    ja: ゴーストノート確率。
- name: Accent
  type: param
  desc:
    en: Accent probability.
    zh: Accent 機率。
    ja: アクセント確率。
- name: Spread
  type: param
  desc:
    en: Stereo spread for mix output (default 50%).
    zh: Mix 輸出的 Stereo Spread（預設 50%）。
    ja: ミックス出力のステレオスプレッド（デフォルト50%）。
- name: Regenerate
  type: param
  desc:
    en: Regenerate button. Generates new Patterns based on current settings.
    zh: Regenerate 按鈕。依據目前設定生成新 Pattern。
    ja: Regenerateボタン。現在の設定に基づいて新パターンを生成。
- name: Reset
  type: param
  desc:
    en: Reset button. Returns all step counters to zero.
    zh: Reset 按鈕。將所有步數計數器歸零。
    ja: Resetボタン。全ステップカウンターをゼロに戻す。
