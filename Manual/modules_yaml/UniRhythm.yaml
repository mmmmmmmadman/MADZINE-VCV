    <li><b>REGEN</b>: Regenerate 觸發輸入。依據目前設定生成新 Pattern。</li>
    <li><b>PPQN</b>: 1（四分音符）、2（八分音符）或 4（十六分音符）每四分音符脈衝數。透過右鍵選單設定。</li>
