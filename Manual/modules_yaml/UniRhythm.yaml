slug: UniRhythm
name: Uni Rhythm
hp: 32
wide: true
alt: UniRhythm
description:
  en: Compact 4-track rhythm generator with 10 world music styles, 8-voice drum synthesis, primary-priority merged outputs, master isolator and drive, and 16-channel poly output for Portal
  zh: 精簡 4 軌節奏生成器，具備 10 種世界音樂風格、8 聲 Drum Synthesis、Primary-Priority 合併輸出、Master Isolator + Drive，以及 16 聲道 Poly Output 供 Portal 使用
  ja: 10種のワールドミュージックスタイル、8ボイスドラム合成、プライマリプライオリティ統合出力、マスターアイソレーター+ドライブ、Portal用16チャンネルポリ出力を備えたコンパクト4トラックリズムジェネレーター
features:
  en:
  - 10 world music rhythm styles with per-role selection
  - '4 rhythmic roles: Timeline, Foundation, Groove, Lead'
  - 8-voice ExtendedDrumSynth (2 voices per role)
  - Per-role FREQ/DECAY/VEL controls with CV
  - EXT IN for external sound sources per role
  - Master 3-band isolator (LOW/MID/HIGH) and tube drive
  - Stereo MIX L/R output with SPREAD control
  - 16-channel POLY output for Portal crossfading
  zh:
  - 10 種世界音樂節奏風格，各角色可獨立選擇
  - 4 種節奏角色：Timeline、Foundation、Groove、Lead
  - 8 聲 ExtendedDrumSynth（每角色 2 聲）
  - 各角色 FREQ/DECAY/VEL 控制，帶 CV 輸入
  - 各角色 EXT IN 外部音源輸入
  - Master 3 頻段 Isolator（LOW/MID/HIGH）與 Tube Drive
  - Stereo MIX L/R 輸出，帶 SPREAD 控制
  - 16 聲道 POLY 輸出，供 Portal Crossfading 使用
  ja:
  - 10種のワールドミュージックリズムスタイル、ロール別選択可能
  - 4つのリズムロール：タイムライン、ファウンデーション、グルーヴ、リード
  - 8ボイスExtendedDrumSynth（ロールあたり2ボイス）
  - ロール別FREQ/DECAY/VELコントロール、CV入力対応
  - ロール別EXT IN外部音源入力
  - マスター3バンドアイソレーター（LOW/MID/HIGH）とチューブドライブ
  - ステレオMIX L/R出力、SPREADコントロール付き
  - Portal用16チャンネルポリ出力
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Compact 4-track cross-cultural rhythm generator with 10 world music styles and 8-voice integrated drum synthesis. Each of the 4 roles (Timeline, Foundation, Groove, Lead) features independent pattern sequencing with 2 synthesized voices, supporting per-role style selection, density and length control, external audio input mixing, and fill patterns. The master section provides a 3-band isolator, tube drive, stereo spread, and a 16-channel polyphonic output designed for seamless crossfading with the Portal module.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">4-Role System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline</b> (Voices 0-1): Time-keeping layer. Bells, hi-hats, and ride cymbals in the 3-12kHz range.</li>
    <li><b>Foundation</b> (Voices 2-3): Bass layer at 40-150Hz. Kick drums and low-frequency bass drums.</li>
    <li><b>Groove</b> (Voices 4-5): Mid-range 250-700Hz. Snare drums, claps, and congas.</li>
    <li><b>Lead</b> (Voices 6-7): High-frequency embellishments and accents. Ghost notes and fills.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Role Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>STYLE</b>: Rhythm style (0-9, snapped to integers). Each role can have a different style. CV: ±5V selects style.</li>
    <li><b>DENSITY</b>: Pattern density (0-100%). Foundation default 20%, Timeline 40%, others 50%. CV: ±5V modulation.</li>
    <li><b>LENGTH</b>: Pattern length (4-32 steps, integer snap).</li>
    <li><b>FREQ</b>: Frequency modifier (-1 to +1 octave). CV: ±1V = ±0.2 octave.</li>
    <li><b>DECAY</b>: Decay multiplier (0.2x to 2.0x). CV: ±1V = ±0.18x (±5V = ±0.9x).</li>
    <li><b>MIX</b>: Blend between internal synth (0%) and external audio (100%).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">External Audio Inputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>EXT IN 1/2</b>: Two external audio inputs per role, corresponding to voice 1 and voice 2.</li>
    <li><b>VCA Envelope</b>: External audio volume responds to hit velocity with natural dynamics. Decay is faster for louder hits.</li>
    <li><b>MIX Knob</b>: Crossfades between internal drum synthesis and external audio sources.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Global Parameters</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Variation</b>: Pattern variation amount (default 30%). Controls how much patterns evolve over time.</li>
    <li><b>Humanize</b>: Humanize timing and velocity (default 50%). Adds organic feel to rhythms.</li>
    <li><b>Swing</b>: Swing amount (default 50%). Adjusts timing of off-beat notes.</li>
    <li><b>Rest</b>: Rest probability with CV input. Removes hits from patterns probabilistically.</li>
    <li><b>Fill</b>: Combined fill probability and intensity (default 30%). Pre-determined at bar start.</li>
    <li><b>Articulation</b>: Articulation amount. Enables Ghost, Accent, Rim, Flam, Drag, Buzz, Ruff articulations.</li>
    <li><b>Ghost Notes</b>: Ghost note probability.</li>
    <li><b>Accent</b>: Accent probability.</li>
    <li><b>Spread</b>: Stereo spread for mix output (default 50%).</li>
    <li><b>Regenerate</b>: Generate new patterns based on current settings.</li>
    <li><b>Reset</b>: Reset all step counters to zero.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Master Section</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Isolator Low</b>: 3-band isolator low band (250Hz crossover). Bipolar: -1 = kill, 0 = unity, +1 = +12dB boost.</li>
    <li><b>Isolator Mid</b>: 3-band isolator mid band (250Hz-4kHz). Same bipolar control.</li>
    <li><b>Isolator High</b>: 3-band isolator high band (4kHz crossover). Same bipolar control.</li>
    <li><b>Master Drive</b>: Asymmetric tube saturation (0-100%). Creates warm even harmonics with DC blocker.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Primary-Priority Merged Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Audio</b>: Sum of both voices per role (primary + secondary).</li>
    <li><b>Gate</b>: Merged gate output. When both voices trigger simultaneously, primary voice takes priority.</li>
    <li><b>Pitch CV</b>: 1V/Oct pitch output from the last triggered voice (primary priority). C4 = 0V.</li>
    <li><b>Vel/Env</b>: Velocity envelope CV (0-10V) from the priority voice.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock and Timing</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CLK</b>: External clock input. Required for pattern playback.</li>
    <li><b>RST</b>: Reset input. Returns all step counters to zero.</li>
    <li><b>REGEN</b>: Regenerate trigger input. Generates new patterns based on current settings.</li>
    <li><b>PPQN</b>: 1 (quarter), 2 (8th), or 4 (16th note) pulses per quarter. Set via right-click menu.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Per-Role Audio</b>: Individual role audio output (sum of 2 voices).</li>
    <li><b>Per-Role Gate</b>: Merged trigger output per role.</li>
    <li><b>Per-Role Pitch</b>: 1V/Oct CV output per role.</li>
    <li><b>Per-Role Vel/Env</b>: Velocity envelope CV output per role.</li>
    <li><b>MIX L/R</b>: Stereo master mix with isolator, drive, and spread applied.</li>
    <li><b>POLY</b>: 16-channel polyphonic output. 4 roles x 4 channels (Audio, Gate, Pitch, VelEnv). Designed for Portal.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Role Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline Style</b>: Timeline role rhythm style (0-9, integer snap).</li>
    <li><b>Timeline Density</b>: Timeline role pattern density (0-100%, default 40%).</li>
    <li><b>Timeline Length</b>: Timeline role pattern length (4-32 steps, integer snap).</li>
    <li><b>Timeline Freq</b>: Timeline role frequency modifier (-1 to +1 octave).</li>
    <li><b>Timeline Decay</b>: Timeline role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Timeline Mix (Int/Ext)</b>: Timeline role internal synth (0%) to external audio (100%).</li>
    <li><b>Foundation Style</b>: Foundation role rhythm style (0-9, integer snap).</li>
    <li><b>Foundation Density</b>: Foundation role pattern density (0-100%, default 20%).</li>
    <li><b>Foundation Length</b>: Foundation role pattern length (4-32 steps, integer snap).</li>
    <li><b>Foundation Freq</b>: Foundation role frequency modifier (-1 to +1 octave).</li>
    <li><b>Foundation Decay</b>: Foundation role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Foundation Mix (Int/Ext)</b>: Foundation role internal synth (0%) to external audio (100%).</li>
    <li><b>Groove Style</b>: Groove role rhythm style (0-9, integer snap).</li>
    <li><b>Groove Density</b>: Groove role pattern density (0-100%, default 50%).</li>
    <li><b>Groove Length</b>: Groove role pattern length (4-32 steps, integer snap).</li>
    <li><b>Groove Freq</b>: Groove role frequency modifier (-1 to +1 octave).</li>
    <li><b>Groove Decay</b>: Groove role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Groove Mix (Int/Ext)</b>: Groove role internal synth (0%) to external audio (100%).</li>
    <li><b>Lead Style</b>: Lead role rhythm style (0-9, integer snap).</li>
    <li><b>Lead Density</b>: Lead role pattern density (0-100%, default 50%).</li>
    <li><b>Lead Length</b>: Lead role pattern length (4-32 steps, integer snap).</li>
    <li><b>Lead Freq</b>: Lead role frequency modifier (-1 to +1 octave).</li>
    <li><b>Lead Decay</b>: Lead role decay multiplier (0.2x to 2.0x).</li>
    <li><b>Lead Mix (Int/Ext)</b>: Lead role internal synth (0%) to external audio (100%).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>: Clock input for pattern playback.</li>
    <li><b>Reset</b>: Reset input. Returns all step counters to zero.</li>
    <li><b>Regenerate</b>: Trigger input to generate new patterns.</li>
    <li><b>Rest CV</b>: CV input for rest probability modulation.</li>
    <li><b>Fill Trigger</b>: Trigger input for fill activation.</li>
    <li><b>Timeline Style CV</b>: CV input for Timeline style modulation.</li>
    <li><b>Timeline Density CV</b>: CV input for Timeline density modulation.</li>
    <li><b>Timeline Freq CV</b>: CV input for Timeline frequency modulation.</li>
    <li><b>Timeline Decay CV</b>: CV input for Timeline decay modulation.</li>
    <li><b>Foundation Style CV</b>: CV input for Foundation style modulation.</li>
    <li><b>Foundation Density CV</b>: CV input for Foundation density modulation.</li>
    <li><b>Foundation Freq CV</b>: CV input for Foundation frequency modulation.</li>
    <li><b>Foundation Decay CV</b>: CV input for Foundation decay modulation.</li>
    <li><b>Groove Style CV</b>: CV input for Groove style modulation.</li>
    <li><b>Groove Density CV</b>: CV input for Groove density modulation.</li>
    <li><b>Groove Freq CV</b>: CV input for Groove frequency modulation.</li>
    <li><b>Groove Decay CV</b>: CV input for Groove decay modulation.</li>
    <li><b>Lead Style CV</b>: CV input for Lead style modulation.</li>
    <li><b>Lead Density CV</b>: CV input for Lead density modulation.</li>
    <li><b>Lead Freq CV</b>: CV input for Lead frequency modulation.</li>
    <li><b>Lead Decay CV</b>: CV input for Lead decay modulation.</li>
    <li><b>Timeline Audio Input 1</b>: External audio input 1 for Timeline role.</li>
    <li><b>Timeline Audio Input 2</b>: External audio input 2 for Timeline role.</li>
    <li><b>Foundation Audio Input 1</b>: External audio input 1 for Foundation role.</li>
    <li><b>Foundation Audio Input 2</b>: External audio input 2 for Foundation role.</li>
    <li><b>Groove Audio Input 1</b>: External audio input 1 for Groove role.</li>
    <li><b>Groove Audio Input 2</b>: External audio input 2 for Groove role.</li>
    <li><b>Lead Audio Input 1</b>: External audio input 1 for Lead role.</li>
    <li><b>Lead Audio Input 2</b>: External audio input 2 for Lead role.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Output Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline Audio</b>: Timeline role merged audio output (sum of 2 voices).</li>
    <li><b>Timeline Gate</b>: Timeline role merged gate/trigger output (primary priority).</li>
    <li><b>Timeline Pitch CV (1V/Oct, C4=0V)</b>: Timeline role pitch CV output.</li>
    <li><b>Timeline Velocity Envelope</b>: Timeline role velocity envelope CV output.</li>
    <li><b>Foundation Audio</b>: Foundation role merged audio output (sum of 2 voices).</li>
    <li><b>Foundation Gate</b>: Foundation role merged gate/trigger output (primary priority).</li>
    <li><b>Foundation Pitch CV (1V/Oct, C4=0V)</b>: Foundation role pitch CV output.</li>
    <li><b>Foundation Velocity Envelope</b>: Foundation role velocity envelope CV output.</li>
    <li><b>Groove Audio</b>: Groove role merged audio output (sum of 2 voices).</li>
    <li><b>Groove Gate</b>: Groove role merged gate/trigger output (primary priority).</li>
    <li><b>Groove Pitch CV (1V/Oct, C4=0V)</b>: Groove role pitch CV output.</li>
    <li><b>Groove Velocity Envelope</b>: Groove role velocity envelope CV output.</li>
    <li><b>Lead Audio</b>: Lead role merged audio output (sum of 2 voices).</li>
    <li><b>Lead Gate</b>: Lead role merged gate/trigger output (primary priority).</li>
    <li><b>Lead Pitch CV (1V/Oct, C4=0V)</b>: Lead role pitch CV output.</li>
    <li><b>Lead Velocity Envelope</b>: Lead role velocity envelope CV output.</li>
    <li><b>Mix L</b>: Left stereo master mix output (with isolator, drive, spread).</li>
    <li><b>Mix R</b>: Right stereo master mix output (with isolator, drive, spread).</li>
    <li><b>Poly Out (16ch for Portal)</b>: 16-channel polyphonic output (4 roles x 4 channels).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Module width: 32HP</li>
    <li>Voice count: 8 (2 per role)</li>
    <li>Synth modes: SINE (pitched), NOISE (unpitched)</li>
    <li>Pattern length: 4-32 steps per role</li>
    <li>Isolator crossovers: 250Hz / 4kHz (Linkwitz-Riley 4th order)</li>
    <li>Drive: Asymmetric tube saturation with DC blocker</li>
    <li>Poly output: 16 channels (4 roles x 4 data types)</li>
    <li>Processing: 32-bit floating point</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">精簡的 4 軌跨文化節奏生成器，具備 10 種世界音樂風格與 8 聲整合 Drum Synthesis。4 個角色（Timeline、Foundation、Groove、Lead）各自擁有獨立的 Pattern 序列器與 2 個合成聲部，支援各角色獨立風格選擇、Density 與 Length 控制、外部 Audio 輸入混合及 Fill Pattern。Master 區段提供 3 頻段 Isolator、Tube Drive、Stereo Spread，以及專為 Portal 模組設計的 16 聲道 Polyphonic 輸出。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">4 角色系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline</b>（Voice 0-1）: 計時層。鈴鐺、Hi-hat、Ride 鈸，頻率範圍 3-12kHz。</li>
    <li><b>Foundation</b>（Voice 2-3）: Bass 層，40-150Hz。Kick 鼓與低頻 Bass 鼓。</li>
    <li><b>Groove</b>（Voice 4-5）: 中頻 250-700Hz。Snare、Clap、Congas。</li>
    <li><b>Lead</b>（Voice 6-7）: 高頻裝飾與重音。Ghost Note 與 Fill。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">各角色控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>STYLE</b>: 節奏風格（0-9，整數對齊）。各角色可選不同風格。CV: ±5V 選擇風格。</li>
    <li><b>DENSITY</b>: Pattern 密度（0-100%）。Foundation 預設 20%、Timeline 40%、其他 50%。CV: ±5V 調變。</li>
    <li><b>LENGTH</b>: Pattern 長度（4-32 步，整數對齊）。</li>
    <li><b>FREQ</b>: 頻率修正（-1 至 +1 八度）。CV: ±1V = ±0.2 八度。</li>
    <li><b>DECAY</b>: Decay 倍數（0.2x 至 2.0x）。CV: ±1V = ±0.18x（±5V = ±0.9x）。</li>
    <li><b>MIX</b>: 內部合成（0%）與外部 Audio（100%）之間的混合。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">外部 Audio 輸入</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>EXT IN 1/2</b>: 各角色兩個外部 Audio 輸入，分別對應 Voice 1 與 Voice 2。</li>
    <li><b>VCA Envelope</b>: 外部 Audio 音量以自然動態響應 Hit Velocity。力度越大，Decay 越快。</li>
    <li><b>MIX Knob</b>: 在內部 Drum Synthesis 與外部 Audio 之間做 Crossfade。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">全域參數</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Variation</b>: Pattern 變化量（預設 30%）。控制 Pattern 隨時間演化的程度。</li>
    <li><b>Humanize</b>: 時序與 Velocity Humanize（預設 50%）。為節奏添加有機感。</li>
    <li><b>Swing</b>: Swing 量（預設 50%）。調整 Off-beat 音符的時序。</li>
    <li><b>Rest</b>: 休止機率，帶 CV 輸入。以機率方式移除 Pattern 中的 Hit。</li>
    <li><b>Fill</b>: 結合 Fill 機率與強度（預設 30%）。在小節開始時預先決定。</li>
    <li><b>Articulation</b>: Articulation 量。啟用 Ghost、Accent、Rim、Flam、Drag、Buzz、Ruff 演奏技法。</li>
    <li><b>Ghost Notes</b>: Ghost Note 機率。</li>
    <li><b>Accent</b>: Accent 機率。</li>
    <li><b>Spread</b>: Mix 輸出的 Stereo Spread（預設 50%）。</li>
    <li><b>Regenerate</b>: 依據目前設定生成新 Pattern。</li>
    <li><b>Reset</b>: 將所有步數計數器歸零。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Master 區段</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Isolator Low</b>: 3 頻段 Isolator 低頻（250Hz 分頻點）。雙極: -1 = Kill、0 = Unity、+1 = +12dB Boost。</li>
    <li><b>Isolator Mid</b>: 3 頻段 Isolator 中頻（250Hz-4kHz）。相同雙極控制。</li>
    <li><b>Isolator High</b>: 3 頻段 Isolator 高頻（4kHz 分頻點）。相同雙極控制。</li>
    <li><b>Master Drive</b>: 非對稱 Tube Saturation（0-100%）。產生溫暖的偶次諧波，帶 DC Blocker。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Primary-Priority 合併輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Audio</b>: 各角色兩個 Voice 的音訊總和（Primary + Secondary）。</li>
    <li><b>Gate</b>: 合併的 Gate 輸出。兩個 Voice 同時觸發時，Primary Voice 優先。</li>
    <li><b>Pitch CV</b>: 來自最後觸發 Voice 的 1V/Oct Pitch 輸出（Primary 優先）。C4 = 0V。</li>
    <li><b>Vel/Env</b>: 來自優先 Voice 的 Velocity Envelope CV（0-10V）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock 與時序</h3>
