    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">10種のワールドミュージックスタイルと8ボイス統合ドラム合成を備えたコンパクト4トラッククロスカルチャーリズムジェネレーター。4つのロール（タイムライン、ファウンデーション、グルーヴ、リード）はそれぞれ独立したパターンシーケンサーと2つの合成ボイスを備え、ロール別スタイル選択、Density・Lengthコントロール、外部オーディオ入力ミキシング、フィルパターンをサポート。マスターセクションは3バンドアイソレーター、チューブドライブ、ステレオスプレッド、Portal用16チャンネルポリフォニック出力を搭載。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">4ロールシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline</b>（ボイス0-1）: タイムキーピングレイヤー。ベル、ハイハット、ライドシンバル。3-12kHz帯域。</li>
    <li><b>Foundation</b>（ボイス2-3）: ベースレイヤー、40-150Hz。キックドラムと低域ベースドラム。</li>
    <li><b>Groove</b>（ボイス4-5）: 中域250-700Hz。スネアドラム、クラップ、コンガ。</li>
    <li><b>Lead</b>（ボイス6-7）: 高域装飾音とアクセント。ゴーストノートとフィル。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ロール別コントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>STYLE</b>: リズムスタイル（0-9、整数スナップ）。各ロールで異なるスタイル選択可能。CV: ±5Vでスタイル選択。</li>
    <li><b>DENSITY</b>: パターン密度（0-100%）。Foundationデフォルト20%、Timeline 40%、その他50%。CV: ±5V変調。</li>
    <li><b>LENGTH</b>: パターン長（4-32ステップ、整数スナップ）。</li>
    <li><b>FREQ</b>: 周波数修正（-1～+1オクターブ）。CV: ±1V = ±0.2オクターブ。</li>
    <li><b>DECAY</b>: ディケイ倍率（0.2x～2.0x）。CV: ±1V = ±0.18x（±5V = ±0.9x）。</li>
    <li><b>MIX</b>: 内部シンセ（0%）と外部オーディオ（100%）のブレンド。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">外部オーディオ入力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>EXT IN 1/2</b>: ロールごとに2つの外部オーディオ入力、ボイス1とボイス2に対応。</li>
    <li><b>VCA Envelope</b>: 外部オーディオの音量がヒットベロシティに応じて変化。強いヒットほどディケイが速い。</li>
    <li><b>MIX Knob</b>: 内部ドラムシンセと外部オーディオソースのクロスフェード。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グローバルパラメータ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Variation</b>: パターンバリエーション量（デフォルト30%）。パターンの時間経過に伴う変化を制御。</li>
    <li><b>Humanize</b>: タイミング・ベロシティヒューマナイズ（デフォルト50%）。リズムにオーガニック感を付加。</li>
    <li><b>Swing</b>: スウィング量（デフォルト50%）。オフビートノートのタイミングを調整。</li>
    <li><b>Rest</b>: 休符確率、CV入力対応。確率的にパターンからヒットを除去。</li>
    <li><b>Fill</b>: フィル確率+強度の統合パラメータ（デフォルト30%）。小節開始時に事前決定。</li>
    <li><b>Articulation</b>: アーティキュレーション量。Ghost、Accent、Rim、Flam、Drag、Buzz、Ruff技法を有効化。</li>
    <li><b>Ghost Notes</b>: ゴーストノート確率。</li>
    <li><b>Accent</b>: アクセント確率。</li>
    <li><b>Spread</b>: ミックス出力のステレオスプレッド（デフォルト50%）。</li>
    <li><b>Regenerate</b>: 現在の設定に基づいて新パターンを生成。</li>
    <li><b>Reset</b>: 全ステップカウンターをゼロにリセット。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">マスターセクション</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Isolator Low</b>: 3バンドアイソレーター低域（250Hzクロスオーバー）。バイポーラ: -1 = Kill、0 = Unity、+1 = +12dBブースト。</li>
    <li><b>Isolator Mid</b>: 3バンドアイソレーター中域（250Hz-4kHz）。同じバイポーラコントロール。</li>
    <li><b>Isolator High</b>: 3バンドアイソレーター高域（4kHzクロスオーバー）。同じバイポーラコントロール。</li>
    <li><b>Master Drive</b>: 非対称チューブサチュレーション（0-100%）。DCブロッカー付きの暖かい偶数倍音を生成。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">プライマリプライオリティ統合出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Audio</b>: ロールあたり両ボイスのオーディオ合計（プライマリ+セカンダリ）。</li>
    <li><b>Gate</b>: 統合ゲート出力。両ボイスが同時トリガーの場合、プライマリボイスが優先。</li>
    <li><b>Pitch CV</b>: 最後にトリガーされたボイスの1V/Octピッチ出力（プライマリ優先）。C4 = 0V。</li>
    <li><b>Vel/Env</b>: 優先ボイスのベロシティエンベロープCV（0-10V）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クロックとタイミング</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CLK</b>: 外部クロック入力。パターン再生に必須。</li>
    <li><b>RST</b>: リセット入力。全ステップカウンターをゼロに戻す。</li>
    <li><b>REGEN</b>: リジェネレートトリガー入力。現在の設定に基づいて新パターンを生成。</li>
    <li><b>PPQN</b>: 1（四分音符）、2（八分音符）、または4（十六分音符）の四分音符あたりパルス数。右クリックメニューで設定。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Per-Role Audio</b>: 個別ロールオーディオ出力（2ボイス合計）。</li>
    <li><b>Per-Role Gate</b>: ロール別統合トリガー出力。</li>
    <li><b>Per-Role Pitch</b>: ロール別1V/Oct CV出力。</li>
    <li><b>Per-Role Vel/Env</b>: ロール別ベロシティエンベロープCV出力。</li>
    <li><b>MIX L/R</b>: ステレオマスターミックス（アイソレーター、ドライブ、スプレッド適用済み）。</li>
    <li><b>POLY</b>: 16チャンネルポリフォニック出力。4ロール×4チャンネル（Audio、Gate、Pitch、VelEnv）。Portal用に設計。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Role Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline Style</b>: Timelineロールリズムスタイル（0-9、整数スナップ）。</li>
    <li><b>Timeline Density</b>: Timelineロールパターン密度（0-100%、デフォルト40%）。</li>
    <li><b>Timeline Length</b>: Timelineロールパターン長（4-32ステップ、整数スナップ）。</li>
    <li><b>Timeline Freq</b>: Timelineロール周波数修正（-1～+1オクターブ）。</li>
    <li><b>Timeline Decay</b>: Timelineロールディケイ倍率（0.2x～2.0x）。</li>
    <li><b>Timeline Mix (Int/Ext)</b>: Timelineロール内部シンセ（0%）から外部オーディオ（100%）。</li>
    <li><b>Foundation Style</b>: Foundationロールリズムスタイル（0-9、整数スナップ）。</li>
    <li><b>Foundation Density</b>: Foundationロールパターン密度（0-100%、デフォルト20%）。</li>
    <li><b>Foundation Length</b>: Foundationロールパターン長（4-32ステップ、整数スナップ）。</li>
    <li><b>Foundation Freq</b>: Foundationロール周波数修正（-1～+1オクターブ）。</li>
    <li><b>Foundation Decay</b>: Foundationロールディケイ倍率（0.2x～2.0x）。</li>
    <li><b>Foundation Mix (Int/Ext)</b>: Foundationロール内部シンセ（0%）から外部オーディオ（100%）。</li>
    <li><b>Groove Style</b>: Grooveロールリズムスタイル（0-9、整数スナップ）。</li>
    <li><b>Groove Density</b>: Grooveロールパターン密度（0-100%、デフォルト50%）。</li>
    <li><b>Groove Length</b>: Grooveロールパターン長（4-32ステップ、整数スナップ）。</li>
    <li><b>Groove Freq</b>: Grooveロール周波数修正（-1～+1オクターブ）。</li>
    <li><b>Groove Decay</b>: Grooveロールディケイ倍率（0.2x～2.0x）。</li>
    <li><b>Groove Mix (Int/Ext)</b>: Grooveロール内部シンセ（0%）から外部オーディオ（100%）。</li>
    <li><b>Lead Style</b>: Leadロールリズムスタイル（0-9、整数スナップ）。</li>
    <li><b>Lead Density</b>: Leadロールパターン密度（0-100%、デフォルト50%）。</li>
    <li><b>Lead Length</b>: Leadロールパターン長（4-32ステップ、整数スナップ）。</li>
    <li><b>Lead Freq</b>: Leadロール周波数修正（-1～+1オクターブ）。</li>
    <li><b>Lead Decay</b>: Leadロールディケイ倍率（0.2x～2.0x）。</li>
    <li><b>Lead Mix (Int/Ext)</b>: Leadロール内部シンセ（0%）から外部オーディオ（100%）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>: パターン再生用クロック入力。</li>
    <li><b>Reset</b>: リセット入力。全ステップカウンターをゼロに戻す。</li>
    <li><b>Regenerate</b>: 新パターン生成トリガー入力。</li>
    <li><b>Rest CV</b>: 休符確率変調CV入力。</li>
    <li><b>Fill Trigger</b>: フィル発動トリガー入力。</li>
    <li><b>Timeline Style CV</b>: Timelineスタイル変調CV入力。</li>
    <li><b>Timeline Density CV</b>: Timeline密度変調CV入力。</li>
    <li><b>Timeline Freq CV</b>: Timeline周波数変調CV入力。</li>
    <li><b>Timeline Decay CV</b>: Timelineディケイ変調CV入力。</li>
    <li><b>Foundation Style CV</b>: Foundationスタイル変調CV入力。</li>
    <li><b>Foundation Density CV</b>: Foundation密度変調CV入力。</li>
    <li><b>Foundation Freq CV</b>: Foundation周波数変調CV入力。</li>
    <li><b>Foundation Decay CV</b>: Foundationディケイ変調CV入力。</li>
    <li><b>Groove Style CV</b>: Grooveスタイル変調CV入力。</li>
    <li><b>Groove Density CV</b>: Groove密度変調CV入力。</li>
    <li><b>Groove Freq CV</b>: Groove周波数変調CV入力。</li>
    <li><b>Groove Decay CV</b>: Grooveディケイ変調CV入力。</li>
    <li><b>Lead Style CV</b>: Leadスタイル変調CV入力。</li>
    <li><b>Lead Density CV</b>: Lead密度変調CV入力。</li>
    <li><b>Lead Freq CV</b>: Lead周波数変調CV入力。</li>
    <li><b>Lead Decay CV</b>: Leadディケイ変調CV入力。</li>
    <li><b>Timeline Audio Input 1</b>: Timelineロール外部オーディオ入力1。</li>
    <li><b>Timeline Audio Input 2</b>: Timelineロール外部オーディオ入力2。</li>
    <li><b>Foundation Audio Input 1</b>: Foundationロール外部オーディオ入力1。</li>
    <li><b>Foundation Audio Input 2</b>: Foundationロール外部オーディオ入力2。</li>
    <li><b>Groove Audio Input 1</b>: Grooveロール外部オーディオ入力1。</li>
    <li><b>Groove Audio Input 2</b>: Grooveロール外部オーディオ入力2。</li>
    <li><b>Lead Audio Input 1</b>: Leadロール外部オーディオ入力1。</li>
    <li><b>Lead Audio Input 2</b>: Leadロール外部オーディオ入力2。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Output Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Timeline Audio</b>: Timelineロール統合オーディオ出力（2ボイス合計）。</li>
    <li><b>Timeline Gate</b>: Timelineロール統合ゲート/トリガー出力（プライマリ優先）。</li>
    <li><b>Timeline Pitch CV (1V/Oct, C4=0V)</b>: TimelineロールピッチCV出力。</li>
    <li><b>Timeline Velocity Envelope</b>: TimelineロールベロシティエンベロープCV出力。</li>
    <li><b>Foundation Audio</b>: Foundationロール統合オーディオ出力（2ボイス合計）。</li>
    <li><b>Foundation Gate</b>: Foundationロール統合ゲート/トリガー出力（プライマリ優先）。</li>
    <li><b>Foundation Pitch CV (1V/Oct, C4=0V)</b>: FoundationロールピッチCV出力。</li>
    <li><b>Foundation Velocity Envelope</b>: FoundationロールベロシティエンベロープCV出力。</li>
    <li><b>Groove Audio</b>: Grooveロール統合オーディオ出力（2ボイス合計）。</li>
    <li><b>Groove Gate</b>: Grooveロール統合ゲート/トリガー出力（プライマリ優先）。</li>
    <li><b>Groove Pitch CV (1V/Oct, C4=0V)</b>: GrooveロールピッチCV出力。</li>
    <li><b>Groove Velocity Envelope</b>: GrooveロールベロシティエンベロープCV出力。</li>
    <li><b>Lead Audio</b>: Leadロール統合オーディオ出力（2ボイス合計）。</li>
    <li><b>Lead Gate</b>: Leadロール統合ゲート/トリガー出力（プライマリ優先）。</li>
    <li><b>Lead Pitch CV (1V/Oct, C4=0V)</b>: LeadロールピッチCV出力。</li>
    <li><b>Lead Velocity Envelope</b>: LeadロールベロシティエンベロープCV出力。</li>
    <li><b>Mix L</b>: 左ステレオマスターミックス出力（アイソレーター、ドライブ、スプレッド適用済み）。</li>
    <li><b>Mix R</b>: 右ステレオマスターミックス出力（アイソレーター、ドライブ、スプレッド適用済み）。</li>
    <li><b>Poly Out (16ch for Portal)</b>: 16チャンネルポリフォニック出力（4ロール×4チャンネル）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>モジュール幅: 32HP</li>
    <li>ボイス数: 8（ロールあたり2）</li>
    <li>シンセモード: SINE（ピッチあり）、NOISE（ピッチなし）</li>
    <li>パターン長: ロールあたり4-32ステップ</li>
    <li>アイソレータークロスオーバー: 250Hz / 4kHz（リンクウィッツ・ライリー4次）</li>
    <li>ドライブ: 非対称チューブサチュレーション、DCブロッカー付き</li>
    <li>ポリ出力: 16チャンネル（4ロール×4データタイプ）</li>
    <li>処理: 32ビット浮動小数点</li>
    </ul>
