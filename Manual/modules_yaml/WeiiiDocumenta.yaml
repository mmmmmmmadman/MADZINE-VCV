hp: 12
wide: false
alt: weiii documenta panel
description:
  en: Recording sampler emulating analog no-input mixer feedback with real-time transient slicing, 3-band EQ, send/return loop, soft limiter, and chaotic parameter morphing
  zh: 錄音 Sampler，模擬 No-input Mixer 回饋效果，具備即時 Transient 切片、3 段 EQ、Send/Return 迴路、Soft Limiter 與混沌參數變形
  ja: ノーインプットミキサーのフィードバックを再現する録音サンプラー、リアルタイムトランジェントスライス、3バンドEQ、センド/リターンループ、ソフトリミッター、カオスパラメータモーフィング搭載
features:
  en:
  - Stereo recording sampler with 60s buffer
  - Real-time transient slicing
  - Chaotic parameter morphing
  - 3-band EQ processing
  - Send/Return loop for external effects
  - Soft limiter at -3dB (7.07V threshold)
  - Polyphonic playback up to 8 voices
  zh:
  - Stereo 錄音 Sampler，60 秒 Buffer
  - 即時 Transient 切片
  - 混沌參數變形
  - 3 段 EQ 處理
  - Send/Return 迴路供外部效果器使用
  - Soft Limiter -3dB（7.07V 閾值）
  - 最多 8 聲 Polyphonic Playback
  ja:
  - ステレオ録音サンプラー、60秒バッファ
  - リアルタイムトランジェントスライス
  - カオスパラメータモーフィング
  - 3バンドEQ処理
  - 外部エフェクト用センド/リターンループ
  - ソフトリミッター -3dB（7.07V閾値）
  - 最大8ボイスポリフォニック再生
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Recording sampler with chaotic parameter morphing, feedback matrix, and slice engine. Combines real-time recording with automatic transient detection, polyphonic playback, 3-band EQ, sample and hold modulation, and parameter morphing. Maximum recording time: 60 seconds at 48kHz. Designed for experimental sound design and live performance.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Recording and Slicing</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>REC</b>: Toggle recording. Clears existing slices on start.</li>
    <li><b>Transient Detection</b>: Triggers new slice when amplitude crosses threshold from below</li>
    <li><b>THRESHOLD</b>: Detection threshold (0-10V, default 1V). Adjusting while not recording rescans existing buffer.</li>
    <li><b>MIN SLICE</b>: Minimum time between slices (0.001-1.0s, default 0.05s)</li>
    <li><b>Slice Storage</b>: Dynamic std::vector (unlimited slices). Each slice stores startSample, endSample, peakAmplitude.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Speed Control</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Non-linear Mapping</b>: Knob 0-1 maps to -8x to +8x with 1x at center</li>
    <li><b>0-25%</b>: Reverse playback from -8x to 0</li>
    <li><b>25-50%</b>: Forward playback from 0 to 1x</li>
    <li><b>50-100%</b>: Forward playback from 1x to 8x</li>
    <li><b>Linear Interpolation</b>: Sub-sample accuracy using playbackPhase for smooth playback at all speeds</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Polyphonic Voice System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>POLY</b>: 1-8 voices (integer snap, CV modulatable)</li>
    <li><b>Voice Structure</b>: Each voice has independent sliceIndex, playbackPosition, playbackPhase, speedMultiplier</li>
    <li><b>Speed Variation</b>: Voices 1-7 get random speedMultiplier (0.5-2.0x)</li>
    <li><b>Slice Switching</b>: Voices randomly switch slices based on sliceChangeTimer (0.5-2.0s intervals)</li>
    <li><b>Mix Output</b>: Multi-voice output divided by numVoices to prevent clipping</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Slice Crossfade</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Fade Time</b>: 0.1ms (SLICE_FADE_TIME_MS constant)</li>
    <li><b>Fade Increment</b>: Calculated from fade time and sample rate</li>
    <li><b>Pending Slice</b>: New slice stored in pendingSliceIndex during fade-out, applied after envelope reaches 0</li>
    <li><b>Maximum Oscillator Frequency</b>: ~5kHz (limited by 0.1ms fade envelope)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Smoothing</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Exponential Filter</b>: Smoothly interpolates toward target with 0.5% step per sample</li>
    <li><b>Time Constant</b>: ~5ms at 44.1kHz</li>
    <li><b>Smoothed Parameters</b>: Scan, Threshold, LoopEnd, FeedbackAmount, FeedbackDelay</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Feedback System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>No-Input Feedback</b>: Output feeds back to input with analog-style saturation</li>
    <li><b>Saturation</b>: Applies tanh soft-clipping scaled for unity gain at low levels</li>
    <li><b>Mix</b>: Feedback signal added to output scaled by feedback amount</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Morph System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>States</b>: IDLE, MORPHING, HOLDING, RETURNING</li>
    <li><b>Curves</b>: Linear, Smooth (S-curve easing), Exponential (fast attack, slow decay), Bezier (cubic)</li>
    <li><b>Default Targets</b>: EQ, Scan, Feedback, Speed enabled. Threshold, MinSlice, S&H disabled.</li>
    <li><b>Morph Time</b>: 1-20 seconds (configurable via right-click)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Send/Return Loop</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Send L/R</b>: Outputs the current audio signal before EQ processing, within the feedback loop</li>
    <li><b>Return L/R</b>: When connected, replaces the signal with external return. Allows inserting external effects into the feedback chain.</li>
    <li><b>Signal Chain Position</b>: Send/Return sits after playback+feedback mixing, before EQ. The EQ'd output then feeds back into the next cycle.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Soft Limiter</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Threshold</b>: -3dB (7.07V for 10V peak system)</li>
    <li><b>Below Threshold</b>: Signal passes through unchanged (linear)</li>
    <li><b>Above Threshold</b>: Soft knee compression with saturation amount 0.2</li>
    <li><b>Position</b>: Applied to main output after EQ, before final output stage</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">EQ Section</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Low</b>: 80Hz shelf (Allen & Heath reference)</li>
    <li><b>Mid</b>: 2.5kHz peak</li>
    <li><b>High</b>: 12kHz shelf</li>
    <li><b>Range</b>: ±12dB per band</li>
    <li><b>Implementation</b>: TBiquadFilter (IIR)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sample & Hold</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Rate</b>: Logarithmic mapping, range 0.01-100Hz (center = 1Hz)</li>
    <li><b>Slew</b>: 0-1 second slew time</li>
    <li><b>Amount</b>: 0-5x gain multiplier</li>
    <li><b>Output</b>: ±10V CV output</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Slice Scan</b>: Scan position through recorded slices (0-100%). CV modulatable.</li>
    <li><b>Scan CV Attenuverter</b>: Attenuverter for Slice Scan CV input (-1.0 to +1.0).</li>
    <li><b>Slice Threshold</b>: Transient detection threshold (0-10V, default 1V). Rescans buffer when adjusted outside recording.</li>
    <li><b>Min Slice Time</b>: Minimum time between slices (0.001-1.0s, default 0.05s).</li>
    <li><b>Loop End Point</b>: Loop end position (0-100%, default 100%).</li>
    <li><b>Morph Random (Hold)</b>: Hold button for chaotic parameter morphing. Randomizes enabled targets while held.</li>
    <li><b>Feedback Amount</b>: No-input feedback level (0-100%). Adds tanh-saturated output back to input.</li>
    <li><b>Feedback CV Attenuverter</b>: Attenuverter for Feedback Amount CV input (-1.0 to +1.0).</li>
    <li><b>Low EQ (80Hz)</b>: Low shelf EQ at 80Hz (±12dB).</li>
    <li><b>Mid EQ (2.5kHz)</b>: Mid peak EQ at 2.5kHz (±12dB).</li>
    <li><b>High EQ (12kHz)</b>: High shelf EQ at 12kHz (±12dB).</li>
    <li><b>Playback Speed</b>: Non-linear speed control. 0-25%: reverse -8x to 0. 25-50%: forward 0 to 1x. 50-100%: forward 1x to 8x.</li>
    <li><b>Polyphonic Voices</b>: Number of playback voices (1-8, integer snap). CV modulatable.</li>
    <li><b>S&H Slew Time</b>: Sample & Hold slew time (0-1s). Smooths CV transitions.</li>
    <li><b>S&H Gain</b>: Sample & Hold gain multiplier (0-5x).</li>
    <li><b>S&H Gain CV Attenuverter</b>: Attenuverter for S&H Gain CV input (-1.0 to +1.0).</li>
    <li><b>S&H Sample Rate</b>: Sample & Hold rate (0.01-100Hz, logarithmic). Center = 1Hz.</li>
    <li><b>S&H Rate CV Attenuverter</b>: Attenuverter for S&H Rate CV input (-1.0 to +1.0).</li>
    <li><b>Record</b>: Toggle recording. Clears existing slices on start.</li>
    <li><b>Play/Loop (cycles: Loop → Play)</b>: Toggle playback mode. Cycles between Loop and one-shot Play.</li>
    <li><b>Stop (hold 2 sec to Clear)</b>: Stop playback. Hold for 2 seconds to clear buffer.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Audio L</b>: Left audio input for recording.</li>
    <li><b>Audio R</b>: Right audio input for recording.</li>
    <li><b>Slice Scan CV</b>: CV input for slice scan position modulation.</li>
    <li><b>Threshold CV</b>: CV input for threshold modulation.</li>
    <li><b>Feedback Amount CV</b>: CV input for feedback amount modulation.</li>
    <li><b>Speed CV</b>: CV input for playback speed modulation.</li>
    <li><b>Polyphonic CV</b>: CV input for voice count modulation.</li>
    <li><b>S&H Amount CV</b>: CV input for S&H gain modulation.</li>
    <li><b>S&H Rate CV</b>: CV input for S&H rate modulation.</li>
    <li><b>Return L</b>: Left return input for external effects loop.</li>
    <li><b>Return R</b>: Right return input for external effects loop.</li>
    <li><b>Rec Trigger</b>: Trigger input to toggle recording.</li>
    <li><b>Play Trigger</b>: Trigger input to toggle playback.</li>
    <li><b>Clear Trigger</b>: Trigger input to stop/clear.</li>
    <li><b>Morph Gate</b>: Gate input for parameter morphing. Morphs while gate is high.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Output Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Main L</b>: Left main audio output (with EQ and soft limiter applied).</li>
    <li><b>Main R</b>: Right main audio output (with EQ and soft limiter applied).</li>
    <li><b>S&H CV</b>: Sample & Hold CV output (±10V).</li>
    <li><b>Send L</b>: Left send output for external effects loop (pre-EQ).</li>
    <li><b>Send R</b>: Right send output for external effects loop (pre-EQ).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Module width: 12HP</li>
    <li>Buffer size: 60 seconds at 48kHz (2,880,000 samples per channel)</li>
    <li>Internal processing: ±10V hard clamp in sample engine</li>
    <li>Main output: Soft limiter at -3dB (7.07V threshold), soft knee compression above</li>
    <li>EQ implementation: Biquad IIR filters</li>
    <li>Slice storage: Dynamic vector (unlimited)</li>
    <li>Random engine: std::default_random_engine with time-based seed</li>
    <li>State persistence: Buffer, slices, all parameters saved to JSON</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">具備混沌參數變形、Feedback Matrix 與 Slice 引擎的錄音 Sampler。結合即時錄音與自動 Transient 偵測、Polyphonic Playback、3 段 EQ、Sample and Hold Modulation 與參數變形。最長錄音時間：48kHz 時 60 秒。專為實驗性音效設計與現場演出設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">錄音與切片</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>REC</b>: 切換錄音。開始時清除既有 Slice。</li>
    <li><b>Transient Detection</b>: 當振幅由下往上穿越閾值時觸發新 Slice</li>
    <li><b>THRESHOLD</b>: 偵測閾值（0-10V，預設 1V）。非錄音時調整會重新掃描既有 Buffer。</li>
    <li><b>MIN SLICE</b>: Slice 間最小時間（0.001-1.0s，預設 0.05s）</li>
    <li><b>Slice Storage</b>: 動態 std::vector（無限 Slice）。每個 Slice 儲存 startSample、endSample、peakAmplitude。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">速度控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>非線性映射</b>: Knob 0-1 映射至 -8x 到 +8x，中心為 1x</li>
    <li><b>0-25%</b>: 反向播放 -8x 至 0</li>
    <li><b>25-50%</b>: 正向播放 0 至 1x</li>
    <li><b>50-100%</b>: 正向播放 1x 至 8x</li>
    <li><b>線性插值</b>: 使用 playbackPhase 進行次樣本精度，在所有速度下流暢播放</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Polyphonic Voice 系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>POLY</b>: 1-8 聲（整數對齊，可 CV 調變）</li>
    <li><b>Voice 結構</b>: 每個 Voice 擁有獨立的 sliceIndex、playbackPosition、playbackPhase、speedMultiplier</li>
    <li><b>速度變化</b>: Voice 1-7 獲得隨機 speedMultiplier（0.5-2.0x）</li>
    <li><b>Slice 切換</b>: Voice 根據 sliceChangeTimer（0.5-2.0s 間隔）隨機切換 Slice</li>
    <li><b>混合輸出</b>: 多 Voice 輸出除以 numVoices 以防止削波</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Slice Crossfade</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Fade 時間</b>: 0.1ms（SLICE_FADE_TIME_MS 常數）</li>
    <li><b>Fade 增量</b>: 根據 Fade 時間與 Sample Rate 計算</li>
    <li><b>待處理 Slice</b>: Fade-out 期間新 Slice 儲存於 pendingSliceIndex，在 Envelope 達 0 後套用</li>
    <li><b>最大 Oscillator 頻率</b>: 約 5kHz（受 0.1ms Fade Envelope 限制）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">參數平滑</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>指數濾波器</b>: 每個 Sample 以 0.5% 步進平滑插值趨向目標值</li>
    <li><b>時間常數</b>: 44.1kHz 時約 5ms</li>
    <li><b>平滑參數</b>: Scan、Threshold、LoopEnd、FeedbackAmount、FeedbackDelay</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Feedback 系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>No-Input Feedback</b>: 輸出回授至輸入，帶類比風格飽和</li>
    <li><b>飽和</b>: 套用 tanh 軟削波，低電平時保持單位增益</li>
    <li><b>混合</b>: Feedback 訊號依 Feedback Amount 縮放後加至輸出</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Morph 系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>狀態</b>: IDLE、MORPHING、HOLDING、RETURNING</li>
    <li><b>曲線</b>: Linear、Smooth（S 曲線緩動）、Exponential（快起慢收）、Bezier（cubic）</li>
    <li><b>預設目標</b>: EQ、Scan、Feedback、Speed 啟用。Threshold、MinSlice、S&H 停用。</li>
    <li><b>Morph 時間</b>: 1-20 秒（可透過右鍵選單設定）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Send/Return 迴路</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Send L/R</b>: 在 EQ 處理前輸出目前音訊訊號，位於 Feedback 迴路內</li>
    <li><b>Return L/R</b>: 連接時以外部 Return 訊號取代內部訊號。允許將外部效果器插入 Feedback Chain 中進行處理。</li>
    <li><b>訊號鏈位置</b>: Send/Return 位於播放+Feedback 混合之後、EQ 之前。EQ 後的輸出再回授至下一循環。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Soft Limiter</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>閾值</b>: -3dB（10V 峰值系統中為 7.07V）</li>
    <li><b>閾值</b>: -3dB（10V 峰值系統下為 7.07V）</li>
    <li><b>低於閾值</b>: 訊號直通不變（線性）</li>
    <li><b>高於閾值</b>: Soft Knee 壓縮，Saturation Amount 0.2</li>
    <li><b>位置</b>: 套用於 EQ 之後、最終輸出前的 Main Output</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">EQ 區段</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Low</b>: 80Hz Shelf（Allen & Heath 參考）</li>
    <li><b>Mid</b>: 2.5kHz Peak</li>
    <li><b>High</b>: 12kHz Shelf</li>
    <li><b>範圍</b>: 每段 ±12dB</li>
    <li><b>實作</b>: TBiquadFilter（IIR）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sample & Hold</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Rate</b>: 對數映射，範圍 0.01-100Hz（中心 = 1Hz）</li>
    <li><b>Slew</b>: 0-1 秒 Slew 時間</li>
    <li><b>Amount</b>: 0-5x 增益倍數</li>
    <li><b>輸出</b>: ±10V CV 輸出</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Slice Scan</b>: Slice 掃描位置（0-100%）。可 CV 調變。</li>
    <li><b>Scan CV Attenuverter</b>: Slice Scan CV 輸入的 Attenuverter（-1.0 至 +1.0）。</li>
    <li><b>Slice Threshold</b>: Transient 偵測閾值（0-10V，預設 1V）。非錄音時調整會重新掃描 Buffer。</li>
    <li><b>Min Slice Time</b>: Slice 間最小時間（0.001-1.0s，預設 0.05s）。</li>
    <li><b>Loop End Point</b>: Loop 結束位置（0-100%，預設 100%）。</li>
    <li><b>Morph Random (Hold)</b>: 按住此按鈕可進行混沌式參數變形（Chaotic Parameter Morphing）。按住期間會持續隨機化所有已啟用的目標參數。</li>
    <li><b>Feedback Amount</b>: No-input Feedback 量（0-100%）。以 tanh 飽和方式將輸出回授至輸入。</li>
    <li><b>Feedback CV Attenuverter</b>: Feedback Amount CV 輸入的 Attenuverter（-1.0 至 +1.0）。</li>
    <li><b>Low EQ (80Hz)</b>: 80Hz Low Shelf EQ（±12dB）。</li>
    <li><b>Mid EQ (2.5kHz)</b>: 2.5kHz Mid Peak EQ（±12dB）。</li>
    <li><b>High EQ (12kHz)</b>: 12kHz High Shelf EQ（±12dB）。</li>
    <li><b>Playback Speed</b>: 非線性速度控制。0-25%: 反向 -8x 至 0。25-50%: 正向 0 至 1x。50-100%: 正向 1x 至 8x。</li>
    <li><b>Polyphonic Voices</b>: 播放 Voice 數量（1-8，整數對齊）。可 CV 調變。</li>
    <li><b>S&H Slew Time</b>: Sample & Hold Slew 時間（0-1s）。平滑 CV 過渡。</li>
    <li><b>S&H Gain</b>: Sample & Hold 增益倍數（0-5x）。</li>
    <li><b>S&H Gain CV Attenuverter</b>: S&H Gain CV 輸入的 Attenuverter（-1.0 至 +1.0）。</li>
    <li><b>S&H Sample Rate</b>: Sample & Hold 取樣率（0.01-100Hz，對數映射）。中心 = 1Hz。</li>
    <li><b>S&H Rate CV Attenuverter</b>: S&H Rate CV 輸入的 Attenuverter（-1.0 至 +1.0）。</li>
    <li><b>Record</b>: 切換錄音。開始時清除既有 Slice。</li>
    <li><b>Play/Loop (cycles: Loop → Play)</b>: 切換播放模式。在 Loop 與單次 Play 之間循環。</li>
    <li><b>Stop (hold 2 sec to Clear)</b>: 停止播放。按住 2 秒清除 Buffer。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Audio L</b>: 左聲道 Audio 錄音輸入。</li>
    <li><b>Audio R</b>: 右聲道 Audio 錄音輸入。</li>
    <li><b>Slice Scan CV</b>: Slice 掃描位置調變 CV 輸入。</li>
    <li><b>Threshold CV</b>: 閾值調變 CV 輸入。</li>
    <li><b>Feedback Amount CV</b>: Feedback Amount 調變 CV 輸入。</li>
    <li><b>Speed CV</b>: 播放速度調變 CV 輸入。</li>
    <li><b>Polyphonic CV</b>: Voice 數量調變 CV 輸入。</li>
    <li><b>S&H Amount CV</b>: S&H Gain 調變 CV 輸入。</li>
    <li><b>S&H Rate CV</b>: S&H Rate 調變 CV 輸入。</li>
    <li><b>Return L</b>: 左聲道 Return 輸入，用於外部效果器迴路。</li>
    <li><b>Return R</b>: 右聲道 Return 輸入，用於外部效果器迴路。</li>
    <li><b>Rec Trigger</b>: 切換錄音的 Trigger 輸入。</li>
    <li><b>Play Trigger</b>: 切換播放的 Trigger 輸入。</li>
    <li><b>Clear Trigger</b>: 停止/清除的 Trigger 輸入。</li>
    <li><b>Morph Gate</b>: 參數變形 Gate 輸入。Gate 為高時進行變形。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Output Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Main L</b>: 左聲道 Main Audio 輸出（含 EQ 與 Soft Limiter）。</li>
