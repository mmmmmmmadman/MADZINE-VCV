    <li><b>Min Slice Time</b>: スライス間の最小時間（0.001-1.0s、デフォルト0.05s）。</li>
    <li><b>Loop End Point</b>: ループ終了位置（0-100%、デフォルト100%）。</li>
    <li><b>Morph Random (Hold)</b>: カオスパラメータモーフィング用のホールドボタン。押し続けている間、有効化されたターゲットパラメータをランダム化し続ける。</li>
    <li><b>Feedback Amount</b>: ノーインプットフィードバック量（0-100%）。tanh飽和で出力を入力にフィードバック。</li>
    <li><b>Feedback CV Attenuverter</b>: Feedback Amount CV入力用アッテヌバーター（-1.0～+1.0）。</li>
    <li><b>Low EQ (80Hz)</b>: 80Hz ローシェルフEQ（±12dB）。</li>
    <li><b>Mid EQ (2.5kHz)</b>: 2.5kHz ミッドピークEQ（±12dB）。</li>
    <li><b>High EQ (12kHz)</b>: 12kHz ハイシェルフEQ（±12dB）。</li>
    <li><b>Playback Speed</b>: 非線形速度コントロール。0-25%: 逆再生-8x～0。25-50%: 順再生0～1x。50-100%: 順再生1x～8x。</li>
    <li><b>Polyphonic Voices</b>: 再生ボイス数（1-8、整数スナップ）。CVモジュレート可能。</li>
    <li><b>S&H Slew Time</b>: サンプル＆ホールドスルー時間（0-1s）。CVトランジションをスムーズ化。</li>
    <li><b>S&H Gain</b>: サンプル＆ホールドゲイン倍率（0-5x）。</li>
    <li><b>S&H Gain CV Attenuverter</b>: S&H Gain CV入力用アッテヌバーター（-1.0～+1.0）。</li>
    <li><b>S&H Sample Rate</b>: サンプル＆ホールドレート（0.01-100Hz、対数）。中心=1Hz。</li>
    <li><b>S&H Rate CV Attenuverter</b>: S&H Rate CV入力用アッテヌバーター（-1.0～+1.0）。</li>
    <li><b>Record</b>: 録音切替。開始時に既存スライスをクリア。</li>
    <li><b>Play/Loop (cycles: Loop → Play)</b>: 再生モード切替。ループとワンショット再生を切り替え。</li>
    <li><b>Stop (hold 2 sec to Clear)</b>: 再生停止。2秒長押しでバッファクリア。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Input Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Audio L</b>: 左チャンネルオーディオ録音入力。</li>
    <li><b>Audio R</b>: 右チャンネルオーディオ録音入力。</li>
    <li><b>Slice Scan CV</b>: スライススキャン位置変調CV入力。</li>
    <li><b>Threshold CV</b>: 閾値変調CV入力。</li>
    <li><b>Feedback Amount CV</b>: フィードバック量変調CV入力。</li>
    <li><b>Speed CV</b>: 再生速度変調CV入力。</li>
    <li><b>Polyphonic CV</b>: ボイス数変調CV入力。</li>
    <li><b>S&H Amount CV</b>: S&Hゲイン変調CV入力。</li>
    <li><b>S&H Rate CV</b>: S&Hレート変調CV入力。</li>
    <li><b>Return L</b>: 左チャンネルリターン入力（外部エフェクトループ用）。</li>
    <li><b>Return R</b>: 右チャンネルリターン入力（外部エフェクトループ用）。</li>
    <li><b>Rec Trigger</b>: 録音切替トリガー入力。</li>
    <li><b>Play Trigger</b>: 再生切替トリガー入力。</li>
    <li><b>Clear Trigger</b>: 停止/クリアトリガー入力。</li>
    <li><b>Morph Gate</b>: パラメータモーフィングゲート入力。ゲートがハイの間モーフィング実行。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Output Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Main L</b>: 左チャンネルメインオーディオ出力（EQ・ソフトリミッター適用済み）。</li>
    <li><b>Main R</b>: 右チャンネルメインオーディオ出力（EQ・ソフトリミッター適用済み）。</li>
    <li><b>S&H CV</b>: サンプル＆ホールドCV出力（±10V）。</li>
    <li><b>Send L</b>: 左チャンネルセンド出力（外部エフェクトループ用、EQ前）。</li>
    <li><b>Send R</b>: 右チャンネルセンド出力（外部エフェクトループ用、EQ前）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>モジュール幅: 12HP</li>
    <li>バッファサイズ: 48kHzで60秒（チャンネルあたり2,880,000サンプル）</li>
    <li>内部処理: サンプルエンジン内 ±10Vハードクランプ</li>
    <li>メイン出力: ソフトリミッター -3dB（7.07V閾値）、超過時ソフトニーコンプレッション</li>
    <li>EQ実装: Biquad IIRフィルター</li>
    <li>スライス保存: 動的ベクター（無制限）</li>
    <li>乱数エンジン: std::default_random_engine、時間ベースシード</li>
    <li>状態永続化: バッファ、スライス、全パラメータをJSONに保存</li>
    </ul>
    <div style="display:none"><ul>
    <li><b>Non-linear Mapping</b>: ノブ0〜1が-8xから+8xにマッピング、中心で1x</li>
    <li><b>Linear Interpolation</b>: playbackPhaseを使用したサブサンプル精度で全速度でスムーズな再生</li>
    <li><b>Voice Structure</b>: 各ボイスが独立したsliceIndex、playbackPosition、playbackPhase、speedMultiplierを持つ</li>
    <li><b>Speed Variation</b>: ボイス1〜7がランダムなspeedMultiplier（0.5〜2.0x）を取得</li>
    <li><b>Slice Switching</b>: ボイスがsliceChangeTimer（0.5〜2.0s間隔）に基づいてランダムにスライスを切り替え</li>
    <li><b>Mix Output</b>: クリッピング防止のため多ボイス出力をnumVoicesで除算</li>
    <li><b>Fade Time</b>: 0.1ms（SLICE_FADE_TIME_MS定数）</li>
    <li><b>Fade Increment</b>: フェードタイムとサンプルレートから計算</li>
    <li><b>Pending Slice</b>: 新しいスライスはフェードアウト中にpendingSliceIndexに格納、エンベロープがゼロになってから適用</li>
    <li><b>Maximum Oscillator Frequency</b>: 約5kHz（0.1msフェードエンベロープによる制限）</li>
    <li><b>Exponential Filter</b>: サンプルあたり0.5%ステップで目標に向けてスムーズに補間</li>
    <li><b>Time Constant</b>: 44.1kHzで約5ms</li>
    <li><b>Smoothed Parameters</b>: Scan、Threshold、LoopEnd、FeedbackAmount、FeedbackDelay</li>
    <li><b>Saturation</b>: 低レベルでユニティゲインを維持するようスケーリングされたtanhソフトクリッピング</li>
    <li><b>Mix</b>: フィードバック信号をフィードバック量でスケーリングして出力に加算</li>
    <li><b>States</b>: IDLE、MORPHING、HOLDING、RETURNING</li>
    <li><b>Curves</b>: 線形、スムーズ（Sカーブイージング）、指数（素早いアタック・遅いディケイ）、ベジェ（制御点設定可能）</li>
    <li><b>Default Targets</b>: EQ、Scan、Feedback、Speed有効。Threshold、MinSlice、S and H無効</li>
    <li><b>Morph Time</b>: 1〜20秒（右クリックで設定可能）</li>
    <li><b>Signal Chain Position</b>: センド/リターンは再生+フィードバックミックス後、EQ前に位置。EQ処理後の出力は次のサイクルにフィードバック。</li>
    <li><b>Below Threshold</b>: 信号は変化なしで通過（線形）</li>
    <li><b>Above Threshold</b>: 飽和量0.2のソフトニーコンプレッション</li>
    <li><b>Threshold</b>: -3dB（10Vピークシステムで7.07V）</li>
    <li><b>Position</b>: EQ後、最終出力前のメイン出力に適用</li>
    <li><b>Range</b>: 各バンド+/-12dB</li>
    <li><b>Implementation</b>: TBiquadFilter（IIR）</li>
    <li><b>Output</b>: +/-10V CV出力</li>
    <li><b>No-Input Feedback</b>: 出力がアナログスタイルサチュレーション付きで入力にフィードバック</li>
    </ul></div>
controls:
- name: Slice Scan
  type: param
  desc:
    en: Scan position through recorded slices (0-100%). CV modulatable.
    zh: Slice 掃描位置（0-100%）。可 CV 調變。
    ja: スライススキャン位置（0-100%）。CVモジュレート可能。
- name: Scan CV Attenuverter
  type: param
  desc:
    en: Attenuverter for Slice Scan CV input (-1.0 to +1.0).
    zh: Slice Scan CV 輸入的 Attenuverter（-1.0 至 +1.0）。
    ja: Slice Scan CV入力用アッテヌバーター（-1.0～+1.0）。
- name: Slice Threshold
  type: param
  desc:
    en: Transient detection threshold (0-10V, default 1V). Rescans buffer when adjusted outside recording.
    zh: Transient 偵測閾值（0-10V，預設 1V）。非錄音時調整會重新掃描 Buffer。
    ja: トランジェント検出閾値（0-10V、デフォルト1V）。非録音時の調整でバッファを再スキャン。
- name: Min Slice Time
  type: param
  desc:
    en: Minimum time between slices (0.001-1.0s, default 0.05s).
    zh: Slice 間最小時間（0.001-1.0s，預設 0.05s）。
    ja: スライス間の最小時間（0.001-1.0s、デフォルト0.05s）。
- name: Loop End Point
  type: param
  desc:
    en: Loop end position (0-100%, default 100%).
    zh: Loop 結束位置（0-100%，預設 100%）。
    ja: ループ終了位置（0-100%、デフォルト100%）。
- name: Morph Random (Hold)
  type: param
  desc:
    en: Hold button for chaotic parameter morphing. Randomizes enabled targets while held.
    zh: 按住此按鈕可進行混沌式參數變形（Chaotic Parameter Morphing）。按住期間會持續隨機化所有已啟用的目標參數。
    ja: カオスパラメータモーフィング用のホールドボタン。押し続けている間、有効化されたターゲットパラメータをランダム化し続ける。
- name: Feedback Amount
  type: param
  desc:
    en: No-input feedback level (0-100%). Adds tanh-saturated output back to input.
    zh: No-input Feedback 量（0-100%）。以 tanh 飽和方式將輸出回授至輸入。
    ja: ノーインプットフィードバック量（0-100%）。tanh飽和で出力を入力にフィードバック。
- name: Feedback CV Attenuverter
  type: param
  desc:
    en: Attenuverter for Feedback Amount CV input (-1.0 to +1.0).
    zh: Feedback Amount CV 輸入的 Attenuverter（-1.0 至 +1.0）。
    ja: Feedback Amount CV入力用アッテヌバーター（-1.0～+1.0）。
- name: Low EQ (80Hz)
  type: param
  desc:
    en: Low shelf EQ at 80Hz (±12dB).
    zh: 80Hz Low Shelf EQ（±12dB）。
    ja: 80Hz ローシェルフEQ（±12dB）。
- name: Mid EQ (2.5kHz)
  type: param
  desc:
    en: Mid peak EQ at 2.5kHz (±12dB).
    zh: 2.5kHz Mid Peak EQ（±12dB）。
    ja: 2.5kHz ミッドピークEQ（±12dB）。
- name: High EQ (12kHz)
  type: param
  desc:
    en: High shelf EQ at 12kHz (±12dB).
    zh: 12kHz High Shelf EQ（±12dB）。
    ja: 12kHz ハイシェルフEQ（±12dB）。
- name: Playback Speed
  type: param
  desc:
    en: 'Non-linear speed control. 0-25%: reverse -8x to 0. 25-50%: forward 0 to 1x. 50-100%: forward 1x to 8x.'
    zh: '非線性速度控制。0-25%: 反向 -8x 至 0。25-50%: 正向 0 至 1x。50-100%: 正向 1x 至 8x。'
    ja: '非線形速度コントロール。0-25%: 逆再生-8x～0。25-50%: 順再生0～1x。50-100%: 順再生1x～8x。'
- name: Polyphonic Voices
  type: param
  desc:
    en: Number of playback voices (1-8, integer snap). CV modulatable.
    zh: 播放 Voice 數量（1-8，整數對齊）。可 CV 調變。
    ja: 再生ボイス数（1-8、整数スナップ）。CVモジュレート可能。
- name: S&H Slew Time
  type: param
  desc:
    en: Sample & Hold slew time (0-1s). Smooths CV transitions.
    zh: Sample & Hold Slew 時間（0-1s）。平滑 CV 過渡。
    ja: サンプル＆ホールドスルー時間（0-1s）。CVトランジションをスムーズ化。
- name: S&H Gain
  type: param
  desc:
    en: Sample & Hold gain multiplier (0-5x).
    zh: Sample & Hold 增益倍數（0-5x）。
    ja: サンプル＆ホールドゲイン倍率（0-5x）。
- name: S&H Gain CV Attenuverter
  type: param
  desc:
    en: Attenuverter for S&H Gain CV input (-1.0 to +1.0).
    zh: S&H Gain CV 輸入的 Attenuverter（-1.0 至 +1.0）。
    ja: S&H Gain CV入力用アッテヌバーター（-1.0～+1.0）。
- name: S&H Sample Rate
  type: param
  desc:
    en: Sample & Hold rate (0.01-100Hz, logarithmic). Center = 1Hz.
    zh: Sample & Hold 取樣率（0.01-100Hz，對數映射）。中心 = 1Hz。
    ja: サンプル＆ホールドレート（0.01-100Hz、対数）。中心=1Hz。
- name: S&H Rate CV Attenuverter
  type: param
  desc:
    en: Attenuverter for S&H Rate CV input (-1.0 to +1.0).
    zh: S&H Rate CV 輸入的 Attenuverter（-1.0 至 +1.0）。
    ja: S&H Rate CV入力用アッテヌバーター（-1.0～+1.0）。
- name: Record
  type: param
  desc:
    en: Toggle recording. Clears existing slices on start.
    zh: 切換錄音。開始時清除既有 Slice。
    ja: 録音切替。開始時に既存スライスをクリア。
- name: 'Play/Loop (cycles: Loop → Play)'
  type: param
  desc:
    en: Toggle playback mode. Cycles between Loop and one-shot Play.
    zh: 切換播放模式。在 Loop 與單次 Play 之間循環。
    ja: 再生モード切替。ループとワンショット再生を切り替え。
- name: Stop (hold 2 sec to Clear)
  type: param
  desc:
    en: Stop playback. Hold for 2 seconds to clear buffer.
    zh: 停止播放。按住 2 秒清除 Buffer。
    ja: 再生停止。2秒長押しでバッファクリア。
- name: Audio L
  type: input
  desc:
    en: Left audio input for recording.
    zh: 左聲道 Audio 錄音輸入。
    ja: 左チャンネルオーディオ録音入力。
- name: Audio R
  type: input
  desc:
    en: Right audio input for recording.
    zh: 右聲道 Audio 錄音輸入。
    ja: 右チャンネルオーディオ録音入力。
- name: Slice Scan CV
  type: input
  desc:
    en: CV input for slice scan position modulation.
    zh: Slice 掃描位置調變 CV 輸入。
    ja: スライススキャン位置変調CV入力。
- name: Threshold CV
  type: input
  desc:
    en: CV input for threshold modulation.
    zh: 閾值調變 CV 輸入。
    ja: 閾値変調CV入力。
- name: Feedback Amount CV
  type: input
  desc:
    en: CV input for feedback amount modulation.
    zh: Feedback Amount 調變 CV 輸入。
    ja: フィードバック量変調CV入力。
- name: Speed CV
  type: input
  desc:
    en: CV input for playback speed modulation.
    zh: 播放速度調變 CV 輸入。
    ja: 再生速度変調CV入力。
- name: Polyphonic CV
  type: input
  desc:
    en: CV input for voice count modulation.
    zh: Voice 數量調變 CV 輸入。
    ja: ボイス数変調CV入力。
- name: S&H Amount CV
  type: input
  desc:
    en: CV input for S&H gain modulation.
    zh: S&H Gain 調變 CV 輸入。
    ja: S&Hゲイン変調CV入力。
- name: S&H Rate CV
  type: input
  desc:
    en: CV input for S&H rate modulation.
    zh: S&H Rate 調變 CV 輸入。
    ja: S&Hレート変調CV入力。
- name: Return L
  type: input
  desc:
    en: Left return input for external effects loop.
    zh: 左聲道 Return 輸入，用於外部效果器迴路。
    ja: 左チャンネルリターン入力（外部エフェクトループ用）。
- name: Return R
  type: input
  desc:
    en: Right return input for external effects loop.
    zh: 右聲道 Return 輸入，用於外部效果器迴路。
    ja: 右チャンネルリターン入力（外部エフェクトループ用）。
- name: Rec Trigger
  type: input
  desc:
    en: Trigger input to toggle recording.
    zh: 切換錄音的 Trigger 輸入。
    ja: 録音切替トリガー入力。
- name: Play Trigger
  type: input
  desc:
    en: Trigger input to toggle playback.
    zh: 切換播放的 Trigger 輸入。
    ja: 再生切替トリガー入力。
- name: Clear Trigger
  type: input
  desc:
    en: Trigger input to stop/clear.
    zh: 停止/清除的 Trigger 輸入。
    ja: 停止/クリアトリガー入力。
- name: Morph Gate
  type: input
  desc:
    en: Gate input for parameter morphing. Morphs while gate is high.
    zh: 參數變形 Gate 輸入。Gate 為高時進行變形。
    ja: パラメータモーフィングゲート入力。ゲートがハイの間モーフィング実行。
- name: Main L
  type: output
  desc:
    en: Left main audio output (with EQ and soft limiter applied).
    zh: 左聲道 Main Audio 輸出（含 EQ 與 Soft Limiter）。
    ja: 左チャンネルメインオーディオ出力（EQ・ソフトリミッター適用済み）。
- name: Main R
  type: output
  desc:
    en: Right main audio output (with EQ and soft limiter applied).
    zh: 右聲道 Main Audio 輸出（含 EQ 與 Soft Limiter）。
    ja: 右チャンネルメインオーディオ出力（EQ・ソフトリミッター適用済み）。
- name: S&H CV
  type: output
  desc:
    en: Sample & Hold CV output (±10V).
    zh: Sample & Hold CV 輸出（±10V）。
    ja: サンプル＆ホールドCV出力（±10V）。
- name: Send L
  type: output
  desc:
    en: Left send output for external effects loop (pre-EQ).
    zh: 左聲道 Send 輸出，用於外部效果器迴路（EQ 前）。
    ja: 左チャンネルセンド出力（外部エフェクトループ用、EQ前）。
- name: Send R
  type: output
  desc:
    en: Right send output for external effects loop (pre-EQ).
    zh: 右聲道 Send 輸出，用於外部效果器迴路（EQ 前）。
    ja: 右チャンネルセンド出力（外部エフェクトループ用、EQ前）。
