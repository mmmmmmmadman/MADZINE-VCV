    <li><b>Send L</b>: 左聲道 Send 輸出，用於外部效果器迴路（EQ 前）。</li>
    <li><b>Send R</b>: 右聲道 Send 輸出，用於外部效果器迴路（EQ 前）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>模組寬度: 12HP</li>
    <li>Buffer 大小: 48kHz 時 60 秒（每聲道 2,880,000 樣本）</li>
    <li>內部處理: Sample Engine 中 ±10V 硬限制</li>
    <li>Main Output: Soft Limiter -3dB（7.07V 閾值），超過時 Soft Knee 壓縮</li>
    <li>EQ 實作: Biquad IIR 濾波器</li>
    <li>Slice 儲存: 動態 Vector（無限）</li>
    <li>隨機引擎: std::default_random_engine，時間基準種子</li>
    <li>狀態持久化: Buffer、Slice、所有參數儲存至 JSON</li>
    </ul>
    <div style="display:none"><ul>
    <li><b>Non-linear Mapping</b>: Knob 0-1 映射至 -8x 到 +8x，中心為 1x</li>
    <li><b>Linear Interpolation</b>: 使用 playbackPhase 的子採樣精度，確保所有速度下平滑播放</li>
    <li><b>Voice Structure</b>: 每個 Voice 有獨立的 sliceIndex、playbackPosition、playbackPhase、speedMultiplier</li>
    <li><b>Speed Variation</b>: Voice 1-7 獲得隨機 speedMultiplier（0.5-2.0x）</li>
    <li><b>Slice Switching</b>: Voice 根據 sliceChangeTimer（0.5-2.0s 間隔）隨機切換 Slice</li>
    <li><b>Mix Output</b>: 多 Voice 輸出除以 numVoices 以防止削波</li>
    <li><b>No-Input Feedback</b>: 輸出回授至輸入，帶類比風格 Saturation</li>
    <li><b>Fade Time</b>: 0.1ms（SLICE_FADE_TIME_MS 常數）</li>
    <li><b>Fade Increment</b>: 由淡化時間與 Sample Rate 計算</li>
    <li><b>Pending Slice</b>: 新 Slice 在淡出期間儲存於 pendingSliceIndex，Envelope 歸零後套用</li>
    <li><b>Maximum Oscillator Frequency</b>: ~5kHz（由 0.1ms 淡化 Envelope 限制）</li>
    <li><b>Exponential Filter</b>: 以每 Sample 0.5% 步進平滑趨近目標</li>
    <li><b>Time Constant</b>: 44.1kHz 時約 5ms</li>
    <li><b>Smoothed Parameters</b>: Scan、Threshold、LoopEnd、FeedbackAmount、FeedbackDelay</li>
    <li><b>Saturation</b>: 套用 tanh 軟削波，低電平時縮放以保持單位增益</li>
    <li><b>Mix</b>: Feedback 訊號按 Feedback 量縮放後加至輸出</li>
    <li><b>States</b>: IDLE、MORPHING、HOLDING、RETURNING</li>
    <li><b>Curves</b>: 線性、平滑（S 曲線緩動）、指數（快速起音、慢速衰減）、Bezier（可設定控制點）</li>
    <li><b>Default Targets</b>: EQ、Scan、Feedback、Speed 啟用。Threshold、MinSlice、S and H 停用</li>
    <li><b>Morph Time</b>: 1-20 秒（可透過右鍵設定）</li>
    <li><b>Signal Chain Position</b>: Send/Return 位於播放+Feedback 混合後、EQ 前。EQ 處理後的輸出回授至下一個循環。</li>
    <li><b>Below Threshold</b>: 訊號通過不變（線性）</li>
    <li><b>Above Threshold</b>: 含軟膝壓縮，飽和量 0.2</li>
    <li><b>Threshold</b>: -3dB（10V 峰值系統下為 7.07V）</li>
    <li><b>Position</b>: 套用至 EQ 後、最終輸出前的主輸出</li>
    <li><b>Range</b>: 每頻段 +/-12dB</li>
    <li><b>Implementation</b>: TBiquadFilter（IIR）</li>
    <li><b>Output</b>: +/-10V CV 輸出</li>
    </ul></div>
