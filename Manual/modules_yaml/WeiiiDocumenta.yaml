    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">カオスパラメータモーフィング、フィードバックマトリクス、スライスエンジンを備えた録音サンプラー。リアルタイム録音と自動トランジェント検出、ポリフォニック再生、3バンドEQ、サンプル＆ホールドモジュレーション、パラメータモーフィングを統合。最大録音時間：48kHzで60秒。実験的サウンドデザインとライブパフォーマンス向けに設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">録音とスライス</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>REC</b>: 録音切替。開始時に既存スライスをクリア。</li>
    <li><b>Transient Detection</b>: 振幅が閾値を下から上へ横切ると新しいスライスをトリガー</li>
    <li><b>THRESHOLD</b>: 検出閾値（0-10V、デフォルト1V）。非録音時の調整は既存バッファを再スキャン。</li>
    <li><b>MIN SLICE</b>: スライス間の最小時間（0.001-1.0s、デフォルト0.05s）</li>
    <li><b>Slice Storage</b>: 動的std::vector（無制限スライス）。各スライスはstartSample、endSample、peakAmplitudeを保存。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">速度コントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>非線形マッピング</b>: ノブ0-1が-8x～+8xにマップ、中心が1x</li>
    <li><b>0-25%</b>: 逆再生 -8x～0</li>
    <li><b>25-50%</b>: 順再生 0～1x</li>
    <li><b>50-100%</b>: 順再生 1x～8x</li>
    <li><b>線形補間</b>: playbackPhaseを使用したサブサンプル精度で全速度でスムーズ再生</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ポリフォニックボイスシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>POLY</b>: 1-8ボイス（整数スナップ、CVモジュレート可能）</li>
    <li><b>ボイス構造</b>: 各ボイスは独立したsliceIndex、playbackPosition、playbackPhase、speedMultiplierを持つ</li>
    <li><b>速度変化</b>: ボイス1-7はランダムなspeedMultiplier（0.5-2.0x）を取得</li>
    <li><b>スライス切替</b>: ボイスはsliceChangeTimer（0.5-2.0s間隔）に基づきランダムにスライス切替</li>
    <li><b>ミックス出力</b>: マルチボイス出力をnumVoicesで除算してクリッピング防止</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">スライスクロスフェード</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>フェード時間</b>: 0.1ms（SLICE_FADE_TIME_MS定数）</li>
    <li><b>フェード増分</b>: フェード時間とサンプルレートから計算</li>
    <li><b>保留スライス</b>: フェードアウト中に新スライスをpendingSliceIndexに保存、エンベロープが0に達した後適用</li>
    <li><b>最大オシレーター周波数</b>: 約5kHz（0.1msフェードエンベロープによる制限）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">パラメータスムージング</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>指数フィルター</b>: サンプルごとに0.5%ステップでターゲット値に向かってスムーズ補間</li>
    <li><b>時定数</b>: 44.1kHzで約5ms</li>
    <li><b>スムーズパラメータ</b>: Scan、Threshold、LoopEnd、FeedbackAmount、FeedbackDelay</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">フィードバックシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ノーインプットフィードバック</b>: アナログスタイル飽和で出力が入力にフィードバック</li>
    <li><b>飽和</b>: tanhソフトクリッピング適用、低レベルでユニティゲインを維持</li>
    <li><b>ミックス</b>: フィードバック信号をフィードバック量でスケーリングして出力に加算</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">モーフシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>状態</b>: IDLE、MORPHING、HOLDING、RETURNING</li>
    <li><b>カーブ</b>: Linear、Smooth（Sカーブイージング）、Exponential（速いアタック、遅いディケイ）、Bezier（cubic）</li>
    <li><b>デフォルトターゲット</b>: EQ、Scan、Feedback、Speed有効。Threshold、MinSlice、S&H無効。</li>
    <li><b>モーフ時間</b>: 1-20秒（右クリックメニューで設定可能）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">センド/リターンループ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Send L/R</b>: EQ処理前の現在のオーディオ信号を出力（フィードバックループ内）</li>
    <li><b>Return L/R</b>: 接続時、内部信号を外部リターン信号に置換。外部エフェクトをフィードバックチェーンに挿入して処理可能。</li>
    <li><b>信号チェーン位置</b>: センド/リターンは再生+フィードバックミキシング後、EQ前に配置。EQ後の出力が次のサイクルにフィードバック。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ソフトリミッター</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>閾値</b>: -3dB（10Vピークシステムで7.07V）</li>
    <li><b>閾値</b>: -3dB（10Vピークシステムで7.07V）</li>
    <li><b>閾値以下</b>: 信号はそのまま通過（リニア）</li>
    <li><b>閾値以上</b>: ソフトニーコンプレッション、サチュレーション量0.2</li>
    <li><b>位置</b>: EQ後、最終出力前のメイン出力に適用</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">EQセクション</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Low</b>: 80Hz Shelf（Allen & Heath参照）</li>
    <li><b>Mid</b>: 2.5kHz Peak</li>
    <li><b>High</b>: 12kHz Shelf</li>
    <li><b>範囲</b>: 各バンド±12dB</li>
    <li><b>実装</b>: TBiquadFilter（IIR）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">サンプル＆ホールド</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Rate</b>: 対数マッピング、範囲0.01-100Hz（中心=1Hz）</li>
    <li><b>Slew</b>: 0-1秒スルー時間</li>
    <li><b>Amount</b>: 0-5xゲイン倍率</li>
    <li><b>出力</b>: ±10V CV出力</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Slice Scan</b>: スライススキャン位置（0-100%）。CVモジュレート可能。</li>
    <li><b>Scan CV Attenuverter</b>: Slice Scan CV入力用アッテヌバーター（-1.0～+1.0）。</li>
