slug: EnvVCA6
name: Env VCA 6
hp: 12
wide: false
alt: Env VCA 6
description:
  en: 'Six stereo envelope-controlled VCAs with independent attack/release, three gate output modes, and sum bus routing (collab: offthesky)'
  zh: 六聲道立體聲 Envelope 控制 VCA，具備獨立 Attack/Release、三種 Gate 輸出模式與 Sum Bus 路由（與 offthesky 合作開發）
  ja: 独立したアタック/リリース、3つのゲート出力モード、サムバスルーティングを備えた6チャンネルステレオエンベロープ制御VCA（offtheskyとのコラボレーション）
features:
  en:
  - Six stereo envelope-controlled VCAs
  - Independent attack/release per channel
  - Manual gate trigger buttons
  - Sum bus routing to Channel 6
  - Three gate output modes
  zh:
  - 6 組 Stereo Envelope 控制 VCA
  - 各聲道獨立 Attack/Release
  - 手動 Gate Trigger 按鈕
  - Channel 6 Sum Bus 路由
  - 三種 Gate Output 模式
  ja:
  - 6組ステレオエンベロープ制御VCA
  - チャンネル別独立アタック/リリース
  - 手動ゲートトリガーボタン
  - チャンネル6サムバスルーティング
  - 3種類のゲート出力モード
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Six-channel envelope-controlled VCA system developed in collaboration with offthesky. Each channel provides independent AD or AHR envelope with stereo VCA, manual gate triggers, and configurable gate outputs. Channels 1-5 can be routed to Channel 6's sum bus for submixing.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow (per channel)</h3>
    <p style="margin-bottom: 1rem;">Gate → Envelope Generator → [× Audio In × Vol CV × Out Vol] → Audio Out. Gate Out derived from envelope state based on selected mode.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Envelope Behavior</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time Range</b>: Exponential scaling from ~1ms (knob at 0) to ~1000s (knob at 1.0). Center position: ~1s.</li>
    <li><b>Minimum Time</b>: Clamped to 1ms to prevent clicks</li>
    <li><b>Curve Shape</b>: S-curve for natural-sounding transitions</li>
    <li><b>Attack Phase</b>: Ramps from 0 to 1 over attack time with curve applied</li>
    <li><b>Decay/Release Phase</b>: Ramps from 1 to 0 over decay time with inverted curve</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Envelope Modes</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>AD Mode (HOLD off)</b>: Attack → Decay. Envelope starts on rising edge, completes full cycle regardless of gate length.</li>
    <li><b>AHR Mode (HOLD on)</b>: Attack → Hold → Release. Attack phase on rising edge, holds at peak while gate is high, release begins on gate falling edge.</li>
    <li><b>Trigger Detection</b>: Schmitt trigger with 0.1V low / 2.0V high thresholds</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Channel Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack</b>: Attack time (0.0-1.0, exponential scaling ~1ms to ~1000s)</li>
    <li><b>Release</b>: Release/Decay time (0.0-1.0, same scaling)</li>
    <li><b>Out Vol</b>: Output volume multiplier (0.0-1.0, default: 0.8)</li>
    <li><b>Manual Button (pink)</b>: Momentary gate - generates 10V while pressed</li>
    <li><b>HOLD Button (pink)</b>: Toggles between AD and AHR envelope modes</li>
    <li><b>Sum Button (pink)</b>: Routes this channel's output to Channel 6 sum bus (CH1-5 only)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Channel I/O</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>In L</b>: Left/mono audio input. If R is unconnected, L is copied to both channels.</li>
    <li><b>In R</b>: Right audio input (optional)</li>
    <li><b>Gate</b>: Trigger/gate input. Combined with manual button (max of both).</li>
    <li><b>Vol Ctrl</b>: Volume CV (0-10V maps to 0-1 multiplier). Defaults to 1.0 if unconnected.</li>
    <li><b>Gate Out</b>: Configurable gate/trigger output (see Gate Output Modes)</li>
    <li><b>Env Out</b>: Raw envelope output (0-10V)</li>
    <li><b>Out L/R</b>: Stereo VCA output = input × envelope × volCV × outVol</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Gate Output Modes (via right-click menu)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Full Cycle Gate</b>: Output stays high (10V) from gate rising edge until envelope returns to zero. Useful for chaining sequences.</li>
    <li><b>End of Cycle Trigger</b>: 1ms pulse when envelope completes (falls below 0.001). Useful for triggering next stage.</li>
    <li><b>Start + End Triggers</b>: 1ms pulses at both gate rising edge AND envelope completion. Useful for clock multiplication.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sum Bus System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Routing</b>: CH1-5 can route to CH6 via Sum buttons (CH6 has no sum button)</li>
    <li><b>Audio Summing</b>: Each channel is attenuated before summing to prevent overload</li>
    <li><b>Envelope Summing</b>: RMS-based calculation of summed channel envelopes; CH6 envelope output uses max(CH6 own envelope, RMS envelope) to preserve the larger value</li>
    <li><b>Combination</b>: Audio sum is ADDED to CH6's own output; envelope uses max() not add</li>
    <li><b>Use Case</b>: Submix multiple channels through CH6 for unified processing</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">VCA Light</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Green LED</b>: Shows current VCA gain level (envelope × volCV × outVol)</li>
    <li><b>Brightness</b>: Proportional to final gain multiplier</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Audio I/O: ±10V (not limited to ±5V)</li>
    <li>Envelope output: 0-10V unipolar</li>
    <li>Volume CV: 0-10V (clamped)</li>
    <li>Gate trigger threshold: Schmitt 0.1V/2.0V</li>
    <li>Gate output pulse width: 1ms (trigger modes)</li>
    <li>Envelope curve: Fixed k=-0.9</li>
    <li>Sum scaling: 0.3x per channel</li>
    <li>Processing: 32-bit floating point</li>
    <li>Module width: 12HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Collaboration</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Developed in collaboration with offthesky</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch 1 Attack</b>: Channel 1 attack time (0.0-1.0, exponential ~1ms to ~1000s). Default: 0.1.</li>
    <li><b>Ch 1 Release</b>: Channel 1 release/decay time (0.0-1.0, same scaling). Default: 0.5.</li>
    <li><b>Ch 1 Out Volume</b>: Channel 1 output volume multiplier 0-1 (default: 0.8).</li>
    <li><b>Ch 1 Manual Gate (Momentary)</b>: Channel 1 momentary gate button. Generates 10V while pressed.</li>
    <li><b>Ch 1 Sum to Ch6</b>: Channel 1 sum bus routing toggle. Routes output to Channel 6.</li>
    <li><b>Ch 1 Env Mode (AD/AHR)</b>: Channel 1 envelope mode. Off = AD, On = AHR (Attack-Hold-Release).</li>
    <li><b>Ch 2 Attack</b>: Channel 2 attack time.</li>
    <li><b>Ch 2 Release</b>: Channel 2 release/decay time.</li>
    <li><b>Ch 2 Out Volume</b>: Channel 2 output volume multiplier.</li>
    <li><b>Ch 2 Manual Gate (Momentary)</b>: Channel 2 momentary gate button.</li>
    <li><b>Ch 2 Sum to Ch6</b>: Channel 2 sum bus routing toggle.</li>
    <li><b>Ch 2 Env Mode (AD/AHR)</b>: Channel 2 envelope mode.</li>
    <li><b>Ch 3 Attack</b>: Channel 3 attack time.</li>
    <li><b>Ch 3 Release</b>: Channel 3 release/decay time.</li>
    <li><b>Ch 3 Out Volume</b>: Channel 3 output volume multiplier.</li>
    <li><b>Ch 3 Manual Gate (Momentary)</b>: Channel 3 momentary gate button.</li>
    <li><b>Ch 3 Sum to Ch6</b>: Channel 3 sum bus routing toggle.</li>
    <li><b>Ch 3 Env Mode (AD/AHR)</b>: Channel 3 envelope mode.</li>
    <li><b>Ch 4 Attack</b>: Channel 4 attack time.</li>
    <li><b>Ch 4 Release</b>: Channel 4 release/decay time.</li>
    <li><b>Ch 4 Out Volume</b>: Channel 4 output volume multiplier.</li>
    <li><b>Ch 4 Manual Gate (Momentary)</b>: Channel 4 momentary gate button.</li>
    <li><b>Ch 4 Sum to Ch6</b>: Channel 4 sum bus routing toggle.</li>
    <li><b>Ch 4 Env Mode (AD/AHR)</b>: Channel 4 envelope mode.</li>
    <li><b>Ch 5 Attack</b>: Channel 5 attack time.</li>
    <li><b>Ch 5 Release</b>: Channel 5 release/decay time.</li>
    <li><b>Ch 5 Out Volume</b>: Channel 5 output volume multiplier.</li>
    <li><b>Ch 5 Manual Gate (Momentary)</b>: Channel 5 momentary gate button.</li>
    <li><b>Ch 5 Sum to Ch6</b>: Channel 5 sum bus routing toggle.</li>
    <li><b>Ch 5 Env Mode (AD/AHR)</b>: Channel 5 envelope mode.</li>
    <li><b>Ch 6 Attack</b>: Channel 6 attack time.</li>
    <li><b>Ch 6 Release</b>: Channel 6 release/decay time.</li>
    <li><b>Ch 6 Out Volume</b>: Channel 6 output volume multiplier.</li>
    <li><b>Ch 6 Manual Gate (Momentary)</b>: Channel 6 momentary gate button.</li>
    <li><b>Ch 6 Env Mode (AD/AHR)</b>: Channel 6 envelope mode.</li>
    <li><b>Gate Output Mode</b>: Gate output behavior (right-click menu). 0=Full Cycle Gate, 1=End Trigger, 2=Start+End Triggers.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">I/O Reference</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Ch 1 In L</b>: Channel 1 left/mono audio input.</li>
    <li><b>Ch 1 In R</b>: Channel 1 right audio input (optional, L copied if unconnected).</li>
    <li><b>Ch 1 Gate</b>: Channel 1 gate/trigger input.</li>
    <li><b>Ch 1 Vol Ctrl</b>: Channel 1 volume CV (0-10V).</li>
    <li><b>Ch 2 In L</b>: Channel 2 left/mono audio input.</li>
    <li><b>Ch 2 In R</b>: Channel 2 right audio input.</li>
    <li><b>Ch 2 Gate</b>: Channel 2 gate/trigger input.</li>
    <li><b>Ch 2 Vol Ctrl</b>: Channel 2 volume CV.</li>
    <li><b>Ch 3 In L</b>: Channel 3 left/mono audio input.</li>
    <li><b>Ch 3 In R</b>: Channel 3 right audio input.</li>
    <li><b>Ch 3 Gate</b>: Channel 3 gate/trigger input.</li>
    <li><b>Ch 3 Vol Ctrl</b>: Channel 3 volume CV.</li>
    <li><b>Ch 4 In L</b>: Channel 4 left/mono audio input.</li>
    <li><b>Ch 4 In R</b>: Channel 4 right audio input.</li>
    <li><b>Ch 4 Gate</b>: Channel 4 gate/trigger input.</li>
    <li><b>Ch 4 Vol Ctrl</b>: Channel 4 volume CV.</li>
    <li><b>Ch 5 In L</b>: Channel 5 left/mono audio input.</li>
    <li><b>Ch 5 In R</b>: Channel 5 right audio input.</li>
    <li><b>Ch 5 Gate</b>: Channel 5 gate/trigger input.</li>
    <li><b>Ch 5 Vol Ctrl</b>: Channel 5 volume CV.</li>
    <li><b>Ch 6 In L</b>: Channel 6 left/mono audio input.</li>
    <li><b>Ch 6 In R</b>: Channel 6 right audio input.</li>
    <li><b>Ch 6 Gate</b>: Channel 6 gate/trigger input.</li>
    <li><b>Ch 6 Vol Ctrl</b>: Channel 6 volume CV.</li>
    <li><b>Ch 1 Gate</b>: Channel 1 gate/trigger output (mode-dependent).</li>
    <li><b>Ch 1 Envelope</b>: Channel 1 envelope output (0-10V).</li>
    <li><b>Ch 1 Out L</b>: Channel 1 left audio output.</li>
    <li><b>Ch 1 Out R</b>: Channel 1 right audio output.</li>
    <li><b>Ch 2 Gate</b>: Channel 2 gate/trigger output.</li>
    <li><b>Ch 2 Envelope</b>: Channel 2 envelope output.</li>
    <li><b>Ch 2 Out L</b>: Channel 2 left audio output.</li>
    <li><b>Ch 2 Out R</b>: Channel 2 right audio output.</li>
    <li><b>Ch 3 Gate</b>: Channel 3 gate/trigger output.</li>
    <li><b>Ch 3 Envelope</b>: Channel 3 envelope output.</li>
    <li><b>Ch 3 Out L</b>: Channel 3 left audio output.</li>
    <li><b>Ch 3 Out R</b>: Channel 3 right audio output.</li>
    <li><b>Ch 4 Gate</b>: Channel 4 gate/trigger output.</li>
    <li><b>Ch 4 Envelope</b>: Channel 4 envelope output.</li>
    <li><b>Ch 4 Out L</b>: Channel 4 left audio output.</li>
    <li><b>Ch 4 Out R</b>: Channel 4 right audio output.</li>
    <li><b>Ch 5 Gate</b>: Channel 5 gate/trigger output.</li>
    <li><b>Ch 5 Envelope</b>: Channel 5 envelope output.</li>
    <li><b>Ch 5 Out L</b>: Channel 5 left audio output.</li>
    <li><b>Ch 5 Out R</b>: Channel 5 right audio output.</li>
    <li><b>Ch 6 Gate</b>: Channel 6 gate/trigger output.</li>
    <li><b>Ch 6 Envelope / Sum Envelope</b>: Channel 6 envelope output / sum envelope.</li>
    <li><b>Ch 6 Out L / Sum L</b>: Channel 6 left audio output / sum left.</li>
    <li><b>Ch 6 Out R / Sum R</b>: Channel 6 right audio output / sum right.</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">與 offthesky 共同開發的六聲道 Envelope 控制 VCA 系統。每個聲道提供獨立的 AD 或 AHR Envelope 搭配 Stereo VCA、手動 Gate Trigger，以及可配置的 Gate Output。Channel 1-5 可路由至 Channel 6 的 Sum Bus 進行 Submixing。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">訊號流（各聲道）</h3>
    <p style="margin-bottom: 1rem;">Gate → Envelope Generator → [× Audio In × Vol CV × Out Vol] → Audio Out。Gate Out 依所選模式從 Envelope 狀態衍生。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Envelope 行為</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>時間範圍</b>: 指數縮放從 ~1ms（旋鈕在 0）至 ~1000s（旋鈕在 1.0）。中間位置: ~1s。</li>
    <li><b>最小時間</b>: 限制在 1ms 以防止 Click 聲</li>
    <li><b>曲線形狀</b>: S 曲線提供自然的過渡效果</li>
    <li><b>Attack 階段</b>: 在 Attack 時間內從 0 升至 1，套用曲線</li>
    <li><b>Decay/Release 階段</b>: 在 Decay 時間內從 1 降至 0，套用反向曲線</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Envelope 模式</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>AD 模式（HOLD 關閉）</b>: Attack → Decay。Envelope 在上升邊緣開始，無論 Gate 長度如何完成完整週期。</li>
    <li><b>AHR 模式（HOLD 開啟）</b>: Attack → Hold → Release。上升邊緣觸發 Attack 階段，Gate 為高時維持峰值，Gate 下降邊緣開始 Release。</li>
    <li><b>Trigger 偵測</b>: Schmitt Trigger，0.1V 低 / 2.0V 高閾值</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">各聲道控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack</b>: Attack 時間（0.0-1.0，指數縮放 ~1ms 至 ~1000s）</li>
    <li><b>Release</b>: Release/Decay 時間（0.0-1.0，相同縮放）</li>
    <li><b>Out Vol</b>: Output 音量乘數（0.0-1.0，預設: 0.8）</li>
    <li><b>Manual 按鈕（粉紅色）</b>: 瞬時 Gate - 按住時產生 10V</li>
    <li><b>HOLD 按鈕（粉紅色）</b>: 切換 AD 與 AHR Envelope 模式</li>
    <li><b>Sum 按鈕（粉紅色）</b>: 將此聲道的 Output 路由至 Channel 6 Sum Bus（僅 CH1-5）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">各聲道 I/O</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>In L</b>: Left/Mono Audio 輸入。若 R 未連接，L 複製至兩聲道。</li>
    <li><b>In R</b>: Right Audio 輸入（選用）</li>
    <li><b>Gate</b>: Trigger/Gate 輸入。與手動按鈕結合（兩者取最大值）。</li>
    <li><b>Vol Ctrl</b>: 音量 CV（0-10V 映射至 0-1 乘數）。未連接時預設為 1.0。</li>
    <li><b>Gate Out</b>: 可配置的 Gate/Trigger Output（見 Gate Output 模式）</li>
    <li><b>Env Out</b>: 原始 Envelope Output（0-10V）</li>
    <li><b>Out L/R</b>: Stereo VCA Output = input × envelope × volCV × outVol</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Gate Output 模式（透過右鍵選單）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Full Cycle Gate</b>: 從 Gate 上升邊緣至 Envelope 回到零期間 Output 維持高電位（10V）。適用於串接序列。</li>
    <li><b>End of Cycle Trigger</b>: Envelope 完成時（降至 0.001 以下）產生 1ms 脈衝。適用於觸發下一階段。</li>
    <li><b>Start + End Triggers</b>: 在 Gate 上升邊緣與 Envelope 完成時皆產生 1ms 脈衝。適用於 Clock 倍增。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sum Bus 系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>路由</b>: CH1-5 可透過 Sum 按鈕路由至 CH6（CH6 無 Sum 按鈕）</li>
    <li><b>Audio 加總</b>: 各聲道在加總前衰減以防止過載</li>
    <li><b>Envelope 加總</b>: 基於 RMS 計算加總聲道的 Envelope；CH6 Envelope Output 使用 max(CH6 自身 Envelope, RMS Envelope) 保留較大值</li>
    <li><b>組合</b>: Audio Sum 加入至 CH6 自身的 Output；Envelope 使用 max() 而非 add</li>
    <li><b>使用情境</b>: 將多個聲道透過 CH6 Submix 以進行統一處理</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">VCA Light</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>綠色 LED</b>: 顯示目前 VCA Gain 等級（envelope × volCV × outVol）</li>
    <li><b>亮度</b>: 與最終 Gain 乘數成正比</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Audio I/O: ±10V（不限於 ±5V）</li>
    <li>Envelope Output: 0-10V Unipolar</li>
    <li>Volume CV: 0-10V（限制範圍）</li>
    <li>Gate Trigger 閾值: Schmitt 0.1V/2.0V</li>
    <li>Gate Output 脈衝寬度: 1ms（Trigger 模式）</li>
    <li>Envelope 曲線: 固定 k=-0.9</li>
    <li>Sum 縮放: 每聲道 0.3x</li>
    <li>處理: 32-bit 浮點運算</li>
    <li>模組寬度: 12HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">合作</h3>
    <ul style="padding-left: 1.5rem;">
    <li>與 offthesky 共同開發</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
