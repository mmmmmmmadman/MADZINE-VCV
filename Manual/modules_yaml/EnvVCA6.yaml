    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">offtheskyと共同開発した6チャンネルエンベロープ制御VCAシステム。各チャンネルはステレオVCAを備えた独立したADまたはAHRエンベロープ、手動ゲートトリガー、構成可能なゲート出力を提供。チャンネル1-5はサブミックス用にチャンネル6のサムバスにルーティング可能。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">信号フロー（チャンネル別）</h3>
    <p style="margin-bottom: 1rem;">Gate → エンベロープジェネレーター → [× Audio In × Vol CV × Out Vol] → Audio Out。ゲート出力は選択されたモードに基づいてエンベロープ状態から導出。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">エンベロープ動作</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>時間範囲</b>: 指数スケーリングで ~1ms（ノブ 0）から ~1000s（ノブ 1.0）まで。中央位置: ~1s。</li>
    <li><b>最小時間</b>: クリック防止のため1msにクランプ</li>
    <li><b>カーブ形状</b>: 自然なサウンドの遷移のためのSカーブ</li>
    <li><b>アタックフェーズ</b>: アタック時間にわたって0から1へランプ、カーブ適用</li>
    <li><b>ディケイ/リリースフェーズ</b>: ディケイ時間にわたって1から0へランプ、反転カーブ適用</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">エンベロープモード</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ADモード（HOLD オフ）</b>: アタック → ディケイ。立ち上がりエッジでエンベロープ開始、ゲート長に関わらず完全サイクル完了。</li>
    <li><b>AHRモード（HOLD オン）</b>: アタック → ホールド → リリース。立ち上がりエッジでアタックフェーズ、ゲートがハイの間ピークでホールド、ゲート立ち下がりエッジでリリース開始。</li>
    <li><b>トリガー検出</b>: シュミットトリガー、0.1V ロー / 2.0V ハイ閾値</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">チャンネル別コントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack</b>: アタック時間（0.0-1.0、指数スケーリング ~1ms〜~1000s）</li>
    <li><b>Release</b>: リリース/ディケイ時間（0.0-1.0、同スケーリング）</li>
    <li><b>Out Vol</b>: 出力音量乗数（0.0-1.0、デフォルト: 0.8）</li>
    <li><b>Manualボタン（ピンク）</b>: モーメンタリーゲート - 押している間10V生成</li>
    <li><b>HOLDボタン（ピンク）</b>: ADとAHRエンベロープモード切替</li>
    <li><b>Sumボタン（ピンク）</b>: このチャンネルの出力をチャンネル6サムバスにルーティング（CH1-5のみ）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">チャンネル別I/O</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>In L</b>: 左/モノオーディオ入力。Rが未接続の場合、Lが両チャンネルにコピーされる。</li>
    <li><b>In R</b>: 右オーディオ入力（オプション）</li>
    <li><b>Gate</b>: トリガー/ゲート入力。手動ボタンと結合（両方の最大値）。</li>
    <li><b>Vol Ctrl</b>: 音量CV（0-10Vを0-1乗数にマップ）。未接続時は1.0がデフォルト。</li>
    <li><b>Gate Out</b>: 構成可能なゲート/トリガー出力（ゲート出力モード参照）</li>
    <li><b>Env Out</b>: 生エンベロープ出力（0-10V）</li>
    <li><b>Out L/R</b>: ステレオVCA出力 = input × envelope × volCV × outVol</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ゲート出力モード（右クリックメニュー経由）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Full Cycle Gate</b>: ゲート立ち上がりエッジからエンベロープがゼロに戻るまで出力がハイ（10V）を維持。シーケンス連鎖に有用。</li>
    <li><b>End of Cycle Trigger</b>: エンベロープ完了時（0.001以下に低下）に1msパルス。次ステージトリガーに有用。</li>
    <li><b>Start + End Triggers</b>: ゲート立ち上がりエッジとエンベロープ完了の両方で1msパルス。クロック倍増に有用。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">サムバスシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ルーティング</b>: CH1-5はSumボタンでCH6にルーティング可能（CH6にはSumボタンなし）</li>
    <li><b>オーディオ加算</b>: 各チャンネルはオーバーロード防止のため加算前に減衰</li>
    <li><b>エンベロープ加算</b>: RMSベースの計算で加算チャンネルのエンベロープを算出；CH6エンベロープ出力はmax(CH6自身のエンベロープ, RMSエンベロープ)で大きい方を保持</li>
    <li><b>組み合わせ</b>: オーディオSumはCH6自身の出力に追加；エンベロープはaddではなくmax()を使用</li>
    <li><b>使用例</b>: CH6経由で複数チャンネルをサブミックスして統一処理</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">VCA Light</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>グリーンLED</b>: 現在のVCAゲインレベル（envelope × volCV × outVol）を表示</li>
    <li><b>明るさ</b>: 最終ゲイン乗数に比例</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>オーディオI/O: ±10V（±5Vに限定されない）</li>
    <li>エンベロープ出力: 0-10V ユニポーラ</li>
    <li>音量CV: 0-10V（クランプ）</li>
    <li>ゲートトリガー閾値: シュミット 0.1V/2.0V</li>
    <li>ゲート出力パルス幅: 1ms（トリガーモード）</li>
    <li>エンベロープカーブ: 固定 k=-0.9</li>
    <li>サムスケーリング: チャンネルあたり0.3x</li>
    <li>処理: 32ビット浮動小数点</li>
    <li>モジュール幅: 12HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">コラボレーション</h3>
