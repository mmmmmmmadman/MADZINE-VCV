    <li><b>Ch 5 Out R</b>: チャンネル5右オーディオ出力。</li>
    <li><b>Ch 6 Gate</b>: チャンネル6ゲート/トリガー出力。</li>
    <li><b>Ch 6 Envelope / Sum Envelope</b>: チャンネル6エンベロープ出力 / サムエンベロープ。</li>
    <li><b>Ch 6 Out L / Sum L</b>: チャンネル6左オーディオ出力 / サム左。</li>
    <li><b>Ch 6 Out R / Sum R</b>: チャンネル6右オーディオ出力 / サム右。</li>
    </ul>
    <div style="display:none"><ul>
    <li><b>Time Range</b>: 指数スケーリングで約1ms（ノブ0）から約1000s（ノブ1.0）まで。中間位置：約1s</li>
    <li><b>Minimum Time</b>: クリックノイズ防止のため1msにクランプ</li>
    <li><b>Curve Shape</b>: 自然なトランジションのためのSカーブ</li>
    <li><b>Attack Phase</b>: アタック時間にわたって0から1にランプ、カーブを適用</li>
    <li><b>Decay/Release Phase</b>: ディケイ時間にわたって1から0にランプ、逆カーブを適用</li>
    <li><b>AD Mode (HOLD off)</b>: アタック→ディケイ。立ち上がりエッジでエンベロープ開始、ゲート長に関わらず完全サイクル完了</li>
    <li><b>AHR Mode (HOLD on)</b>: アタック→ホールド→リリース。立ち上がりエッジでアタック開始、ゲート高時にピークホールド、ゲート下降でリリース</li>
    <li><b>Trigger Detection</b>: シュミットトリガー、0.1V低 / 2.0V高閾値</li>
    <li><b>Manual Button (pink)</b>: モメンタリーゲート - 押している間10Vを生成</li>
    <li><b>HOLD Button (pink)</b>: ADとAHRエンベロープモードを切り替え</li>
    <li><b>Sum Button (pink)</b>: このチャンネルの出力をCH6サムバスにルーティング（CH1〜5のみ）</li>
    <li><b>Routing</b>: CH1〜5はSumボタンでCH6へルーティング可能（CH6にSumボタンなし）</li>
    <li><b>Audio Summing</b>: 過負荷防止のため合計前に各チャンネルを減衰</li>
    <li><b>Envelope Summing</b>: 合計チャンネルエンベロープのRMSベース計算；CH6エンベロープ出力はmax(CH6自身のエンベロープ, RMSエンベロープ)を使用して大きい方の値を保持</li>
    <li><b>Combination</b>: オーディオ合計はCH6自身の出力に加算；エンベロープはmax()を使用</li>
    <li><b>Use Case</b>: CH6を通じて複数チャンネルのサブミックスを統一処理</li>
    <li><b>Green LED</b>: 現在のVCAゲインレベルを表示（エンベロープ x volCV x outVol）</li>
    <li><b>Brightness</b>: 最終ゲイン乗数に比例</li>
    </ul></div>
