slug: TWNCLight
name: TWNC Light
hp: 4
wide: false
alt: TWNC Light
description:
  en: Streamlined dual-track Euclidean rhythm generator with envelope outputs, ideal for minimal setups
  zh: 精簡雙軌 Euclidean Rhythm 生成器，具備 Envelope 輸出，適合極簡設置
  ja: エンベロープ出力を備えたコンパクトデュアルトラックユークリッドリズム生成器、ミニマルセットアップに最適
features:
  en:
  - Dual-track Euclidean generator
  - Envelope outputs (no synthesis)
  - Quarter-note accent system
  - 4HP compact design
  - Ideal for external sound sources
  zh:
  - 雙軌 Euclidean Generator
  - Envelope 輸出（無合成）
  - 四分音符 Accent 系統
  - 4HP 緊湊設計
  - 適合外部音源
  ja:
  - デュアルトラックユークリッド生成器
  - エンベロープ出力（合成なし）
  - 四分音符アクセントシステム
  - 4HPコンパクト設計
  - 外部音源に最適
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Compact 4HP envelope generator with dual-track Euclidean rhythm engine. Outputs envelope CV signals only (no audio synthesis). Designed to drive TWNC 2 or other sound sources.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow</h3>
    <p style="margin-bottom: 1rem;">Clock → [Euclidean Pattern Generator] → [Envelope Generator] → CV Output. Track 2 has additional clock division/multiplication before pattern generation. Accent system provides separate quarter-note envelope.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Euclidean Algorithm</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Distribution</b>: Bjorklund via floor-based spacing, evenly distributing fills across pattern length. Euclidean shift is always 0 (rotation not applied to pattern).</li>
    <li><b>Auto-reset</b>: Sequence resets every 32 clock pulses</li>
    <li><b>Length</b>: 1-32 steps (default: 16)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Global Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CLK</b>: Clock input (Schmitt trigger, 0.1V low / 2V high threshold)</li>
    <li><b>LEN</b>: Sequence length (1-32 steps, default: 16, snap)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Drum Track (Track 1)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>FILL</b>: Rhythm density (0-100%, default: 66.6%)</li>
    <li><b>ACCNT</b>: Quarter-note accent shift (1-7 steps, default: 1). Triggers main VCA envelope. Accent fires when clock step matches (shift-1) mod 4. Track 1 always runs at 1x clock (no div/mult).</li>
    <li><b>A.DEC</b>: Accent envelope decay (0.01-2s, default: 0.549s)</li>
    <li><b>DECAY</b>: Track 1 envelope decay (0.01-2s, default: 0.3s). FM envelope uses half this value (decayParam * 0.5), VCA envelope uses full value.</li>
    <li><b>SHAPE</b>: Envelope curve (0-0.99, default: 0.5)</li>
    <li><b>D.D</b>: Decay CV input (±10V, scaled /10)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">HATs Track (Track 2)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>FILL</b>: Rhythm density (0-100%, default: 100%)</li>
    <li><b>SHIFT</b>: Clock delay from accent (1-4 steps, default: 3). Delays HATs start relative to accent</li>
    <li><b>D/M</b>: Clock div/mult (-3 to +3, default: -3 = 1/4x)</li>
    <li>Div/mult values: -3:1/4x, -2:1/3x, -1:1/2x, 0:1x, +1:2x, +2:3x, +3:4x</li>
    <li><b>DECAY</b>: Envelope decay (0.01-2s, default: 0.094s). VCA envelope uses half this value (decayParam * 0.5).</li>
    <li><b>SHAPE</b>: Envelope curve (0-0.99, default: 0.5)</li>
    <li><b>H.D</b>: Decay CV input (±10V, scaled /10)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Envelope Algorithm</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack</b>: Fixed 1ms linear ramp</li>
    <li><b>Decay</b>: Variable S-curve with smoothstep transition (same as TWNC)</li>
    <li><b>Shape calculation</b>: frontK ranges -0.9 to -0.4, backK ranges -1.0 to 0.6 based on shape parameter</li>
    <li><b>Output formula</b>: Weighted interpolation producing S-curve decay characteristic</li>
    <li><b>Trigger pulse</b>: 30ms pulse for retriggering</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock Division/Multiplication</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Division</b>: Counts input clocks, triggers on Nth</li>
    <li><b>Multiplication</b>: Generates N triggers per input clock period</li>
    <li><b>Gate width</b>: 50% of multiplied clock period (minimum 1ms)</li>
    <li><b>Combined</b>: Division applied first, then multiplication</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">HATs Delay System</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>SHIFT parameter</b>: Delays HATs track start by N clock pulses after accent trigger</li>
    <li><b>Behavior</b>: When SHIFT=1, HATs starts immediately with accent. When SHIFT>1, waits SHIFT-1 clocks</li>
    <li><b>Reset</b>: Delay counter resets when SHIFT parameter changes</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ENVs (top)</b>: Main accent VCA envelope (0-10V)</li>
    <li><b>ENVs (bottom-left)</b>: Track 1 FM envelope (0-10V)</li>
    <li><b>ENVs (bottom-right)</b>: Track 2 VCA envelope (0-10V)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Clock input: Schmitt trigger (0.1V/2V thresholds)</li>
    <li>CV input: ±10V (scaled /10)</li>
    <li>Envelope output: 0-10V unipolar</li>
    <li>Attack time: 1ms (fixed)</li>
    <li>Decay range: 0.01-2 seconds</li>
    <li>Clock period: 0.01-10 seconds</li>
    <li>Processing: 32-bit floating point</li>
    <li>Module width: 4HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Companion Module</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>TWNC 2</b>: Receives envelope outputs to drive BD/SN/HH synthesis</li>
    <li><b>Usage</b>: Connect ENVs outputs to TWNC 2 ENV inputs for complete drum machine</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Global Clock</b>: Clock input (Schmitt trigger, 0.1V/2V thresholds).</li>
    <li><b>Global Length</b>: Sequence length (1-32 steps, default: 16, snap).</li>
    <li><b>Track 1 Fill</b>: Drum track rhythm density (0-100%, default: 66.6%).</li>
    <li><b>VCA Shift</b>: Quarter-note accent shift (1-7 steps, default: 1, snap).</li>
    <li><b>VCA Decay</b>: Accent envelope decay time (0.01-2s, default: 0.549s).</li>
    <li><b>Track 1 Decay</b>: Drum envelope decay (0.01-2s, default: 0.3s).</li>
    <li><b>Track 1 Shape</b>: Drum envelope curve (0-0.99, default: 0.5).</li>
    <li><b>Track 2 Fill</b>: HATs rhythm density (0-100%, default: 100%).</li>
    <li><b>Track 2 Shift</b>: HATs clock delay from accent (1-4 steps, default: 3, snap).</li>
    <li><b>Track 2 Div/Mult</b>: HATs clock div/mult (-3 to +3, default: -3 = 1/4x, snap).</li>
    <li><b>Track 2 Decay</b>: HATs envelope decay (0.01-2s, default: 0.094s).</li>
    <li><b>Track 2 Shape</b>: HATs envelope curve (0-0.99, default: 0.5).</li>
    <li><b>Drum Frequency CV</b>: Drum frequency CV input.</li>
    <li><b>Drum Decay CV</b>: Drum decay CV input (scaled /10).</li>
    <li><b>Hats Frequency CV</b>: Hats frequency CV input.</li>
    <li><b>Hats Decay CV</b>: Hats decay CV input (scaled /10).</li>
    <li><b>Accent VCA Envelope</b>: Main accent VCA envelope output (0-10V).</li>
    <li><b>Track 1 FM Envelope</b>: Track 1 FM envelope output (0-10V).</li>
    <li><b>Track 2 VCA Envelope</b>: Track 2 VCA envelope output (0-10V).</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">緊湊型 4HP Envelope 生成器，具備雙軌 Euclidean Rhythm 引擎。僅輸出 Envelope CV 訊號（無音訊合成）。專為驅動 TWNC 2 或其他音源而設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">訊號流程</h3>
    <p style="margin-bottom: 1rem;">Clock → [Euclidean Pattern Generator] → [Envelope Generator] → CV Output。Track 2 在 Pattern 生成前有額外的 Clock Division/Multiplication。Accent 系統提供獨立的四分音符 Envelope。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Euclidean 演算法</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Distribution</b>：透過基於 floor 的間距的 Bjorklund，將 Fill 均勻分佈於 Pattern 長度。Euclidean Shift 固定為 0（不套用旋轉）。</li>
    <li><b>Auto-reset</b>：序列每 32 個 Clock Pulse 自動重置</li>
    <li><b>Length</b>：1-32 步（預設：16）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">全域控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CLK</b>：Clock 輸入（Schmitt Trigger，0.1V 低 / 2V 高閾值）</li>
    <li><b>LEN</b>：序列長度（1-32 步，預設：16，Snap）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Drum Track（Track 1）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>FILL</b>：節奏密度（0-100%，預設：66.6%）</li>
    <li><b>ACCNT</b>：四分音符 Accent Shift（1-7 步，預設：1）。觸發主 VCA Envelope。Accent 在 Clock Step 匹配 (shift-1) mod 4 時觸發。Track 1 固定以 1x Clock 運行（無 Div/Mult）。</li>
    <li><b>A.DEC</b>：Accent Envelope Decay（0.01-2s，預設：0.549s）</li>
    <li><b>DECAY</b>：Track 1 Envelope Decay（0.01-2s，預設：0.3s）。FM Envelope 使用此值的一半（decayParam * 0.5），VCA Envelope 使用完整值。</li>
    <li><b>SHAPE</b>：Envelope 曲線（0-0.99，預設：0.5）</li>
    <li><b>D.D</b>：Decay CV 輸入（±10V，縮放 /10）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">HATs Track（Track 2）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>FILL</b>：節奏密度（0-100%，預設：100%）</li>
    <li><b>SHIFT</b>：相對 Accent 的 Clock Delay（1-4 步，預設：3）。延遲 HATs 相對於 Accent 的起始</li>
    <li><b>D/M</b>：Clock Div/Mult（-3 到 +3，預設：-3 = 1/4x）</li>
    <li>Div/Mult 值：-3:1/4x、-2:1/3x、-1:1/2x、0:1x、+1:2x、+2:3x、+3:4x</li>
    <li><b>DECAY</b>：Envelope Decay（0.01-2s，預設：0.094s）。VCA Envelope 使用此值的一半（decayParam * 0.5）。</li>
    <li><b>SHAPE</b>：Envelope 曲線（0-0.99，預設：0.5）</li>
    <li><b>H.D</b>：Decay CV 輸入（±10V，縮放 /10）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Envelope 演算法</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack</b>：固定 1ms 線性斜坡</li>
    <li><b>Decay</b>：可變 S 曲線與 Smoothstep 過渡（與 TWNC 相同）</li>
    <li><b>Shape calculation</b>：frontK 範圍 -0.9 至 -0.4，backK 範圍 -1.0 至 0.6，取決於 Shape 參數</li>
    <li><b>Output formula</b>：加權插值產生 S 曲線 Decay 特性</li>
    <li><b>Trigger Pulse</b>：30ms Pulse 用於 Retriggering</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock Division/Multiplication</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Division</b>：計數輸入 Clock，在第 N 個時觸發</li>
    <li><b>Multiplication</b>：每個輸入 Clock 週期生成 N 個 Trigger</li>
    <li><b>Gate width</b>：乘法後 Clock 週期的 50%（最小 1ms）</li>
    <li><b>Combined</b>：先套用 Division，然後 Multiplication</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">HATs Delay 系統</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>SHIFT parameter</b>：在 Accent Trigger 後延遲 HATs Track 起始 N 個 Clock Pulse</li>
    <li><b>Behavior</b>：當 SHIFT=1 時，HATs 立即與 Accent 同步開始。當 SHIFT>1 時，等待 SHIFT-1 個 Clock</li>
    <li><b>Reset</b>：SHIFT 參數變更時 Delay 計數器重置</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ENVs (top)</b>：主 Accent VCA Envelope（0-10V）</li>
    <li><b>ENVs (bottom-left)</b>：Track 1 FM Envelope（0-10V）</li>
    <li><b>ENVs (bottom-right)</b>：Track 2 VCA Envelope（0-10V）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Clock 輸入：Schmitt Trigger（0.1V/2V 閾值）</li>
    <li>CV 輸入：±10V（縮放 /10）</li>
    <li>Envelope 輸出：0-10V 單極性</li>
    <li>Attack 時間：1ms（固定）</li>
    <li>Decay 範圍：0.01-2 秒</li>
    <li>Clock 週期：0.01-10 秒</li>
    <li>處理：32-bit 浮點</li>
    <li>模組寬度：4HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">配套模組</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>TWNC 2</b>：接收 Envelope 輸出以驅動 BD/SN/HH 合成</li>
    <li><b>Usage</b>：連接 ENVs 輸出至 TWNC 2 ENV 輸入以組成完整 Drum Machine</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Global Clock</b>：Clock 輸入（Schmitt Trigger，閾值 0.1V/2V）。</li>
    <li><b>Global Length</b>：序列長度（1-32 步，預設：16，Snap）。</li>
    <li><b>Track 1 Fill</b>：Drum 軌道節奏密度（0-100%，預設：66.6%）。</li>
    <li><b>VCA Shift</b>：四分音符 Accent Shift（1-7 步，預設：1，Snap）。</li>
    <li><b>VCA Decay</b>：Accent Envelope Decay 時間（0.01-2s，預設：0.549s）。</li>
    <li><b>Track 1 Decay</b>：Drum Envelope Decay（0.01-2s，預設：0.3s）。</li>
    <li><b>Track 1 Shape</b>：Drum Envelope 曲線（0-0.99，預設：0.5）。</li>
    <li><b>Track 2 Fill</b>：HATs 節奏密度（0-100%，預設：100%）。</li>
    <li><b>Track 2 Shift</b>：HATs 相對 Accent 的 Clock Delay（1-4 步，預設：3，Snap）。</li>
    <li><b>Track 2 Div/Mult</b>：HATs Clock Div/Mult（-3 到 +3，預設：-3 = 1/4x，Snap）。</li>
    <li><b>Track 2 Decay</b>：HATs Envelope Decay（0.01-2s，預設：0.094s）。</li>
    <li><b>Track 2 Shape</b>：HATs Envelope 曲線（0-0.99，預設：0.5）。</li>
    <li><b>Drum Frequency CV</b>：Drum 頻率 CV 輸入。</li>
    <li><b>Drum Decay CV</b>：Drum Decay CV 輸入（縮放 /10）。</li>
    <li><b>Hats Frequency CV</b>：Hats 頻率 CV 輸入。</li>
    <li><b>Hats Decay CV</b>：Hats Decay CV 輸入（縮放 /10）。</li>
    <li><b>Accent VCA Envelope</b>：主 Accent VCA Envelope 輸出（0-10V）。</li>
    <li><b>Track 1 FM Envelope</b>：Track 1 FM Envelope 輸出（0-10V）。</li>
    <li><b>Track 2 VCA Envelope</b>：Track 2 VCA Envelope 輸出（0-10V）。</li>
    </ul>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">デュアルトラックユークリッドリズムエンジン搭載のコンパクト4HPエンベロープ生成器。エンベロープCV信号のみを出力（オーディオ合成なし）。TWNC 2または他の音源を駆動するように設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">信号フロー</h3>
    <p style="margin-bottom: 1rem;">Clock → [Euclidean Pattern Generator] → [Envelope Generator] → CV Output。Track 2はパターン生成前に追加のクロック分割/倍増機能あり。アクセントシステムは個別の四分音符エンベロープを提供。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ユークリッドアルゴリズム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Distribution</b>：floor基準スペーシングによるBjorklund、パターン長全体にフィルを均等分布。ユークリッドシフトは常に0（ローテーション未適用）。</li>
    <li><b>Auto-reset</b>：シーケンスは32クロックパルスごとに自動リセット</li>
    <li><b>Length</b>：1-32ステップ（デフォルト：16）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グローバルコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>CLK</b>：クロック入力（シュミットトリガー、0.1V低/2V高閾値）</li>
    <li><b>LEN</b>：シーケンス長（1-32ステップ、デフォルト：16、スナップ）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Drum Track（Track 1）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>FILL</b>：リズム密度（0-100%、デフォルト：66.6%）</li>
    <li><b>ACCNT</b>：四分音符アクセントシフト（1-7ステップ、デフォルト：1）。メインVCAエンベロープをトリガー。アクセントはクロックステップが(shift-1) mod 4に一致した時に発火。Track 1は常に1xクロックで動作（除/乗なし）。</li>
    <li><b>A.DEC</b>：アクセントエンベロープディケイ（0.01-2s、デフォルト：0.549s）</li>
    <li><b>DECAY</b>：Track 1エンベロープディケイ（0.01-2s、デフォルト：0.3s）。FMエンベロープはこの値の半分（decayParam * 0.5）を使用、VCAエンベロープは全値を使用。</li>
    <li><b>SHAPE</b>：エンベロープカーブ（0-0.99、デフォルト：0.5）</li>
    <li><b>D.D</b>：ディケイCV入力（±10V、スケール/10）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">HATs Track（Track 2）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>FILL</b>：リズム密度（0-100%、デフォルト：100%）</li>
    <li><b>SHIFT</b>：アクセントからのクロックディレイ（1-4ステップ、デフォルト：3）。アクセントに対してHATs開始を遅延</li>
    <li><b>D/M</b>：クロック除/乗（-3から+3、デフォルト：-3 = 1/4x）</li>
    <li>除/乗値：-3:1/4x、-2:1/3x、-1:1/2x、0:1x、+1:2x、+2:3x、+3:4x</li>
    <li><b>DECAY</b>：エンベロープディケイ（0.01-2s、デフォルト：0.094s）。VCAエンベロープはこの値の半分（decayParam * 0.5）を使用。</li>
    <li><b>SHAPE</b>：エンベロープカーブ（0-0.99、デフォルト：0.5）</li>
    <li><b>H.D</b>：ディケイCV入力（±10V、スケール/10）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">エンベロープアルゴリズム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack</b>：固定1msリニアランプ</li>
    <li><b>Decay</b>：smoothstepトランジション付き可変Sカーブ（TWNCと同様）</li>
    <li><b>Shape calculation</b>：frontKは-0.9から-0.4、backKは-1.0から0.6の範囲、シェイプパラメータに基づく</li>
    <li><b>Output formula</b>：加重補間によるSカーブディケイ特性</li>
    <li><b>Trigger pulse</b>：リトリガー用30msパルス</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クロック分割/倍増</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Division</b>：入力クロックをカウント、N番目でトリガー</li>
    <li><b>Multiplication</b>：入力クロック周期ごとにNトリガーを生成</li>
    <li><b>Gate width</b>：倍増後クロック周期の50%（最小1ms）</li>
    <li><b>Combined</b>：分割を先に適用、次に倍増</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">HATsディレイシステム</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>SHIFT parameter</b>：アクセントトリガー後NクロックパルスHATsトラック開始を遅延</li>
    <li><b>Behavior</b>：SHIFT=1の時、HATsはアクセントと同時に開始。SHIFT>1の時、SHIFT-1クロック待機</li>
    <li><b>Reset</b>：SHIFTパラメータ変更時にディレイカウンターリセット</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ENVs (top)</b>：メインアクセントVCAエンベロープ（0-10V）</li>
    <li><b>ENVs (bottom-left)</b>：Track 1 FMエンベロープ（0-10V）</li>
    <li><b>ENVs (bottom-right)</b>：Track 2 VCAエンベロープ（0-10V）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>クロック入力：シュミットトリガー（0.1V/2V閾値）</li>
    <li>CV入力：±10V（スケール/10）</li>
    <li>エンベロープ出力：0-10V単極性</li>
    <li>アタック時間：1ms（固定）</li>
    <li>ディケイ範囲：0.01-2秒</li>
    <li>クロック周期：0.01-10秒</li>
    <li>処理：32ビット浮動小数点</li>
    <li>モジュール幅：4HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">コンパニオンモジュール</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>TWNC 2</b>：エンベロープ出力を受信してBD/SN/HH合成を駆動</li>
    <li><b>Usage</b>：ENVs出力をTWNC 2 ENV入力に接続して完全なドラムマシンを構成</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Global Clock</b>：クロック入力（シュミットトリガー、閾値0.1V/2V）。</li>
    <li><b>Global Length</b>：シーケンス長（1-32ステップ、デフォルト：16、スナップ）。</li>
    <li><b>Track 1 Fill</b>：ドラムトラックリズム密度（0-100%、デフォルト：66.6%）。</li>
    <li><b>VCA Shift</b>：四分音符アクセントシフト（1-7ステップ、デフォルト：1、スナップ）。</li>
    <li><b>VCA Decay</b>：アクセントエンベロープディケイ時間（0.01-2s、デフォルト：0.549s）。</li>
    <li><b>Track 1 Decay</b>：ドラムエンベロープディケイ（0.01-2s、デフォルト：0.3s）。</li>
    <li><b>Track 1 Shape</b>：ドラムエンベロープカーブ（0-0.99、デフォルト：0.5）。</li>
    <li><b>Track 2 Fill</b>：HATsリズム密度（0-100%、デフォルト：100%）。</li>
    <li><b>Track 2 Shift</b>：HATsアクセントからのクロックディレイ（1-4ステップ、デフォルト：3、スナップ）。</li>
    <li><b>Track 2 Div/Mult</b>：HATsクロックDiv/Mult（-3から+3、デフォルト：-3 = 1/4x、スナップ）。</li>
    <li><b>Track 2 Decay</b>：HATsエンベロープディケイ（0.01-2s、デフォルト：0.094s）。</li>
    <li><b>Track 2 Shape</b>：HATsエンベロープカーブ（0-0.99、デフォルト：0.5）。</li>
    <li><b>Drum Frequency CV</b>：ドラム周波数CV入力。</li>
    <li><b>Drum Decay CV</b>：ドラムディケイCV入力（スケール/10）。</li>
    <li><b>Hats Frequency CV</b>：ハット周波数CV入力。</li>
    <li><b>Hats Decay CV</b>：ハットディケイCV入力（スケール/10）。</li>
    <li><b>Accent VCA Envelope</b>：メインアクセントVCAエンベロープ出力（0-10V）。</li>
    <li><b>Track 1 FM Envelope</b>：トラック1 FMエンベロープ出力（0-10V）。</li>
    <li><b>Track 2 VCA Envelope</b>：トラック2 VCAエンベロープ出力（0-10V）。</li>
    </ul>
controls:
- name: Global Clock
  type: input
  desc:
    en: Clock input (Schmitt trigger, 0.1V/2V thresholds).
    zh: Clock 輸入（Schmitt Trigger，閾值 0.1V/2V）。
    ja: クロック入力（シュミットトリガー、閾値0.1V/2V）。
- name: Drum Frequency CV
  type: input
  desc:
    en: Drum frequency CV input.
    zh: Drum 頻率 CV 輸入。
    ja: ドラム周波数CV入力。
- name: Drum Decay CV
  type: input
  desc:
    en: Drum decay CV input (scaled /10).
    zh: Drum Decay CV 輸入（縮放 /10）。
    ja: ドラムディケイCV入力（スケール/10）。
- name: Hats Frequency CV
  type: input
  desc:
    en: Hats frequency CV input.
    zh: Hats 頻率 CV 輸入。
    ja: ハット周波数CV入力。
- name: Hats Decay CV
  type: input
  desc:
    en: Hats decay CV input (scaled /10).
    zh: Hats Decay CV 輸入（縮放 /10）。
    ja: ハットディケイCV入力（スケール/10）。
- name: Global Length
  type: param
  desc:
    en: 'Sequence length (1-32 steps, default: 16, snap).'
    zh: 序列長度（1-32 步，預設：16，Snap）。
    ja: シーケンス長（1-32ステップ、デフォルト：16、スナップ）。
- name: Track 1 Fill
  type: param
  desc:
    en: 'Drum track rhythm density (0-100%, default: 66.6%).'
    zh: Drum 軌道節奏密度（0-100%，預設：66.6%）。
    ja: ドラムトラックリズム密度（0-100%、デフォルト：66.6%）。
- name: VCA Shift
  type: param
  desc:
    en: 'Quarter-note accent shift (1-7 steps, default: 1, snap).'
    zh: 四分音符 Accent Shift（1-7 步，預設：1，Snap）。
    ja: 四分音符アクセントシフト（1-7ステップ、デフォルト：1、スナップ）。
- name: VCA Decay
  type: param
  desc:
    en: 'Accent envelope decay time (0.01-2s, default: 0.549s).'
    zh: Accent Envelope Decay 時間（0.01-2s，預設：0.549s）。
    ja: アクセントエンベロープディケイ時間（0.01-2s、デフォルト：0.549s）。
- name: Track 1 Decay
  type: param
  desc:
    en: 'Drum envelope decay (0.01-2s, default: 0.3s).'
    zh: Drum Envelope Decay（0.01-2s，預設：0.3s）。
    ja: ドラムエンベロープディケイ（0.01-2s、デフォルト：0.3s）。
- name: Track 1 Shape
  type: param
  desc:
    en: 'Drum envelope curve (0-0.99, default: 0.5).'
    zh: Drum Envelope 曲線（0-0.99，預設：0.5）。
    ja: ドラムエンベロープカーブ（0-0.99、デフォルト：0.5）。
- name: Track 2 Fill
  type: param
  desc:
    en: 'HATs rhythm density (0-100%, default: 100%).'
    zh: HATs 節奏密度（0-100%，預設：100%）。
    ja: HATsリズム密度（0-100%、デフォルト：100%）。
- name: Track 2 Div/Mult
  type: param
  desc:
    en: 'HATs clock div/mult (-3 to +3, default: -3 = 1/4x, snap).'
    zh: HATs Clock Div/Mult（-3 到 +3，預設：-3 = 1/4x，Snap）。
    ja: HATsクロックDiv/Mult（-3から+3、デフォルト：-3 = 1/4x、スナップ）。
- name: Track 2 Decay
  type: param
  desc:
    en: 'HATs envelope decay (0.01-2s, default: 0.094s).'
    zh: HATs Envelope Decay（0.01-2s，預設：0.094s）。
    ja: HATsエンベロープディケイ（0.01-2s、デフォルト：0.094s）。
- name: Track 2 Shape
  type: param
  desc:
    en: 'HATs envelope curve (0-0.99, default: 0.5).'
    zh: HATs Envelope 曲線（0-0.99，預設：0.5）。
    ja: HATsエンベロープカーブ（0-0.99、デフォルト：0.5）。
- name: Track 2 Shift
  type: param
  desc:
    en: 'HATs clock delay from accent (1-4 steps, default: 3, snap).'
    zh: HATs 相對 Accent 的 Clock Delay（1-4 步，預設：3，Snap）。
    ja: HATsアクセントからのクロックディレイ（1-4ステップ、デフォルト：3、スナップ）。
- name: Accent VCA Envelope
  type: output
  desc:
    en: Main accent VCA envelope output (0-10V).
    zh: 主 Accent VCA Envelope 輸出（0-10V）。
    ja: メインアクセントVCAエンベロープ出力（0-10V）。
- name: Track 1 FM Envelope
  type: output
  desc:
    en: Track 1 FM envelope output (0-10V).
    zh: Track 1 FM Envelope 輸出（0-10V）。
    ja: トラック1 FMエンベロープ出力（0-10V）。
- name: Track 2 VCA Envelope
  type: output
  desc:
    en: Track 2 VCA envelope output (0-10V).
    zh: Track 2 VCA Envelope 輸出（0-10V）。
    ja: トラック2 VCAエンベロープ出力（0-10V）。
