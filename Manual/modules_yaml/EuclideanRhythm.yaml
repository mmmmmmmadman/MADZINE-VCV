  zh:
  - 三軌獨立 Euclidean
  - 各軌 Clock Division/Multiplication
  - Pattern Rotation 偏移
  - Chain 輸出用於軌道切換
  - Sync 與 Reset 輸入
  ja:
  - 3トラック独立ユークリッド
  - トラック別クロック分割/倍増
  - パターンローテーションオフセット
