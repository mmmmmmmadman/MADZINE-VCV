slug: EuclideanRhythm
name: Euclidean Rhythm
hp: 8
wide: false
alt: Euclidean Rhythm
description:
  en: Three independent Euclidean rhythm tracks with per-track clock division/multiplication and chain outputs for sequential switching
  zh: 三軌獨立 Euclidean Rhythm，具備各軌 Clock Division/Multiplication 與 Chain 輸出，用於順序切換
  ja: トラック別クロック分割/倍増とシーケンシャル切替用チェーン出力を備えた3トラック独立ユークリッドリズム
features:
