slug: MADDYPlus
name: MADDY+
hp: 12
wide: false
alt: MADDY Plus
description:
  en: Extended MADDY with three independent CV sequencers featuring custom pattern support via context menu
  zh: MADDY 進階版，具備三組獨立 CV Sequencer，支援右鍵選單自訂 Pattern
  ja: 3系統の独立CVシーケンサーを搭載したMADDY拡張版、コンテキストメニューでカスタムパターン対応
features:
  en:
  - Three independent CV sequencers
  - 5 voltage knobs per sequence
  - Sequential, Custom, Jump modes with reverse variants
  - Density and Chaos controls
  - Custom pattern via context menu
  zh:
  - 三組獨立 CV Sequencer
  - 每組 5 個電壓旋鈕
  - Sequential、Custom、Jump 模式及反向變體
  - Density 與 Chaos 控制
  - 右鍵選單自訂 Pattern
  ja:
  - 3系統の独立CVシーケンサー
  - 各系統5つの電圧ノブ
  - Sequential、Custom、Jumpモード（逆順バリアント付き）
  - DensityとChaosコントロール
  - コンテキストメニューでカスタムパターン
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Advanced multi-channel sequencer combining swing clock generation, 3-track Euclidean rhythm generator, and three independent pattern-based CV sequencers. Extended version of MADDY with additional CV channels, chain sequencing, and Clock CV input.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock Section</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Frequency</b>: Internal clock frequency (0.125-128 Hz, exponential). Range -3 to 7, displayed as 2^param Hz. Default: ~7 Hz.</li>
    <li><b>Swing</b>: Swing amount via phase offset (0-1, default: 0). Display shows degrees: 180 to 90. Higher values create stronger shuffle feel.</li>
    <li><b>Clock CV Attenuverter</b>: Attenuverter for Clock CV input (-1 to +1, default: 0). Scales the incoming CV before modulating the clock frequency.</li>
    <li><b>Clock CV</b> (input): CV input for clock frequency modulation (+-10V).</li>
    <li><b>Manual Reset</b>: Button to reset all tracks and sequencers to initial state.</li>
    <li><b>Ch1 Clock Source</b>: Selects what advances the main CV sequencer (Ch1). 7 options: LFO, T1, T2, T3, 12, 23, 1213. Default: 1 (T1).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Global Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Length</b>: Global pattern length (1-48 steps, default: 32, snap). Shared across all rhythm tracks and CV sequencers. Clamped to 1-48 in process.</li>
    <li><b>Decay</b>: Envelope decay parameter (0-1, default: 0.3). Non-linear mapping using power curve for natural-sounding decay. Shared across all tracks.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Track Controls (T1, T2, T3)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>T1 Fill</b>: Track 1 rhythm density (0-100%, default: 100%). Converted to integer hit count based on pattern length.</li>
    <li><b>T1 Div/Mult</b>: Track 1 clock division/multiplication (-3 to +3, default: 0 = 1x). Snap-enabled.</li>
    <li><b>T2 Fill</b>: Track 2 rhythm density (0-100%, default: 100%).</li>
    <li><b>T2 Div/Mult</b>: Track 2 clock division/multiplication (-3 to +3, default: 0 = 1x). Snap-enabled.</li>
    <li><b>T3 Fill</b>: Track 3 rhythm density (0-100%, default: 100%).</li>
    <li><b>T3 Div/Mult</b>: Track 3 clock division/multiplication (-3 to +3, default: 0 = 1x). Snap-enabled.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV Sequencer (Ch1)</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>K1</b>: Voltage knob 1 (-10V to +10V, default: 0V)</li>
    <li><b>K2</b>: Voltage knob 2 (-10V to +10V, default: 2V)</li>
    <li><b>K3</b>: Voltage knob 3 (-10V to +10V, default: 4V)</li>
    <li><b>K4</b>: Voltage knob 4 (-10V to +10V, default: 6V)</li>
    <li><b>K5</b>: Voltage knob 5 (-10V to +10V, default: 8V)</li>
    <li><b>Ch1 Mode</b>: Pattern mode (0-5, default: 1 = Custom). 0: Sequential, 1: Custom, 2: Jump, 3: Rev Sequential, 4: Rev Custom, 5: Rev Jump.</li>
    <li><b>Density</b>: Controls the number of active K knobs (0-1, default: 0.5 = 4 knobs). 0-0.2: 2, 0.2-0.4: 3, 0.4-0.6: 4, 0.6-1.0: 5.</li>
    <li><b>Chaos</b>: Randomization amount (0-100%, default: 0%). >50% selects knobs outside DENSITY range.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV Sequencer Modes</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Sequential</b>: Cycles K1-K5 in order, uses all 5 knobs regardless of DENSITY</li>
    <li><b>Custom</b>: User-defined pattern via right-click menu. Default: 32-step phasing pattern. DENSITY controls active knob count.</li>
    <li><b>Jump</b>: Fixed pattern K1->K3->K5->K2->K4</li>
    <li><b>Rev Sequential / Rev Custom / Rev Jump</b>: Reverse variants of the above modes</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Ch2 CV Sequencer</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch2 Clock Source</b>: Clock source for Ch2 (0-6, default: 2 = T2). Same options as Ch1.</li>
    <li><b>Ch2 Mode</b>: Pattern mode for Ch2 (0-5, default: 1 = Custom). Same modes as Ch1.</li>
    <li><b>Ch2 Density</b>: Active knob count for Ch2 (0-1, default: 0.5).</li>
    <li><b>Ch2 CVD Time/Attenuation</b>: CV delay time/attenuation for Ch2 (0-1, default: 0). When Ch2 CV input is connected, attenuates the external CV signal.</li>
    <li><b>Ch2 Step Delay</b>: Step delay for Ch2 (0-5, default: 0, snap). Delays Ch2 output by N steps, creating canon/echo effects.</li>
    <li><b>Ch2 CV</b> (input): External CV input for Ch2.</li>
    <li><b>Ch2 CV</b> (output): Ch2 CV sequencer voltage output (-10V to +10V).</li>
    <li><b>Ch2 Trigger</b> (output): Ch2 trigger output (fires when CV value changes).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Ch3 CV Sequencer</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch3 Clock Source</b>: Clock source for Ch3 (0-6, default: 3 = T3). Same options as Ch1.</li>
    <li><b>Ch3 Mode</b>: Pattern mode for Ch3 (0-5, default: 1 = Custom). Same modes as Ch1.</li>
    <li><b>Ch3 Density</b>: Active knob count for Ch3 (0-1, default: 0.5).</li>
    <li><b>Ch3 CVD Time/Attenuation</b>: CV delay time/attenuation for Ch3 (0-1, default: 0). When Ch3 CV input is connected, attenuates the external CV signal.</li>
    <li><b>Ch3 Step Delay</b>: Step delay for Ch3 (0-5, default: 0, snap). Delays Ch3 output by N steps.</li>
    <li><b>Ch3 CV</b> (input): External CV input for Ch3.</li>
    <li><b>Ch3 CV</b> (output): Ch3 CV sequencer voltage output (-10V to +10V).</li>
    <li><b>Ch3 Trigger</b> (output): Ch3 trigger output (fires when CV value changes).</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>: Master clock output (1ms pulse, post-swing)</li>
    <li><b>Reset</b>: Reset output pulse (generated on manual/auto reset)</li>
    <li><b>T1 Trigger</b>: Track 1 envelope output (0-10V)</li>
    <li><b>T2 Trigger</b>: Track 2 envelope output (0-10V)</li>
    <li><b>T3 Trigger</b>: Track 3 envelope output (0-10V)</li>
    <li><b>Chain 1+2</b>: Chain 1+2 envelope output (0-10V)</li>
    <li><b>Chain 2+3</b>: Chain 2+3 envelope output (0-10V)</li>
    <li><b>Chain 1+2+3</b>: Chain 1+2+1+3 envelope output (0-10V)</li>
    <li><b>CV</b>: Ch1 CV sequencer voltage output (-10V to +10V)</li>
    <li><b>Trigger</b>: Ch1 trigger output (fires when CV value changes)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li>Module width: 12HP</li>
    <li>Internal clock: 0.125-128 Hz (exponential, param range -3 to 7)</li>
    <li>Pattern length: 1-48 steps</li>
    <li>Clock div/mult: 1/4x to 4x per track (-3 to +3)</li>
    <li>Clock output: 10V, 1ms pulse width</li>
    <li>CV output range: +/-10V</li>
    <li>Envelope output: 0-10V</li>
    <li>Processing: 32-bit floating point</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Right-Click Menu</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Panel Theme</b>: Light / Dark panel appearance</li>
    <li><b>Attack Time</b>: Envelope attack time (0.5-20ms, default: 6ms). Affects all three tracks.</li>
    <li><b>Track Shift</b>: Euclidean pattern rotation for each track (0-4 steps)</li>
    <li><b>Custom Pattern</b>: Define knob sequence for Custom mode. Enter a string of numbers 1-5 (e.g., "12312345"). Each number selects which K knob to use for that step.</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">整合 Swing Clock 生成、3 軌 Euclidean Rhythm 生成器與三組獨立 Pattern 式 CV Sequencer 的進階多通道 Sequencer。MADDY 的擴展版本，具備額外 CV 通道、Chain Sequencing 與 Clock CV 輸入。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Clock 區段</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Frequency</b>：內部 Clock 頻率（0.125-128 Hz，指數）。參數範圍 -3 到 7，顯示為 2^param Hz。預設：~7 Hz。</li>
    <li><b>Swing</b>：透過相位偏移的 Swing 量（0-1，預設：0）。顯示角度：180 到 90。數值越高 Shuffle 感越強。</li>
    <li><b>Clock CV Attenuverter</b>：Clock CV 輸入的 Attenuverter（-1 至 +1，預設：0）。在調變 Clock 頻率前縮放輸入 CV。</li>
    <li><b>Clock CV</b>（輸入）：Clock 頻率調變 CV 輸入（+-10V）。</li>
    <li><b>Manual Reset</b>：按鈕，重置所有軌道與 Sequencer 至初始狀態。</li>
    <li><b>Ch1 Clock Source</b>：選擇推進主 CV Sequencer（Ch1）的來源。7 種選項：LFO、T1、T2、T3、12、23、1213。預設：1（T1）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">全域控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Length</b>：全域 Pattern 長度（1-48 步，預設：32，Snap）。所有節奏軌道和 CV Sequencer 共用。</li>
    <li><b>Decay</b>：Envelope Decay 參數（0-1，預設：0.3）。使用 Power Curve 的非線性映射。所有軌道共用。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">每軌控制（T1、T2、T3）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>T1 Fill</b>：Track 1 節奏密度（0-100%，預設：100%）。根據 Pattern 長度轉換為整數 Hit 數。</li>
    <li><b>T1 Div/Mult</b>：Track 1 Clock Division/Multiplication（-3 到 +3，預設：0 = 1x）。Snap 啟用。</li>
    <li><b>T2 Fill</b>：Track 2 節奏密度（0-100%，預設：100%）。</li>
    <li><b>T2 Div/Mult</b>：Track 2 Clock Division/Multiplication（-3 到 +3，預設：0 = 1x）。Snap 啟用。</li>
    <li><b>T3 Fill</b>：Track 3 節奏密度（0-100%，預設：100%）。</li>
    <li><b>T3 Div/Mult</b>：Track 3 Clock Division/Multiplication（-3 到 +3，預設：0 = 1x）。Snap 啟用。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV Sequencer（Ch1）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>K1</b>：電壓旋鈕 1（-10V 至 +10V，預設：0V）</li>
    <li><b>K2</b>：電壓旋鈕 2（-10V 至 +10V，預設：2V）</li>
    <li><b>K3</b>：電壓旋鈕 3（-10V 至 +10V，預設：4V）</li>
    <li><b>K4</b>：電壓旋鈕 4（-10V 至 +10V，預設：6V）</li>
    <li><b>K5</b>：電壓旋鈕 5（-10V 至 +10V，預設：8V）</li>
    <li><b>Ch1 Mode</b>：Pattern 模式（0-5，預設：1 = Custom）。0: Sequential、1: Custom、2: Jump、3: Rev Sequential、4: Rev Custom、5: Rev Jump。</li>
    <li><b>Density</b>：控制活動 K 旋鈕數量（0-1，預設：0.5 = 4 個）。0-0.2: 2 個、0.2-0.4: 3 個、0.4-0.6: 4 個、0.6-1.0: 5 個。</li>
    <li><b>Chaos</b>：隨機化量（0-100%，預設：0%）。>50% 時選擇 DENSITY 範圍外的旋鈕。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV Sequencer 模式</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Sequential</b>：依序循環 K1-K5，無論 DENSITY 皆使用全部 5 個旋鈕</li>
    <li><b>Custom</b>：透過右鍵選單自訂 Pattern。預設：32 步移相 Pattern。DENSITY 控制活動旋鈕數。</li>
    <li><b>Jump</b>：固定 Pattern K1->K3->K5->K2->K4</li>
    <li><b>Rev Sequential / Rev Custom / Rev Jump</b>：上述模式的反向變體</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Ch2 CV Sequencer</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch2 Clock Source</b>：Ch2 的 Clock 來源（0-6，預設：2 = T2）。與 Ch1 相同選項。</li>
    <li><b>Ch2 Mode</b>：Ch2 的 Pattern 模式（0-5，預設：1 = Custom）。與 Ch1 相同模式。</li>
    <li><b>Ch2 Density</b>：Ch2 的活動旋鈕數（0-1，預設：0.5）。</li>
    <li><b>Ch2 CVD Time/Attenuation</b>：Ch2 的 CV Delay 時間/衰減（0-1，預設：0）。當 Ch2 CV 輸入連接時，衰減外部 CV 訊號。</li>
    <li><b>Ch2 Step Delay</b>：Ch2 的步進延遲（0-5，預設：0，Snap）。將 Ch2 輸出延遲 N 步，產生卡農/迴音效果。</li>
    <li><b>Ch2 CV</b>（輸入）：Ch2 的外部 CV 輸入。</li>
    <li><b>Ch2 CV</b>（輸出）：Ch2 CV Sequencer 電壓輸出（-10V 至 +10V）。</li>
    <li><b>Ch2 Trigger</b>（輸出）：Ch2 Trigger 輸出（CV 值變更時觸發）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Ch3 CV Sequencer</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch3 Clock Source</b>：Ch3 的 Clock 來源（0-6，預設：3 = T3）。與 Ch1 相同選項。</li>
    <li><b>Ch3 Mode</b>：Ch3 的 Pattern 模式（0-5，預設：1 = Custom）。與 Ch1 相同模式。</li>
    <li><b>Ch3 Density</b>：Ch3 的活動旋鈕數（0-1，預設：0.5）。</li>
    <li><b>Ch3 CVD Time/Attenuation</b>：Ch3 的 CV Delay 時間/衰減（0-1，預設：0）。當 Ch3 CV 輸入連接時，衰減外部 CV 訊號。</li>
    <li><b>Ch3 Step Delay</b>：Ch3 的步進延遲（0-5，預設：0，Snap）。將 Ch3 輸出延遲 N 步。</li>
    <li><b>Ch3 CV</b>（輸入）：Ch3 的外部 CV 輸入。</li>
    <li><b>Ch3 CV</b>（輸出）：Ch3 CV Sequencer 電壓輸出（-10V 至 +10V）。</li>
    <li><b>Ch3 Trigger</b>（輸出）：Ch3 Trigger 輸出（CV 值變更時觸發）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>：主 Clock 輸出（1ms Pulse，Swing 後）</li>
    <li><b>Reset</b>：Reset 輸出 Pulse（手動/自動 Reset 時產生）</li>
    <li><b>T1 Trigger</b>：Track 1 Envelope 輸出（0-10V）</li>
    <li><b>T2 Trigger</b>：Track 2 Envelope 輸出（0-10V）</li>
    <li><b>T3 Trigger</b>：Track 3 Envelope 輸出（0-10V）</li>
    <li><b>Chain 1+2</b>：Chain 1+2 Envelope 輸出（0-10V）</li>
    <li><b>Chain 2+3</b>：Chain 2+3 Envelope 輸出（0-10V）</li>
    <li><b>Chain 1+2+3</b>：Chain 1+2+1+3 Envelope 輸出（0-10V）</li>
    <li><b>CV</b>：Ch1 CV Sequencer 電壓輸出（-10V 至 +10V）</li>
    <li><b>Trigger</b>：Ch1 Trigger 輸出（CV 值變更時觸發）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li>模組寬度：12HP</li>
    <li>內部 Clock：0.125-128 Hz（指數，參數範圍 -3 到 7）</li>
    <li>Pattern 長度：1-48 步</li>
    <li>Clock Div/Mult：每軌 1/4x 到 4x（-3 到 +3）</li>
    <li>Clock 輸出：10V，1ms Pulse 寬度</li>
    <li>CV 輸出範圍：+-10V</li>
    <li>Envelope 輸出：0-10V</li>
    <li>處理：32-bit 浮點</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">右鍵選單</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Panel Theme</b>：Light / Dark 面板外觀</li>
    <li><b>Attack Time</b>：Envelope Attack 時間（0.5-20ms，預設：6ms）。影響所有三軌。</li>
    <li><b>Track Shift</b>：每軌 Euclidean Pattern 旋轉（0-4 步）</li>
    <li><b>Custom Pattern</b>：定義 Custom 模式的旋鈕序列。輸入 1-5 的數字字串（例如「12312345」）。每個數字選擇該步驟使用的 K 旋鈕。</li>
    </ul>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">スウィングクロック生成、3トラックユークリッドリズム生成、3系統の独立パターンベースCVシーケンサーを統合した高度なマルチチャンネルシーケンサー。追加CVチャンネル、チェーンシーケンス、Clock CV入力を備えたMADDYの拡張版。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クロックセクション</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Frequency</b>：内部クロック周波数（0.125-128 Hz、指数）。パラメータ範囲-3から7、2^param Hzとして表示。デフォルト：~7 Hz。</li>
    <li><b>Swing</b>：位相オフセットによるスウィング量（0-1、デフォルト：0）。角度で表示：180から90。値が高いほどシャッフル感が強化。</li>
    <li><b>Clock CV Attenuverter</b>：Clock CV入力のアッテニュバーター（-1から+1、デフォルト：0）。クロック周波数変調前に入力CVをスケール。</li>
    <li><b>Clock CV</b>（入力）：クロック周波数変調CV入力（+-10V）。</li>
    <li><b>Manual Reset</b>：全トラックとシーケンサーを初期状態にリセットするボタン。</li>
    <li><b>Ch1 Clock Source</b>：メインCVシーケンサー（Ch1）の進行ソースを選択。7オプション：LFO、T1、T2、T3、12、23、1213。デフォルト：1（T1）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グローバルコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Length</b>：グローバルパターン長（1-48ステップ、デフォルト：32、スナップ）。全リズムトラックとCVシーケンサーで共有。</li>
    <li><b>Decay</b>：エンベロープディケイパラメータ（0-1、デフォルト：0.3）。パワーカーブの非線形マッピング。全トラック共有。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">トラック別コントロール（T1、T2、T3）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>T1 Fill</b>：トラック1リズム密度（0-100%、デフォルト：100%）。パターン長に基づき整数ヒット数に変換。</li>
    <li><b>T1 Div/Mult</b>：トラック1クロック分割/倍増（-3から+3、デフォルト：0 = 1x）。スナップ有効。</li>
    <li><b>T2 Fill</b>：トラック2リズム密度（0-100%、デフォルト：100%）。</li>
    <li><b>T2 Div/Mult</b>：トラック2クロック分割/倍増（-3から+3、デフォルト：0 = 1x）。スナップ有効。</li>
    <li><b>T3 Fill</b>：トラック3リズム密度（0-100%、デフォルト：100%）。</li>
    <li><b>T3 Div/Mult</b>：トラック3クロック分割/倍増（-3から+3、デフォルト：0 = 1x）。スナップ有効。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CVシーケンサー（Ch1）</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>K1</b>：電圧ノブ1（-10Vから+10V、デフォルト：0V）</li>
    <li><b>K2</b>：電圧ノブ2（-10Vから+10V、デフォルト：2V）</li>
    <li><b>K3</b>：電圧ノブ3（-10Vから+10V、デフォルト：4V）</li>
    <li><b>K4</b>：電圧ノブ4（-10Vから+10V、デフォルト：6V）</li>
    <li><b>K5</b>：電圧ノブ5（-10Vから+10V、デフォルト：8V）</li>
    <li><b>Ch1 Mode</b>：パターンモード（0-5、デフォルト：1 = Custom）。0: Sequential、1: Custom、2: Jump、3: Rev Sequential、4: Rev Custom、5: Rev Jump。</li>
    <li><b>Density</b>：アクティブKノブ数を制御（0-1、デフォルト：0.5 = 4個）。0-0.2: 2個、0.2-0.4: 3個、0.4-0.6: 4個、0.6-1.0: 5個。</li>
    <li><b>Chaos</b>：ランダム化量（0-100%、デフォルト：0%）。>50%でDENSITY範囲外のノブを選択。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CVシーケンサーモード</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Sequential</b>：K1-K5を順にサイクル、DENSITYに関わらず全5ノブを使用</li>
    <li><b>Custom</b>：右クリックメニューでユーザー定義パターン。デフォルト：32ステップフェージングパターン。DENSITYがアクティブノブ数を制御。</li>
    <li><b>Jump</b>：固定パターンK1->K3->K5->K2->K4</li>
    <li><b>Rev Sequential / Rev Custom / Rev Jump</b>：上記モードの逆順バリアント</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Ch2 CVシーケンサー</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch2 Clock Source</b>：Ch2のクロックソース（0-6、デフォルト：2 = T2）。Ch1と同じオプション。</li>
    <li><b>Ch2 Mode</b>：Ch2のパターンモード（0-5、デフォルト：1 = Custom）。Ch1と同じモード。</li>
    <li><b>Ch2 Density</b>：Ch2のアクティブノブ数（0-1、デフォルト：0.5）。</li>
    <li><b>Ch2 CVD Time/Attenuation</b>：Ch2のCVディレイ時間/アッテネーション（0-1、デフォルト：0）。Ch2 CV入力接続時に外部CV信号をアッテネート。</li>
    <li><b>Ch2 Step Delay</b>：Ch2のステップディレイ（0-5、デフォルト：0、スナップ）。Ch2出力をNステップ遅延、カノン/エコー効果を生成。</li>
    <li><b>Ch2 CV</b>（入力）：Ch2の外部CV入力。</li>
    <li><b>Ch2 CV</b>（出力）：Ch2 CVシーケンサー電圧出力（-10Vから+10V）。</li>
    <li><b>Ch2 Trigger</b>（出力）：Ch2トリガー出力（CV値変更時に発火）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Ch3 CVシーケンサー</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Ch3 Clock Source</b>：Ch3のクロックソース（0-6、デフォルト：3 = T3）。Ch1と同じオプション。</li>
    <li><b>Ch3 Mode</b>：Ch3のパターンモード（0-5、デフォルト：1 = Custom）。Ch1と同じモード。</li>
    <li><b>Ch3 Density</b>：Ch3のアクティブノブ数（0-1、デフォルト：0.5）。</li>
    <li><b>Ch3 CVD Time/Attenuation</b>：Ch3のCVディレイ時間/アッテネーション（0-1、デフォルト：0）。Ch3 CV入力接続時に外部CV信号をアッテネート。</li>
    <li><b>Ch3 Step Delay</b>：Ch3のステップディレイ（0-5、デフォルト：0、スナップ）。Ch3出力をNステップ遅延。</li>
    <li><b>Ch3 CV</b>（入力）：Ch3の外部CV入力。</li>
    <li><b>Ch3 CV</b>（出力）：Ch3 CVシーケンサー電圧出力（-10Vから+10V）。</li>
    <li><b>Ch3 Trigger</b>（出力）：Ch3トリガー出力（CV値変更時に発火）。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Clock</b>：マスタークロック出力（1msパルス、スウィング後）</li>
    <li><b>Reset</b>：リセット出力パルス（手動/自動リセット時に生成）</li>
    <li><b>T1 Trigger</b>：トラック1エンベロープ出力（0-10V）</li>
    <li><b>T2 Trigger</b>：トラック2エンベロープ出力（0-10V）</li>
    <li><b>T3 Trigger</b>：トラック3エンベロープ出力（0-10V）</li>
    <li><b>Chain 1+2</b>：Chain 1+2エンベロープ出力（0-10V）</li>
    <li><b>Chain 2+3</b>：Chain 2+3エンベロープ出力（0-10V）</li>
    <li><b>Chain 1+2+3</b>：Chain 1+2+1+3エンベロープ出力（0-10V）</li>
    <li><b>CV</b>：Ch1 CVシーケンサー電圧出力（-10Vから+10V）</li>
    <li><b>Trigger</b>：Ch1トリガー出力（CV値変更時に発火）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li>モジュール幅：12HP</li>
    <li>内部クロック：0.125-128 Hz（指数、パラメータ範囲-3から7）</li>
    <li>パターン長：1-48ステップ</li>
    <li>クロックDiv/Mult：トラック別1/4xから4x（-3から+3）</li>
    <li>クロック出力：10V、1msパルス幅</li>
    <li>CV出力範囲：+-10V</li>
    <li>エンベロープ出力：0-10V</li>
    <li>処理：32ビット浮動小数点</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">右クリックメニュー</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Panel Theme</b>：Light / Darkパネル外観</li>
    <li><b>Attack Time</b>：エンベロープアタックタイム（0.5-20ms、デフォルト：6ms）。全3トラックに影響。</li>
    <li><b>Track Shift</b>：各トラックのユークリッドパターン回転（0-4ステップ）</li>
    <li><b>Custom Pattern</b>：Customモード用のノブシーケンスを定義。1-5の数字文字列を入力（例：「12312345」）。各数字はそのステップで使用するKノブを選択。</li>
    </ul>
controls:
- name: Frequency
  type: param
  desc:
    en: 'Internal clock frequency (0.125-128 Hz, exponential). Range -3 to 7, displayed as 2^param Hz. Default: ~7 Hz.'
    zh: 內部 Clock 頻率（0.125-128 Hz，指數）。參數範圍 -3 到 7，顯示為 2^param Hz。預設：~7 Hz。
    ja: 内部クロック周波数（0.125-128 Hz、指数）。パラメータ範囲-3から7、2^param Hzとして表示。デフォルト：~7 Hz。
- name: Swing
  type: param
  desc:
    en: 'Swing amount via phase offset (0-1, default: 0). Display shows degrees: 180 to 90. Higher values create stronger shuffle feel.'
    zh: 透過相位偏移的 Swing 量（0-1，預設：0）。顯示角度：180 到 90。數值越高 Shuffle 感越強。
    ja: 位相オフセットによるスウィング量（0-1、デフォルト：0）。角度で表示：180から90。値が高いほどシャッフル感が強化。
- name: Length
  type: param
  desc:
    en: 'Global pattern length (1-48 steps, default: 32, snap). Shared across all rhythm tracks and CV sequencers. Clamped to 1-48 in process.'
    zh: 全域 Pattern 長度（1-48 步，預設：32，Snap）。所有節奏軌道和 CV Sequencer 共用。
    ja: グローバルパターン長（1-48ステップ、デフォルト：32、スナップ）。全リズムトラックとCVシーケンサーで共有。
- name: Decay
  type: param
  desc:
    en: 'Envelope decay parameter (0-1, default: 0.3). Non-linear mapping using power curve for natural-sounding decay. Shared across all tracks.'
    zh: Envelope Decay 參數（0-1，預設：0.3）。使用 Power Curve 的非線性映射。所有軌道共用。
    ja: エンベロープディケイパラメータ（0-1、デフォルト：0.3）。パワーカーブの非線形マッピング。全トラック共有。
- name: K1
  type: param
  desc:
    en: 'Voltage knob 1 (-10V to +10V, default: 0V)'
    zh: 電壓旋鈕 1（-10V 至 +10V，預設：0V）
    ja: 電圧ノブ1（-10Vから+10V、デフォルト：0V）
- name: K2
  type: param
  desc:
    en: 'Voltage knob 2 (-10V to +10V, default: 2V)'
    zh: 電壓旋鈕 2（-10V 至 +10V，預設：2V）
    ja: 電圧ノブ2（-10Vから+10V、デフォルト：2V）
- name: K3
  type: param
  desc:
    en: 'Voltage knob 3 (-10V to +10V, default: 4V)'
    zh: 電壓旋鈕 3（-10V 至 +10V，預設：4V）
    ja: 電圧ノブ3（-10Vから+10V、デフォルト：4V）
- name: K4
  type: param
  desc:
    en: 'Voltage knob 4 (-10V to +10V, default: 6V)'
    zh: 電壓旋鈕 4（-10V 至 +10V，預設：6V）
    ja: 電圧ノブ4（-10Vから+10V、デフォルト：6V）
- name: K5
  type: param
  desc:
    en: 'Voltage knob 5 (-10V to +10V, default: 8V)'
    zh: 電壓旋鈕 5（-10V 至 +10V，預設：8V）
    ja: 電圧ノブ5（-10Vから+10V、デフォルト：8V）
- name: Mode
  type: param
  desc:
    en: 'Ch1 pattern mode (0-5, default: 1 = Custom). 0: Sequential, 1: Custom, 2: Jump, 3: Rev Sequential, 4: Rev Custom, 5: Rev Jump.'
    zh: 'Ch1 Pattern 模式（0-5，預設：1 = Custom）。0: Sequential、1: Custom、2: Jump、3: Rev Sequential、4: Rev Custom、5: Rev Jump。'
    ja: 'Ch1パターンモード（0-5、デフォルト：1 = Custom）。0: Sequential、1: Custom、2: Jump、3: Rev Sequential、4: Rev Custom、5: Rev Jump。'
- name: Density
  type: param
  desc:
    en: 'Controls the number of active K knobs (0-1, default: 0.5 = 4 knobs). 0-0.2: 2, 0.2-0.4: 3, 0.4-0.6: 4, 0.6-1.0: 5.'
    zh: '控制活動 K 旋鈕數量（0-1，預設：0.5 = 4 個）。0-0.2: 2 個、0.2-0.4: 3 個、0.4-0.6: 4 個、0.6-1.0: 5 個。'
    ja: 'アクティブKノブ数を制御（0-1、デフォルト：0.5 = 4個）。0-0.2: 2個、0.2-0.4: 3個、0.4-0.6: 4個、0.6-1.0: 5個。'
- name: Chaos
  type: param
  desc:
    en: 'Randomization amount (0-100%, default: 0%). >50% selects knobs outside DENSITY range.'
    zh: 隨機化量（0-100%，預設：0%）。>50% 時選擇 DENSITY 範圍外的旋鈕。
    ja: ランダム化量（0-100%、デフォルト：0%）。>50%でDENSITY範囲外のノブを選択。
- name: Clock Source
  type: param
  desc:
    en: 'Ch1 clock source selector (0-6, default: 1 = T1). Options: LFO, T1, T2, T3, 12, 23, 1213.'
    zh: 'Ch1 Clock 來源選擇器（0-6，預設：1 = T1）。選項：LFO、T1、T2、T3、12、23、1213。'
    ja: 'Ch1クロックソースセレクター（0-6、デフォルト：1 = T1）。オプション：LFO、T1、T2、T3、12、23、1213。'
- name: T1 Fill
  type: param
  desc:
    en: 'Track 1 rhythm density (0-100%, default: 100%). Converted to integer hit count based on pattern length.'
    zh: Track 1 節奏密度（0-100%，預設：100%）。根據 Pattern 長度轉換為整數 Hit 數。
    ja: トラック1リズム密度（0-100%、デフォルト：100%）。パターン長に基づき整数ヒット数に変換。
- name: T1 Div/Mult
  type: param
  desc:
    en: 'Track 1 clock division/multiplication (-3 to +3, default: 0 = 1x). Snap-enabled.'
    zh: Track 1 Clock Division/Multiplication（-3 到 +3，預設：0 = 1x）。Snap 啟用。
    ja: トラック1クロック分割/倍増（-3から+3、デフォルト：0 = 1x）。スナップ有効。
- name: T2 Fill
  type: param
  desc:
    en: 'Track 2 rhythm density (0-100%, default: 100%).'
    zh: Track 2 節奏密度（0-100%，預設：100%）。
    ja: トラック2リズム密度（0-100%、デフォルト：100%）。
- name: T2 Div/Mult
  type: param
  desc:
    en: 'Track 2 clock division/multiplication (-3 to +3, default: 0 = 1x). Snap-enabled.'
    zh: Track 2 Clock Division/Multiplication（-3 到 +3，預設：0 = 1x）。Snap 啟用。
    ja: トラック2クロック分割/倍増（-3から+3、デフォルト：0 = 1x）。スナップ有効。
- name: T3 Fill
  type: param
  desc:
    en: 'Track 3 rhythm density (0-100%, default: 100%).'
    zh: Track 3 節奏密度（0-100%，預設：100%）。
    ja: トラック3リズム密度（0-100%、デフォルト：100%）。
- name: T3 Div/Mult
  type: param
  desc:
    en: 'Track 3 clock division/multiplication (-3 to +3, default: 0 = 1x). Snap-enabled.'
    zh: Track 3 Clock Division/Multiplication（-3 到 +3，預設：0 = 1x）。Snap 啟用。
    ja: トラック3クロック分割/倍増（-3から+3、デフォルト：0 = 1x）。スナップ有効。
- name: T1 Trigger
  type: output
  desc:
    en: Track 1 envelope output (0-10V)
    zh: Track 1 Envelope 輸出（0-10V）
    ja: トラック1エンベロープ出力（0-10V）
- name: T2 Trigger
  type: output
  desc:
    en: Track 2 envelope output (0-10V)
    zh: Track 2 Envelope 輸出（0-10V）
    ja: トラック2エンベロープ出力（0-10V）
- name: T3 Trigger
  type: output
  desc:
    en: Track 3 envelope output (0-10V)
    zh: Track 3 Envelope 輸出（0-10V）
    ja: トラック3エンベロープ出力（0-10V）
- name: Reset
  type: output
  desc:
    en: Reset output pulse (generated on manual/auto reset)
    zh: Reset 輸出 Pulse（手動/自動 Reset 時產生）
    ja: リセット出力パルス（手動/自動リセット時に生成）
- name: Clock
  type: output
  desc:
    en: Master clock output (1ms pulse, post-swing)
    zh: 主 Clock 輸出（1ms Pulse，Swing 後）
    ja: マスタークロック出力（1msパルス、スウィング後）
- name: Chain 1+2
  type: output
  desc:
    en: Chain 1+2 envelope output (0-10V)
    zh: Chain 1+2 Envelope 輸出（0-10V）
    ja: Chain 1+2エンベロープ出力（0-10V）
- name: Chain 2+3
  type: output
  desc:
    en: Chain 2+3 envelope output (0-10V)
    zh: Chain 2+3 Envelope 輸出（0-10V）
    ja: Chain 2+3エンベロープ出力（0-10V）
- name: Chain 1+2+3
  type: output
  desc:
    en: Chain 1+2+1+3 envelope output (0-10V)
    zh: Chain 1+2+1+3 Envelope 輸出（0-10V）
    ja: Chain 1+2+1+3エンベロープ出力（0-10V）
- name: CV
  type: output
  desc:
    en: Ch1 CV sequencer voltage output (-10V to +10V)
    zh: Ch1 CV Sequencer 電壓輸出（-10V 至 +10V）
    ja: Ch1 CVシーケンサー電圧出力（-10Vから+10V）
- name: Trigger
  type: output
  desc:
    en: Ch1 trigger output (fires when CV value changes)
    zh: Ch1 Trigger 輸出（CV 值變更時觸發）
    ja: Ch1トリガー出力（CV値変更時に発火）
- name: Manual Reset
  type: param
  desc:
    en: 'Button to reset all tracks and sequencers to initial state (0-1, default: 0).'
    zh: 按鈕，重置所有軌道與 Sequencer 至初始狀態（0-1，預設：0）。
    ja: 全トラックとシーケンサーを初期状態にリセットするボタン（0-1、デフォルト：0）。
- name: Ch2 Clock Source
  type: param
  desc:
    en: 'Clock source for Ch2 (0-6, default: 2 = T2). Same options as Ch1.'
    zh: Ch2 的 Clock 來源（0-6，預設：2 = T2）。與 Ch1 相同選項。
    ja: Ch2のクロックソース（0-6、デフォルト：2 = T2）。Ch1と同じオプション。
- name: Ch2 Mode
  type: param
  desc:
    en: 'Pattern mode for Ch2 (0-5, default: 1 = Custom). Same modes as Ch1.'
    zh: Ch2 的 Pattern 模式（0-5，預設：1 = Custom）。與 Ch1 相同模式。
    ja: Ch2のパターンモード（0-5、デフォルト：1 = Custom）。Ch1と同じモード。
- name: Ch2 Density
  type: param
  desc:
    en: 'Active knob count for Ch2 (0-1, default: 0.5).'
    zh: Ch2 的活動旋鈕數（0-1，預設：0.5）。
    ja: Ch2のアクティブノブ数（0-1、デフォルト：0.5）。
- name: Ch2 CVD Time/Attenuation
  type: param
  desc:
    en: 'CV delay time/attenuation for Ch2 (0-1, default: 0). When Ch2 CV input is connected, attenuates the external CV signal.'
    zh: Ch2 的 CV Delay 時間/衰減（0-1，預設：0）。當 Ch2 CV 輸入連接時，衰減外部 CV 訊號。
    ja: Ch2のCVディレイ時間/アッテネーション（0-1、デフォルト：0）。Ch2 CV入力接続時に外部CV信号をアッテネート。
- name: Ch2 Step Delay
  type: param
  desc:
    en: 'Step delay for Ch2 (0-5, default: 0, snap). Delays Ch2 output by N steps, creating canon/echo effects.'
    zh: Ch2 的步進延遲（0-5，預設：0，Snap）。將 Ch2 輸出延遲 N 步，產生卡農/迴音效果。
    ja: Ch2のステップディレイ（0-5、デフォルト：0、スナップ）。Ch2出力をNステップ遅延、カノン/エコー効果を生成。
- name: Ch3 Clock Source
  type: param
  desc:
    en: 'Clock source for Ch3 (0-6, default: 3 = T3). Same options as Ch1.'
    zh: Ch3 的 Clock 來源（0-6，預設：3 = T3）。與 Ch1 相同選項。
    ja: Ch3のクロックソース（0-6、デフォルト：3 = T3）。Ch1と同じオプション。
- name: Ch3 Mode
  type: param
  desc:
    en: 'Pattern mode for Ch3 (0-5, default: 1 = Custom). Same modes as Ch1.'
    zh: Ch3 的 Pattern 模式（0-5，預設：1 = Custom）。與 Ch1 相同模式。
    ja: Ch3のパターンモード（0-5、デフォルト：1 = Custom）。Ch1と同じモード。
- name: Ch3 Density
  type: param
  desc:
    en: 'Active knob count for Ch3 (0-1, default: 0.5).'
    zh: Ch3 的活動旋鈕數（0-1，預設：0.5）。
    ja: Ch3のアクティブノブ数（0-1、デフォルト：0.5）。
- name: Ch3 CVD Time/Attenuation
  type: param
  desc:
    en: 'CV delay time/attenuation for Ch3 (0-1, default: 0). When Ch3 CV input is connected, attenuates the external CV signal.'
    zh: Ch3 的 CV Delay 時間/衰減（0-1，預設：0）。當 Ch3 CV 輸入連接時，衰減外部 CV 訊號。
    ja: Ch3のCVディレイ時間/アッテネーション（0-1、デフォルト：0）。Ch3 CV入力接続時に外部CV信号をアッテネート。
- name: Ch3 Step Delay
  type: param
  desc:
    en: 'Step delay for Ch3 (0-5, default: 0, snap). Delays Ch3 output by N steps.'
    zh: Ch3 的步進延遲（0-5，預設：0，Snap）。將 Ch3 輸出延遲 N 步。
    ja: Ch3のステップディレイ（0-5、デフォルト：0、スナップ）。Ch3出力をNステップ遅延。
- name: Clock CV Attenuverter
  type: param
  desc:
    en: 'Attenuverter for Clock CV input (-1 to +1, default: 0). Scales the incoming CV before modulating the clock frequency.'
    zh: Clock CV 輸入的 Attenuverter（-1 至 +1，預設：0）。在調變 Clock 頻率前縮放輸入 CV。
    ja: Clock CV入力のアッテニュバーター（-1から+1、デフォルト：0）。クロック周波数変調前に入力CVをスケール。
- name: Clock CV
  type: input
  desc:
    en: CV input for clock frequency modulation (+-10V), scaled by Clock CV Attenuverter.
    zh: Clock 頻率調變 CV 輸入（+-10V），由 Clock CV Attenuverter 縮放。
    ja: クロック周波数変調CV入力（+-10V）、Clock CV Attenuverterでスケール。
- name: Ch2 CV
  type: input
  desc:
    en: External CV input for Ch2 sequencer, attenuated by Ch2 CVD Time/Attenuation.
    zh: Ch2 Sequencer 的外部 CV 輸入，由 Ch2 CVD Time/Attenuation 衰減。
    ja: Ch2シーケンサーの外部CV入力、Ch2 CVD Time/Attenuationでアッテネート。
- name: Ch3 CV
  type: input
  desc:
    en: External CV input for Ch3 sequencer, attenuated by Ch3 CVD Time/Attenuation.
    zh: Ch3 Sequencer 的外部 CV 輸入，由 Ch3 CVD Time/Attenuation 衰減。
    ja: Ch3シーケンサーの外部CV入力、Ch3 CVD Time/Attenuationでアッテネート。
- name: Ch2 CV
  type: output
  desc:
    en: Ch2 CV sequencer voltage output (-10V to +10V).
    zh: Ch2 CV Sequencer 電壓輸出（-10V 至 +10V）。
    ja: Ch2 CVシーケンサー電圧出力（-10Vから+10V）。
- name: Ch2 Trigger
  type: output
  desc:
    en: Ch2 Trigger output (fires when CV value changes).
    zh: Ch2 Trigger 輸出（CV 值變更時觸發）。
    ja: Ch2トリガー出力（CV値変更時に発火）。
- name: Ch3 CV
  type: output
  desc:
    en: Ch3 CV sequencer voltage output (-10V to +10V).
    zh: Ch3 CV Sequencer 電壓輸出（-10V 至 +10V）。
    ja: Ch3 CVシーケンサー電圧出力（-10Vから+10V）。
- name: Ch3 Trigger
  type: output
  desc:
    en: Ch3 Trigger output (fires when CV value changes).
    zh: Ch3 Trigger 輸出（CV 值變更時觸發）。
    ja: Ch3トリガー出力（CV値変更時に発火）。
