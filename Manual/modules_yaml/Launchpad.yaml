slug: Launchpad
name: Launchpad
hp: 40
wide: true
alt: Launchpad
description:
  en: 8x8 grid audio/CV looper with session-style clip launching, scene triggers, and send/return routing
  zh: 8x8 Grid Audio/CV Looper，具備 Session 風格 Clip 啟動、Scene 觸發與 Send/Return Routing
  ja: 8x8グリッドAudio/CVルーパー、セッションスタイルクリップランチ、シーントリガー、センド/リターンルーティング対応
features:
  en:
    - 64 recordable cells (8 rows x 8 columns)
    - Up to 10 seconds recording per cell
    - Quantized launch and stop
    - 8 scene trigger buttons
    - Stereo send A/B with returns
  zh:
    - 64 個可錄製單元格（8 列 x 8 欄）
    - 每格最長 10 秒錄音
    - 量化 Launch 與 Stop
    - 8 個 Scene 觸發按鈕
    - Stereo Send A/B 與 Return
  ja:
    - 64個の録音可能セル（8行 x 8列）
    - セルあたり最大10秒録音
    - クオンタイズランチ・ストップ
    - 8シーントリガーボタン
    - ステレオ Send A/B と Return
manual_html_raw:
  en: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>

    <p style="margin-bottom: 1rem;">Session-style grid looper inspired by Ableton Live''s clip launching workflow. Features an 8x8 grid of recordable cells, each capable of storing up to 10 seconds of audio or CV. Includes per-row mixer controls with stereo send/return routing for external effects processing.</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Grid Cells</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Recording</b>: Click empty cell to start recording from row input. Click again or wait for max length to stop.</li>

    <li><b>Playback</b>: Click recorded cell to start playback. In session mode, only one cell per row plays at a time.</li>

    <li><b>Stop</b>: Click playing cell to stop. Playback stops at quantize boundary if enabled.</li>

    <li><b>Clear</b>: Hold cell for 1 second to clear recording</li>

    <li><b>Move</b>: Drag cell to another location to move content</li>

    <li><b>Copy</b>: Shift+drag to copy content to new location</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Cell States</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Empty</b>: Dark gray, no content</li>

    <li><b>Has Content</b>: Brown, stopped with recording</li>

    <li><b>Playing</b>: Teal/cyan, currently playing with waveform and playhead</li>

    <li><b>Recording</b>: Red-brown with progress bar at bottom</li>

    <li><b>Queued</b>: Gold/yellow, waiting for quantize boundary to start</li>

    <li><b>Stop Queued</b>: Dark brown, waiting to stop</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Quantize Options</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Free</b>: Immediate launch/stop, no quantization</li>

    <li><b>1</b>: Launch on next clock</li>

    <li><b>8</b>: Launch on next 8-clock boundary</li>

    <li><b>16</b>: Launch on next 16-clock boundary</li>

    <li><b>32</b>: Launch on next 32-clock boundary</li>

    <li><b>64</b>: Launch on next 64-clock boundary</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Scene Triggers</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>SCENE 1-8</b>: Trigger all cells in corresponding column simultaneously</li>

    <li><b>Behavior</b>: Launches one cell per row from the selected column</li>

    <li><b>CV Trigger</b>: Each scene has trigger input for external control</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Row Mixer</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>SEND A</b>: Send level to effect chain A (0-100%)</li>

    <li><b>SEND B</b>: Send level to effect chain B (0-100%)</li>

    <li><b>PAN</b>: Stereo panning (-1 = full left, 0 = center, +1 = full right)</li>

    <li><b>LEVEL</b>: Output level for this row (0-100%)</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Loop Crossfade</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Automatic</b>: Last 96 samples crossfade with first 96 samples</li>

    <li><b>Minimum Length</b>: Crossfade only applies if recording exceeds 192 samples</li>

    <li><b>Purpose</b>: Eliminates clicks at loop boundaries</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Inputs</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>CLOCK</b>: Sync clock for quantized launching</li>

    <li><b>RESET</b>: Reset clock counter</li>

    <li><b>ROW 1-8</b>: Audio/CV input for each row (recording source)</li>

    <li><b>SCENE 1-8 TRIG</b>: CV trigger for scene launching</li>

    <li><b>STOP ALL TRIG</b>: Stop all playing cells</li>

    <li><b>RETURN A L/R</b>: Stereo return from effect chain A</li>

    <li><b>RETURN B L/R</b>: Stereo return from effect chain B</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>ROW 1-8</b>: Direct output from each row (pre-mixer)</li>

    <li><b>SEND A L/R</b>: Stereo send to effect chain A</li>

    <li><b>SEND B L/R</b>: Stereo send to effect chain B</li>

    <li><b>MIX L/R</b>: Main stereo output (all rows mixed with pan and level)</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Visual Feedback</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Waveform</b>: Downsampled waveform display in recorded cells</li>

    <li><b>Playhead</b>: White vertical line showing current playback position</li>

    <li><b>Clock Counter</b>: Bottom-right corner shows recording length in clocks</li>

    <li><b>Progress Bar</b>: Red bar at bottom during recording</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>

    <ul style="padding-left: 1.5rem;">

    <li>Module width: 40HP</li>

    <li>Grid size: 8 rows x 8 columns (64 cells)</li>

    <li>Max recording: 480,000 samples (~10 seconds at 48kHz)</li>

    <li>Crossfade length: 96 samples (~2ms at 48kHz)</li>

    <li>Waveform cache: 64 samples per display point</li>

    <li>Processing: 32-bit floating point</li>

    <li><b>Quantize</b>: Scene trigger quantize mode. Options: Free (immediate), 1, 8, 16, 32, 64 (steps). Controls when scene changes take effect relative to clock.</li>

    <li><b>Return A Left</b>: Left channel return input for Send/Return bus A.</li>

    <li><b>Return A Right</b>: Right channel return input for Send/Return bus A.</li>

    <li><b>Return B Left</b>: Left channel return input for Send/Return bus B.</li>

    <li><b>Return B Right</b>: Right channel return input for Send/Return bus B.</li>

    <li><b>Mix Left</b>: Main stereo mix left output.</li>

    <li><b>Mix Right</b>: Main stereo mix right output.</li>

    <li><b>Row</b>: Audio input/output per row. Each row is an independent loop recorder/player.</li>

    <li><b>Scene</b>: Scene buttons trigger different scene configurations. Can be CV-triggered.</li>

    </ul>'
  zh: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>

    <p style="margin-bottom: 1rem;">靈感來自 Ableton Live 的 Clip Launch 工作流程的 Session 風格 Grid Looper。具備 8x8 Grid 的可錄製單元格，每格可儲存最長 10 秒的 Audio 或 CV。包含每列的 Mixer 控制，具備 Stereo Send/Return Routing 用於外部效果處理。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Grid 單元格</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>錄製</b>: 點擊空格開始從列輸入錄製。再次點擊或等待達到最大長度停止。</li>

    <li><b>播放</b>: 點擊已錄製的格子開始播放。Session 模式下每列同時只有一格播放。</li>

    <li><b>停止</b>: 點擊正在播放的格子停止。若啟用量化，在量化邊界停止。</li>

    <li><b>清除</b>: 長按格子 1 秒清除錄音</li>

    <li><b>移動</b>: 拖曳格子到其他位置移動內容</li>

    <li><b>複製</b>: Shift+拖曳複製內容到新位置</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">單元格狀態</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>空</b>: 深灰色，無內容</li>

    <li><b>有內容</b>: 棕色，已停止但有錄音</li>

    <li><b>播放中</b>: 青綠色，顯示波形與播放頭</li>

    <li><b>錄製中</b>: 紅棕色，底部有進度條</li>

    <li><b>等待中</b>: 金黃色，等待量化邊界啟動</li>

    <li><b>停止等待中</b>: 深棕色，等待停止</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">量化選項</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Free</b>: 立即 Launch/Stop，無量化</li>

    <li><b>1</b>: 在下一個 Clock 啟動</li>

    <li><b>8</b>: 在下一個 8-Clock 邊界啟動</li>

    <li><b>16</b>: 在下一個 16-Clock 邊界啟動</li>

    <li><b>32</b>: 在下一個 32-Clock 邊界啟動</li>

    <li><b>64</b>: 在下一個 64-Clock 邊界啟動</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Scene 觸發</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>SCENE 1-8</b>: 同時觸發對應欄中的所有格子</li>

    <li><b>行為</b>: 從選定欄啟動每列一格</li>

    <li><b>CV 觸發</b>: 每個 Scene 有 Trigger 輸入用於外部控制</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">列 Mixer</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>SEND A</b>: 發送至效果鏈 A 的音量（0-100%）</li>

    <li><b>SEND B</b>: 發送至效果鏈 B 的音量（0-100%）</li>

    <li><b>PAN</b>: Stereo Panning（-1 = 全左，0 = 中央，+1 = 全右）</li>

    <li><b>LEVEL</b>: 該列的輸出音量（0-100%）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Loop Crossfade</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>自動</b>: 最後 96 Sample 與最前 96 Sample Crossfade</li>

    <li><b>最小長度</b>: 只有錄音超過 192 Sample 時應用 Crossfade</li>

    <li><b>用途</b>: 消除 Loop 邊界的爆音</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸入</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>CLOCK</b>: 用於量化 Launch 的同步 Clock</li>

    <li><b>RESET</b>: 重置 Clock 計數器</li>

    <li><b>ROW 1-8</b>: 每列的 Audio/CV 輸入（錄製來源）</li>

    <li><b>SCENE 1-8 TRIG</b>: Scene Launch 的 CV Trigger</li>

    <li><b>STOP ALL TRIG</b>: 停止所有播放中的格子</li>

    <li><b>RETURN A L/R</b>: 來自效果鏈 A 的 Stereo Return</li>

    <li><b>RETURN B L/R</b>: 來自效果鏈 B 的 Stereo Return</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>ROW 1-8</b>: 每列的直接輸出（pre-mixer）</li>

    <li><b>SEND A L/R</b>: 發送至效果鏈 A 的 Stereo 輸出</li>

    <li><b>SEND B L/R</b>: 發送至效果鏈 B 的 Stereo 輸出</li>

    <li><b>MIX L/R</b>: 主 Stereo 輸出（所有列混合並應用 Pan 與 Level）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">視覺回饋</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>波形</b>: 已錄製格子中顯示降採樣波形</li>

    <li><b>播放頭</b>: 白色垂直線顯示當前播放位置</li>

    <li><b>Clock 計數</b>: 右下角顯示錄音長度（Clock 數）</li>

    <li><b>進度條</b>: 錄製期間底部紅色條</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>

    <ul style="padding-left: 1.5rem;">

    <li>模組寬度：40HP</li>

    <li>Grid 大小：8 列 x 8 欄（64 格）</li>

    <li>最大錄音：480,000 Sample（48kHz 時約 10 秒）</li>

    <li>Crossfade 長度：96 Sample（48kHz 時約 2ms）</li>

    <li>波形快取：每顯示點 64 Sample</li>

    <li>處理：32-bit 浮點</li>

    <li><b>Quantize</b>: Scene 觸發量化模式。選項：Free（立即）、1、8、16、32、64（步）。控制場景變更相對於 Clock 何時生效。</li>

    <li><b>Return A Left</b>: Send/Return Bus A 的左聲道 Return 輸入。</li>

    <li><b>Return A Right</b>: Send/Return Bus A 的右聲道 Return 輸入。</li>

    <li><b>Return B Left</b>: Send/Return Bus B 的左聲道 Return 輸入。</li>

    <li><b>Return B Right</b>: Send/Return Bus B 的右聲道 Return 輸入。</li>

    <li><b>Mix Left</b>: 主立體聲混音左輸出。</li>

    <li><b>Mix Right</b>: 主立體聲混音右輸出。</li>

    <li><b>Row</b>: 每列的 Audio 輸入/輸出。每列為獨立的 Loop 錄音/播放器。</li>

    <li><b>Scene</b>: Scene 按鈕觸發不同的場景配置。可由 CV 觸發。</li>

    </ul>

    <div style="display:none"><ul>

    <li><b>Recording</b>: 點擊空白格子開始從該列輸入錄音。再次點擊或等待最大長度時自動停止。錄音中顯示為紅棕色，底部有進度條</li>

    <li><b>Playback</b>: 點擊已錄製的格子開始播放。Session 模式下每列同時只有一格播放。</li>

    <li><b>Stop</b>: 點擊正在播放的格子停止播放。若啟用量化，播放會在量化邊界停止。</li>

    <li><b>Clear</b>: 長按格子 1 秒清除錄音</li>

    <li><b>Move</b>: 拖曳格子到其他位置移動內容</li>

    <li><b>Copy</b>: Shift+拖曳複製內容到新位置</li>

    <li><b>Empty</b>: 深灰色，無內容</li>

    <li><b>Has Content</b>: 棕色，已停止但有錄音</li>

    <li><b>Playing</b>: 青綠色，正在播放，顯示波形與播放頭</li>

    <li><b>Queued</b>: 金黃色，等待量化邊界啟動</li>

    <li><b>Stop Queued</b>: 深棕色，等待停止</li>

    <li><b>Behavior</b>: 從選定欄啟動每列一格</li>

    <li><b>CV Trigger</b>: 每個 Scene 有 Trigger 輸入用於外部控制</li>

    <li><b>Automatic</b>: 最後 96 Sample 與最前 96 Sample 自動 Crossfade</li>

    <li><b>Minimum Length</b>: 只有錄音超過 192 Sample 時應用 Crossfade</li>

    <li><b>Purpose</b>: 消除 Loop 邊界的爆音</li>

    <li><b>Waveform</b>: 已錄製格子中顯示降取樣波形</li>

    <li><b>Playhead</b>: 白色垂直線顯示目前播放位置</li>

    <li><b>Clock Counter</b>: 右下角以 Clock 數顯示錄音長度</li>

    <li><b>Progress Bar</b>: 錄音期間底部顯示紅色進度條</li>

    </ul></div>'
  ja: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>

    <p style="margin-bottom: 1rem;">Ableton Liveのクリップランチワークフローにインスパイアされたセッションスタイルグリッドルーパー。8x8グリッドの録音可能セルを備え、各セルは最大10秒のAudioまたはCVを保存可能。各行のミキサーコントロールと外部エフェクト処理用ステレオセンド/リターンルーティングを含む。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グリッドセル</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>録音</b>: 空のセルをクリックして行入力から録音開始。再度クリックまたは最大長に達すると停止。</li>

    <li><b>再生</b>: 録音済みセルをクリックで再生開始。セッションモードでは各行1セルのみ同時再生。</li>

    <li><b>停止</b>: 再生中のセルをクリックで停止。クオンタイズ有効時は境界で停止。</li>

    <li><b>クリア</b>: セルを1秒長押しで録音消去</li>

    <li><b>移動</b>: セルを別の場所にドラッグしてコンテンツ移動</li>

    <li><b>コピー</b>: Shift+ドラッグで新しい場所にコピー</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">セル状態</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>空</b>: ダークグレー、コンテンツなし</li>

    <li><b>コンテンツあり</b>: 茶色、録音ありで停止中</li>

    <li><b>再生中</b>: ティール/シアン、波形と再生ヘッド表示</li>

    <li><b>録音中</b>: 赤茶色、下部に進捗バー</li>

    <li><b>待機中</b>: ゴールド/黄色、クオンタイズ境界待ち</li>

    <li><b>停止待機中</b>: ダークブラウン、停止待ち</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クオンタイズオプション</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Free</b>: 即時ランチ/ストップ、クオンタイズなし</li>

    <li><b>1</b>: 次のクロックでランチ</li>

    <li><b>8</b>: 次の8クロック境界でランチ</li>

    <li><b>16</b>: 次の16クロック境界でランチ</li>

    <li><b>32</b>: 次の32クロック境界でランチ</li>

    <li><b>64</b>: 次の64クロック境界でランチ</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">シーントリガー</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>SCENE 1-8</b>: 対応する列の全セルを同時トリガー</li>

    <li><b>動作</b>: 選択列から各行1セルをランチ</li>

    <li><b>CVトリガー</b>: 各シーンに外部制御用トリガー入力</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">行ミキサー</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>SEND A</b>: エフェクトチェーンAへのセンドレベル（0-100%）</li>

    <li><b>SEND B</b>: エフェクトチェーンBへのセンドレベル（0-100%）</li>

    <li><b>PAN</b>: ステレオパンニング（-1 = 全左、0 = 中央、+1 = 全右）</li>

    <li><b>LEVEL</b>: この行の出力レベル（0-100%）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ループクロスフェード</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>自動</b>: 最後の96サンプルと最初の96サンプルをクロスフェード</li>

    <li><b>最小長</b>: 録音が192サンプルを超える場合のみクロスフェード適用</li>

    <li><b>目的</b>: ループ境界でのクリックノイズ除去</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">入力</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>CLOCK</b>: クオンタイズランチ用同期クロック</li>

    <li><b>RESET</b>: クロックカウンターリセット</li>

    <li><b>ROW 1-8</b>: 各行のAudio/CV入力（録音ソース）</li>

    <li><b>SCENE 1-8 TRIG</b>: シーンランチ用CVトリガー</li>

    <li><b>STOP ALL TRIG</b>: 全再生セル停止</li>

    <li><b>RETURN A L/R</b>: エフェクトチェーンAからのステレオリターン</li>

    <li><b>RETURN B L/R</b>: エフェクトチェーンBからのステレオリターン</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>ROW 1-8</b>: 各行のダイレクト出力（プリミキサー）</li>

    <li><b>SEND A L/R</b>: エフェクトチェーンAへのステレオセンド</li>

    <li><b>SEND B L/R</b>: エフェクトチェーンBへのステレオセンド</li>

    <li><b>MIX L/R</b>: メインステレオ出力（全行ミックス、PanとLevel適用）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ビジュアルフィードバック</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>波形</b>: 録音済みセルにダウンサンプル波形表示</li>

    <li><b>再生ヘッド</b>: 現在の再生位置を示す白い垂直線</li>

    <li><b>クロックカウンター</b>: 右下に録音長（クロック数）表示</li>

    <li><b>進捗バー</b>: 録音中下部に赤いバー</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>

    <ul style="padding-left: 1.5rem;">

    <li>モジュール幅：40HP</li>

    <li>グリッドサイズ：8行 x 8列（64セル）</li>

    <li>最大録音：480,000サンプル（48kHzで約10秒）</li>

    <li>クロスフェード長：96サンプル（48kHzで約2ms）</li>

    <li>波形キャッシュ：表示点あたり64サンプル</li>

    <li>処理：32ビット浮動小数点</li>

    <li><b>Quantize</b>: シーントリガークオンタイズモード。オプション: Free（即時）、1、8、16、32、64（ステップ）。クロックに対するシーン変更のタイミングを制御。</li>

    <li><b>Return A Left</b>: Send/Return Bus Aの左チャンネルリターン入力。</li>

    <li><b>Return A Right</b>: Send/Return Bus Aの右チャンネルリターン入力。</li>

    <li><b>Return B Left</b>: Send/Return Bus Bの左チャンネルリターン入力。</li>

    <li><b>Return B Right</b>: Send/Return Bus Bの右チャンネルリターン入力。</li>

    <li><b>Mix Left</b>: メインステレオミックス左出力。</li>

    <li><b>Mix Right</b>: メインステレオミックス右出力。</li>

    <li><b>Row</b>: 各行のAudio入出力。各行は独立したループレコーダー/プレーヤー。</li>

    <li><b>Scene</b>: シーンボタンで異なるシーン構成をトリガー。CVトリガー対応。</li>

    </ul>

    <div style="display:none"><ul>

    <li><b>Recording</b>: 空格子をクリックして行入力から録音開始。再クリックか最大長さに達すると停止</li>

    <li><b>Playback</b>: 録音済みセルをクリックして再生開始。セッションモードでは各行1セルのみ再生</li>

    <li><b>Stop</b>: 再生中セルをクリックして停止。クォンタイズ有効時は境界で停止</li>

    <li><b>Clear</b>: セルを1秒長押しして録音をクリア</li>

    <li><b>Move</b>: セルをドラッグして別の場所へ移動</li>

    <li><b>Copy</b>: Shift+ドラッグでコンテンツを新しい場所へコピー</li>

    <li><b>Empty</b>: 暗いグレー、コンテンツなし</li>

    <li><b>Has Content</b>: ブラウン、停止中で録音あり</li>

    <li><b>Playing</b>: ティール/シアン、波形とプレイヘッド付きで再生中</li>

    <li><b>Queued</b>: ゴールド/イエロー、クォンタイズ境界での開始待ち</li>

    <li><b>Stop Queued</b>: 暗いブラウン、停止待ち</li>

    <li><b>Behavior</b>: 選択したカラムから各行1セルを起動</li>

    <li><b>CV Trigger</b>: 各シーンに外部制御用トリガー入力あり</li>

    <li><b>Automatic</b>: 最後の96サンプルを最初の96サンプルとクロスフェード</li>

    <li><b>Minimum Length</b>: 録音が192サンプルを超える場合のみクロスフェード適用</li>

    <li><b>Purpose</b>: ループ境界でのクリックを除去</li>

    <li><b>Waveform</b>: 録音済みセルにダウンサンプリングされた波形表示</li>

    <li><b>Playhead</b>: 現在の再生位置を示す白い垂直線</li>

    <li><b>Clock Counter</b>: 右下隅に録音長をクロック数で表示</li>

    <li><b>Progress Bar</b>: 録音中に下部に赤いバー</li>

    </ul></div>'
controls:
  - name: Quantize
    type: param
    desc:
      en: 'Scene trigger quantize mode. Options: Free (immediate), 1, 8, 16, 32, 64 (steps). Controls when scene changes take effect relative to clock.'
      zh: Scene 觸發量化模式。選項：Free（立即）、1、8、16、32、64（步）。控制場景變更相對於 Clock 何時生效。
      ja: 'シーントリガークオンタイズモード。オプション: Free（即時）、1、8、16、32、64（ステップ）。クロックに対するシーン変更のタイミングを制御。'
  - name: Stop All
    type: param
    desc:
      en: Stop all currently playing cells, quantized to the selected quantize mode.
      zh: 停止所有正在播放的格子，依當前 Quantize 模式量化。
      ja: 再生中の全セルを停止。現在の Quantize モードに従ってクオンタイズ。
  - name: Scene 1
    type: param
    desc:
      en: 'Trigger scene 1: launch one cell per row from column 1, quantized to the selected quantize mode.'
      zh: 觸發 Scene 1：從第 1 欄啟動每列一格，依 Quantize 模式量化。
      ja: シーン 1 をトリガー：1 列目から各行1セルをランチ、Quantize モードに従う。
