slug: Facehugger
name: Facehugger
hp: 4
wide: false
alt: Facehugger
description:
  en: Chaos-modulated granular processor with Lorenz attractor modulation and sample-and-hold output
  zh: Chaos 調變 Granular Processor，具備 Lorenz Attractor 調變與 Sample-and-Hold 輸出
  ja: ローレンツアトラクター変調とサンプル&ホールド出力を備えたカオス変調グラニュラープロセッサー
features:
  en:
  - 16-grain granular processor
  - Lorenz attractor chaos modulation
  - Sample-and-hold chaos output
  - Auto-patch with YAMANOTE
  - Polyphonic up to 16 channels
  zh:
  - 16-Grain Granular Processor
  - Lorenz Attractor Chaos 調變
  - Sample-and-Hold Chaos 輸出
  - 與 YAMANOTE 自動配線
  - Polyphonic 最多 16 聲道
  ja:
  - 16グレイン・グラニュラープロセッサー
  - ローレンツアトラクターカオス変調
  - サンプル&ホールドカオス出力
  - YAMANOTEとの自動パッチ
  - ポリフォニック最大16チャンネル
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Granular processor with Lorenz attractor chaos modulation. Part of the Alien trilogy effects series (Runner, Facehugger, Ovomorph). Features grain size, density, and position controls with chaos-driven parameter modulation. Designed to work with YAMANOTE for send/return routing.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow</h3>
    <p style="margin-bottom: 1rem;">Input → Grain Buffer → Grain Playback → [Chaos Modulation] → Wet/Dry Mix → Output. Audio is continuously written to a circular buffer. Grains read from this buffer with independent playback positions, creating time-stretched and textural effects.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Granular Parameters</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Size</b>: Grain duration (1-100ms, default: 30%). Small = glitchy textures, large = smooth time-stretch.</li>
    <li><b>Break</b>: Grain density/trigger rate (0-100%, default: 40%). 0 = sparse grains, 100% = up to 51 grains/second.</li>
    <li><b>Shift</b>: Buffer read position offset (0-100%, default: 50%). Controls where in the buffer grains start playback.</li>
    <li><b>Mix</b>: Wet/dry balance (0-100%, default: 50%). CV adds ±10%.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Grain Engine</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Max Grains</b>: 16 simultaneous grains</li>
    <li><b>Buffer Size</b>: 8,192 samples (~170ms at 48kHz)</li>
    <li><b>Envelope</b>: Raised cosine (Hanning) window for smooth crossfades</li>
    <li><b>Output Normalization</b>: Amplitude scales with active grain count to prevent clipping</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaos Generator</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Algorithm</b>: Lorenz strange attractor differential equations</li>
    <li><b>Chaos</b>: Modulation depth (0-100%, default: 0%). Controls chaos effects on granular parameters.</li>
    <li><b>Rate</b>: Chaos evolution speed (0.01-2.0x, default: 0.5x). Higher = faster parameter changes.</li>
    <li><b>Chaos Effects</b>: Position ±20 samples, 30% chance reverse playback, 20% chance octave shift (0.5× or 2×)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sample & Hold</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>S&H Output</b>: Stepped chaos signal sampled at RATE × 10 Hz</li>
    <li><b>Range</b>: 0-5V CV output</li>
    <li><b>Use</b>: External modulation source with quantized, stepped behavior</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Auto-Patch with YAMANOTE</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Detection</b>: When placed directly right of YAMANOTE, auto-connects to send/return</li>
    <li><b>Channel Selection</b>: Uses Channel A if single effect, Channel B if part of chain</li>
    <li><b>Chain Support</b>: Multiple effects (Runner, Facehugger, Ovomorph) auto-distribute across channels</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Inputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: Left stereo input</li>
    <li><b>Right Audio</b>: Right stereo input (normalizes to Left if disconnected)</li>
    <li><b>Size CV</b>: Grain size modulation</li>
    <li><b>Break CV</b>: Grain density modulation</li>
    <li><b>Shift CV</b>: Buffer position modulation</li>
    <li><b>Mix CV</b>: Wet/dry modulation</li>
    <li><b>Chaos CV</b>: Chaos depth modulation</li>
    <li><b>Rate CV</b>: Chaos speed modulation</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: Left processed output (polyphonic)</li>
    <li><b>Right Audio</b>: Right processed output (polyphonic)</li>
    <li><b>Chaos CV</b>: Raw chaos signal 0-5V (polyphonic)</li>
    <li><b>Sample &amp; Hold CV</b>: Sample-and-hold chaos 0-5V (polyphonic)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Module width: 4HP</li>
    <li>Grain buffer: 8,192 samples (~170ms at 48kHz)</li>
    <li>Max grains: 16 simultaneous</li>
    <li>Grain envelope: Hanning window</li>
    <li>Chaos algorithm: Lorenz attractor</li>
    <li>Polyphony: Up to 16 channels</li>
    <li>Processing: 32-bit floating point</li>
    <li><b>Sample & Hold CV</b>: Sample & Hold output from Chaos section. Samples random values at Chaos Rate, with slew limiting.</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">具備 Lorenz Attractor Chaos 調變的 Granular Processor。屬於 Alien 三部曲效果器系列（Runner、Facehugger、Ovomorph）。具備 Grain 大小、密度和位置控制，以及 Chaos 驅動的參數調變。設計用於與 YAMANOTE 配合進行 Send/Return Routing。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">訊號流程</h3>
    <p style="margin-bottom: 1rem;">Input → Grain Buffer → Grain Playback → [Chaos 調變] → Wet/Dry Mix → Output。Audio 持續寫入循環 Buffer。Grain 從此 Buffer 以獨立的播放位置讀取，創造 Time-Stretch 和紋理效果。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Granular 參數</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Size</b>: Grain 長度（1-100ms，預設：30%）。小 = Glitchy 質感，大 = 平滑 Time-Stretch。</li>
    <li><b>Break</b>: Grain 密度/觸發速率（0-100%，預設：40%）。0 = 稀疏 Grain，100% = 最多 51 Grain/秒。</li>
    <li><b>Shift</b>: Buffer 讀取位置偏移（0-100%，預設：50%）。控制 Grain 從 Buffer 何處開始播放。</li>
    <li><b>Mix</b>: Wet/Dry 平衡（0-100%，預設：50%）。CV 增加 ±10%。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Grain 引擎</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Max Grains</b>: 16 個同時 Grain</li>
    <li><b>Buffer Size</b>: 8,192 Sample（48kHz 時約 170ms）</li>
    <li><b>Envelope</b>: Raised Cosine（Hanning）視窗，平滑交叉淡化</li>
    <li><b>Output Normalization</b>: 振幅隨活躍 Grain 數量縮放，防止削波</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaos Generator</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Algorithm</b>: Lorenz 奇異吸引子微分方程式</li>
    <li><b>Chaos</b>: 調變深度（0-100%，預設：0%）。控制 Chaos 對 Granular 參數的影響。</li>
    <li><b>Rate</b>: Chaos 演化速度（0.01-2.0x，預設：0.5x）。越高 = 參數變化越快。</li>
    <li><b>Chaos Effects</b>: 位置 ±20 Sample、30% 機率反向播放、20% 機率 Octave Shift（0.5× 或 2×）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sample & Hold</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>S&H Output</b>: 以 RATE × 10 Hz 取樣的階梯 Chaos 訊號</li>
    <li><b>Range</b>: 0-5V CV 輸出</li>
    <li><b>Use</b>: 具有量化、階梯行為的外部調變源</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">與 YAMANOTE 自動配線</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Detection</b>: 當放置在 YAMANOTE 正右方時，自動連接到 Send/Return</li>
    <li><b>Channel Selection</b>: 單一效果器使用 Channel A，鏈式配置使用 Channel B</li>
    <li><b>Chain Support</b>: 多個效果器（Runner、Facehugger、Ovomorph）自動分配到各聲道</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸入</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左聲道 Stereo 輸入</li>
    <li><b>Right Audio</b>: 右聲道 Stereo 輸入（未連接時正規化至 Left）</li>
    <li><b>Size CV</b>: Grain 大小調變</li>
    <li><b>Break CV</b>: Grain 密度調變</li>
    <li><b>Shift CV</b>: Buffer 位置調變</li>
    <li><b>Mix CV</b>: Wet/Dry 調變</li>
    <li><b>Chaos CV</b>: Chaos 深度調變</li>
    <li><b>Rate CV</b>: Chaos 速度調變</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左聲道處理輸出（Polyphonic）</li>
    <li><b>Right Audio</b>: 右聲道處理輸出（Polyphonic）</li>
    <li><b>Chaos CV</b>: 原始 Chaos 訊號 0-5V（Polyphonic）</li>
    <li><b>Sample &amp; Hold CV</b>: Sample-and-Hold Chaos 0-5V（Polyphonic）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>模組寬度：4HP</li>
    <li>Grain Buffer：8,192 Sample（48kHz 時約 170ms）</li>
    <li>最大 Grain 數：16 個同時</li>
    <li>Grain Envelope：Hanning 視窗</li>
    <li>Chaos 演算法：Lorenz Attractor</li>
    <li>Polyphony：最多 16 聲道</li>
    <li>處理：32-bit 浮點</li>
    <li><b>Sample & Hold CV</b>: Chaos 區段的 Sample & Hold 輸出。依 Chaos Rate 取樣隨機值，帶有 Slew 限制。</li>
    </ul>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">ローレンツアトラクターカオス変調を備えたグラニュラープロセッサー。Alienトリロジーエフェクトシリーズ（Runner、Facehugger、Ovomorph）の一つ。グレインサイズ、密度、位置コントロールとカオス駆動パラメータ変調を搭載。YAMANOTEとのセンド/リターンルーティング用に設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">信号フロー</h3>
    <p style="margin-bottom: 1rem;">Input → Grain Buffer → Grain Playback → [Chaos変調] → Wet/Dry Mix → Output。オーディオは循環バッファに継続的に書き込まれます。グレインはこのバッファから独立した再生位置で読み取り、タイムストレッチとテクスチャエフェクトを生成。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グラニュラーパラメータ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Size</b>: グレイン長（1-100ms、デフォルト：30%）。小=グリッチーなテクスチャ、大=スムースなタイムストレッチ。</li>
    <li><b>Break</b>: グレイン密度/トリガーレート（0-100%、デフォルト：40%）。0=まばらなグレイン、100%=最大51グレイン/秒。</li>
    <li><b>Shift</b>: バッファ読み取り位置オフセット（0-100%、デフォルト：50%）。グレインがバッファのどこから再生を開始するかを制御。</li>
    <li><b>Mix</b>: ウェット/ドライバランス（0-100%、デフォルト：50%）。CVで±10%追加。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グレインエンジン</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Max Grains</b>: 16同時グレイン</li>
    <li><b>Buffer Size</b>: 8,192サンプル（48kHzで約170ms）</li>
    <li><b>Envelope</b>: レイズドコサイン（ハニング）ウィンドウでスムースなクロスフェード</li>
    <li><b>Output Normalization</b>: アクティブグレイン数に応じて振幅をスケールしてクリッピング防止</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">カオスジェネレーター</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Algorithm</b>: ローレンツストレンジアトラクター微分方程式</li>
    <li><b>Chaos</b>: 変調深度（0-100%、デフォルト：0%）。カオスがグラニュラーパラメータに与える影響を制御。</li>
    <li><b>Rate</b>: カオス進化速度（0.01-2.0x、デフォルト：0.5x）。高いほどパラメータ変化が速い。</li>
    <li><b>Chaos Effects</b>: 位置±20サンプル、30%の確率で逆再生、20%の確率でオクターブシフト（0.5×または2×）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">サンプル&ホールド</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>S&H Output</b>: RATE × 10 Hzでサンプルされたステップカオス信号</li>
    <li><b>Range</b>: 0-5V CV出力</li>
    <li><b>Use</b>: クオンタイズされたステップ動作の外部変調ソース</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">YAMANOTEとの自動パッチ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Detection</b>: YAMANOTEの直右に配置するとセンド/リターンに自動接続</li>
    <li><b>Channel Selection</b>: 単一エフェクトはChannel A、チェーンの一部はChannel Bを使用</li>
    <li><b>Chain Support</b>: 複数エフェクト（Runner、Facehugger、Ovomorph）が各チャンネルに自動分配</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">入力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左ステレオ入力</li>
    <li><b>Right Audio</b>: 右ステレオ入力（未接続時はLeftに正規化）</li>
    <li><b>Size CV</b>: グレインサイズ変調</li>
    <li><b>Break CV</b>: グレイン密度変調</li>
    <li><b>Shift CV</b>: バッファ位置変調</li>
    <li><b>Mix CV</b>: ウェット/ドライ変調</li>
    <li><b>Chaos CV</b>: カオス深度変調</li>
    <li><b>Rate CV</b>: カオス速度変調</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左処理出力（ポリフォニック）</li>
    <li><b>Right Audio</b>: 右処理出力（ポリフォニック）</li>
    <li><b>Chaos CV</b>: 生カオス信号0-5V（ポリフォニック）</li>
    <li><b>Sample &amp; Hold CV</b>: サンプル&ホールドカオス0-5V（ポリフォニック）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>モジュール幅：4HP</li>
    <li>グレインバッファ：8,192サンプル（48kHzで約170ms）</li>
    <li>最大グレイン数：16同時</li>
    <li>グレインエンベロープ：ハニングウィンドウ</li>
    <li>カオスアルゴリズム：ローレンツアトラクター</li>
    <li>ポリフォニー：最大16チャンネル</li>
    <li>処理：32ビット浮動小数点</li>
    <li><b>Sample & Hold CV</b>: Chaosセクションのサンプル＆ホールド出力。Chaos Rateでランダム値をサンプリングし、スルーリミッティング付き。</li>
    </ul>
controls:
- name: Size
  type: param
  desc:
    en: 'Grain duration (1-100ms, default: 30%). Small = glitchy textures, large = smooth time-stretch.'
    zh: Grain 長度（1-100ms，預設：30%）。小 = Glitchy 質感，大 = 平滑 Time-Stretch。
    ja: グレイン長（1-100ms、デフォルト：30%）。小=グリッチーなテクスチャ、大=スムースなタイムストレッチ。
- name: Break
  type: param
  desc:
    en: 'Grain density/trigger rate (0-100%, default: 40%). 0 = sparse grains, 100% = up to 51 grains/second.'
    zh: Grain 密度/觸發速率（0-100%，預設：40%）。0 = 稀疏 Grain，100% = 最多 51 Grain/秒。
    ja: グレイン密度/トリガーレート（0-100%、デフォルト：40%）。0=まばらなグレイン、100%=最大51グレイン/秒。
- name: Shift
  type: param
  desc:
    en: 'Buffer read position offset (0-100%, default: 50%). Controls where in the buffer grains start playback.'
    zh: Buffer 讀取位置偏移（0-100%，預設：50%）。控制 Grain 從 Buffer 何處開始播放。
    ja: バッファ読み取り位置オフセット（0-100%、デフォルト：50%）。グレインがバッファのどこから再生を開始するかを制御。
- name: Mix
  type: param
  desc:
    en: 'Wet/dry balance (0-100%, default: 50%). CV adds ±10%.'
    zh: Wet/Dry 平衡（0-100%，預設：50%）。CV 增加 ±10%。
    ja: ウェット/ドライバランス（0-100%、デフォルト：50%）。CVで±10%追加。
- name: Chaos
  type: param
  desc:
    en: 'Modulation depth (0-100%, default: 0%). Controls chaos effects on granular parameters.'
    zh: 調變深度（0-100%，預設：0%）。控制 Chaos 對 Granular 參數的影響。
    ja: 変調深度（0-100%、デフォルト：0%）。カオスがグラニュラーパラメータに与える影響を制御。
- name: Rate
  type: param
  desc:
    en: 'Chaos evolution speed (0.01-2.0x, default: 0.5x). Higher = faster parameter changes.'
    zh: Chaos 演化速度（0.01-2.0x，預設：0.5x）。越高 = 參數變化越快。
    ja: カオス進化速度（0.01-2.0x、デフォルト：0.5x）。高いほどパラメータ変化が速い。
- name: Left Audio
  type: input
  desc:
    en: Left stereo input
    zh: 左聲道 Stereo 輸入
    ja: 左ステレオ入力
- name: Right Audio
  type: input
  desc:
    en: Right stereo input (normalizes to Left if disconnected)
    zh: 右聲道 Stereo 輸入（未連接時正規化至 Left）
    ja: 右ステレオ入力（未接続時はLeftに正規化）
- name: Size CV
  type: input
  desc:
    en: Grain size modulation
    zh: Grain 大小調變
    ja: グレインサイズ変調
- name: Break CV
  type: input
  desc:
    en: Grain density modulation
    zh: Grain 密度調變
    ja: グレイン密度変調
- name: Shift CV
  type: input
  desc:
    en: Buffer position modulation
    zh: Buffer 位置調變
    ja: バッファ位置変調
- name: Mix CV
  type: input
  desc:
    en: Wet/dry modulation
    zh: Wet/Dry 調變
    ja: ウェット/ドライ変調
- name: Chaos CV
  type: input
  desc:
    en: Chaos depth modulation
    zh: Chaos 深度調變
    ja: カオス深度変調
- name: Rate CV
  type: input
  desc:
    en: Chaos speed modulation
    zh: Chaos 速度調變
    ja: カオス速度変調
- name: Left Audio
  type: output
  desc:
    en: Left processed output (polyphonic)
    zh: 左聲道處理輸出（Polyphonic）
    ja: 左処理出力（ポリフォニック）
- name: Right Audio
  type: output
  desc:
    en: Right processed output (polyphonic)
    zh: 右聲道處理輸出（Polyphonic）
    ja: 右処理出力（ポリフォニック）
- name: Chaos CV
  type: output
  desc:
    en: Raw chaos signal 0-5V (polyphonic)
    zh: 原始 Chaos 訊號 0-5V（Polyphonic）
    ja: 生カオス信号0-5V（ポリフォニック）
- name: Sample & Hold CV
  type: output
  desc:
    en: Sample & Hold chaos signal 0-5V, sampled at Rate × 10 Hz (polyphonic)
    zh: Sample & Hold Chaos 訊號 0-5V，取樣速率 Rate × 10 Hz（Polyphonic）
    ja: サンプル&ホールドカオス信号0-5V、Rate × 10 Hzでサンプル（ポリフォニック）
