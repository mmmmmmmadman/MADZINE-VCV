    ja: トラック2ディケイ時間0.01-2.0秒（デフォルト：1.0s、単位：s）
- name: Track 2 Shape
  type: param
  desc:
    en: Envelope shape for Track 2 (0-0.99). Controls the curve of the decay phase. 0=linear, higher=more exponential.
    zh: Track 2 的 Envelope 形狀（0-0.99）。控制 Decay 階段的曲線。0=線性，越高=越指數。
    ja: トラック2のエンベロープシェイプ（0-0.99）。ディケイフェーズのカーブを制御。0=リニア、高値=よりエクスポネンシャル。
- name: Track 3 Decay Time
  type: param
