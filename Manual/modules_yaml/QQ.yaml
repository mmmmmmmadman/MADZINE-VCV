slug: QQ
name: Q_Q
hp: 4
wide: false
alt: QQ
description:
  en: Triple decay envelope generator with adjustable S-curve shaping and real-time 3-track oscilloscope display
  zh: 三軌 Decay Envelope 生成器，具備可調 S-curve Shaping 與即時 3 軌 Oscilloscope 顯示
  ja: 調整可能なS-curveシェイピングとリアルタイム3トラックオシロスコープ表示を備えたトリプルディケイエンベロープ生成器
features:
  en:
  - Three decay envelope tracks
  - Real-time oscilloscope display
  - Adjustable curve shaping
  - Individual track triggers
  - Visual waveform comparison
  zh:
  - 三軌 Decay Envelope
  - 即時 Oscilloscope 顯示
  - 可調曲線造型
  - 各軌獨立 Trigger
  - 視覺 Waveform 比較
  ja:
  - 3トラックディケイエンベロープ
  - リアルタイムオシロスコープ表示
  - 調整可能カーブシェイピング
  - トラック別トリガー
  - 視覚的波形比較
manual_html_raw:
  en: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>

    <p style="margin-bottom: 1rem;">Three-track decay envelope generator with real-time oscilloscope display and S-curve shaping algorithm. Each track features independent trigger, decay time with CV modulation, and curve shaping. The oscilloscope display shows all three envelopes simultaneously with colors matching their input cables.</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow</h3>

    <p style="margin-bottom: 1rem;">Trigger → Attack Phase → Decay Phase → Output. Each track runs independently with its own envelope state machine tracking attack/decay phases and current level.</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">S-Curve Envelope Algorithm</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Implementation</b>: Uses smoothDecayEnvelope() with dual-k interpolation for natural envelope shapes</li>

    <li><b>Front K</b>: Controls initial curve steepness, ranging -0.9 to -0.4</li>

    <li><b>Back K</b>: Controls tail curve, ranging -1.0 to 0.6</li>

    <li><b>K Crossfade</b>: Linear interpolation from frontK to backK as envelope progresses</li>

    <li><b>Shape Behavior</b>: Weighted interpolation between target and current, with k varying through decay</li>

    <li><b>At Shape 0</b>: Linear decay (frontK ≈ -0.9, backK ≈ -1.0)</li>

    <li><b>At Shape 1</b>: Exponential decay with long tail (frontK ≈ -0.4, backK ≈ 0.6)</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Track Controls (T1, T2, T3)</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Track 1 Trigger</b> / <b>Track 2 Trigger</b> / <b>Track 3 Trigger</b>: Rising edge detection with Schmitt trigger (low: 0.1V, high: 2.0V).</li>

    <li><b>Track 1 Decay Time</b> / <b>Track 2 Decay Time</b> / <b>Track 3 Decay Time</b>: Decay time 0.01-2.0 seconds (default: 1.0s, unit: s)</li>

    <li><b>Track 1 Shape</b> / <b>Track 2 Shape</b> / <b>Track 3 Shape</b>: Envelope curve shape 0 to 0.99 (default: 0.5). Lower values create faster initial decay, higher values create longer tails with slower initial decay.</li>

    <li><b>Track 1 Decay CV</b> / <b>Track 2 Decay CV</b> / <b>Track 3 Decay CV</b>: Decay time CV modulation input (±10V), additive and scaled by attenuator</li>

    <li><b>Track 1 Decay CV Amount</b> / <b>Track 2 Decay CV Amount</b> / <b>Track 3 Decay CV Amount</b>: Hidden small knob (0-100%, default: 50%) controlling CV depth</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Attack Phase</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Attack Time</b>: Configurable 1.0-20ms per track via right-click menu</li>

    <li><b>Default</b>: 1.0ms (nearly instantaneous)</li>

    <li><b>Algorithm</b>: Linear ramp from current value (or 0 if not retriggering) to 10V</li>

    <li><b>Menu Options</b>: 1.0ms, 1ms, 2ms, 5ms, 10ms, 20ms</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Retrigger Behavior</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Off (Default)</b>: New trigger resets envelope to 0V, then attack phase begins</li>

    <li><b>On</b>: New trigger starts attack from current envelope value, preventing amplitude discontinuities</li>

    <li><b>Use Case</b>: Retrigger mode creates smoother overlapping envelopes for fast trigger sequences</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Scope Display</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Buffer Size</b>: 128 samples per track (BUFFER_SIZE constant)</li>

    <li><b>Color Matching</b>: Each waveform adopts the color of its connected input cable via PortWidget API</li>

    <li><b>Time</b>: Adjustable via hidden time parameter (click and drag on display)</li>

    <li><b>Y-axis</b>: 0-10V mapped to display height</li>

    <li><b>Rendering</b>: Anti-aliased line drawing at display refresh rate</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Track 1 Envelope</b> / <b>Track 2 Envelope</b> / <b>Track 3 Envelope</b>: Individual track envelope outputs (0-10V unipolar)</li>

    <li><b>Polyphonic</b>: Each output is monophonic (1 channel)</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li>Trigger input range: ±10V (Schmitt trigger: 0.1V low, 2.0V high)</li>

    <li>CV input range: ±10V</li>

    <li>Output range: 0-10V unipolar</li>

    <li>Attack time: 1.0-20ms (configurable per track)</li>

    <li>Decay time: 10ms to 2 seconds</li>

    <li>Shape range: 0 to 0.99</li>

    <li>Scope buffer: 128 samples per track</li>

    <li>Processing: 32-bit floating point</li>

    <li>Module width: 4HP</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Right-Click Menu</h3>

    <ul style="padding-left: 1.5rem;">

    <li><b>Track 1/2/3 Attack Time</b>: Select attack duration per track (1.0ms, 1ms, 2ms, 5ms, 10ms, 20ms)</li>

    <li><b>Retrigger</b>: Enable/disable retriggering from current value (global setting)</li>

    <li><b>Track 1 Shape</b>: Envelope shape for Track 1 (0-0.99). Controls the curve of the decay phase. 0=linear, higher=more exponential.</li>

    <li><b>Track 2 Shape</b>: Envelope shape for Track 2 (0-0.99). Controls the curve of the decay phase. 0=linear, higher=more exponential.</li>

    <li><b>Track 1 Decay CV Amount</b>: CV attenuator for Track 1 decay time modulation (0-100%). Default 50%.</li>

    <li><b>Track 2 Decay CV Amount</b>: CV attenuator for Track 2 decay time modulation (0-100%). Default 50%.</li>

    <li><b>Track 1 Trigger</b>: Trigger input for Track 1 envelope.</li>

    <li><b>Track 2 Trigger</b>: Trigger input for Track 2 envelope.</li>

    <li><b>Track 1 Decay CV</b>: CV input for Track 1 decay time modulation. Scaled by Track 1 Decay CV Amount.</li>

    <li><b>Track 2 Decay CV</b>: CV input for Track 2 decay time modulation. Scaled by Track 2 Decay CV Amount.</li>

    <li><b>Track 1 Envelope</b>: Envelope output for Track 1 (0-10V).</li>

    <li><b>Track 2 Envelope</b>: Envelope output for Track 2 (0-10V).</li>

    <li><b>Track 3 Shape</b>: Envelope shape for Track 3 (0-0.99). Controls the curve of the decay phase. 0=linear, higher=more exponential.</li>

    <li><b>Track 3 Decay CV Amount</b>: CV attenuator for Track 3 decay time modulation (0-100%). Default 50%.</li>

    <li><b>Track 3 Trigger</b>: Trigger input for Track 3 envelope.</li>

    <li><b>Track 3 Decay CV</b>: CV input for Track 3 decay time modulation. Scaled by Track 3 Decay CV Amount.</li>

    <li><b>Track 3 Envelope</b>: Envelope output for Track 3 (0-10V).</li>

    </ul>'
  zh: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>

    <p style="margin-bottom: 1rem;">三軌 Decay Envelope 生成器，具備即時 Oscilloscope 顯示與 S-curve Shaping 演算法。每軌具備獨立 Trigger、含 CV 調變的 Decay 時間與曲線造型。Oscilloscope 顯示同時顯示所有三條 Envelope，顏色匹配其輸入 Cable。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">訊號流程</h3>

    <p style="margin-bottom: 1rem;">Trigger → Attack Phase → Decay Phase → Output。每軌獨立運行，具備自己的 Envelope State Machine 追蹤 Attack/Decay 階段與當前電平。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">S-Curve Envelope 演算法</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>實作</b>: 使用 smoothDecayEnvelope() 含雙 k 內插以產生自然 Envelope 形狀</li>

    <li><b>Front K</b>: 控制初始曲線陡峭度，範圍 -0.9 至 -0.4</li>

    <li><b>Back K</b>: 控制尾端曲線，範圍 -1.0 至 0.6</li>

    <li><b>K Crossfade</b>: 隨著 Envelope 進展從 frontK 至 backK 線性內插</li>

    <li><b>Shape 行為</b>: 目標與當前值的加權內插，k 在 Decay 過程中變化</li>

    <li><b>Shape 0 時</b>: 線性 Decay（frontK ≈ -0.9，backK ≈ -1.0）</li>

    <li><b>Shape 1 時</b>: 指數 Decay 含長尾（frontK ≈ -0.4，backK ≈ 0.6）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">各軌控制（T1、T2、T3）</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Track 1 Trigger</b> / <b>Track 2 Trigger</b> / <b>Track 3 Trigger</b>：上升邊緣偵測含 Schmitt Trigger（低：0.1V，高：2.0V）。</li>

    <li><b>Track 1 Decay Time</b> / <b>Track 2 Decay Time</b> / <b>Track 3 Decay Time</b>：Decay 時間 0.01-2.0 秒（預設：1.0s，單位：s）</li>

    <li><b>Track 1 Shape</b> / <b>Track 2 Shape</b> / <b>Track 3 Shape</b>：Envelope 曲線形狀 0 至 0.99（預設：0.5）。較低值產生較快初始 Decay，較高值產生較慢初始 Decay 的較長尾。</li>

    <li><b>Track 1 Decay CV</b> / <b>Track 2 Decay CV</b> / <b>Track 3 Decay CV</b>：Decay 時間 CV 調變輸入（±10V），加法並由 Attenuator 縮放</li>

    <li><b>Track 1 Decay CV Amount</b> / <b>Track 2 Decay CV Amount</b> / <b>Track 3 Decay CV Amount</b>：隱藏小 Knob（0-100%，預設：50%）控制 CV 深度</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Attack Phase</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Attack 時間</b>: 透過右鍵選單各軌可設定 1.0-20ms</li>

    <li><b>預設</b>: 1.0ms（幾乎瞬間）</li>

    <li><b>演算法</b>: 從當前值（或若非重觸發則為 0）至 10V 線性爬升</li>

    <li><b>選單選項</b>: 1.0ms、1ms、2ms、5ms、10ms、20ms</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Retrigger 行為</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Off（預設）</b>: 新 Trigger 將 Envelope 重設為 0V，然後開始 Attack 階段</li>

    <li><b>On</b>: 新 Trigger 從當前 Envelope 值開始 Attack，防止振幅不連續</li>

    <li><b>使用案例</b>: Retrigger 模式為快速 Trigger 序列產生更平滑重疊 Envelope</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Scope 顯示</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Buffer Size</b>: 每軌 128 Samples（BUFFER_SIZE 常數）</li>

    <li><b>顏色匹配</b>: 每個 Waveform 透過 PortWidget API 採用其連接輸入 Cable 的顏色</li>

    <li><b>Time</b>：可透過隱藏時間參數調整（在顯示上點擊並拖曳）</li>

    <li><b>Y 軸</b>: 0-10V 映射至顯示高度</li>

    <li><b>渲染</b>: 以顯示刷新率進行 Anti-aliased 線條繪製</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Track 1 Envelope</b> / <b>Track 2 Envelope</b> / <b>Track 3 Envelope</b>：個別軌道 Envelope 輸出（0-10V Unipolar）</li>

    <li><b>Polyphonic</b>: 每個輸出為單音（1 Channel）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li>Trigger 輸入範圍：±10V（Schmitt Trigger：0.1V 低，2.0V 高）</li>

    <li>CV 輸入範圍：±10V</li>

    <li>輸出範圍：0-10V Unipolar</li>

    <li>Attack 時間：1.0-20ms（各軌可設定）</li>

    <li>Decay 時間：10ms 至 2 秒</li>

    <li>Shape 範圍：0 至 0.99</li>

    <li>Scope Buffer：每軌 128 Samples</li>

    <li>處理：32-bit 浮點數</li>

    <li>模組寬度：4HP</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">右鍵選單</h3>

    <ul style="padding-left: 1.5rem;">

    <li><b>Track 1/2/3 Attack Time</b>: 選擇各軌 Attack 持續時間（1.0ms、1ms、2ms、5ms、10ms、20ms）</li>

    <li><b>Retrigger</b>: 啟用/停用從當前值重觸發（全域設定）</li>

    <li><b>Track 1 Shape</b>: Track 1 的 Envelope 形狀（0-0.99）。控制 Decay 階段的曲線。0=線性，越高=越指數。</li>

    <li><b>Track 2 Shape</b>: Track 2 的 Envelope 形狀（0-0.99）。控制 Decay 階段的曲線。0=線性，越高=越指數。</li>

    <li><b>Track 1 Decay CV Amount</b>: Track 1 Decay 時間調變的 CV 衰減量（0-100%）。預設 50%。</li>

    <li><b>Track 2 Decay CV Amount</b>: Track 2 Decay 時間調變的 CV 衰減量（0-100%）。預設 50%。</li>

    <li><b>Track 1 Trigger</b>: Track 1 Envelope 的 Trigger 輸入。</li>

    <li><b>Track 2 Trigger</b>: Track 2 Envelope 的 Trigger 輸入。</li>

    <li><b>Track 1 Decay CV</b>: Track 1 Decay 時間調變的 CV 輸入。由 Track 1 Decay CV Amount 縮放。</li>

    <li><b>Track 2 Decay CV</b>: Track 2 Decay 時間調變的 CV 輸入。由 Track 2 Decay CV Amount 縮放。</li>

    <li><b>Track 1 Envelope</b>: Track 1 的 Envelope 輸出（0-10V）。</li>

    <li><b>Track 2 Envelope</b>: Track 2 的 Envelope 輸出（0-10V）。</li>

    <li><b>Track 3 Shape</b>: Track 3 的 Envelope 形狀（0-0.99）。控制 Decay 階段的曲線。0=線性，越高=越指數。</li>

    <li><b>Track 3 Decay CV Amount</b>: Track 3 Decay 時間調變的 CV 衰減量（0-100%）。預設 50%。</li>

    <li><b>Track 3 Trigger</b>: Track 3 Envelope 的 Trigger 輸入。</li>

    <li><b>Track 3 Decay CV</b>: Track 3 Decay 時間調變的 CV 輸入。由 Track 3 Decay CV Amount 縮放。</li>

    <li><b>Track 3 Envelope</b>: Track 3 的 Envelope 輸出（0-10V）。</li>

    </ul>

    <div style="display:none"><ul>

    <li><b>Implementation</b>: 使用 smoothDecayEnvelope() 含雙 k 內插以產生自然 Envelope 形狀</li>

    <li><b>Shape Behavior</b>: 在目標值與當前值之間進行加權內插，其中 k 值會隨著 Decay 過程動態變化</li>

    <li><b>At Shape 0</b>: 線性 Decay（frontK approx -0.9，backK approx -1.0）</li>

    <li><b>At Shape 1</b>: 指數 Decay 含長尾（frontK approx -0.4，backK approx 0.6）</li>

    <li><b>Attack Time</b>: 可透過右鍵選單每軌設定 1.0-20ms</li>

    <li><b>Default</b>: 1.0ms（幾乎瞬間）</li>

    <li><b>Algorithm</b>: 從當前值（或未重觸發時從 0）到 10V 的線性斜坡</li>

    <li><b>Menu Options</b>: 1.0ms、1ms、2ms、5ms、10ms、20ms</li>

    <li><b>Off (Default)</b>: 新 Trigger 將 Envelope 重設至 0V，然後開始 Attack 階段</li>

    <li><b>Use Case</b>: 重觸發模式為快速 Trigger 序列創造更平滑的重疊 Envelope</li>

    <li><b>Color Matching</b>: 每個 Waveform 透過 PortWidget API 採用連接輸入 Cable 的顏色</li>

    <li><b>Y-axis</b>: 0-10V 對應至顯示高度</li>

    <li><b>Rendering</b>: 以顯示更新率進行抗鋸齒線條繪製</li>

    </ul></div>'
  ja: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>

    <p style="margin-bottom: 1rem;">リアルタイムオシロスコープ表示とS-curveシェイピングアルゴリズム付き3トラックディケイエンベロープ生成器。各トラックは独立トリガー、CV変調付きディケイ時間、カーブシェイピングを搭載。オシロスコープディスプレイは3つのエンベロープを同時表示し、色は入力ケーブルと一致。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">信号フロー</h3>

    <p style="margin-bottom: 1rem;">トリガー → アタックフェーズ → ディケイフェーズ → 出力。各トラックは独立動作し、アタック/ディケイフェーズと現在レベルを追跡する独自のエンベロープステートマシンを持つ。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">S-Curveエンベロープアルゴリズム</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>実装</b>: 自然なエンベロープ形状のためデュアルk補間付きsmoothDecayEnvelope()使用</li>

    <li><b>Front K</b>: 初期カーブ急峻さを制御、範囲 -0.9〜-0.4</li>

    <li><b>Back K</b>: テールカーブを制御、範囲 -1.0〜0.6</li>

    <li><b>Kクロスフェード</b>: エンベロープ進行に従いfrontKからbackKへ線形補間</li>

    <li><b>Shape動作</b>: ターゲットと現在値の加重補間、kはディケイ中に変化</li>

    <li><b>Shape 0時</b>: リニアディケイ（frontK ≈ -0.9、backK ≈ -1.0）</li>

    <li><b>Shape 1時</b>: ロングテール付き指数ディケイ（frontK ≈ -0.4、backK ≈ 0.6）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">トラック別コントロール（T1、T2、T3）</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Track 1 Trigger</b> / <b>Track 2 Trigger</b> / <b>Track 3 Trigger</b>：シュミットトリガー付き立ち上がりエッジ検出（ロー：0.1V、ハイ：2.0V）。</li>

    <li><b>Track 1 Decay Time</b> / <b>Track 2 Decay Time</b> / <b>Track 3 Decay Time</b>：ディケイ時間0.01-2.0秒（デフォルト：1.0s、単位：s）</li>

    <li><b>Track 1 Shape</b> / <b>Track 2 Shape</b> / <b>Track 3 Shape</b>：エンベロープカーブ形状0〜0.99（デフォルト：0.5）。低値は速い初期ディケイ、高値は遅い初期ディケイのロングテールを生成。</li>

    <li><b>Track 1 Decay CV</b> / <b>Track 2 Decay CV</b> / <b>Track 3 Decay CV</b>：ディケイ時間CV変調入力（±10V）、加算でアッテヌエーターでスケーリング</li>

    <li><b>Track 1 Decay CV Amount</b> / <b>Track 2 Decay CV Amount</b> / <b>Track 3 Decay CV Amount</b>：CV深度制御の隠し小ノブ（0-100%、デフォルト：50%）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">アタックフェーズ</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>アタック時間</b>: 右クリックメニューでトラック別に1.0-20ms設定可能</li>

    <li><b>デフォルト</b>: 1.0ms（ほぼ瞬時）</li>

    <li><b>アルゴリズム</b>: 現在値（またはリトリガーでない場合は0）から10Vへリニアランプ</li>

    <li><b>メニューオプション</b>: 1.0ms、1ms、2ms、5ms、10ms、20ms</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">リトリガー動作</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Off（デフォルト）</b>: 新トリガーはエンベロープを0Vにリセット後、アタックフェーズ開始</li>

    <li><b>On</b>: 新トリガーは現在のエンベロープ値からアタック開始、振幅不連続を防止</li>

    <li><b>使用例</b>: リトリガーモードは高速トリガーシーケンス用により滑らかな重複エンベロープを生成</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">スコープ表示</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>バッファサイズ</b>: トラック別128サンプル（BUFFER_SIZE定数）</li>

    <li><b>カラーマッチング</b>: 各波形はPortWidget API経由で接続入力ケーブルの色を採用</li>

    <li><b>Time</b>：隠し時間パラメータで調整可能（ディスプレイをクリック＆ドラッグ）</li>

    <li><b>Y軸</b>: 0-10Vをディスプレイ高さにマッピング</li>

    <li><b>レンダリング</b>: ディスプレイリフレッシュレートでアンチエイリアスライン描画</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Track 1 Envelope</b> / <b>Track 2 Envelope</b> / <b>Track 3 Envelope</b>：個別トラックエンベロープ出力（0-10Vユニポーラ）</li>

    <li><b>ポリフォニック</b>: 各出力はモノフォニック（1チャンネル）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li>トリガー入力範囲：±10V（シュミットトリガー：0.1Vロー、2.0Vハイ）</li>

    <li>CV入力範囲：±10V</li>

    <li>出力範囲：0-10Vユニポーラ</li>

    <li>アタック時間：1.0-20ms（トラック別設定可能）</li>

    <li>ディケイ時間：10ms〜2秒</li>

    <li>Shape範囲：0〜0.99</li>

    <li>スコープバッファ：トラック別128サンプル</li>

    <li>処理：32ビット浮動小数点</li>

    <li>モジュール幅：4HP</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">右クリックメニュー</h3>

    <ul style="padding-left: 1.5rem;">

    <li><b>Track 1/2/3 Attack Time</b>: トラック別アタック期間選択（1.0ms、1ms、2ms、5ms、10ms、20ms）</li>

    <li><b>Retrigger</b>: 現在値からのリトリガーを有効/無効化（グローバル設定）</li>

    <li><b>Track 1 Shape</b>: トラック1のエンベロープシェイプ（0-0.99）。ディケイフェーズのカーブを制御。0=リニア、高値=よりエクスポネンシャル。</li>

    <li><b>Track 2 Shape</b>: トラック2のエンベロープシェイプ（0-0.99）。ディケイフェーズのカーブを制御。0=リニア、高値=よりエクスポネンシャル。</li>

    <li><b>Track 1 Decay CV Amount</b>: トラック1ディケイ時間変調用CVアッテネーター（0-100%）。デフォルト50%。</li>

    <li><b>Track 2 Decay CV Amount</b>: トラック2ディケイ時間変調用CVアッテネーター（0-100%）。デフォルト50%。</li>

    <li><b>Track 1 Trigger</b>: トラック1エンベロープのトリガー入力。</li>

    <li><b>Track 2 Trigger</b>: トラック2エンベロープのトリガー入力。</li>

    <li><b>Track 1 Decay CV</b>: トラック1ディケイ時間変調用CV入力。Track 1 Decay CV Amountでスケーリング。</li>

    <li><b>Track 2 Decay CV</b>: トラック2ディケイ時間変調用CV入力。Track 2 Decay CV Amountでスケーリング。</li>

    <li><b>Track 1 Envelope</b>: トラック1のエンベロープ出力（0-10V）。</li>

    <li><b>Track 2 Envelope</b>: トラック2のエンベロープ出力（0-10V）。</li>

    <li><b>Track 3 Shape</b>: トラック3のエンベロープシェイプ（0-0.99）。ディケイフェーズのカーブを制御。0=リニア、高値=よりエクスポネンシャル。</li>

    <li><b>Track 3 Decay CV Amount</b>: トラック3ディケイ時間変調用CVアッテネーター（0-100%）。デフォルト50%。</li>

    <li><b>Track 3 Trigger</b>: トラック3エンベロープのトリガー入力。</li>

    <li><b>Track 3 Decay CV</b>: トラック3ディケイ時間変調用CV入力。Track 3 Decay CV Amountでスケーリング。</li>

    <li><b>Track 3 Envelope</b>: トラック3のエンベロープ出力（0-10V）。</li>

    </ul>

    <div style="display:none"><ul>

    <li><b>Implementation</b>: smoothDecayEnvelope()とデュアルk補間を使用して自然なエンベロープ形状を生成</li>

    <li><b>Shape Behavior</b>: ターゲット値と現在値の間で加重補間を行い、ディケイの進行中にk値が動的に変化します</li>

    <li><b>At Shape 0</b>: 線形ディケイ（frontK approx -0.9、backK approx -1.0）</li>

    <li><b>At Shape 1</b>: ロングテール付き指数ディケイ（frontK approx -0.4、backK approx 0.6）</li>

    <li><b>Attack Time</b>: 右クリックメニューでトラックごとに1.0〜20msを設定可能</li>

    <li><b>Default</b>: 1.0ms（ほぼ瞬間）</li>

    <li><b>Algorithm</b>: 現在値（またはリトリガーしない場合は0）から10Vへの線形ランプ</li>

    <li><b>Menu Options</b>: 1.0ms、1ms、2ms、5ms、10ms、20ms</li>

    <li><b>Off (Default)</b>: 新しいトリガーがエンベロープを0Vにリセット、その後アタックフェーズ開始</li>

    <li><b>Use Case</b>: リトリガーモードで高速トリガーシーケンスのスムーズな重なりエンベロープを作成</li>

    <li><b>Color Matching</b>: 各波形がPortWidget APIで接続入力ケーブルの色を採用</li>

    <li><b>Y-axis</b>: 0〜10Vを表示高さにマッピング</li>

    <li><b>Rendering</b>: 表示リフレッシュレートでアンチエイリアスライン描画</li>

    <li><b>K Crossfade</b>: エンベロープの進行に伴ってfrontKからbackKへ線形補間</li>

    <li><b>Buffer Size</b>: トラックあたり128サンプル（BUFFER_SIZE定数）</li>

    <li><b>Polyphonic</b>: 各出力はモノフォニック（1チャンネル）</li>

    </ul></div>'
controls:
- name: Track 1 Decay Time
  type: param
  desc:
    en: 'Track 1 Decay time 0.01-2.0 seconds (default: 1.0s, unit: s)'
    zh: Track 1 Decay 時間 0.01-2.0 秒（預設：1.0s，單位：s）
    ja: トラック1ディケイ時間0.01-2.0秒（デフォルト：1.0s、単位：s）
- name: Track 1 Shape
  type: param
  desc:
    en: Envelope shape for Track 1 (0-0.99). Controls the curve of the decay phase. 0=linear, higher=more exponential.
    zh: Track 1 的 Envelope 形狀（0-0.99）。控制 Decay 階段的曲線。0=線性，越高=越指數。
    ja: トラック1のエンベロープシェイプ（0-0.99）。ディケイフェーズのカーブを制御。0=リニア、高値=よりエクスポネンシャル。
