slug: Portal
name: Portal
hp: 8
wide: false
alt: Portal
description:
  en: Poly crossfader for UniRhythm with 3-band isolator, tube drive, DJ-style cue monitoring, and selectable crossfader curve
  zh: UniRhythm 專用 Poly Crossfader，具備 3 頻段 Isolator、Tube Drive、DJ 風格 Cue 監聽與可選 Crossfader 曲線
  ja: 3バンドアイソレーター、チューブドライブ、DJスタイルキューモニタリング、選択可能なクロスフェーダーカーブを備えたUniRhythm用ポリクロスフェーダー
features:
  en:
  - 2x 16-channel poly input (A/B decks from UniRhythm)
  - 'Crossfader with 3 curve types: Linear, Equal Power, Cut'
  - 3-band isolator (LOW/MID/HIGH) with kill capability
  - Tube drive with asymmetric saturation
  - DJ-style CUE A/B monitoring with dedicated stereo output
  - 'Per-role CV outputs: Gate, Pitch, Vel/Env (crossfaded)'
  zh:
  - 2 組 16 聲道 Poly 輸入（來自 UniRhythm 的 A/B Deck）
  - Crossfader 支援 3 種曲線：Linear、Equal Power、Cut
  - 3 頻段 Isolator（LOW/MID/HIGH），帶 Kill 功能
  - Tube Drive 非對稱飽和
  - DJ 風格 CUE A/B 監聽，帶獨立 Stereo 輸出
  - 各角色 CV 輸出：Gate、Pitch、Vel/Env（Crossfaded）
  ja:
  - 2系統16チャンネルポリ入力（UniRhythmのA/Bデッキ）
  - 3種のカーブ対応クロスフェーダー：リニア、イコールパワー、カット
  - 3バンドアイソレーター（LOW/MID/HIGH）、Kill機能付き
  - チューブドライブ非対称サチュレーション
  - DJスタイルCUE A/Bモニタリング、専用ステレオ出力
  - ロール別CV出力：Gate、Pitch、Vel/Env（クロスフェード済み）
manual_html_raw:
  en: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>

    <p style="margin-bottom: 1rem;">Poly crossfader designed for mixing between two UniRhythm modules in a DJ-style workflow. Accepts two 16-channel polyphonic inputs (Deck A and Deck B) from UniRhythm''s POLY output, providing smooth crossfading between rhythm generators with a 3-band isolator, tube drive, and dedicated cue monitoring output. The crossfader curve can be selected from three types via the right-click menu. Per-role CV outputs (Gate, Pitch, Vel/Env) are also crossfaded for external synthesis control.</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Poly Channel Layout</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Channels 0-3</b>: Timeline (Audio, Gate, Pitch, VelEnv)</li>

    <li><b>Channels 4-7</b>: Foundation (Audio, Gate, Pitch, VelEnv)</li>

    <li><b>Channels 8-11</b>: Groove (Audio, Gate, Pitch, VelEnv)</li>

    <li><b>Channels 12-15</b>: Lead (Audio, Gate, Pitch, VelEnv)</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Crossfader</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>XFADE Slider</b>: Horizontal slider. A (left) to B (right). Default: center (50%).</li>

    <li><b>Cross CV</b>: CV input for crossfader position. ±10V maps to ±1.0 position offset (coefficient 0.1).</li>

    <li><b>Linear Curve</b>: Straight gain crossfade. A = 1-pos, B = pos.</li>

    <li><b>Equal Power (default)</b>: Constant power crossfade using sine/cosine. No dip at center.</li>

    <li><b>Cut Curve</b>: DJ-style hard cut with overlap zone. A stays at full until 40%, B stays at full after 60%.</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Isolator</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>LOW</b>: Low band gain (below 250Hz). Bipolar: -1 = kill, 0 = unity, +1 = +12dB boost. Quadratic cut for musical feel.</li>

    <li><b>MID</b>: Mid band gain (250Hz-4kHz). Same bipolar control.</li>

    <li><b>HIGH</b>: High band gain (above 4kHz). Same bipolar control.</li>

    <li><b>Filter Type</b>: Linkwitz-Riley 4th order (cascaded 2nd order Butterworth) for phase-coherent crossover.</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Drive</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>DRIVE</b>: Master tube drive (0-100%). Asymmetric waveshaping: soft saturation on positive, harder on negative for even harmonics.</li>

    <li><b>Makeup Gain</b>: Automatic gain compensation to maintain perceived volume.</li>

    <li><b>DC Blocker</b>: 1st order high-pass at ~10Hz removes DC offset from saturation.</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Cue Monitoring</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>CUE Button</b>: Toggle between A and B. Displays current selection as colored text.</li>

    <li><b>CUE L/R</b>: Dedicated stereo output for headphone monitoring. Outputs raw audio from selected deck (A or B) without crossfader, isolator, or drive processing.</li>

    <li><b>Use Case</b>: Pre-listen to the incoming deck before crossfading, just like a DJ mixer.</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV Outputs</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Gate</b>: Crossfaded gate signal per role (Timeline, Foundation, Groove, Lead).</li>

    <li><b>Pitch</b>: Crossfaded pitch CV per role (1V/Oct).</li>

    <li><b>Vel/Env</b>: Crossfaded velocity envelope CV per role.</li>

    <li><b>Layout</b>: Upper group (Timeline + Groove), Lower group (Foundation + Lead).</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Inputs</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Poly in A</b>: 16-channel polyphonic input from UniRhythm Deck A.</li>

    <li><b>Poly in B</b>: 16-channel polyphonic input from UniRhythm Deck B.</li>

    <li><b>Cross CV</b>: Crossfader position CV modulation (±10V, coefficient 0.1).</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Master L/R</b>: Stereo master output with crossfade, isolator, drive, and soft clip applied.</li>

    <li><b>CUE L/R</b>: Stereo cue monitoring output (raw selected deck audio).</li>

    <li><b>Per-Role Gate/Pitch/VelEnv</b>: 4 roles x 3 CV types = 12 crossfaded CV outputs.</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>

    <ul style="padding-left: 1.5rem;">

    <li>Module width: 8HP</li>

    <li>Poly input: 16 channels per deck</li>

    <li>Crossfader curves: Linear, Equal Power, Cut</li>

    <li>Isolator crossovers: 250Hz / 4kHz (Linkwitz-Riley 4th order)</li>

    <li>Drive: Asymmetric tube saturation with DC blocker (~10Hz)</li>

    <li>Output limiting: Soft clip via tanh</li>

    <li>Processing: 32-bit floating point</li>

    <li><b>Crossfader</b>: DJ-style crossfader between Deck A and Deck B. 0%=full A, 100%=full B. CV modulated via Crossfader CV input.</li>

    <li><b>Cue A/B</b>: Cue routing switch. Selects which deck (A or B) is sent to the Cue output for monitoring.</li>

    <li><b>Deck A (16ch poly)</b>: 16-channel polyphonic input for Deck A. Channels are decoded into individual track signals.</li>

    <li><b>Deck B (16ch poly)</b>: 16-channel polyphonic input for Deck B. Channels are decoded into individual track signals.</li>

    <li><b>Crossfader CV</b>: CV input for crossfader position modulation (&plusmn;10V, coefficient 0.1, adds offset to crossfader position).</li>

    <li><b>Master L</b>: Master left channel output. Main stereo mix after crossfader, isolator, drive, and soft clip.</li>

    <li><b>Master R</b>: Master right channel output. Main stereo mix after crossfader, isolator, drive, and soft clip.</li>

    <li><b>Cue L</b>: Cue left channel output for headphone monitoring.</li>

    <li><b>Cue R</b>: Cue right channel output for headphone monitoring.</li>

    </ul>'
  zh: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>

    <p style="margin-bottom: 1rem;">專為 DJ 風格工作流設計的 Poly Crossfader，用於混合兩台 UniRhythm 模組。接收來自 UniRhythm POLY Output 的兩組 16 聲道 Polyphonic 輸入（Deck A 與 Deck B），提供 3 頻段 Isolator、Tube Drive 與獨立 Cue 監聽輸出的平滑 Crossfading。Crossfader 曲線可透過右鍵選單從三種類型中選擇。各角色 CV 輸出（Gate、Pitch、Vel/Env）同樣經過 Crossfade 處理，供外部合成器控制使用。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Poly 聲道配置</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Channels 0-3</b>: Timeline（Audio、Gate、Pitch、VelEnv）</li>

    <li><b>Channels 4-7</b>: Foundation（Audio、Gate、Pitch、VelEnv）</li>

    <li><b>Channels 8-11</b>: Groove（Audio、Gate、Pitch、VelEnv）</li>

    <li><b>Channels 12-15</b>: Lead（Audio、Gate、Pitch、VelEnv）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Crossfader</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>XFADE Slider</b>: 水平滑桿。A（左）至 B（右）。預設：中央（50%）。</li>

    <li><b>Cross CV</b>: Crossfader 位置的 CV 輸入。±10V 對應 ±1.0 位置偏移（係數 0.1）。</li>

    <li><b>Linear Curve</b>: 直線增益 Crossfade。A = 1-pos、B = pos。</li>

    <li><b>Equal Power (default)</b>: 等功率 Crossfade，使用 Sine/Cosine。中央無凹陷。</li>

    <li><b>Cut Curve</b>: DJ 風格硬切，帶重疊區。A 在 40% 前維持全量，B 在 60% 後維持全量。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Isolator</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>LOW</b>: 低頻增益（250Hz 以下）。雙極: -1 = Kill、0 = Unity、+1 = +12dB Boost。二次曲線 Cut 提供音樂感。</li>

    <li><b>MID</b>: 中頻增益（250Hz-4kHz）。相同雙極控制。</li>

    <li><b>HIGH</b>: 高頻增益（4kHz 以上）。相同雙極控制。</li>

    <li><b>Filter Type</b>: Linkwitz-Riley 4 階（串聯 2 階 Butterworth），相位一致 Crossover。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Drive</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>DRIVE</b>: Master Tube Drive（0-100%）。非對稱波形整形：正半週柔和飽和、負半週較硬，產生偶次諧波。</li>

    <li><b>Makeup Gain</b>: 自動增益補償以維持感知音量。</li>

    <li><b>DC Blocker</b>: 1 階高通約 10Hz，消除 Saturation 產生的 DC 偏移。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Cue 監聽</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>CUE Button</b>: 在 A 與 B 之間切換。以彩色文字顯示目前選擇。</li>

    <li><b>CUE L/R</b>: 專用 Stereo 耳機監聽輸出。輸出所選 Deck（A 或 B）的原始 Audio，不經 Crossfader、Isolator 或 Drive 處理。</li>

    <li><b>Use Case</b>: 在 Crossfading 前預聽即將進入的 Deck，如同 DJ Mixer。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV 輸出</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Gate</b>: 各角色 Crossfade 後的 Gate 訊號（Timeline、Foundation、Groove、Lead）。</li>

    <li><b>Pitch</b>: 各角色 Crossfade 後的 Pitch CV（1V/Oct）。</li>

    <li><b>Vel/Env</b>: 各角色 Crossfade 後的 Velocity Envelope CV。</li>

    <li><b>Layout</b>: 上半組（Timeline + Groove），下半組（Foundation + Lead）。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸入</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Poly in A</b>: 來自 UniRhythm Deck A 的 16 聲道 Polyphonic 輸入。</li>

    <li><b>Poly in B</b>: 來自 UniRhythm Deck B 的 16 聲道 Polyphonic 輸入。</li>

    <li><b>Cross CV</b>: Crossfader 位置 CV 調變（±10V，係數 0.1）。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Master L/R</b>: Stereo Master 輸出，含 Crossfade、Isolator、Drive 與 Soft Clip。</li>

    <li><b>CUE L/R</b>: Stereo Cue 監聽輸出（原始所選 Deck Audio）。</li>

    <li><b>Per-Role Gate/Pitch/VelEnv</b>: 4 角色 x 3 CV 類型 = 12 個 Crossfade 後的 CV 輸出。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>

    <ul style="padding-left: 1.5rem;">

    <li>模組寬度: 8HP</li>

    <li>Poly 輸入: 每 Deck 16 聲道</li>

    <li>Crossfader 曲線: Linear、Equal Power、Cut</li>

    <li>Isolator 分頻點: 250Hz / 4kHz（Linkwitz-Riley 4 階）</li>

    <li>Drive: 非對稱 Tube Saturation，含 DC Blocker（~10Hz）</li>

    <li>輸出限幅: 透過 tanh 的 Soft Clip</li>

    <li>處理: 32 位元浮點</li>

    <li><b>Crossfader</b>: DJ 風格交叉混合器，Deck A 與 Deck B 之間。0%=完全 A，100%=完全 B。可透過 Crossfader CV 輸入進行 CV 調變。</li>

    <li><b>Cue A/B</b>: Cue 路由切換。選擇將哪個 Deck（A 或 B）送至 Cue 輸出以供監聽。</li>

    <li><b>Deck A (16ch poly)</b>: Deck A 的 16 聲道 Polyphonic 輸入。各聲道解碼為獨立的軌道訊號。</li>

    <li><b>Deck B (16ch poly)</b>: Deck B 的 16 聲道 Polyphonic 輸入。各聲道解碼為獨立的軌道訊號。</li>

    <li><b>Crossfader CV</b>: Crossfader 位置調變的 CV 輸入（&plusmn;10V，係數 0.1，加至 Crossfader 位置偏移）。</li>

    <li><b>Master L</b>: Master 左聲道輸出。經過 Crossfader、Isolator、Drive 與 Soft Clip 後的主立體聲混音。</li>

    <li><b>Master R</b>: Master 右聲道輸出。經過 Crossfader、Isolator、Drive 與 Soft Clip 後的主立體聲混音。</li>

    <li><b>Cue L</b>: Cue 左聲道輸出，用於耳機監聽。</li>

    <li><b>Cue R</b>: Cue 右聲道輸出，用於耳機監聽。</li>

    </ul>'
  ja: '<h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>

    <p style="margin-bottom: 1rem;">2台のUniRhythmモジュールをDJスタイルでミキシングするためのポリクロスフェーダー。UniRhythmのPOLY出力から2系統の16チャンネルポリフォニック入力（デッキA・デッキB）を受け取り、3バンドアイソレーター、チューブドライブ、専用キューモニタリング出力を備えたスムーズなクロスフェードを提供。クロスフェーダーカーブは右クリックメニューから3種類を選択可能。ロール別CV出力（Gate、Pitch、Vel/Env）もクロスフェード処理され、外部シンセ制御に使用可能。</p>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ポリチャンネルレイアウト</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Channels 0-3</b>: Timeline（Audio、Gate、Pitch、VelEnv）</li>

    <li><b>Channels 4-7</b>: Foundation（Audio、Gate、Pitch、VelEnv）</li>

    <li><b>Channels 8-11</b>: Groove（Audio、Gate、Pitch、VelEnv）</li>

    <li><b>Channels 12-15</b>: Lead（Audio、Gate、Pitch、VelEnv）</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クロスフェーダー</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>XFADE Slider</b>: 水平スライダー。A（左）からB（右）。デフォルト：中央（50%）。</li>

    <li><b>Cross CV</b>: クロスフェーダー位置のCV入力。±10Vが±1.0の位置オフセットに対応（係数0.1）。</li>

    <li><b>Linear Curve</b>: ストレートゲインクロスフェード。A = 1-pos、B = pos。</li>

    <li><b>Equal Power (default)</b>: サイン/コサインによる定電力クロスフェード。中央でのディップなし。</li>

    <li><b>Cut Curve</b>: DJスタイルハードカット。Aは40%までフル、Bは60%以降フル。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">アイソレーター</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>LOW</b>: 低域ゲイン（250Hz以下）。バイポーラ: -1 = Kill、0 = Unity、+1 = +12dBブースト。二次曲線カットで音楽的な操作感。</li>

    <li><b>MID</b>: 中域ゲイン（250Hz-4kHz）。同じバイポーラコントロール。</li>

    <li><b>HIGH</b>: 高域ゲイン（4kHz以上）。同じバイポーラコントロール。</li>

    <li><b>Filter Type</b>: リンクウィッツ・ライリー4次（カスケード2次バターワース）、位相コヒーレントクロスオーバー。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ドライブ</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>DRIVE</b>: マスターチューブドライブ（0-100%）。非対称ウェーブシェーピング：正側ソフトサチュレーション、負側ハードで偶数倍音を生成。</li>

    <li><b>Makeup Gain</b>: 知覚音量を維持する自動ゲイン補正。</li>

    <li><b>DC Blocker</b>: 1次ハイパス約10Hz、サチュレーションによるDCオフセットを除去。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">キューモニタリング</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>CUE Button</b>: AとBを切り替え。カラーテキストで現在の選択を表示。</li>

    <li><b>CUE L/R</b>: 専用ステレオヘッドフォンモニタリング出力。クロスフェーダー、アイソレーター、ドライブ処理なしの、選択デッキ（AまたはB）の生オーディオを出力。</li>

    <li><b>Use Case</b>: DJミキサーのように、クロスフェード前に次のデッキをプリリスン。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">CV出力</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Gate</b>: ロール別クロスフェード済みゲート信号（Timeline、Foundation、Groove、Lead）。</li>

    <li><b>Pitch</b>: ロール別クロスフェード済みピッチCV（1V/Oct）。</li>

    <li><b>Vel/Env</b>: ロール別クロスフェード済みベロシティエンベロープCV。</li>

    <li><b>Layout</b>: 上段グループ（Timeline + Groove）、下段グループ（Foundation + Lead）。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">入力</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Poly in A</b>: UniRhythmデッキAからの16チャンネルポリフォニック入力。</li>

    <li><b>Poly in B</b>: UniRhythmデッキBからの16チャンネルポリフォニック入力。</li>

    <li><b>Cross CV</b>: クロスフェーダー位置CV変調（±10V、係数0.1）。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>

    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">

    <li><b>Master L/R</b>: ステレオマスター出力（クロスフェード、アイソレーター、ドライブ、ソフトクリップ適用済み）。</li>

    <li><b>CUE L/R</b>: ステレオキューモニタリング出力（選択デッキの生オーディオ）。</li>

    <li><b>Per-Role Gate/Pitch/VelEnv</b>: 4ロール×3 CVタイプ = 12個のクロスフェード済みCV出力。</li>

    </ul>


    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>

    <ul style="padding-left: 1.5rem;">

    <li>モジュール幅: 8HP</li>

    <li>ポリ入力: デッキあたり16チャンネル</li>

    <li>クロスフェーダーカーブ: リニア、イコールパワー、カット</li>

    <li>アイソレータークロスオーバー: 250Hz / 4kHz（リンクウィッツ・ライリー4次）</li>

    <li>ドライブ: 非対称チューブサチュレーション、DCブロッカー付き（~10Hz）</li>

    <li>出力リミッティング: tanhによるソフトクリップ</li>

    <li>処理: 32ビット浮動小数点</li>

    <li><b>Crossfader</b>: DJスタイルのクロスフェーダー。Deck AとDeck Bの間を制御。0%=完全A、100%=完全B。Crossfader CV入力でCV変調可能。</li>

    <li><b>Cue A/B</b>: キュールーティングスイッチ。モニタリング用にどのデッキ（AまたはB）をキュー出力に送るかを選択。</li>

    <li><b>Deck A (16ch poly)</b>: Deck Aの16チャンネルポリフォニック入力。チャンネルは個別のトラック信号にデコードされます。</li>

    <li><b>Deck B (16ch poly)</b>: Deck Bの16チャンネルポリフォニック入力。チャンネルは個別のトラック信号にデコードされます。</li>

    <li><b>Crossfader CV</b>: クロスフェーダー位置変調用CV入力（&plusmn;10V、係数0.1、クロスフェーダー位置にオフセットを加算）。</li>

    <li><b>Master L</b>: マスター左チャンネル出力。クロスフェーダー、アイソレーター、ドライブ、ソフトクリップ後のメインステレオミックス。</li>

    <li><b>Master R</b>: マスター右チャンネル出力。クロスフェーダー、アイソレーター、ドライブ、ソフトクリップ後のメインステレオミックス。</li>

    <li><b>Cue L</b>: ヘッドフォンモニタリング用キュー左チャンネル出力。</li>

    <li><b>Cue R</b>: ヘッドフォンモニタリング用キュー右チャンネル出力。</li>

    </ul>'
controls:
- name: Crossfader
  type: param
  desc:
    en: DJ-style crossfader between Deck A and Deck B. 0%=full A, 100%=full B. CV modulated via Crossfader CV input.
    zh: DJ 風格交叉混合器，Deck A 與 Deck B 之間。0%=完全 A，100%=完全 B。可透過 Crossfader CV 輸入進行 CV 調變。
    ja: DJスタイルのクロスフェーダー。Deck AとDeck Bの間を制御。0%=完全A、100%=完全B。Crossfader CV入力でCV変調可能。
- name: Cue A/B
  type: param
  desc:
    en: Cue routing switch. Selects which deck (A or B) is sent to the Cue output for monitoring.
    zh: Cue 路由切換。選擇將哪個 Deck（A 或 B）送至 Cue 輸出以供監聽。
    ja: キュールーティングスイッチ。モニタリング用にどのデッキ（AまたはB）をキュー出力に送るかを選択。
- name: Isolator Low
  type: param
  desc:
    en: Low band gain (below 250Hz) for master Isolator. Bipolar -1 to +1, default 0 (unity); -1 kill, +1 approximately +12dB boost.
    zh: Master Isolator 低頻增益（250Hz 以下），雙極 -1 至 +1，預設 0（Unity）；-1 為 Kill，+1 約 +12dB Boost。
    ja: マスターアイソレーターの低域ゲイン（250Hz以下）、バイポーラ -1 から +1、デフォルト 0（Unity）；-1 は Kill、+1 は約 +12dB ブースト。
- name: Isolator Mid
  type: param
  desc:
    en: Mid band gain (250Hz to 4kHz) for master Isolator. Bipolar -1 to +1, default 0 (unity); -1 kill, +1 approximately +12dB boost.
    zh: Master Isolator 中頻增益（250Hz 至 4kHz），雙極 -1 至 +1，預設 0（Unity）；-1 為 Kill，+1 約 +12dB Boost。
    ja: マスターアイソレーターの中域ゲイン（250Hz から 4kHz）、バイポーラ -1 から +1、デフォルト 0（Unity）；-1 は Kill、+1 は約 +12dB ブースト。
- name: Isolator High
  type: param
  desc:
    en: High band gain (above 4kHz) for master Isolator. Bipolar -1 to +1, default 0 (unity); -1 kill, +1 approximately +12dB boost.
    zh: Master Isolator 高頻增益（4kHz 以上），雙極 -1 至 +1，預設 0（Unity）；-1 為 Kill，+1 約 +12dB Boost。
    ja: マスターアイソレーターの高域ゲイン（4kHz以上）、バイポーラ -1 から +1、デフォルト 0（Unity）；-1 は Kill、+1 は約 +12dB ブースト。
- name: Master Drive
  type: param
  desc:
    en: Master tube Drive amount with asymmetric saturation and auto makeup gain. Range 0% to 100%, default 0%.
    zh: Master Tube Drive 量，非對稱 Saturation 並自動補償增益，範圍 0% 至 100%，預設 0%。
    ja: マスターチューブ Drive 量、非対称サチュレーションと自動メイクアップゲイン付き。範囲 0% から 100%、デフォルト 0%。
- name: Deck A (16ch poly)
  type: input
  desc:
    en: 16-channel polyphonic input for Deck A. Channels are decoded into individual track signals.
    zh: Deck A 的 16 聲道 Polyphonic 輸入。各聲道解碼為獨立的軌道訊號。
    ja: Deck Aの16チャンネルポリフォニック入力。チャンネルは個別のトラック信号にデコードされます。
- name: Deck B (16ch poly)
  type: input
  desc:
    en: 16-channel polyphonic input for Deck B. Channels are decoded into individual track signals.
    zh: Deck B 的 16 聲道 Polyphonic 輸入。各聲道解碼為獨立的軌道訊號。
    ja: Deck Bの16チャンネルポリフォニック入力。チャンネルは個別のトラック信号にデコードされます。
- name: Crossfader CV
  type: input
  desc:
    en: CV input for crossfader position modulation (±10V, coefficient 0.1, adds offset to crossfader position).
    zh: Crossfader 位置調變的 CV 輸入（±10V，係數 0.1，加至 Crossfader 位置偏移）。
    ja: クロスフェーダー位置変調用CV入力（±10V、係数0.1、クロスフェーダー位置にオフセットを加算）。
- name: Timeline Gate
  type: output
  desc:
    en: Timeline role Gate CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Timeline 角色 Gate CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Timeline ロールの Gate CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Foundation Gate
  type: output
  desc:
    en: Foundation role Gate CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Foundation 角色 Gate CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Foundation ロールの Gate CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Groove Gate
  type: output
  desc:
    en: Groove role Gate CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Groove 角色 Gate CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Groove ロールの Gate CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Lead Gate
  type: output
  desc:
    en: Lead role Gate CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Lead 角色 Gate CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Lead ロールの Gate CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Timeline Pitch
  type: output
  desc:
    en: Timeline role Pitch CV output (1V/Oct), crossfaded between Deck A and Deck B via Crossfader position.
    zh: Timeline 角色 Pitch CV 輸出（1V/Oct），依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Timeline ロールの Pitch CV 出力（1V/Oct）、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Foundation Pitch
  type: output
  desc:
    en: Foundation role Pitch CV output (1V/Oct), crossfaded between Deck A and Deck B via Crossfader position.
    zh: Foundation 角色 Pitch CV 輸出（1V/Oct），依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Foundation ロールの Pitch CV 出力（1V/Oct）、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Groove Pitch
  type: output
  desc:
    en: Groove role Pitch CV output (1V/Oct), crossfaded between Deck A and Deck B via Crossfader position.
    zh: Groove 角色 Pitch CV 輸出（1V/Oct），依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Groove ロールの Pitch CV 出力（1V/Oct）、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Lead Pitch
  type: output
  desc:
    en: Lead role Pitch CV output (1V/Oct), crossfaded between Deck A and Deck B via Crossfader position.
    zh: Lead 角色 Pitch CV 輸出（1V/Oct），依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Lead ロールの Pitch CV 出力（1V/Oct）、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Timeline VelEnv
  type: output
  desc:
    en: Timeline role Velocity Envelope CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Timeline 角色 Velocity Envelope CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Timeline ロールの Velocity Envelope CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Foundation VelEnv
  type: output
  desc:
    en: Foundation role Velocity Envelope CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Foundation 角色 Velocity Envelope CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Foundation ロールの Velocity Envelope CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Groove VelEnv
  type: output
  desc:
    en: Groove role Velocity Envelope CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Groove 角色 Velocity Envelope CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Groove ロールの Velocity Envelope CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Lead VelEnv
  type: output
  desc:
    en: Lead role Velocity Envelope CV output, crossfaded between Deck A and Deck B via Crossfader position.
    zh: Lead 角色 Velocity Envelope CV 輸出，依 Crossfader 位置於 Deck A 與 Deck B 間 Crossfade。
    ja: Lead ロールの Velocity Envelope CV 出力、Crossfader 位置に応じて Deck A と Deck B 間でクロスフェード。
- name: Master L
  type: output
  desc:
    en: Master left channel output. Main stereo mix after crossfader, isolator, drive, and soft clip.
    zh: Master 左聲道輸出。經過 Crossfader、Isolator、Drive 與 Soft Clip 後的主立體聲混音。
    ja: マスター左チャンネル出力。クロスフェーダー、アイソレーター、ドライブ、ソフトクリップ後のメインステレオミックス。
- name: Master R
  type: output
  desc:
    en: Master right channel output. Main stereo mix after crossfader, isolator, drive, and soft clip.
    zh: Master 右聲道輸出。經過 Crossfader、Isolator、Drive 與 Soft Clip 後的主立體聲混音。
    ja: マスター右チャンネル出力。クロスフェーダー、アイソレーター、ドライブ、ソフトクリップ後のメインステレオミックス。
- name: Cue L
  type: output
  desc:
    en: Cue left channel output for headphone monitoring.
    zh: Cue 左聲道輸出，用於耳機監聽。
    ja: ヘッドフォンモニタリング用キュー左チャンネル出力。
- name: Cue R
  type: output
  desc:
    en: Cue right channel output for headphone monitoring.
    zh: Cue 右聲道輸出，用於耳機監聽。
    ja: ヘッドフォンモニタリング用キュー右チャンネル出力。
