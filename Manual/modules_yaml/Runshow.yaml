slug: Runshow
name: Runshow
hp: 12
wide: false
alt: Runshow
description:
  en: Performance timer with real-time clock, bar/beat counter, dual interval timers, and four variable-length bar sequencers
  zh: 演出計時器，具備即時 Clock、Bar/Beat 計數器、雙 Interval Timer 與四個可變長度 Bar Sequencer
  ja: リアルタイムクロック、バー/ビートカウンター、デュアルインターバルタイマー、4つの可変長バーシーケンサーを備えたパフォーマンスタイマー
features:
  en:
  - Real-time show timer display
  - Bar:Beat:Tick counter
  - Dual interval timers
  - Four variable-length sequencers
  - 5 morphable waveform shapes
  zh:
  - 即時演出計時顯示
  - Bar:Beat:Tick 計數器
  - 雙 Interval Timer
  - 四個可變長度 Sequencer
  - 5 種 Morphable Waveform Shape
  ja:
  - リアルタイムショータイマー表示
  - バー:ビート:ティックカウンター
  - デュアルインターバルタイマー
  - 4つの可変長シーケンサー
  - 5種モーファブル波形シェイプ
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Show timing and performance sequencer developed in collaboration with jan0ritter. Combines real-time clock counting, multiple timer systems, and variable-length bar sequencing with morphable waveform generation. Uses C++ chrono library for high-precision elapsed time tracking. Designed for live performance timing with visual progress tracking and precise trigger generation.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Transport Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Start/Stop</b>: Toggle via button or CV. Starts/stops elapsed time counting.</li>
    <li><b>Reset</b>: Resets all counters (clockCount, currentBar, quarter_notes, eighth_notes, sixteenth_notes)</li>
    <li><b>Clock Input</b>: External clock assumed to be 16th notes. 4 clocks = 1 beat, 16 clocks = 1 bar default.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Waveform Generation</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>5 Base Waveforms</b>: Attack (ramp up, instant drop), Triangle (symmetric), Decay (instant rise, ramp down), Sine (half-wave), Square (sustain at 10V)</li>
    <li><b>Attack</b>: Linear ramp from 0V to 10V over 99% of phase, then drops to 0V</li>
    <li><b>Triangle</b>: Rises from 0V to 10V in first half, falls back to 0V in second half</li>
    <li><b>Decay</b>: Starts at 10V, then linear ramp down to 0V over 99% of phase</li>
    <li><b>Sine</b>: Half-wave sine shape, 0-10V unipolar</li>
    <li><b>Square</b>: Sustains at 10V for entire duration</li>
    <li><b>Morphing</b>: Linear interpolation between adjacent waveforms. Morph 0-1: Attack↔Triangle, 1-2: Triangle↔Decay, 2-3: Decay↔Sine, 3-4: Sine↔Square</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Timer Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Pulse Width</b>: 1-99%, determines waveform duration as percentage of interval</li>
    <li><b>Waveform</b>: 0-4 snapped value selecting/morphing between shapes</li>
    <li><b>Bar 1-4</b>: Each bar length 1-16 clocks (integer snap). Total cycle = sum of all 4 bar lengths.</li>
    <li><b>Timer Max</b>: Adjustable maximum for the 5Min progress bar (1-60 minutes, default: 5). Draggable yellow line on first bar.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Interval Timers</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>5Min Timer</b>: Triggers every 5 minutes until 30 minutes elapsed (5 triggers total)</li>
    <li><b>1Min Timer</b>: Triggers every 1 minute until 15 minutes elapsed (15 triggers total)</li>
    <li><b>Duration</b>: Waveform length equals pulse width percentage of interval</li>
    <li><b>Phase</b>: Advances proportionally each sample, resets when complete</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Bar Cycle Logic</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Cycle Position</b>: Current position wraps within total cycle length</li>
    <li><b>Bar Detection</b>: Compares clocksInCycle against cumulative bar lengths</li>
    <li><b>Transition Trigger</b>: Waveform triggered when currentBarInCycle changes</li>
    <li><b>Clock Interval Tracking</b>: Measures time between clocks for adaptive pulse width</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Visual Display</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time Code</b>: M:SS:CC format. Minutes limited to 0-999 (3 digits).</li>
    <li><b>Bar:Beat:Tick</b>: BBB:B:T format. Beat = (clockCount/4) % 4 + 1, Tick = clockCount % 4 + 1</li>
    <li><b>Beat LED</b>: Full brightness on beat, then fades smoothly</li>
    <li><b>6 Progress Bars</b>: 5m (6 segments, max adjustable via Timer Max 1-60 min), 1m (15 segments), Bar 1-4 (4 segments each)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Module width: 12HP</li>
    <li>Clock detection: SchmittTrigger</li>
    <li>Time precision: chrono::steady_clock</li>
    <li>Output range: 0-10V unipolar</li>
    <li>Bar length: 1-16 clocks (integer snap)</li>
    <li>Timer Max: 1-60 minutes (integer snap, default: 5)</li>
    <li>Waveform morph: Continuous 0.0-4.0</li>
    <li>State persistence: running, clockCount, currentBar, elapsedSeconds saved to JSON</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Reset</b>: Reset button. Resets all counters and timers to zero.</li>
    <li><b>Start/Stop</b>: Toggle button. Starts or stops elapsed time counting.</li>
    <li><b>Pulse Width (Bar %)</b>: Waveform duration as percentage of interval 1-99% (default: 10%).</li>
    <li><b>Waveform</b>: Selects waveform shape 0-4 (snap). Attack, Triangle, Decay, Sine, Square.</li>
    <li><b>Bar 1 Length</b>: Bar 1 clock count 1-16 (integer snap, default: 16).</li>
    <li><b>Bar 2 Length</b>: Bar 2 clock count 1-16 (integer snap, default: 16).</li>
    <li><b>Bar 3 Length</b>: Bar 3 clock count 1-16 (integer snap, default: 16).</li>
    <li><b>Bar 4 Length</b>: Bar 4 clock count 1-16 (integer snap, default: 16).</li>
    <li><b>Timer Max</b>: Maximum minutes for 5Min progress bar 1-60 (integer snap, default: 5). Draggable yellow line.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">I/O Reference</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Clock</b>: External clock input (assumed 16th notes). 4 clocks = 1 beat.</li>
    <li><b>Reset</b>: Reset CV trigger input.</li>
    <li><b>Start/Stop</b>: Start/Stop CV trigger input.</li>
    <li><b>5Min Timer</b>: Triggers waveform every 5 minutes until 30 minutes elapsed (0-10V).</li>
    <li><b>1Min Timer</b>: Triggers waveform every 1 minute until 15 minutes elapsed (0-10V).</li>
    <li><b>Bar 1 Timer</b>: Waveform output triggered at start of Bar 1 (0-10V).</li>
    <li><b>Bar 2 Timer</b>: Waveform output triggered at start of Bar 2 (0-10V).</li>
    <li><b>Bar 3 Timer</b>: Waveform output triggered at start of Bar 3 (0-10V).</li>
    <li><b>Bar 4 Timer</b>: Waveform output triggered at start of Bar 4 (0-10V).</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">與 jan0ritter 共同開發的演出計時與 Performance Sequencer。結合即時 Clock 計數、多重 Timer 系統與可變長度 Bar Sequencing 及 Morphable Waveform 生成。使用 C++ chrono 函式庫進行高精度經過時間追蹤。專為現場演出計時設計，具備視覺進度追蹤與精確 Trigger 生成。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Transport 控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Start/Stop</b>: 透過按鈕或 CV 切換。開始/停止經過時間計數。</li>
    <li><b>Reset</b>: 重置所有計數器（clockCount、currentBar、quarter_notes、eighth_notes、sixteenth_notes）</li>
    <li><b>Clock Input</b>: 外部 Clock 假定為 16 分音符。預設 4 個 Clock = 1 Beat，16 個 Clock = 1 Bar。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Waveform 生成</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>5 Base Waveforms</b>: Attack（上升斜坡，瞬間下降）、Triangle（對稱）、Decay（瞬間上升，下降斜坡）、Sine（半波）、Square（持續於 10V）</li>
    <li><b>Attack</b>: 0V 到 10V 線性上升佔 99% Phase，然後下降至 0V</li>
    <li><b>Triangle</b>: 前半段從 0V 上升至 10V，後半段下降回 0V</li>
    <li><b>Decay</b>: 從 10V 開始，線性下降至 0V 佔 99% Phase</li>
    <li><b>Sine</b>: 半波 Sine 形狀，0-10V 單極性</li>
    <li><b>Square</b>: 整個持續時間維持於 10V</li>
    <li><b>Morphing</b>: 相鄰 Waveform 間的線性插值。Morph 0-1: Attack↔Triangle，1-2: Triangle↔Decay，2-3: Decay↔Sine，3-4: Sine↔Square</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Timer 控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Pulse Width</b>: 1-99%，決定 Waveform 持續時間佔 Interval 的百分比</li>
    <li><b>Waveform</b>: 0-4 對齊值，選擇/變形於形狀間</li>
    <li><b>Bar 1-4</b>: 各 Bar 長度 1-16 個 Clock（整數對齊）。總循環 = 所有 4 個 Bar 長度之總和。</li>
    <li><b>Timer Max</b>: 5Min 進度條的可調最大值（1-60 分鐘，預設: 5）。第一條進度條上的黃色線可拖曳。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Interval Timer</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>5Min Timer</b>: 每 5 分鐘觸發一次，直到經過 30 分鐘（總共 5 次觸發）</li>
    <li><b>1Min Timer</b>: 每 1 分鐘觸發一次，直到經過 15 分鐘（總共 15 次觸發）</li>
    <li><b>Duration</b>: Waveform 長度等於 Pulse Width 百分比乘以 Interval</li>
    <li><b>Phase</b>: 每個 Sample 按比例遞進，完成時重置</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Bar Cycle 邏輯</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Cycle Position</b>: 目前位置在總 Cycle 長度內循環</li>
    <li><b>Bar Detection</b>: 比較 clocksInCycle 與累積 Bar 長度</li>
    <li><b>Transition Trigger</b>: 當 currentBarInCycle 改變時觸發 Waveform</li>
    <li><b>Clock Interval Tracking</b>: 測量 Clock 間的時間以適應性調整 Pulse Width</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">視覺顯示</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time Code</b>: M:SS:CC 格式。分鐘限制為 0-999（3 位數）。</li>
    <li><b>Bar:Beat:Tick</b>: BBB:B:T 格式。Beat = (clockCount/4) % 4 + 1，Tick = clockCount % 4 + 1</li>
    <li><b>Beat LED</b>: Beat 時全亮度，然後平滑淡出</li>
    <li><b>6 Progress Bars</b>: 5m（6 段，最大值由 Timer Max 1-60 分鐘調整）、1m（15 段）、Bar 1-4（各 4 段）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>模組寬度：12HP</li>
    <li>Clock 偵測：SchmittTrigger</li>
    <li>時間精度：chrono::steady_clock</li>
    <li>輸出範圍：0-10V 單極性</li>
    <li>Bar 長度：1-16 個 Clock（整數對齊）</li>
    <li>Timer Max：1-60 分鐘（整數對齊，預設: 5）</li>
    <li>Waveform Morph：連續 0.0-4.0</li>
    <li>狀態保存：running、clockCount、currentBar、elapsedSeconds 儲存至 JSON</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Reset</b>: 重設按鈕。重設所有計數器與 Timer 為零。</li>
    <li><b>Start/Stop</b>: 切換按鈕。啟動或停止經過時間計數。</li>
    <li><b>Pulse Width (Bar %)</b>: Waveform 持續時間佔 Interval 的百分比 1-99%（預設: 10%）。</li>
    <li><b>Waveform</b>: 選擇 Waveform 形狀 0-4（Snap）。Attack、Triangle、Decay、Sine、Square。</li>
    <li><b>Bar 1 Length</b>: Bar 1 Clock 數量 1-16（整數對齊，預設: 16）。</li>
    <li><b>Bar 2 Length</b>: Bar 2 Clock 數量 1-16（整數對齊，預設: 16）。</li>
    <li><b>Bar 3 Length</b>: Bar 3 Clock 數量 1-16（整數對齊，預設: 16）。</li>
    <li><b>Bar 4 Length</b>: Bar 4 Clock 數量 1-16（整數對齊，預設: 16）。</li>
    <li><b>Timer Max</b>: 5Min 進度條的最大分鐘數 1-60（整數對齊，預設: 5）。黃色線可拖曳。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">I/O Reference</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Clock</b>: 外部 Clock 輸入（假定為 16 分音符）。4 個 Clock = 1 Beat。</li>
    <li><b>Reset</b>: 重設 CV 觸發輸入。</li>
    <li><b>Start/Stop</b>: Start/Stop CV 觸發輸入。</li>
    <li><b>5Min Timer</b>: 每 5 分鐘觸發 Waveform，直到 30 分鐘（0-10V）。</li>
    <li><b>1Min Timer</b>: 每 1 分鐘觸發 Waveform，直到 15 分鐘（0-10V）。</li>
    <li><b>Bar 1 Timer</b>: Bar 1 開始時觸發的 Waveform 輸出（0-10V）。</li>
    <li><b>Bar 2 Timer</b>: Bar 2 開始時觸發的 Waveform 輸出（0-10V）。</li>
    <li><b>Bar 3 Timer</b>: Bar 3 開始時觸發的 Waveform 輸出（0-10V）。</li>
    <li><b>Bar 4 Timer</b>: Bar 4 開始時觸發的 Waveform 輸出（0-10V）。</li>
    </ul>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">jan0ritterと共同開発したショータイミングとパフォーマンスシーケンサー。リアルタイムクロックカウント、複数タイマーシステム、可変長バーシーケンスとモーファブル波形生成を統合。C++ chronoライブラリを使用した高精度経過時間追跡。視覚的進行追跡と正確なトリガー生成によるライブパフォーマンスタイミング向けに設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">トランスポートコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Start/Stop</b>: ボタンまたはCVで切り替え。経過時間カウントを開始/停止。</li>
    <li><b>Reset</b>: 全カウンターをリセット（clockCount、currentBar、quarter_notes、eighth_notes、sixteenth_notes）</li>
    <li><b>Clock Input</b>: 外部クロックは16分音符と想定。デフォルトで4クロック = 1ビート、16クロック = 1バー。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">波形生成</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>5 Base Waveforms</b>: Attack（ランプアップ、瞬間ドロップ）、Triangle（対称）、Decay（瞬間ライズ、ランプダウン）、Sine（半波）、Square（10Vでサステイン）</li>
    <li><b>Attack</b>: 0Vから10Vへフェーズの99%で線形上昇、その後0Vに降下</li>
    <li><b>Triangle</b>: 前半で0Vから10Vへ上昇、後半で0Vへ降下</li>
    <li><b>Decay</b>: 10Vで開始、フェーズの99%で0Vへ線形降下</li>
    <li><b>Sine</b>: 半波サイン形状、0-10Vユニポーラ</li>
    <li><b>Square</b>: 全持続時間10Vを維持</li>
    <li><b>Morphing</b>: 隣接波形間の線形補間。Morph 0-1: Attack↔Triangle、1-2: Triangle↔Decay、2-3: Decay↔Sine、3-4: Sine↔Square</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">タイマーコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Pulse Width</b>: 1-99%、インターバルに対する波形持続時間の割合を決定</li>
    <li><b>Waveform</b>: 0-4スナップ値、形状間の選択/モーフィング</li>
    <li><b>Bar 1-4</b>: 各バー長1-16クロック（整数スナップ）。総サイクル = 全4バー長の合計。</li>
    <li><b>Timer Max</b>: 5Minプログレスバーの調整可能な最大値（1-60分、デフォルト: 5）。最初のバー上の黄色ラインをドラッグ可能。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">インターバルタイマー</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>5Min Timer</b>: 30分経過まで5分毎にトリガー（計5回トリガー）</li>
    <li><b>1Min Timer</b>: 15分経過まで1分毎にトリガー（計15回トリガー）</li>
    <li><b>Duration</b>: 波形長はパルス幅パーセンテージとインターバルの積</li>
    <li><b>Phase</b>: 各サンプルで比例進行、完了時リセット</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">バーサイクルロジック</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Cycle Position</b>: 現在位置は総サイクル長内でラップ</li>
    <li><b>Bar Detection</b>: clocksInCycleと累積バー長を比較</li>
    <li><b>Transition Trigger</b>: currentBarInCycle変更時に波形トリガー</li>
    <li><b>Clock Interval Tracking</b>: クロック間時間を測定し適応的パルス幅調整</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">視覚表示</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time Code</b>: M:SS:CC形式。分は0-999に制限（3桁）。</li>
    <li><b>Bar:Beat:Tick</b>: BBB:B:T形式。Beat = (clockCount/4) % 4 + 1、Tick = clockCount % 4 + 1</li>
    <li><b>Beat LED</b>: ビート時フル輝度、その後スムーズにフェードアウト</li>
    <li><b>6 Progress Bars</b>: 5m（6セグメント、Timer Max 1-60分で最大値調整可能）、1m（15セグメント）、Bar 1-4（各4セグメント）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>モジュール幅：12HP</li>
    <li>クロック検出：SchmittTrigger</li>
    <li>時間精度：chrono::steady_clock</li>
    <li>出力範囲：0-10Vユニポーラ</li>
    <li>バー長：1-16クロック（整数スナップ）</li>
    <li>Timer Max：1-60分（整数スナップ、デフォルト: 5）</li>
    <li>波形モーフ：連続0.0-4.0</li>
    <li>状態保存：running、clockCount、currentBar、elapsedSecondsをJSONに保存</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Parameter Reference</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Reset</b>: リセットボタン。全カウンターとタイマーをゼロにリセット。</li>
    <li><b>Start/Stop</b>: トグルボタン。経過時間カウントを開始/停止。</li>
    <li><b>Pulse Width (Bar %)</b>: インターバルに対する波形持続時間の割合 1-99%（デフォルト: 10%）。</li>
    <li><b>Waveform</b>: 波形シェイプ選択 0-4（スナップ）。Attack、Triangle、Decay、Sine、Square。</li>
    <li><b>Bar 1 Length</b>: バー1クロック数 1-16（整数スナップ、デフォルト: 16）。</li>
    <li><b>Bar 2 Length</b>: バー2クロック数 1-16（整数スナップ、デフォルト: 16）。</li>
    <li><b>Bar 3 Length</b>: バー3クロック数 1-16（整数スナップ、デフォルト: 16）。</li>
    <li><b>Bar 4 Length</b>: バー4クロック数 1-16（整数スナップ、デフォルト: 16）。</li>
    <li><b>Timer Max</b>: 5Minプログレスバーの最大分数 1-60（整数スナップ、デフォルト: 5）。黄色ラインをドラッグ可能。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">I/O Reference</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Clock</b>: 外部クロック入力（16分音符と想定）。4クロック = 1ビート。</li>
    <li><b>Reset</b>: リセットCVトリガー入力。</li>
    <li><b>Start/Stop</b>: Start/Stop CVトリガー入力。</li>
    <li><b>5Min Timer</b>: 30分経過まで5分毎に波形トリガー（0-10V）。</li>
    <li><b>1Min Timer</b>: 15分経過まで1分毎に波形トリガー（0-10V）。</li>
    <li><b>Bar 1 Timer</b>: バー1開始時にトリガーされる波形出力（0-10V）。</li>
    <li><b>Bar 2 Timer</b>: バー2開始時にトリガーされる波形出力（0-10V）。</li>
    <li><b>Bar 3 Timer</b>: バー3開始時にトリガーされる波形出力（0-10V）。</li>
    <li><b>Bar 4 Timer</b>: バー4開始時にトリガーされる波形出力（0-10V）。</li>
    </ul>
controls:
- name: Reset
  type: param
  desc:
    en: Reset button. Resets all counters (clockCount, currentBar, quarter_notes, eighth_notes, sixteenth_notes) to zero.
    zh: Reset 按鈕。重置所有計數器（clockCount、currentBar、quarter_notes、eighth_notes、sixteenth_notes）為零。
    ja: Resetボタン。全カウンター（clockCount、currentBar、quarter_notes、eighth_notes、sixteenth_notes）をゼロにリセット。
- name: Start/Stop
  type: param
  desc:
    en: Start/Stop toggle button. Starts or stops elapsed time counting.
    zh: Start/Stop 切換按鈕。啟動或停止經過時間計數。
    ja: Start/Stopトグルボタン。経過時間カウントを開始/停止。
- name: Pulse Width (Bar %)
  type: param
  desc:
    en: 'Waveform duration as percentage of Interval, 1-99% (default: 10%).'
    zh: 'Waveform 持續時間佔 Interval 的百分比，1-99%（預設：10%）。'
    ja: 'インターバルに対する波形持続時間の割合、1-99%（デフォルト：10%）。'
- name: Waveform
  type: param
  desc:
    en: 'Waveform shape selector 0-4 (snap, default: 4). Attack, Triangle, Decay, Sine, Square.'
    zh: 'Waveform 形狀選擇 0-4（Snap，預設：4）。Attack、Triangle、Decay、Sine、Square。'
    ja: '波形シェイプ選択 0-4（スナップ、デフォルト：4）。Attack、Triangle、Decay、Sine、Square。'
- name: Bar 1 Length
  type: param
  desc:
    en: 'Bar 1 Clock count, 1-16 (integer snap, default: 16).'
    zh: 'Bar 1 Clock 數量，1-16（整數 Snap，預設：16）。'
    ja: 'Bar 1クロック数、1-16（整数スナップ、デフォルト：16）。'
- name: Bar 2 Length
  type: param
  desc:
    en: 'Bar 2 Clock count, 1-16 (integer snap, default: 16).'
    zh: 'Bar 2 Clock 數量，1-16（整數 Snap，預設：16）。'
    ja: 'Bar 2クロック数、1-16（整数スナップ、デフォルト：16）。'
- name: Bar 3 Length
  type: param
  desc:
    en: 'Bar 3 Clock count, 1-16 (integer snap, default: 16).'
    zh: 'Bar 3 Clock 數量，1-16（整數 Snap，預設：16）。'
    ja: 'Bar 3クロック数、1-16（整数スナップ、デフォルト：16）。'
- name: Bar 4 Length
  type: param
  desc:
    en: 'Bar 4 Clock count, 1-16 (integer snap, default: 16).'
    zh: 'Bar 4 Clock 數量，1-16（整數 Snap，預設：16）。'
    ja: 'Bar 4クロック数、1-16（整数スナップ、デフォルト：16）。'
- name: Timer Max
  type: param
  desc:
    en: 'Maximum minutes for the 5Min progress bar, 1-60 (integer snap, default: 5). Draggable yellow line on first bar.'
    zh: '5Min 進度條最大分鐘數，1-60（整數 Snap，預設：5）。第一條進度條上的黃線可拖曳。'
    ja: '5Minプログレスバーの最大分数、1-60（整数スナップ、デフォルト：5）。最初のバー上の黄色ラインをドラッグ可能。'
- name: Clock
  type: input
  desc:
    en: External Clock input (assumed 16th notes). 4 Clocks = 1 Beat.
    zh: 外部 Clock 輸入（假定為 16 分音符）。4 個 Clock = 1 Beat。
    ja: 外部クロック入力（16分音符と想定）。4クロック = 1ビート。
- name: Reset
  type: input
  desc:
    en: Reset Trigger input. Resets all counters to zero.
    zh: Reset Trigger 輸入。重置所有計數器為零。
    ja: Resetトリガー入力。全カウンターをゼロにリセット。
- name: Start/Stop
  type: input
  desc:
    en: Start/Stop Trigger input. Toggles elapsed time counting.
    zh: Start/Stop Trigger 輸入。切換經過時間計數。
    ja: Start/Stopトリガー入力。経過時間カウントを切り替え。
- name: 5Min Timer
  type: output
  desc:
    en: Waveform output triggered every 5 minutes until 30 minutes elapsed (5 triggers total, 0-10V).
    zh: 每 5 分鐘觸發 Waveform 輸出，直到 30 分鐘（共 5 次 Trigger，0-10V）。
    ja: 30分経過まで5分毎に波形出力をトリガー（計5回Trigger、0-10V）。
- name: 1Min Timer
  type: output
  desc:
    en: Waveform output triggered every 1 minute until 15 minutes elapsed (15 triggers total, 0-10V).
    zh: 每 1 分鐘觸發 Waveform 輸出，直到 15 分鐘（共 15 次 Trigger，0-10V）。
    ja: 15分経過まで1分毎に波形出力をトリガー（計15回Trigger、0-10V）。
- name: Bar 1 Timer
  type: output
  desc:
    en: Waveform output triggered at start of Bar 1 (0-10V).
    zh: Bar 1 開始時觸發的 Waveform 輸出（0-10V）。
    ja: Bar 1開始時にトリガーされる波形出力（0-10V）。
- name: Bar 2 Timer
  type: output
  desc:
    en: Waveform output triggered at start of Bar 2 (0-10V).
    zh: Bar 2 開始時觸發的 Waveform 輸出（0-10V）。
    ja: Bar 2開始時にトリガーされる波形出力（0-10V）。
- name: Bar 3 Timer
  type: output
  desc:
    en: Waveform output triggered at start of Bar 3 (0-10V).
    zh: Bar 3 開始時觸發的 Waveform 輸出（0-10V）。
    ja: Bar 3開始時にトリガーされる波形出力（0-10V）。
- name: Bar 4 Timer
  type: output
  desc:
    en: Waveform output triggered at start of Bar 4 (0-10V).
    zh: Bar 4 開始時觸發的 Waveform 輸出（0-10V）。
    ja: Bar 4開始時にトリガーされる波形出力（0-10V）。
