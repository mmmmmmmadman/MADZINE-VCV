slug: ADGenerator
name: AD Generator
hp: 8
wide: false
alt: AD Generator
description:
  en: Triple AD envelope generator with dual processing modes, global parameter controls, and per-track band pass filtering
  zh: 三軌 AD Envelope 生成器，具備雙處理模式、Global 參數控制與各軌 Band Pass Filter
  ja: デュアル処理モード、グローバルパラメータ制御、トラック別バンドパスフィルターを備えた3トラックADエンベロープ生成器
features:
  en:
  - Three independent AD envelope tracks
  - Trigger mode and Hybrid follower mode
  - Global Attack/Decay controls
  - Band Pass Filter with frequency and gain
  - Auto-route for single-source multi-band processing
  zh:
  - 三軌獨立 AD Envelope
  - Trigger 模式與 Hybrid Follower 模式
  - Global Attack/Decay 控制
  - Band Pass Filter 含頻率與增益
  - Auto-route 單一來源多頻帶處理
  ja:
  - 3トラック独立ADエンベロープ
  - トリガーモードとハイブリッドフォロワーモード
  - グローバルアタック/ディケイ制御
  - 周波数・ゲイン付きバンドパスフィルター
  - 単一ソースマルチバンド処理用Auto-route
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Three-track Attack-Decay envelope generator with dual processing modes, designed for both traditional trigger-based operation and advanced audio-following applications. Each track operates independently with its own envelope parameters while sharing global offset controls. The innovative Follower mode enables hybrid processing that responds to both discrete triggers and continuous audio dynamics.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow Architecture</h3>
    <p style="margin-bottom: 1rem;">Input → [Auto-Route Selection] → [Optional 4-Stage BPF] → [Envelope Generator] → [Optional Gain Stage] → Output. When Follower is enabled, the signal passes through a cascaded bandpass filter before envelope detection. The envelope generator operates in hybrid mode, outputting the maximum of trigger-based and amplitude-following envelopes.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Global Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack All</b>: Global attack time offset (-1.0 to +1.0). Adds up to ±0.5s offset to all track attack times. Useful for simultaneously shifting all envelopes faster or slower.</li>
    <li><b>Decay All</b>: Global decay time offset (-1.0 to +1.0). Same behavior as Attack All but for decay times.</li>
    <li><b>Auto Route</b>: Auto-route toggle (default: ON). When enabled, Track 1 input is internally routed to all three tracks, allowing single-source multi-band envelope extraction when combined with different BPF frequencies.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Per-Track Envelope Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Track 1 Trigger</b>: Trigger or audio input for Track 1. In Trigger-only mode, uses Schmitt trigger detection. In Hybrid mode, requires >9.5V for trigger while following audio dynamics.</li>
    <li><b>Track 2 Trigger</b>: Trigger or audio input for Track 2. Same behavior as Track 1.</li>
    <li><b>Track 3 Trigger</b>: Trigger or audio input for Track 3. Same behavior as Track 1.</li>
    <li><b>Track 1 Attack</b>: Attack time with exponential scaling. Formula: 10^((param-0.5)*6). At 0%: ~1ms, at 50%: ~1s. Default: 0.002.</li>
    <li><b>Track 2 Attack</b>: Attack time for Track 2. Same scaling. Default: 0.</li>
    <li><b>Track 3 Attack</b>: Attack time for Track 3. Same scaling. Default: 0.</li>
    <li><b>Track 1 Decay</b>: Decay time with identical exponential scaling. Default: 0.3 (~63ms actual time).</li>
    <li><b>Track 2 Decay</b>: Decay time for Track 2. Default: 0.3.</li>
    <li><b>Track 3 Decay</b>: Decay time for Track 3. Default: 0.3.</li>
    <li><b>Track 1 Curve</b>: S-curve shaping (-0.99 to +0.99). Negative = exponential, positive = logarithmic. Default: -0.748.</li>
    <li><b>Track 2 Curve</b>: S-curve shaping for Track 2. Default: -0.832.</li>
    <li><b>Track 3 Curve</b>: S-curve shaping for Track 3. Default: -0.731.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Follower Mode Controls</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Track 1 BPF Enable</b>: Toggle between Trigger-only (OFF) and Hybrid (ON) modes for Track 1. Blue LED indicates active state.</li>
    <li><b>Track 2 BPF Enable</b>: Toggle Hybrid mode for Track 2.</li>
    <li><b>Track 3 BPF Enable</b>: Toggle Hybrid mode for Track 3.</li>
    <li><b>Track 1 BPF Frequency</b>: 4-stage cascaded bandpass filter center frequency (20Hz-8kHz). Default: 200Hz (bass).</li>
    <li><b>Track 2 BPF Frequency</b>: BPF center frequency for Track 2. Default: 1kHz (mid).</li>
    <li><b>Track 3 BPF Frequency</b>: BPF center frequency for Track 3. Default: 5kHz (high).</li>
    <li><b>Track 1 BPF Gain</b>: Post-filter output gain (0.1x-100x). Default: 3.0x.</li>
    <li><b>Track 2 BPF Gain</b>: Post-filter gain for Track 2. Default: 3.0x.</li>
    <li><b>Track 3 BPF Gain</b>: Post-filter gain for Track 3. Default: 3.0x.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Processing Modes Explained</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Trigger-Only (Follower OFF)</b>: Classic AD envelope behavior. Envelope triggers on rising edge using standard Schmitt trigger detection. Attack phase ramps from 0 to peak, then Decay phase returns to 0. Ignores audio content between triggers.</li>
    <li><b>Hybrid (Follower ON)</b>: Advanced dual-engine processing. Runs BOTH trigger envelope AND amplitude follower simultaneously, outputting the MAXIMUM of both. The follower uses rectified input with configurable attack/release coefficients. This mode excels at extracting dynamics from complex audio while still responding to explicit triggers.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Track 1 Envelope</b>: Track 1 envelope output (0-10V). When Follower is ON, output is multiplied by GAIN setting.</li>
    <li><b>Track 2 Envelope</b>: Track 2 envelope output (0-10V). Same behavior.</li>
    <li><b>Track 3 Envelope</b>: Track 3 envelope output (0-10V). Same behavior.</li>
    <li><b>Sum</b>: Mixed output of all three tracks with 0.33x scaling per track to prevent clipping. Final output clamped to 0-10V.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Creative Applications</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Multi-band Dynamics</b>: Enable Auto-Route, set different BPF frequencies (e.g., 100Hz/800Hz/4kHz), and use outputs to control frequency-specific VCAs or filters.</li>
    <li><b>Drum Envelope Extraction</b>: Feed a drum loop, enable Follower mode, tune FREQ to isolate kick (low), snare (mid), or hi-hat (high) dynamics.</li>
    <li><b>Sidechain Ducking</b>: Use individual outputs to modulate other module parameters based on specific frequency content.</li>
    <li><b>Polyrhythmic Triggers</b>: With Auto-Route OFF, feed different clock divisions to each track for complex envelope patterns.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Input voltage: ±10V (audio/CV), trigger threshold: Schmitt trigger (Trigger-only) / 9.5V (Hybrid)</li>
    <li>Output voltage: 0-10V (unipolar envelope); may exceed 10V when Follower ON with GAIN >1x</li>
    <li>Attack/Decay range: ~1ms to ~1000s (exponential mapping)</li>
    <li>BPF: 4-stage cascaded bandpass, 20Hz-8kHz</li>
    <li>Envelope follower: Attack coeff = 1-exp(-dt/(ATK*0.1)), Release coeff = 1-exp(-dt/(DEC*0.5))</li>
    <li>Processing: 32-bit floating point</li>
    <li>Module width: 8HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Right-Click Menu</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Panel Theme</b>: Light / Dark panel appearance</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">三軌 Attack-Decay Envelope 生成器，具備雙處理模式，適用於傳統 Trigger 操作與進階 Audio Following 應用。每軌獨立運作並擁有自己的 Envelope 參數，同時共用 Global Offset 控制。Follower 模式可同時回應離散 Trigger 與連續 Audio 動態。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow 架構</h3>
    <p style="margin-bottom: 1rem;">Input → [Auto-Route 選擇] → [可選 4-Stage BPF] → [Envelope Generator] → [Optional Gain Stage] → Output。啟用 Follower 時，訊號在 Envelope 偵測前先通過 Cascaded Bandpass Filter。Envelope Generator 以 Hybrid 模式運作，輸出 Trigger Envelope 與 Amplitude Following Envelope 的最大值。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Global 控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack All</b>: Global Attack 時間偏移（-1.0 至 +1.0）。對所有軌道 Attack 時間加上最多 ±0.5s 偏移。</li>
    <li><b>Decay All</b>: Global Decay 時間偏移（-1.0 至 +1.0）。與 Attack All 相同但作用於 Decay 時間。</li>
    <li><b>Auto Route</b>: Auto-route 開關（預設：ON）。啟用時，Track 1 輸入內部路由至所有三軌，搭配不同 BPF 頻率可實現單一來源多頻帶 Envelope 擷取。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">各軌 Envelope 控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Track 1 Trigger</b>: 軌道 1 的 Trigger 或 Audio 輸入。Trigger-only 模式使用 Schmitt Trigger 偵測。Hybrid 模式需要 >9.5V 觸發並追蹤 Audio 動態。</li>
    <li><b>Track 2 Trigger</b>: 軌道 2 的 Trigger 或 Audio 輸入。行為同軌道 1。</li>
    <li><b>Track 3 Trigger</b>: 軌道 3 的 Trigger 或 Audio 輸入。行為同軌道 1。</li>
    <li><b>Track 1 Attack</b>: Attack 時間，指數縮放。公式：10^((param-0.5)*6)。0%：約 1ms，50%：約 1s。預設：0.002。</li>
    <li><b>Track 2 Attack</b>: 軌道 2 Attack 時間。相同縮放。預設：0。</li>
    <li><b>Track 3 Attack</b>: 軌道 3 Attack 時間。相同縮放。預設：0。</li>
    <li><b>Track 1 Decay</b>: Decay 時間，相同指數縮放。預設：0.3（實際約 63ms）。</li>
    <li><b>Track 2 Decay</b>: 軌道 2 Decay 時間。預設：0.3。</li>
    <li><b>Track 3 Decay</b>: 軌道 3 Decay 時間。預設：0.3。</li>
    <li><b>Track 1 Curve</b>: S-curve 形狀（-0.99 至 +0.99）。負值 = 指數，正值 = 對數。預設：-0.748。</li>
    <li><b>Track 2 Curve</b>: 軌道 2 S-curve 形狀。預設：-0.832。</li>
    <li><b>Track 3 Curve</b>: 軌道 3 S-curve 形狀。預設：-0.731。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Follower 模式控制</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Track 1 BPF Enable</b>: 切換軌道 1 的 Trigger-only（OFF）與 Hybrid（ON）模式。藍色 LED 指示啟用狀態。</li>
    <li><b>Track 2 BPF Enable</b>: 切換軌道 2 的 Hybrid 模式。</li>
    <li><b>Track 3 BPF Enable</b>: 切換軌道 3 的 Hybrid 模式。</li>
    <li><b>Track 1 BPF Frequency</b>: 4-stage Cascaded Bandpass Filter 中心頻率（20Hz-8kHz）。預設：200Hz（低頻）。</li>
    <li><b>Track 2 BPF Frequency</b>: 軌道 2 BPF 中心頻率。預設：1kHz（中頻）。</li>
    <li><b>Track 3 BPF Frequency</b>: 軌道 3 BPF 中心頻率。預設：5kHz（高頻）。</li>
    <li><b>Track 1 BPF Gain</b>: Filter 後輸出增益（0.1x-100x）。預設：3.0x。</li>
    <li><b>Track 2 BPF Gain</b>: 軌道 2 Filter 後增益。預設：3.0x。</li>
    <li><b>Track 3 BPF Gain</b>: 軌道 3 Filter 後增益。預設：3.0x。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">處理模式說明</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Trigger-Only (Follower OFF)</b>: 經典 AD Envelope 行為。使用標準 Schmitt Trigger 偵測於上升沿觸發 Envelope。Attack 階段從 0 上升至峰值，Decay 階段返回 0。忽略 Trigger 之間的 Audio 內容。</li>
    <li><b>Hybrid (Follower ON)</b>: 進階雙引擎處理。同時執行 Trigger Envelope 與 Amplitude Follower，輸出兩者最大值。Follower 使用整流輸入並具有可配置 Attack/Release 係數。此模式擅長從複雜 Audio 中擷取動態，同時仍回應明確 Trigger。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>1、2、3</b>: 各軌獨立 Envelope 輸出（0-10V）。Follower 開啟時，輸出乘以 GAIN 設定。</li>
    <li><b>MIYA（Sum）</b>: 三軌混合輸出，每軌 0.33x 縮放以防止 Clipping。最終輸出限制於 0-10V。以三眼角色圖案命名。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">創意應用</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Multi-band Dynamics</b>: 啟用 Auto-Route，設定不同 BPF 頻率（如 100Hz/800Hz/4kHz），使用輸出控制頻率特定 VCA 或 Filter。</li>
    <li><b>Drum Envelope Extraction</b>: 輸入鼓組 Loop，啟用 Follower 模式，調整 FREQ 以分離 Kick（低頻）、Snare（中頻）或 Hi-hat（高頻）動態。</li>
    <li><b>Sidechain Ducking</b>: 使用各軌個別輸出，根據特定頻率內容調變其他模組的參數。</li>
    <li><b>Polyrhythmic Triggers</b>: Auto-Route 關閉時，對各軌輸入不同時鐘分頻以產生複雜 Envelope 圖案。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>輸入電壓：±10V（Audio/CV），Trigger 閾值：Schmitt Trigger（Trigger-only）/ 9.5V（Hybrid）</li>
    <li>輸出電壓：0-10V（Unipolar Envelope）；Follower ON 且 GAIN >1x 時可能超過 10V</li>
    <li>Attack/Decay 範圍：約 1ms 至 1000s（指數映射）</li>
    <li>BPF：4-stage Cascaded Bandpass，20Hz-8kHz</li>
    <li>Envelope Follower：Attack 係數 = 1-exp(-dt/(ATK*0.1))，Release 係數 = 1-exp(-dt/(DEC*0.5))</li>
    <li>處理：32-bit 浮點</li>
    <li>模組寬度：8HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">參數對照</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack All</b>: Global Attack 時間偏移（-1.0 至 +1.0）。對所有軌道 Attack 時間加上最多 +-0.5s 偏移。</li>
    <li><b>Decay All</b>: Global Decay 時間偏移（-1.0 至 +1.0）。與 Attack All 相同但作用於 Decay 時間。</li>
    <li><b>Auto Route</b>: Auto-route 開關（預設: ON）。啟用時 Track 1 輸入路由至所有三軌。</li>
    <li><b>Track 1 Attack</b>: 軌道 1 Attack 時間，指數縮放。預設: 0.002。</li>
    <li><b>Track 1 Decay</b>: 軌道 1 Decay 時間，指數縮放。預設: 0.3。</li>
    <li><b>Track 1 Curve</b>: 軌道 1 S-curve 形狀（-0.99 至 +0.99）。預設: -0.748。</li>
    <li><b>Track 1 BPF Enable</b>: 軌道 1 Trigger-only/Hybrid 模式切換。</li>
    <li><b>Track 1 BPF Frequency</b>: 軌道 1 BPF 中心頻率（20Hz-8kHz）。預設: 200Hz。</li>
    <li><b>Track 1 BPF Gain</b>: 軌道 1 Filter 後增益（0.1x-100x）。預設: 3.0x。</li>
    <li><b>Track 2 Attack</b>: 軌道 2 Attack 時間。預設: 0。</li>
    <li><b>Track 2 Decay</b>: 軌道 2 Decay 時間。預設: 0.3。</li>
    <li><b>Track 2 Curve</b>: 軌道 2 S-curve 形狀。預設: -0.832。</li>
    <li><b>Track 2 BPF Enable</b>: 軌道 2 Trigger-only/Hybrid 模式切換。</li>
    <li><b>Track 2 BPF Frequency</b>: 軌道 2 BPF 中心頻率。預設: 1kHz。</li>
    <li><b>Track 2 BPF Gain</b>: 軌道 2 Filter 後增益。預設: 3.0x。</li>
    <li><b>Track 3 Attack</b>: 軌道 3 Attack 時間。預設: 0。</li>
    <li><b>Track 3 Decay</b>: 軌道 3 Decay 時間。預設: 0.3。</li>
    <li><b>Track 3 Curve</b>: 軌道 3 S-curve 形狀。預設: -0.731。</li>
    <li><b>Track 3 BPF Enable</b>: 軌道 3 Trigger-only/Hybrid 模式切換。</li>
    <li><b>Track 3 BPF Frequency</b>: 軌道 3 BPF 中心頻率。預設: 5kHz。</li>
    <li><b>Track 3 BPF Gain</b>: 軌道 3 Filter 後增益。預設: 3.0x。</li>
    <li><b>Track 1 Trigger</b>: 軌道 1 Trigger 或 Audio 輸入。</li>
    <li><b>Track 2 Trigger</b>: 軌道 2 Trigger 或 Audio 輸入。</li>
    <li><b>Track 3 Trigger</b>: 軌道 3 Trigger 或 Audio 輸入。</li>
    <li><b>Track 1 Envelope</b>: 軌道 1 Envelope 輸出（0-10V）。Follower ON 時乘以 GAIN。</li>
    <li><b>Track 2 Envelope</b>: 軌道 2 Envelope 輸出（0-10V）。</li>
    <li><b>Track 3 Envelope</b>: 軌道 3 Envelope 輸出（0-10V）。</li>
    <li><b>Sum</b>: 三軌混合輸出，每軌 0.33x 縮放以防止 Clipping。最終輸出限制於 0-10V。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">右鍵選單</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Panel Theme</b>: Light / Dark 面板外觀</li>
    </ul>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">デュアル処理モードを備えた3トラックAttack-Decayエンベロープ生成器。従来のトリガーベース操作と高度なオーディオフォロー用途の両方に対応。各トラックは独立して動作し、独自のエンベロープパラメータを持ちながらグローバルオフセット制御を共有。Followerモードは離散トリガーと連続オーディオダイナミクスの両方に応答するハイブリッド処理を実現。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">シグナルフローアーキテクチャ</h3>
    <p style="margin-bottom: 1rem;">Input → [Auto-Route選択] → [オプション4-Stage BPF] → [Envelope Generator] → [Optional Gain Stage] → Output。Follower有効時、信号はエンベロープ検出前にカスケードバンドパスフィルターを通過。エンベロープ生成器はハイブリッドモードで動作し、トリガーベースとアンプリチュードフォローエンベロープの最大値を出力。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">グローバルコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>ATK ALL</b>: グローバルアタック時間オフセット（-1.0〜+1.0）。全トラックのアタック時間に最大±0.5sのオフセットを追加。</li>
    <li><b>DEC ALL</b>: グローバルディケイ時間オフセット（-1.0〜+1.0）。ATK ALLと同様だがディケイ時間に適用。</li>
    <li><b>ROUTE</b>: Auto-routeトグル（デフォルト: ON）。有効時、Track 1入力が内部的に全3トラックにルーティングされ、異なるBPF周波数と組み合わせて単一ソースからのマルチバンドエンベロープ抽出が可能。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">トラック別エンベロープコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>IN</b>: トリガーまたはオーディオ入力。Trigger-onlyモードでは標準シュミットトリガー検出（VCV標準閾値）を使用。Hybridモードでは>9.5Vでトリガー検出し、連続オーディオダイナミクスも追従。</li>
    <li><b>ATK</b>: アタック時間、指数スケーリング。式: 10^((param-0.5)*6)。0%: 約1ms、50%: 約1s、100%: 約1000s。デフォルト値: Track1=0.002、Track2=0、Track3=0。</li>
    <li><b>DEC</b>: ディケイ時間、同一の指数スケーリング。デフォルト: 全トラック0.3（実際約63ms）。</li>
    <li><b>CURV</b>: S-curveシェイプパラメータ（-0.99〜+0.99）。負の値は指数カーブ（速いアタック/遅いテール）、正の値は対数カーブ（遅いアタック/速いテール）を生成。デフォルトカーブは負（約-0.75〜-0.83）でパーカッシブサウンドに最適化。アルゴリズム: output = (x - k*x) / (k - 2*k*|x| + 1)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Followerモードコントロール</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Follower</b>: Trigger-only（OFF）とHybrid（ON）モードを切替。青色LEDが有効状態を表示。</li>
    <li><b>FREQ</b>: 4段カスケードバンドパスフィルター中心周波数（20Hz-8kHz）。各段はスムーズな周波数応答のためワンポールローパス/ハイパスカスケードを使用。デフォルト周波数はマルチバンド構成: Track1=200Hz（低域）、Track2=1kHz（中域）、Track3=5kHz（高域）。</li>
    <li><b>GAIN</b>: フィルター後出力ゲイン（0.1x-100x、デフォルト: 3.0x）。フィルター後の信号レベル変化を補償し、弱い周波数帯域のブーストが可能。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">処理モードの説明</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Trigger-Only (Follower OFF)</b>: 従来のADエンベロープ動作。標準シュミットトリガー検出で立ち上がりエッジでエンベロープがトリガー。アタックフェーズは0からピークへ上昇、ディケイフェーズは0へ戻る。トリガー間のオーディオ内容は無視。</li>
    <li><b>Hybrid (Follower ON)</b>: 高度なデュアルエンジン処理。トリガーエンベロープとアンプリチュードフォロワーを同時実行し、両者の最大値を出力。フォロワーは整流入力と設定可能なアタック/リリース係数を使用。このモードは明示的なトリガーに応答しながら複雑なオーディオからダイナミクスを抽出するのに優れる。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>1、2、3</b>: 各トラック個別エンベロープ出力（0-10V）。Follower ON時、出力はGAIN設定で乗算。</li>
    <li><b>MIYA（Sum）</b>: クリッピング防止のため各トラック0.33xスケーリングした3トラック混合出力。最終出力は0-10Vにクランプ。三つ目キャラクターモチーフにちなんで命名。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">クリエイティブな応用</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Multi-band Dynamics</b>: Auto-Routeを有効化、異なるBPF周波数（例: 100Hz/800Hz/4kHz）を設定し、出力で周波数特定のVCAやフィルターを制御。</li>
    <li><b>Drum Envelope Extraction</b>: ドラムループを入力、Followerモードを有効化、FREQを調整してキック（低域）、スネア（中域）、ハイハット（高域）のダイナミクスを分離。</li>
    <li><b>Sidechain Ducking</b>: 個別出力を使用して特定周波数内容に基づき他のモジュールパラメータを変調。</li>
    <li><b>Polyrhythmic Triggers</b>: Auto-Route OFF時、各トラックに異なるクロック分周を入力して複雑なエンベロープパターンを生成。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>入力電圧: ±10V（オーディオ/CV）、トリガー閾値: シュミットトリガー（Trigger-only）/ 9.5V（Hybrid）</li>
    <li>出力電圧: 0-10V（ユニポーラエンベロープ）；Follower ONでGAIN >1x時は10Vを超える場合あり</li>
    <li>アタック/ディケイ範囲: 約1ms〜1000s（指数マッピング）</li>
    <li>BPF: 4段カスケードバンドパス、20Hz-8kHz</li>
    <li>エンベロープフォロワー: アタック係数 = 1-exp(-dt/(ATK*0.1))、リリース係数 = 1-exp(-dt/(DEC*0.5))</li>
    <li>処理: 32ビット浮動小数点</li>
    <li>モジュール幅: 8HP</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">パラメータリファレンス</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Attack All</b>: グローバルアタック時間オフセット（-1.0〜+1.0）。全トラックのアタック時間に最大±0.5sのオフセットを追加。全エンベロープを同時に速くまたは遅くシフトするのに有用。</li>
    <li><b>Decay All</b>: グローバルディケイ時間オフセット（-1.0〜+1.0）。Attack Allと同様だがディケイ時間に適用。</li>
    <li><b>Auto Route</b>: Auto-routeトグル（デフォルト: ON）。有効時、Track 1入力が内部的に全3トラックにルーティングされ、異なるBPF周波数と組み合わせて単一ソースからのマルチバンドエンベロープ抽出が可能。</li>
    <li><b>Track 1 Attack</b>: トラック1アタック時間、指数スケーリング。式: 10^((param-0.5)*6)。0%: 約1ms、50%: 約1s。デフォルト: 0.002。</li>
    <li><b>Track 1 Decay</b>: トラック1ディケイ時間、指数スケーリング。デフォルト: 0.3。</li>
    <li><b>Track 1 Curve</b>: トラック1 S-curveシェイプ（-0.99〜+0.99）。デフォルト: -0.748。</li>
    <li><b>Track 1 BPF Enable</b>: トラック1のTrigger-only（OFF）とHybrid（ON）モードの切替。青色LEDが有効状態を表示。</li>
    <li><b>Track 1 BPF Frequency</b>: トラック1 BPF中心周波数（20Hz-8kHz）。デフォルト: 200Hz。</li>
    <li><b>Track 1 BPF Gain</b>: トラック1フィルター後ゲイン（0.1x-100x）。デフォルト: 3.0x。</li>
    <li><b>Track 2 Attack</b>: トラック2アタック時間。デフォルト: 0。</li>
    <li><b>Track 2 Decay</b>: トラック2ディケイ時間。デフォルト: 0.3。</li>
    <li><b>Track 2 Curve</b>: トラック2 S-curveシェイプ。デフォルト: -0.832。</li>
    <li><b>Track 2 BPF Enable</b>: トラック2 Trigger-only/Hybridモード切替。</li>
    <li><b>Track 2 BPF Frequency</b>: トラック2 BPF中心周波数。デフォルト: 1kHz。</li>
    <li><b>Track 2 BPF Gain</b>: トラック2フィルター後ゲイン。デフォルト: 3.0x。</li>
    <li><b>Track 3 Attack</b>: トラック3アタック時間。デフォルト: 0。</li>
    <li><b>Track 3 Decay</b>: トラック3ディケイ時間。デフォルト: 0.3。</li>
    <li><b>Track 3 Curve</b>: トラック3 S-curveシェイプ。デフォルト: -0.731。</li>
    <li><b>Track 3 BPF Enable</b>: トラック3 Trigger-only/Hybridモード切替。</li>
    <li><b>Track 3 BPF Frequency</b>: トラック3 BPF中心周波数。デフォルト: 5kHz。</li>
    <li><b>Track 3 BPF Gain</b>: トラック3フィルター後ゲイン。デフォルト: 3.0x。</li>
    <li><b>Track 1 Trigger</b>: トラック1のトリガーまたはオーディオ入力。Trigger-onlyモードではSchmittトリガー検出を使用。Hybridモードでは>9.5Vでトリガー検出し、オーディオダイナミクスも追従。</li>
    <li><b>Track 2 Trigger</b>: トラック2トリガーまたはオーディオ入力。</li>
    <li><b>Track 3 Trigger</b>: トラック3トリガーまたはオーディオ入力。</li>
    <li><b>Track 1 Envelope</b>: トラック1エンベロープ出力（0-10V）。Follower ON時はGAIN設定で乗算。</li>
    <li><b>Track 2 Envelope</b>: トラック2エンベロープ出力（0-10V）。</li>
    <li><b>Track 3 Envelope</b>: トラック3エンベロープ出力（0-10V）。</li>
    <li><b>Sum</b>: 3トラック混合出力、各トラック0.33xスケーリングでクリッピングを防止。最終出力は0-10Vにクランプ。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">右クリックメニュー</h3>
    <ul style="padding-left: 1.5rem;">
    <li><b>Panel Theme</b>: Light / Dark パネル外観</li>
    </ul>
controls:
- name: Attack All
  type: param
  desc:
    en: Global attack time offset (-1.0 to +1.0). Adds up to ±0.5s offset to all track attack times. Useful for simultaneously shifting all envelopes faster or slower.
    zh: Global Attack 時間偏移（-1.0 至 +1.0，預設 0）。對所有軌道 Attack 時間加上最多 ±0.5s 偏移。
    ja: グローバルアタック時間オフセット（-1.0〜+1.0）。全トラックのアタック時間に最大±0.5sのオフセットを追加。全エンベロープを同時に速くまたは遅くシフトするのに有用。
- name: Decay All
  type: param
  desc:
    en: Global decay time offset (-1.0 to +1.0). Same behavior as Attack All but for decay times.
    zh: Global Decay 時間偏移（-1.0 至 +1.0，預設 0）。與 Attack All 相同但作用於 Decay 時間。
    ja: グローバルディケイ時間オフセット（-1.0〜+1.0）。Attack Allと同様だがディケイ時間に適用。
- name: Auto Route
  type: param
  desc:
    en: 'Auto-route toggle (default: ON). When enabled, Track 1 input is internally routed to all three tracks, allowing single-source multi-band envelope extraction when combined with different BPF frequencies.'
    zh: Auto-route 開關（預設 ON）。啟用時 Track 1 輸入內部路由至所有三軌，搭配不同 BPF 頻率可實現單一來源多頻帶 Envelope 擷取。
    ja: 'Auto-routeトグル（デフォルト: ON）。有効時、Track 1入力が内部的に全3トラックにルーティングされ、異なるBPF周波数と組み合わせて単一ソースからのマルチバンドエンベロープ抽出が可能。'
- name: Track 1 Attack
  type: param
  desc:
    en: 'Attack time with exponential scaling. Formula: 10^((param-0.5)*6). At 0%: ~1ms, at 50%: ~1s. Default: 0.002.'
    zh: Track 1 Attack 時間，指數縮放（0 至 1，預設 0.002）。約 1ms 至 1000s。
    ja: 'トラック1アタック時間、指数スケーリング。式: 10^((param-0.5)*6)。0%: 約1ms、50%: 約1s。デフォルト: 0.002。'
- name: Track 1 Decay
  type: param
  desc:
    en: 'Decay time with identical exponential scaling. Default: 0.3 (~63ms actual time).'
    zh: Track 1 Decay 時間，指數縮放（0 至 1，預設 0.3）。約 1ms 至 1000s。
    ja: 'トラック1ディケイ時間、指数スケーリング。デフォルト: 0.3。'
- name: Track 1 Curve
  type: param
  desc:
    en: 'S-curve shaping (-0.99 to +0.99). Negative = exponential, positive = logarithmic. Default: -0.748.'
    zh: Track 1 S-curve 形狀（-0.99 至 +0.99，預設 -0.748）。負值為指數曲線，正值為對數曲線。
    ja: 'トラック1 S-curveシェイプ（-0.99〜+0.99）。デフォルト: -0.748。'
- name: Track 1 BPF Enable
  type: param
  desc:
    en: Toggle between Trigger-only (OFF) and Hybrid (ON) modes for Track 1. Blue LED indicates active state.
    zh: Track 1 模式切換（0 或 1，預設 OFF）。OFF 為 Trigger-only，ON 為 Hybrid（Trigger + Envelope Follower）。藍色 LED 指示啟用狀態。
    ja: トラック1のTrigger-only（OFF）とHybrid（ON）モードの切替。青色LEDが有効状態を表示。
- name: Track 1 BPF Frequency
  type: param
  desc:
    en: '4-stage cascaded bandpass filter center frequency (20Hz-8kHz). Default: 200Hz (bass).'
    zh: Track 1 BPF 中心頻率（20Hz 至 8000Hz，預設 200Hz）。Bandpass 為 SVF 架構 Q=1，作用於 Envelope Follower 前端訊號。
    ja: 'トラック1 BPF中心周波数（20Hz-8kHz）。デフォルト: 200Hz。'
- name: Track 1 BPF Gain
  type: param
  desc:
    en: 'Post-filter output gain (0.1x-100x). Default: 3.0x.'
    zh: Track 1 BPF 後輸出增益（0.1x 至 100x，預設 3.0x）。Follower 開啟時乘至輸出 Envelope。
    ja: 'トラック1フィルター後ゲイン（0.1x-100x）。デフォルト: 3.0x。'
- name: Track 2 Attack
  type: param
  desc:
    en: 'Attack time for Track 2. Same scaling. Default: 0.'
    zh: Track 2 Attack 時間，指數縮放（0 至 1，預設 0）。約 1ms 至 1000s。
    ja: 'トラック2アタック時間。デフォルト: 0。'
- name: Track 2 Decay
  type: param
  desc:
    en: 'Decay time for Track 2. Default: 0.3.'
    zh: Track 2 Decay 時間，指數縮放（0 至 1，預設 0.3）。約 1ms 至 1000s。
    ja: 'トラック2ディケイ時間。デフォルト: 0.3。'
- name: Track 2 Curve
  type: param
  desc:
    en: 'S-curve shaping for Track 2. Default: -0.832.'
    zh: Track 2 S-curve 形狀（-0.99 至 +0.99，預設 -0.832）。負值為指數曲線，正值為對數曲線。
    ja: 'トラック2 S-curveシェイプ。デフォルト: -0.832。'
- name: Track 2 BPF Enable
  type: param
  desc:
    en: Toggle Hybrid mode for Track 2.
    zh: Track 2 模式切換（0 或 1，預設 OFF）。OFF 為 Trigger-only，ON 為 Hybrid。藍色 LED 指示啟用狀態。
    ja: トラック2 Trigger-only/Hybridモード切替。
- name: Track 2 BPF Frequency
  type: param
  desc:
    en: 'BPF center frequency for Track 2. Default: 1kHz (mid).'
    zh: Track 2 BPF 中心頻率（20Hz 至 8000Hz，預設 1000Hz）。
    ja: 'トラック2 BPF中心周波数。デフォルト: 1kHz。'
- name: Track 2 BPF Gain
  type: param
  desc:
    en: 'Post-filter gain for Track 2. Default: 3.0x.'
    zh: Track 2 BPF 後輸出增益（0.1x 至 100x，預設 3.0x）。
    ja: 'トラック2フィルター後ゲイン。デフォルト: 3.0x。'
- name: Track 3 Attack
  type: param
  desc:
    en: 'Attack time for Track 3. Same scaling. Default: 0.'
    zh: Track 3 Attack 時間，指數縮放（0 至 1，預設 0）。約 1ms 至 1000s。
    ja: 'トラック3アタック時間。デフォルト: 0。'
- name: Track 3 Decay
  type: param
  desc:
    en: 'Decay time for Track 3. Default: 0.3.'
    zh: Track 3 Decay 時間，指數縮放（0 至 1，預設 0.3）。約 1ms 至 1000s。
    ja: 'トラック3ディケイ時間。デフォルト: 0.3。'
- name: Track 3 Curve
  type: param
  desc:
    en: 'S-curve shaping for Track 3. Default: -0.731.'
    zh: Track 3 S-curve 形狀（-0.99 至 +0.99，預設 -0.731）。負值為指數曲線，正值為對數曲線。
    ja: 'トラック3 S-curveシェイプ。デフォルト: -0.731。'
- name: Track 3 BPF Enable
  type: param
  desc:
    en: Toggle Hybrid mode for Track 3.
    zh: Track 3 模式切換（0 或 1，預設 OFF）。OFF 為 Trigger-only，ON 為 Hybrid。藍色 LED 指示啟用狀態。
    ja: トラック3 Trigger-only/Hybridモード切替。
- name: Track 3 BPF Frequency
  type: param
  desc:
    en: 'BPF center frequency for Track 3. Default: 5kHz (high).'
    zh: Track 3 BPF 中心頻率（20Hz 至 8000Hz，預設 5000Hz）。
    ja: 'トラック3 BPF中心周波数。デフォルト: 5kHz。'
- name: Track 3 BPF Gain
  type: param
  desc:
    en: 'Post-filter gain for Track 3. Default: 3.0x.'
    zh: Track 3 BPF 後輸出增益（0.1x 至 100x，預設 3.0x）。
    ja: 'トラック3フィルター後ゲイン。デフォルト: 3.0x。'
- name: Track 1 Trigger
  type: input
  desc:
    en: Trigger or audio input for Track 1. In Trigger-only mode, uses Schmitt trigger detection. In Hybrid mode, requires >9.5V for trigger while following audio dynamics.
    zh: Track 1 Trigger 或 Audio 輸入。Trigger-only 模式使用 Schmitt Trigger 偵測。Hybrid 模式需要 >9.5V 觸發並追蹤 Audio 動態。
    ja: トラック1のトリガーまたはオーディオ入力。Trigger-onlyモードではSchmittトリガー検出を使用。Hybridモードでは>9.5Vでトリガー検出し、オーディオダイナミクスも追従。
- name: Track 2 Trigger
  type: input
  desc:
    en: Trigger or audio input for Track 2. Same behavior as Track 1.
    zh: Track 2 Trigger 或 Audio 輸入。行為同 Track 1。
    ja: トラック2トリガーまたはオーディオ入力。
- name: Track 3 Trigger
  type: input
  desc:
    en: Trigger or audio input for Track 3. Same behavior as Track 1.
    zh: Track 3 Trigger 或 Audio 輸入。行為同 Track 1。
    ja: トラック3トリガーまたはオーディオ入力。
- name: Track 1 Envelope
  type: output
  desc:
    en: Track 1 envelope output (0-10V). When Follower is ON, output is multiplied by GAIN setting.
    zh: Track 1 Envelope 輸出（0 至 10V）。Hybrid 模式下輸出乘以 BPF Gain。
    ja: トラック1エンベロープ出力（0-10V）。Follower ON時はGAIN設定で乗算。
- name: Track 2 Envelope
  type: output
  desc:
    en: Track 2 envelope output (0-10V). Same behavior.
    zh: Track 2 Envelope 輸出（0 至 10V）。Hybrid 模式下輸出乘以 BPF Gain。
    ja: トラック2エンベロープ出力（0-10V）。
- name: Track 3 Envelope
  type: output
  desc:
    en: Track 3 envelope output (0-10V). Same behavior.
    zh: Track 3 Envelope 輸出（0 至 10V）。Hybrid 模式下輸出乘以 BPF Gain。
    ja: トラック3エンベロープ出力（0-10V）。
- name: Sum
  type: output
  desc:
    en: Mixed output of all three tracks with 0.33x scaling per track to prevent clipping. Final output clamped to 0-10V.
    zh: 三軌混合輸出（0 至 10V）。每軌以 0.33x 縮放後相加防止 Clipping，最終輸出 clamp 至 0 至 10V。
    ja: 3トラック混合出力、各トラック0.33xスケーリングでクリッピングを防止。最終出力は0-10Vにクランプ。
