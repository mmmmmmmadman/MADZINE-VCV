- name: Fade Clock
  type: param
  desc:
    en: Start crossfade N Clocks before segment ends (0-16, default 0, snap to integer). 0 disables Clock-advance fade.
    zh: 在段落結束前 N 個 Clock 開始 Crossfade（0-16，預設 0，整數 Snap）。0 時停用提前 Crossfade。
    ja: セグメント終了Nクロック前にクロスフェード開始（0-16、デフォルト0、整数スナップ）。0で事前クロスフェード無効。
- name: Fade Time
  type: param
  desc:
    en: Crossfade duration in milliseconds (0-1000, default 100). Linear crossfade between current and next Input.
    zh: Crossfade 持續時間，單位毫秒（0-1000，預設 100）。當前與下一個 Input 之間的線性 Crossfade。
    ja: クロスフェード持続時間（ミリ秒、0-1000、デフォルト100）。現在と次のInput間のリニアクロスフェード。
- name: Clock
  type: input
  desc:
    en: Clock input. Each pulse advances the internal counter.
    zh: Clock 輸入。每個 Pulse 推進內部計數器。
