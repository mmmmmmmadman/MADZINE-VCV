slug: Runner
name: Runner
hp: 4
wide: false
alt: Runner
description:
  en: Chaos-modulated stereo delay with Lorenz attractor modulation and sample-and-hold output
  zh: Chaos 調變 Stereo Delay，具備 Lorenz Attractor 調變與 Sample-and-Hold 輸出
  ja: ローレンツアトラクター変調とサンプル&ホールド出力を備えたカオス変調ステレオディレイ
features:
  en:
  - Independent L/R delay times up to 2s
  - Lorenz attractor chaos modulation
  - Sample-and-hold chaos output
  - Auto-patch with YAMANOTE
  - Polyphonic up to 16 channels
  zh:
  - 獨立 L/R Delay 時間最長 2 秒
  - Lorenz Attractor Chaos 調變
  - Sample-and-Hold Chaos 輸出
  - 與 YAMANOTE 自動配線
  - Polyphonic 最多 16 聲道
  ja:
  - 独立L/Rディレイタイム最大2秒
  - ローレンツアトラクターカオス変調
  - サンプル&ホールドカオス出力
  - YAMANOTEとの自動パッチ
  - ポリフォニック最大16チャンネル
manual_html_raw:
  en: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Overview</h3>
    <p style="margin-bottom: 1rem;">Stereo delay processor with Lorenz attractor chaos modulation. Part of the Alien trilogy effects series (Runner, Facehugger, Ovomorph). Features independent left/right delay times, feedback control, and chaos-driven parameter modulation. Designed to work with YAMANOTE for send/return routing.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Signal Flow</h3>
    <p style="margin-bottom: 1rem;">Input → Delay Buffer → [Chaos Modulation] → Wet/Dry Mix → Output. Delay times and feedback can be modulated by the internal Lorenz chaos generator for organic, evolving delay textures.</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Delay Parameters</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time L</b>: Left channel delay time (1ms-2s, default: 250ms). CV adds ±200ms.</li>
    <li><b>Time R</b>: Right channel delay time (1ms-2s, default: 250ms). CV adds ±200ms.</li>
    <li><b>Feedback</b>: Feedback amount (0-95%, default: 30%). CV adds ±10%.</li>
    <li><b>Mix</b>: Wet/dry balance (0-100%, default: 50%). CV adds ±10%.</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaos Generator</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Algorithm</b>: Lorenz strange attractor differential equations</li>
    <li><b>Chaos</b>: Modulation depth (0-100%, default: 0%). Controls how much chaos affects delay time and feedback.</li>
    <li><b>Rate</b>: Chaos evolution speed (0.01-2.0x, default: 0.5x). Higher = faster parameter changes.</li>
    <li><b>Effect on Delay</b>: Time ±100ms, Feedback ±10%</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sample & Hold</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>S&H Output</b>: Stepped chaos signal sampled at RATE × 10 Hz</li>
    <li><b>Range</b>: 0-5V CV output</li>
    <li><b>Use</b>: External modulation source with quantized, stepped behavior</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Auto-Patch with YAMANOTE</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Detection</b>: When placed directly right of YAMANOTE, auto-connects to send/return</li>
    <li><b>Channel Selection</b>: Uses Channel A if single effect, Channel B if part of chain</li>
    <li><b>Chain Support</b>: Multiple effects (Runner, Facehugger, Ovomorph) auto-distribute across channels</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Inputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: Left stereo input</li>
    <li><b>Right Audio</b>: Right stereo input (normalizes to Left if disconnected)</li>
    <li><b>Time L CV</b>: Left delay time modulation</li>
    <li><b>Time R CV</b>: Right delay time modulation</li>
    <li><b>Feedback CV</b>: Feedback modulation</li>
    <li><b>Mix CV</b>: Wet/dry modulation</li>
    <li><b>Chaos CV</b>: Chaos depth modulation</li>
    <li><b>Rate CV</b>: Chaos speed modulation</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Outputs</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: Left processed output (polyphonic)</li>
    <li><b>Right Audio</b>: Right processed output (polyphonic)</li>
    <li><b>Chaos CV</b>: Raw chaos signal 0-5V (polyphonic)</li>
    <li><b>Sample &amp; Hold CV</b>: Sample-and-hold chaos 0-5V (polyphonic)</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Technical Specifications</h3>
    <ul style="padding-left: 1.5rem;">
    <li>Module width: 4HP</li>
    <li>Delay buffer: 96,000 samples per channel (~2s at 48kHz)</li>
    <li>Delay time range: 1ms - 2 seconds</li>
    <li>Feedback range: 0-95%</li>
    <li>Chaos algorithm: Lorenz attractor</li>
    <li>Polyphony: Up to 16 channels</li>
    <li>Processing: 32-bit floating point</li>
    <li><b>Sample & Hold CV</b>: Sample & Hold output from Chaos section. Samples random values at Chaos Rate, with slew limiting.</li>
    </ul>
  zh: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概述</h3>
    <p style="margin-bottom: 1rem;">具備 Lorenz Attractor Chaos 調變的 Stereo Delay 處理器。屬於 Alien 三部曲效果器系列（Runner、Facehugger、Ovomorph）。具備獨立左右 Delay 時間、Feedback 控制和 Chaos 驅動的參數調變。設計用於與 YAMANOTE 配合進行 Send/Return Routing。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">訊號流程</h3>
    <p style="margin-bottom: 1rem;">Input → Delay Buffer → [Chaos 調變] → Wet/Dry Mix → Output。Delay 時間和 Feedback 可由內部 Lorenz Chaos Generator 調變，產生有機、演化的 Delay 質感。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Delay 參數</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time L</b>: 左聲道 Delay 時間（1ms-2s，預設：250ms）。CV 增加 ±200ms。</li>
    <li><b>Time R</b>: 右聲道 Delay 時間（1ms-2s，預設：250ms）。CV 增加 ±200ms。</li>
    <li><b>Feedback</b>: Feedback 量（0-95%，預設：30%）。CV 增加 ±10%。</li>
    <li><b>Mix</b>: Wet/Dry 平衡（0-100%，預設：50%）。CV 增加 ±10%。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Chaos Generator</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Algorithm</b>: Lorenz 奇異吸引子微分方程式</li>
    <li><b>Chaos</b>: 調變深度（0-100%，預設：0%）。控制 Chaos 對 Delay 時間和 Feedback 的影響程度。</li>
    <li><b>Rate</b>: Chaos 演化速度（0.01-2.0x，預設：0.5x）。越高 = 參數變化越快。</li>
    <li><b>Effect on Delay</b>: 時間 ±100ms，Feedback ±10%</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">Sample & Hold</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>S&H Output</b>: 以 RATE × 10 Hz 取樣的階梯 Chaos 訊號</li>
    <li><b>Range</b>: 0-5V CV 輸出</li>
    <li><b>Use</b>: 具有量化、階梯行為的外部調變源</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">與 YAMANOTE 自動配線</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Detection</b>: 當放置在 YAMANOTE 正右方時，自動連接到 Send/Return</li>
    <li><b>Channel Selection</b>: 單一效果器使用 Channel A，鏈式配置使用 Channel B</li>
    <li><b>Chain Support</b>: 多個效果器（Runner、Facehugger、Ovomorph）自動分配到各聲道</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸入</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左聲道 Stereo 輸入</li>
    <li><b>Right Audio</b>: 右聲道 Stereo 輸入（未連接時正規化至 Left）</li>
    <li><b>Time L CV</b>: 左 Delay 時間調變</li>
    <li><b>Time R CV</b>: 右 Delay 時間調變</li>
    <li><b>Feedback CV</b>: Feedback 調變</li>
    <li><b>Mix CV</b>: Wet/Dry 調變</li>
    <li><b>Chaos CV</b>: Chaos 深度調變</li>
    <li><b>Rate CV</b>: Chaos 速度調變</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">輸出</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左聲道處理輸出（Polyphonic）</li>
    <li><b>Right Audio</b>: 右聲道處理輸出（Polyphonic）</li>
    <li><b>Chaos CV</b>: 原始 Chaos 訊號 0-5V（Polyphonic）</li>
    <li><b>Sample &amp; Hold CV</b>: Sample-and-Hold Chaos 0-5V（Polyphonic）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術規格</h3>
    <ul style="padding-left: 1.5rem;">
    <li>模組寬度：4HP</li>
    <li>Delay Buffer：每聲道 96,000 Sample（48kHz 時約 2 秒）</li>
    <li>Delay 時間範圍：1ms - 2 秒</li>
    <li>Feedback 範圍：0-95%</li>
    <li>Chaos 演算法：Lorenz Attractor</li>
    <li>Polyphony：最多 16 聲道</li>
    <li>處理：32-bit 浮點</li>
    <li><b>Sample & Hold CV</b>: Chaos 區段的 Sample & Hold 輸出。依 Chaos Rate 取樣隨機值，帶有 Slew 限制。</li>
    </ul>
  ja: |-
    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">概要</h3>
    <p style="margin-bottom: 1rem;">ローレンツアトラクターカオス変調を備えたステレオディレイプロセッサー。Alienトリロジーエフェクトシリーズ（Runner、Facehugger、Ovomorph）の一つ。独立左右ディレイタイム、フィードバック制御、カオス駆動パラメータ変調を搭載。YAMANOTEとのセンド/リターンルーティング用に設計。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">信号フロー</h3>
    <p style="margin-bottom: 1rem;">Input → Delay Buffer → [Chaos変調] → Wet/Dry Mix → Output。ディレイタイムとフィードバックは内部ローレンツカオスジェネレーターで変調でき、オーガニックで進化するディレイテクスチャーを生成。</p>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">ディレイパラメータ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Time L</b>: 左チャンネルディレイタイム（1ms-2s、デフォルト：250ms）。CVで±200ms追加。</li>
    <li><b>Time R</b>: 右チャンネルディレイタイム（1ms-2s、デフォルト：250ms）。CVで±200ms追加。</li>
    <li><b>Feedback</b>: フィードバック量（0-95%、デフォルト：30%）。CVで±10%追加。</li>
    <li><b>Mix</b>: ウェット/ドライバランス（0-100%、デフォルト：50%）。CVで±10%追加。</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">カオスジェネレーター</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Algorithm</b>: ローレンツストレンジアトラクター微分方程式</li>
    <li><b>Chaos</b>: 変調深度（0-100%、デフォルト：0%）。カオスがディレイタイムとフィードバックに与える影響を制御。</li>
    <li><b>Rate</b>: カオス進化速度（0.01-2.0x、デフォルト：0.5x）。高いほどパラメータ変化が速い。</li>
    <li><b>Effect on Delay</b>: タイム±100ms、フィードバック±10%</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">サンプル&ホールド</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>S&H Output</b>: RATE × 10 Hzでサンプルされたステップカオス信号</li>
    <li><b>Range</b>: 0-5V CV出力</li>
    <li><b>Use</b>: クオンタイズされたステップ動作の外部変調ソース</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">YAMANOTEとの自動パッチ</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Detection</b>: YAMANOTEの直右に配置するとセンド/リターンに自動接続</li>
    <li><b>Channel Selection</b>: 単一エフェクトはChannel A、チェーンの一部はChannel Bを使用</li>
    <li><b>Chain Support</b>: 複数エフェクト（Runner、Facehugger、Ovomorph）が各チャンネルに自動分配</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">入力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左ステレオ入力</li>
    <li><b>Right Audio</b>: 右ステレオ入力（未接続時はLeftに正規化）</li>
    <li><b>Time L CV</b>: 左ディレイタイム変調</li>
    <li><b>Time R CV</b>: 右ディレイタイム変調</li>
    <li><b>Feedback CV</b>: フィードバック変調</li>
    <li><b>Mix CV</b>: ウェット/ドライ変調</li>
    <li><b>Chaos CV</b>: カオス深度変調</li>
    <li><b>Rate CV</b>: カオス速度変調</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">出力</h3>
    <ul style="padding-left: 1.5rem; margin-bottom: 1rem;">
    <li><b>Left Audio</b>: 左処理出力（ポリフォニック）</li>
    <li><b>Right Audio</b>: 右処理出力（ポリフォニック）</li>
    <li><b>Chaos CV</b>: 生カオス信号0-5V（ポリフォニック）</li>
    <li><b>Sample &amp; Hold CV</b>: サンプル&ホールドカオス0-5V（ポリフォニック）</li>
    </ul>

    <h3 style="color: oklch(0.65 0.06 295); margin-bottom: 0.8rem; border-bottom: 2px solid oklch(0.30 0.008 265); padding-bottom: 0.5rem;">技術仕様</h3>
    <ul style="padding-left: 1.5rem;">
    <li>モジュール幅：4HP</li>
    <li>ディレイバッファ：チャンネル毎96,000サンプル（48kHzで約2秒）</li>
    <li>ディレイタイム範囲：1ms - 2秒</li>
    <li>フィードバック範囲：0-95%</li>
    <li>カオスアルゴリズム：ローレンツアトラクター</li>
    <li>ポリフォニー：最大16チャンネル</li>
    <li>処理：32ビット浮動小数点</li>
    <li><b>Sample & Hold CV</b>: Chaosセクションのサンプル＆ホールド出力。Chaos Rateでランダム値をサンプリングし、スルーリミッティング付き。</li>
    </ul>
controls:
- name: Time L
  type: param
  desc:
    en: 'Left channel delay time (1ms-2s, default: 250ms). CV adds Time modulation.'
    zh: 左聲道 Delay 時間（1ms-2s，預設：250ms）。CV 調變 Time。
    ja: 左チャンネルディレイタイム（1ms-2s、デフォルト：250ms）。CVでTime変調。
- name: Time R
  type: param
  desc:
    en: 'Right channel delay time (1ms-2s, default: 250ms). CV adds Time modulation.'
    zh: 右聲道 Delay 時間（1ms-2s，預設：250ms）。CV 調變 Time。
    ja: 右チャンネルディレイタイム（1ms-2s、デフォルト：250ms）。CVでTime変調。
- name: Feedback
  type: param
  desc:
    en: 'Feedback amount (0-95%, default: 30%). CV adds Feedback modulation.'
    zh: Feedback 量（0-95%，預設：30%）。CV 調變 Feedback。
    ja: フィードバック量（0-95%、デフォルト：30%）。CVでFeedback変調。
- name: Mix
  type: param
  desc:
    en: 'Wet/dry balance (0-100%, default: 50%). CV adds Mix modulation.'
    zh: Wet/Dry 平衡（0-100%，預設：50%）。CV 調變 Mix。
    ja: ウェット/ドライバランス（0-100%、デフォルト：50%）。CVでMix変調。
- name: Chaos
  type: param
  desc:
    en: 'Chaos modulation depth (0-100%, default: 0%). Controls how much Chaos affects Delay time and Feedback.'
    zh: Chaos 調變深度（0-100%，預設：0%）。控制 Chaos 對 Delay 時間和 Feedback 的影響程度。
    ja: Chaos変調深度（0-100%、デフォルト：0%）。ChaosがDelayタイムとFeedbackに与える影響を制御。
- name: Rate
  type: param
  desc:
    en: 'Chaos evolution speed (0.01-2.0x, default: 0.5x). Higher values = faster parameter changes.'
    zh: Chaos 演化速度（0.01-2.0x，預設：0.5x）。越高 = 參數變化越快。
    ja: Chaos進化速度（0.01-2.0x、デフォルト：0.5x）。高いほどパラメータ変化が速い。
- name: Left Audio
  type: input
  desc:
    en: Left audio input (polyphonic, up to 16 channels).
    zh: 左聲道音訊輸入（Polyphonic，最多 16 聲道）。
    ja: 左チャンネルオーディオ入力（ポリフォニック、最大16チャンネル）。
- name: Right Audio
  type: input
  desc:
    en: Right audio input. Normalizes to Left input if disconnected.
    zh: 右聲道音訊輸入。未連接時正規化至 Left。
    ja: 右チャンネルオーディオ入力。未接続時はLeftに正規化。
- name: Time L CV
  type: input
  desc:
    en: Left Delay time CV input. Adds Time modulation.
    zh: 左 Delay Time CV 輸入。調變 Time。
    ja: 左Delay Time CV入力。Time変調。
- name: Time R CV
  type: input
  desc:
    en: Right Delay time CV input. Adds Time modulation.
    zh: 右 Delay Time CV 輸入。調變 Time。
    ja: 右Delay Time CV入力。Time変調。
- name: Feedback CV
  type: input
  desc:
    en: Feedback CV input. Adds Feedback modulation.
    zh: Feedback CV 輸入。調變 Feedback。
    ja: Feedback CV入力。Feedback変調。
- name: Mix CV
  type: input
  desc:
    en: Mix CV input. Adds Wet/Dry modulation.
    zh: Mix CV 輸入。調變 Wet/Dry。
    ja: Mix CV入力。Wet/Dry変調。
- name: Chaos CV
  type: input
  desc:
    en: Chaos CV input. Adds Chaos depth modulation.
    zh: Chaos CV 輸入。調變 Chaos 深度。
    ja: Chaos CV入力。Chaos深度変調。
- name: Rate CV
  type: input
  desc:
    en: Rate CV input. Adds Chaos Rate modulation.
    zh: Rate CV 輸入。調變 Chaos Rate。
    ja: Rate CV入力。Chaos Rate変調。
- name: Left Audio
  type: output
  desc:
    en: Left audio output (polyphonic).
    zh: 左聲道音訊輸出（Polyphonic）。
    ja: 左チャンネルオーディオ出力（ポリフォニック）。
- name: Right Audio
  type: output
  desc:
    en: Right audio output (polyphonic).
